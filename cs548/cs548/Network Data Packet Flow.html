<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Data Packet Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0d1420;
  --surface2: #111b2e;
  --border: #1a2540;
  --border2: #243050;
  --text: #c8d8f0;
  --text-dim: #4a6080;
  --text-mid: #7a96b8;

  --app:    #22d3ee;
  --tls:    #a78bfa;
  --tcp:    #fbbf24;
  --ip:     #34d399;
  --fw:     #f87171;
  --mac:    #fb923c;

  --app-bg:  #001a20;
  --tls-bg:  #120a22;
  --tcp-bg:  #1a1000;
  --ip-bg:   #001a10;
  --fw-bg:   #1a0505;
  --mac-bg:  #1a0800;

  --mono: 'JetBrains Mono', monospace;
  --display: 'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════ HEADER ═══════════════════════════ */
.header {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.header-title {
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: #fff;
  white-space: nowrap;
}
.header-sub {
  font-size: .65rem;
  color: var(--text-dim);
  white-space: nowrap;
}
.scenario-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.stab {
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-mid);
  font-family: var(--mono);
  font-size: .63rem;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.stab:hover { border-color: var(--text-mid); color: var(--text); }
.stab.active { border-color: var(--app); background: rgba(34,211,238,.1); color: var(--app); font-weight: 700; }

.view-tabs {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.vtab {
  padding: 5px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: .6rem;
  cursor: pointer;
  transition: all .15s;
}
.vtab:hover { color: var(--text); }
.vtab.active { background: var(--border2); color: var(--text); border-color: var(--border2); }

/* ═══════════════════════════ MAIN LAYOUT ═══════════════════════ */
.main {
  display: grid;
  grid-template-columns: 1fr 340px;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ═══════════════════════════ LEFT PANEL ═══════════════════════ */
.left-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

/* NETWORK DIAGRAM */
.diagram-area {
  padding: 20px 24px 12px;
  flex-shrink: 0;
}

.scenario-caption {
  font-family: var(--display);
  font-size: .75rem;
  font-weight: 600;
  color: var(--text-mid);
  margin-bottom: 16px;
  letter-spacing: .04em;
}
.scenario-caption span { color: var(--app); }

/* Endpoint row */
.endpoint-row {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 4px;
}
.node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  width: 88px;
  flex-shrink: 0;
}
.node-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  position: relative;
}
.node-pulse {
  position: absolute;
  inset: -3px;
  border-radius: 12px;
  border: 1.5px solid var(--app);
  opacity: 0;
  animation: pulse 2s ease-in-out infinite;
}
.node-label { font-size: .63rem; font-weight: 600; color: var(--text); text-align: center; line-height: 1.3; }
.node-addr  { font-size: .55rem; color: var(--text-dim); text-align: center; }

@keyframes pulse {
  0%,100% { opacity:0; transform:scale(1); }
  50%      { opacity:.6; transform:scale(1.05); }
}

/* Wire between nodes */
.wire-segment {
  flex: 1;
  position: relative;
  height: 44px;
  display: flex;
  align-items: center;
}
.wire-line {
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg,
    var(--app) 0%, var(--tls) 20%, var(--tcp) 40%,
    var(--ip) 60%, var(--fw) 80%, var(--mac) 100%);
  border-radius: 2px;
  position: relative;
  overflow: visible;
}
.wire-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,255,255,.5);
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  animation: traverse 3s cubic-bezier(.4,0,.6,1) infinite;
}
.wire-dot:nth-child(2) { animation-delay: 1s; }
.wire-dot:nth-child(3) { animation-delay: 2s; }
@keyframes traverse {
  0%   { left: 0%;   opacity:0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { left: 100%; opacity:0; }
}
.wire-arrowhead {
  position: absolute;
  right: -1px;
  top: 50%;
  transform: translateY(-50%);
  width: 0; height: 0;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-left: 8px solid var(--mac);
}

.mid-device {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 5px 10px;
  border: 1px dashed var(--border2);
  border-radius: 6px;
  cursor: pointer;
  transition: border-color .15s;
  flex-shrink: 0;
}
.mid-device:hover { border-color: var(--text-mid); }
.mid-device-icon { font-size: 16px; }
.mid-device-name { font-size: .55rem; font-weight: 600; color: var(--text-mid); white-space: nowrap; }
.mid-device-role { font-size: .5rem; color: var(--text-dim); white-space: nowrap; }

/* ═══════════════════════════ STACK AREA ═══════════════════════ */
.stack-area {
  flex: 1;
  overflow: auto;
  padding: 0 24px 16px;
}

.stacks-wrapper {
  display: grid;
  grid-template-columns: 1fr 36px 1fr;
  gap: 0;
  min-width: 500px;
}
.stack-col { display: flex; flex-direction: column; gap: 3px; }
.stack-header {
  font-size: .58rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 0 8px;
  text-align: center;
}

/* LAYER BLOCK */
.layer-block {
  border-radius: 6px;
  border: 1px solid transparent;
  overflow: hidden;
  cursor: pointer;
  transition: transform .12s, box-shadow .12s, border-color .2s;
  animation: slideIn .3s ease both;
}
.layer-block:hover { transform: translateY(-1px); }
.layer-block.active {
  border-color: var(--active-c) !important;
  box-shadow: 0 0 0 1px var(--active-c), 0 4px 20px rgba(0,0,0,.4);
}

@keyframes slideIn {
  from { opacity:0; transform: translateX(-10px); }
  to   { opacity:1; transform: translateX(0); }
}
.layer-block:nth-child(1) { animation-delay: .04s; }
.layer-block:nth-child(2) { animation-delay: .08s; }
.layer-block:nth-child(3) { animation-delay: .12s; }
.layer-block:nth-child(4) { animation-delay: .16s; }
.layer-block:nth-child(5) { animation-delay: .20s; }

.lb-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  font-size: .64rem;
}
.lb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.lb-name { font-weight: 700; flex: 1; }
.lb-proto { font-size: .56rem; opacity: .7; }

/* PACKET VISUALIZATION */
.pkt-vis {
  display: flex;
  height: 26px;
  margin: 0 6px 6px;
  border-radius: 3px;
  overflow: hidden;
}
.pkt-seg {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .52rem;
  font-weight: 600;
  padding: 0 4px;
  text-align: center;
  line-height: 1.2;
  border-right: 1px solid rgba(0,0,0,.25);
  overflow: hidden;
  color: rgba(0,0,0,.75);
  white-space: nowrap;
}
.pkt-seg:last-child { border-right: none; }

/* NEW segment pop animation */
.pkt-seg.new-seg {
  animation: segPop .35s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes segPop {
  0%   { transform: scaleY(0); opacity:0; }
  100% { transform: scaleY(1); opacity:1; }
}

/* Middle column – encapsulation arrows */
.encap-mid-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 26px;
  gap: 3px;
}
.encap-arrow {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  cursor: default;
}
.ea-track {
  width: 1px;
  flex: 1;
  max-height: 22px;
  background: var(--border2);
}
.ea-head {
  width: 0; height: 0;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-top: 6px solid var(--border2);
}
.ea-label {
  font-size: .46rem;
  color: var(--text-dim);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  letter-spacing: .06em;
}

/* ═══════════════════════════ STEP VIEW ═══════════════════════ */
.steps-list {
  flex: 1;
  overflow: auto;
  padding: 12px 24px 16px;
}
.step-item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  animation: slideIn .35s ease both;
}
.step-item:last-child { border-bottom: none; }
.step-item:nth-child(1){animation-delay:.04s}
.step-item:nth-child(2){animation-delay:.08s}
.step-item:nth-child(3){animation-delay:.12s}
.step-item:nth-child(4){animation-delay:.16s}
.step-item:nth-child(5){animation-delay:.20s}
.step-item:nth-child(6){animation-delay:.24s}

.step-badge {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .65rem;
  font-weight: 800;
  flex-shrink: 0;
  font-family: var(--display);
}
.step-body { flex: 1; }
.step-layer { font-size: .57rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 2px; }
.step-title { font-size: .72rem; font-weight: 600; color: var(--text); margin-bottom: 4px; font-family: var(--display); }
.step-desc  { font-size: .64rem; line-height: 1.7; color: var(--text-mid); }
.step-pkt {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 8px;
}
.sp {
  font-size: .54rem;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid;
  font-weight: 600;
  white-space: nowrap;
}

/* ═══════════════════════════ COMPARE VIEW ═══════════════════════ */
.compare-area {
  flex: 1;
  overflow: auto;
  padding: 12px 24px;
}
.compare-table {
  width: 100%;
  border-collapse: collapse;
}
.compare-table th {
  font-size: .6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  padding: 8px 10px;
  border-bottom: 2px solid var(--border2);
  text-align: left;
  white-space: nowrap;
}
.compare-table td {
  font-size: .64rem;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.5;
}
.compare-table tr:nth-child(even) td { background: rgba(255,255,255,.015); }
.cb { /* chip badge */
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: .57rem;
  font-weight: 700;
  border: 1px solid;
  white-space: nowrap;
}
.cb-yes { color: var(--ip);  border-color: var(--ip);  background: rgba(52,211,153,.1); }
.cb-no  { color: var(--fw);  border-color: var(--fw);  background: rgba(248,113,113,.1); }
.cb-mid { color: var(--tcp); border-color: var(--tcp); background: rgba(251,191,36,.1); }
.cb-pur { color: var(--tls); border-color: var(--tls); background: rgba(167,139,250,.1); }

/* ═══════════════════════════ RIGHT DETAIL PANEL ═══════════════ */
.right-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}
.detail-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.detail-layer-name {
  font-family: var(--display);
  font-size: .95rem;
  font-weight: 700;
  margin-bottom: 2px;
}
.detail-proto {
  font-size: .6rem;
  color: var(--text-dim);
}
.detail-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
}
.detail-body {
  flex: 1;
  overflow: auto;
  padding: 14px 18px;
}
.detail-section { margin-bottom: 18px; }
.detail-section-title {
  font-size: .58rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.detail-text {
  font-size: .67rem;
  line-height: 1.8;
  color: var(--text-mid);
}
.detail-text strong { color: var(--text); font-weight: 600; }
.detail-text code {
  background: rgba(255,255,255,.06);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: .62rem;
}

.field-list { display: flex; flex-direction: column; gap: 5px; }
.field-row {
  display: flex;
  gap: 8px;
  padding: 6px 8px;
  background: rgba(255,255,255,.025);
  border-radius: 4px;
  border-left: 2px solid transparent;
}
.fn { font-size: .62rem; font-weight: 700; min-width: 120px; flex-shrink: 0; }
.fd { font-size: .62rem; color: var(--text-mid); line-height: 1.5; }

.exam-box {
  padding: 10px 12px;
  border-radius: 5px;
  border: 1px solid;
  font-size: .63rem;
  line-height: 1.7;
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  height: 100%;
  color: var(--text-dim);
  font-size: .68rem;
  text-align: center;
  padding: 20px;
}
.empty-icon { font-size: 32px; opacity: .4; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ═══════════════════════ HEADER ═══════════════════════ -->
<div class="header">
  <div>
    <div class="header-title">Network Packet Flow</div>
    <div class="header-sub"> Click any layer to inspect</div>
  </div>
  <div class="scenario-tabs" id="scenarioTabs">
    <button class="stab active" onclick="setScenario('https')">🌐 HTTPS</button>
    <button class="stab" onclick="setScenario('vpn')">🔒 IPsec VPN</button>
    <button class="stab" onclick="setScenario('wifi')">📶 Wi-Fi Auth</button>
    <button class="stab" onclick="setScenario('ssh')">⬛ SSH Tunnel</button>
  </div>
  <div class="view-tabs">
    <button class="vtab active" id="vt-encap" onclick="setView('encap')">Encapsulation</button>
    <button class="vtab" id="vt-steps" onclick="setView('steps')">Step-by-Step</button>
    <button class="vtab" id="vt-compare" onclick="setView('compare')">Compare</button>
  </div>
</div>

<!-- ═══════════════════════ MAIN ═══════════════════════ -->
<div class="main">
  <div class="left-panel">

    <!-- NETWORK DIAGRAM (always visible) -->
    <div class="diagram-area">
      <div class="scenario-caption" id="scenarioCap">
        Scenario: <span id="scenarioName">HTTPS Browser → Bank Server</span>
      </div>
      <div class="endpoint-row" id="endpointRow">
        <!-- built by JS -->
      </div>
    </div>

    <!-- ENCAP VIEW -->
    <div class="stack-area" id="encapView">
      <div class="stacks-wrapper" id="stacksWrapper"><!-- built by JS --></div>
    </div>

    <!-- STEPS VIEW -->
    <div class="steps-list" id="stepsView" style="display:none"><!-- built by JS --></div>

    <!-- COMPARE VIEW -->
    <div class="compare-area" id="compareView" style="display:none"><!-- built by JS --></div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div id="rightPanel">
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div>Click any layer block<br>to see detailed analysis</div>
        <div style="margin-top:8px;font-size:.58rem;color:var(--text-dim)">or switch scenarios &amp; views<br>in the header above</div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  DATA LAYER DEFINITIONS
// ══════════════════════════════════════════════════════════════════
const LAYERS = {
  app: {
    label: 'Application Layer', proto: 'HTTP · DNS · SMTP', col: 'var(--app)', bg: 'var(--app-bg)',
    short: 'L7',
    overview: `The <strong>Application Layer</strong> generates raw payload data. For HTTPS, this is a plaintext HTTP request — <code>GET /account HTTP/1.1</code> — or an HTTP response. The application passes data directly to a socket API; it has no knowledge of encryption, routing, or framing below it.<br><br>HTTP is <strong>stateless</strong> — each request is independent. Cookies, session tokens, and OAuth enable state across requests. This layer is where an attacker sees your data if TLS is absent.`,
    fields: [
      { name:'Method / Status', desc:'GET, POST, PUT, DELETE (req) or 200 OK, 404 (resp)' },
      { name:'Host header', desc:'Domain name — also drives SNI in TLS handshake so correct cert is served' },
      { name:'Cookie header', desc:'Session ID sent automatically by browser on every request (authentication)' },
      { name:'Content-Type', desc:'MIME type of body — text/html, application/json, multipart/form-data' },
      { name:'Body', desc:'HTML, JSON payload, or form POST data. Plaintext without TLS.' },
    ],
    services: { conf: false, integ: false, auth: false },
    examTip: 'HTTP is stateless and has NO built-in security. TLS provides all security for HTTPS. Know the difference between HTTP headers and the TLS Record that wraps them.',
    tipColor: 'var(--app)',
  },
  tls: {
    label: 'TLS / Session Layer', proto: 'TLS 1.3 · TLS 1.2 · SSH · DTLS', col: 'var(--tls)', bg: 'var(--tls-bg)',
    short: 'TLS',
    overview: `<strong>TLS 1.3</strong> sits between Application and TCP. It takes the HTTP payload, encrypts it with <strong>AES-256-GCM</strong> (AEAD), and appends a <strong>128-bit authentication tag</strong> (GHASH). Only the authenticated recipient can decrypt. TLS has four sub-protocols:<br><br>
    <strong>• Handshake (22):</strong> negotiates ciphers, authenticates server via X.509 certificate, establishes shared keys via ECDHE.<br>
    <strong>• Record (23):</strong> encrypts/MACs application data.<br>
    <strong>• Alert (21):</strong> signals errors (certificate_expired, bad_record_mac, etc.).<br>
    <strong>• ChangeCipherSpec (20):</strong> signals switch to negotiated parameters.<br><br>
    <strong>TLS 1.3 improvement over 1.2:</strong> 1 round-trip (vs 2), mandatory ECDHE for Perfect Forward Secrecy, removed RSA static key exchange, AEAD-only cipher suites, no compression (CRIME attack fix).`,
    fields: [
      { name:'Content Type (1B)', desc:'23=App Data, 22=Handshake, 21=Alert, 20=ChangeCipherSpec' },
      { name:'Version (2B)', desc:'0x0303 — TLS 1.2-compatible header; real version in ClientHello extension' },
      { name:'Length (2B)', desc:'Byte length of the encrypted fragment. Max ~16 KB per record.' },
      { name:'Encrypted Payload', desc:'AES-256-GCM ciphertext of the HTTP data. Only derived session key decrypts it.' },
      { name:'Auth Tag (16B)', desc:'GHASH over ciphertext + AAD. Any 1-bit change → tag mismatch → RECORD DROP.' },
    ],
    services: { conf: true, integ: true, auth: true },
    examTip: 'TLS 1.3 mandates ECDHE (Perfect Forward Secrecy). Know the 6 session keys derived: client/server write key, MAC key, IV. Handshake message type numbers: 1=ClientHello, 2=ServerHello, 11=Certificate, 16=ClientKeyExchange, 20=Finished.',
    tipColor: 'var(--tls)',
  },
  tcp: {
    label: 'Transport Layer', proto: 'TCP · UDP · DTLS', col: 'var(--tcp)', bg: 'var(--tcp-bg)',
    short: 'L4',
    overview: `<strong>TCP</strong> provides <em>reliable, ordered, connection-oriented</em> delivery of TLS records. It handles segmentation (splitting large data into MSS-sized chunks), sequencing (Sequence Number field), acknowledgment (ACK Number), flow control (window size), and retransmission.<br><br>
    <strong>TCP provides NO security by itself</strong> — TLS is responsible for confidentiality and integrity. TCP's checksum detects accidental bit errors but is not cryptographic.<br><br>
    <strong>TCP attacks:</strong> SYN flooding (fills half-open connection table, DoS), sequence number prediction (inject data into session), TCP session hijacking (forge RST or data packets with guessed sequence numbers).`,
    fields: [
      { name:'Source Port (2B)', desc:'Ephemeral port (OS-assigned, 49152–65535). Identifies the sender\'s socket.' },
      { name:'Dest Port (2B)', desc:'443=HTTPS, 22=SSH, 80=HTTP, 25=SMTP, 53=DNS' },
      { name:'Sequence Number (4B)', desc:'Byte offset of first byte in segment. Enables ordering and duplicate detection.' },

      mac:  [{ t:'MAC Dst/Src', f:2, c:'#9a3412' },{ t:'EtherType:IPv4', f:1.5, c:'#7c2d12' },{ t:'[ IP Packet ]', f:5, c:'#431407' },{ t:'FCS(CRC)', f:1, c:'#350f05' }],
    },
    steps: [
      { lid:'app', num:1, title:'Telnet — a cleartext protocol (port 23)', desc:'Telnet sends terminal data in plaintext — no encryption. The company firewall blocks port 23 (Telnet). Without tunneling, this traffic is both exposed AND blocked.',
        segs:[{t:'Telnet: ls -la /var/log (CLEARTEXT)',c:'var(--fw)'}] },
      { lid:'tls', num:2, title:'SSH encrypts Telnet inside a channel', desc:'Command: ssh -L 8000:work:23 user@apollo. SSH local port forwarding: connections to localhost:8000 are tunneled to work:23 via apollo. SSH Transport Layer uses AES-128-CTR + HMAC-SHA2-256. Telnet data is wrapped in an SSH channel packet — completely hidden from the firewall.',
        segs:[{t:'SSH Chan Hdr',c:'var(--tls)'},{t:'AES-CTR(Telnet Data)',c:'var(--tls)'},{t:'HMAC-SHA256',c:'var(--tls)'}] },
      { lid:'tcp', num:3, title:'TCP segment to port 22 (SSH)', desc:'The encrypted SSH packet is placed in a TCP segment to destination port 22. This is the key: port 22 is allowed by the firewall. Port 23 (the real destination inside the tunnel) is completely invisible.',
        segs:[{t:'Src:54000 Dst:22',c:'var(--tcp)'},{t:'Seq# ACK#',c:'var(--tcp)'},{t:'[SSH(Telnet)]',c:'var(--tcp)'}] },
      { lid:'ip', num:4, title:'IP routes to SSH server apollo', desc:'IP header destination = apollo (10.0.0.20). The real final destination (work:23) is hidden inside the encrypted SSH payload. Routers and the firewall see only this IP header.',
        segs:[{t:'Dst: 10.0.0.20 (apollo)',c:'var(--ip)'},{t:'Proto:TCP Port:22',c:'var(--ip)'},{t:'[SSH tunnel inside]',c:'var(--ip)'}] },
      { lid:'fw', num:5, title:'FIREWALL BYPASSED — sees only port 22', desc:'Critical exam point: The firewall has a rule "ALLOW TCP dst:22 to apollo". It sees port 22 traffic — allowed. It CANNOT inspect the AES-encrypted SSH payload. It cannot detect that Telnet (port 23, which it would block) is tunneled inside. SSH tunneling evades port-based firewall rules.',
        segs:[{t:'Firewall: dst:22 → ✓ ALLOW',c:'var(--fw)'},{t:'Cannot see dst:23 inside SSH',c:'var(--fw)'},{t:'Tunnel passes through',c:'var(--ip)'}] },
      { lid:'mac', num:6, title:'Ethernet frame — wired link, no L2 encryption', desc:'On a wired network (unlike Wi-Fi), Ethernet 802.3 has no encryption. The 4-byte FCS (CRC-32) detects bit errors but is NOT cryptographic. All security comes from SSH at the application layer.',
        segs:[{t:'802.3 Ethernet Frame',c:'var(--mac)'},{t:'[IP + TCP + SSH(Telnet)]',c:'var(--mac)'},{t:'FCS (CRC-32, NOT crypto)',c:'var(--fw)'}] },
    ],
    compare: [
      { layer:'Telnet (cleartext)', conf:'None', integ:'None', auth:'Password (cleartext!)', note:'UNSAFE without SSH tunnel' },
      { layer:'SSH Tunnel', conf:'AES-128-CTR', integ:'HMAC-SHA2-256', auth:'Password / Public key', note:'Full security; hides Telnet inside' },
      { layer:'TCP :22', conf:'None', integ:'Checksum', auth:'None', note:'Port 22 allowed by firewall' },
      { layer:'IP', conf:'None', integ:'Checksum', auth:'None', note:'Dst=apollo; real dst hidden in SSH' },
      { layer:'Firewall', conf:'N/A', integ:'N/A', auth:'Allows :22 — bypassed!', note:'Cannot inspect encrypted SSH payload' },

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
let currentScenario = 'https';
let currentView     = 'encap';
let selectedLayer   = null;

// ══════════════════════════════════════════════════════════════════
//  RENDER HELPERS
// ══════════════════════════════════════════════════════════════════

function setScenario(s) {
  currentScenario = s;
  selectedLayer = null;
  document.querySelectorAll('.stab').forEach((b,i) => {
    b.classList.toggle('active', ['https','vpn','wifi','ssh'][i] === s);
  });
  renderAll();
  showEmptyDetail();
}

function setView(v) {
  currentView = v;
  ['encap','steps','compare'].forEach(id => {
    document.getElementById(id+'View').style.display = id === v ? '' : 'none';
  });
  ['vt-encap','vt-steps','vt-compare'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === 'vt-'+v);
  });
  renderAll();
}

function renderAll() {
  const sc = SCENARIOS[currentScenario];
  document.getElementById('scenarioName').textContent = sc.name;
  renderEndpoints(sc);
  if (currentView === 'encap')   renderEncap(sc);
  if (currentView === 'steps')   renderSteps(sc);
  if (currentView === 'compare') renderCompare(sc);
}

// ── ENDPOINTS ──────────────────────────────────────────────────────
function renderEndpoints(sc) {
  const row = document.getElementById('endpointRow');
  let html = '';
  sc.nodes.forEach((n, i) => {
    html += `<div class="node">
      <div class="node-icon">${n.icon}<div class="node-pulse"></div></div>
      <div class="node-label">${n.label}</div>
      <div class="node-addr">${n.addr}</div>
    </div>`;
    if (i < sc.nodes.length - 1) {
      const next = sc.nodes[i+1];
      if (next.dashed) {
        html += `<div class="wire-segment" style="flex:.8">
          <div class="wire-line" style="background:linear-gradient(90deg,var(--app),var(--tls))">
            <div class="wire-dot"></div><div class="wire-dot"></div>
          </div></div>
          <div class="mid-device">
            <div class="mid-device-icon">${next.icon}</div>
            <div class="mid-device-name">${next.label}</div>
            <div class="mid-device-role">${next.role||''}</div>
          </div>`;
      } else {
        html += `<div class="wire-segment">
          <div class="wire-line">
            <div class="wire-dot"></div><div class="wire-dot"></div><div class="wire-dot"></div>
            <div class="wire-arrowhead"></div>
          </div>
        </div>`;
      }
    }
  });
  row.innerHTML = html;
}

// ── ENCAP VIEW ─────────────────────────────────────────────────────
function renderEncap(sc) {
  const w = document.getElementById('stacksWrapper');
  const layers = sc.layers;

  const senderBlocks  = layers.map(lid => layerBlock(sc, lid, 'sender',   false)).join('');
  const receiverBlocks = [...layers].reverse().map(lid => layerBlock(sc, lid, 'receiver', true)).join('');

  const arrows = layers.map(() => `
    <div class="encap-arrow">
      <div class="ea-track"></div>
      <div class="ea-head"></div>
    </div>`).join('');

  w.innerHTML = `
    <div class="stack-col">
      <div class="stack-header">⬇ SENDER — Encapsulation</div>
      ${senderBlocks}
    </div>
    <div class="encap-mid-col">${arrows}</div>
    <div class="stack-col">
      <div class="stack-header">⬆ RECEIVER — Decapsulation</div>
      ${receiverBlocks}
    </div>`;
}

function layerBlock(sc, lid, side, highlight) {
  const L   = LAYERS[lid];
  const pkts = sc.packets[lid] || [];
  const active = selectedLayer === lid ? 'active' : '';
  const pktHtml = pkts.map(p =>
    `<div class="pkt-seg" style="flex:${p.f};background:${p.c}">${p.t}</div>`
  ).join('');

  return `<div class="layer-block ${active}" data-layer="${lid}"
    style="background:${L.bg};border-color:rgba(255,255,255,.06);--active-c:${L.col}"
    onclick="selectLayer('${lid}')">
    <div class="lb-header" style="background:${L.col}22">
      <div class="lb-dot" style="background:${L.col}"></div>
      <span class="lb-name" style="color:${L.col}">${L.label}</span>
      <span class="lb-proto">${L.proto}</span>
    </div>
    <div class="pkt-vis">${pktHtml}</div>
  </div>`;
}

// ── STEPS VIEW ─────────────────────────────────────────────────────
function renderSteps(sc) {
  const el = document.getElementById('stepsView');
  el.innerHTML = sc.steps.map(s => {
    const L = LAYERS[s.lid];
    const segsHtml = s.segs.map(seg =>
      `<span class="sp" style="color:${seg.c};border-color:${seg.c};background:${seg.c}18">${seg.t}</span>`
    ).join('');
    return `<div class="step-item" onclick="selectLayer('${s.lid}')">
      <div class="step-badge" style="background:${L.col}25;color:${L.col}">${s.num}</div>
      <div class="step-body">
        <div class="step-layer" style="color:${L.col}">${L.label}</div>
        <div class="step-title">${s.title}</div>
        <div class="step-desc">${s.desc}</div>
        <div class="step-pkt">${segsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

// ── COMPARE VIEW ────────────────────────────────────────────────────
function renderCompare(sc) {
  const el = document.getElementById('compareView');
  const badge = (v) => {
    const lo = v.toLowerCase();
    if (lo.includes('none') || lo.includes('broken') || lo.includes('unsafe')) return `<span class="cb cb-no">${v}</span>`;
    if (lo.includes('checksum') || lo.includes('crc') || lo.includes('n/a')) return `<span class="cb cb-mid">${v}</span>`;
    if (lo.includes('cert') || lo.includes('eap') || lo.includes('radius') || lo.includes('ike')) return `<span class="cb cb-pur">${v}</span>`;
    return `<span class="cb cb-yes">${v}</span>`;
  };
  el.innerHTML = `<table class="compare-table">
    <thead><tr>
      <th style="color:var(--text)">Layer / Protocol</th>
      <th style="color:var(--app)">Confidentiality</th>
      <th style="color:var(--ip)">Integrity</th>
      <th style="color:var(--tls)">Authentication</th>
      <th style="color:var(--text-dim)">Notes</th>
    </tr></thead>
    <tbody>
    ${sc.compare.map(r => `<tr>
      <td style="color:var(--text);font-weight:600">${r.layer}</td>
      <td>${badge(r.conf)}</td>
      <td>${badge(r.integ)}</td>
      <td>${badge(r.auth)}</td>
      <td style="color:var(--text-dim);font-size:.6rem">${r.note}</td>
    </tr>`).join('')}
    </tbody>
  </table>
  <p style="font-size:.58rem;color:var(--text-dim);margin-top:10px;line-height:1.7">
    Green = security provided at this layer. Red = no security (relies on layer above). Click any row's layer name in Encapsulation view for full details.
  </p>`;
}

// ══════════════════════════════════════════════════════════════════
//  DETAIL PANEL
// ══════════════════════════════════════════════════════════════════

function selectLayer(lid) {
  selectedLayer = lid;
  // Update active state on blocks
  document.querySelectorAll('.layer-block').forEach(b => {
    b.classList.toggle('active', b.dataset.layer === lid);
  });
  renderDetailPanel(lid);
}

function showEmptyDetail() {
  document.getElementById('rightPanel').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div>Click any layer block<br>to see detailed analysis</div>
      <div style="margin-top:8px;font-size:.58rem;color:var(--text-dim)">or switch scenarios &amp; views<br>in the header above</div>
    </div>`;
}

function renderDetailPanel(lid) {
  const L = LAYERS[lid];
  const sc = SCENARIOS[currentScenario];

  const svc = L.services;
  const confBadge = svc.conf
    ? `<span class="cb cb-yes" style="font-size:.6rem">✓ Confidentiality</span>`
    : `<span class="cb cb-no"  style="font-size:.6rem">✗ No Confidentiality</span>`;
  const integBadge = svc.integ
    ? `<span class="cb cb-yes" style="font-size:.6rem">✓ Integrity</span>`
    : `<span class="cb cb-no"  style="font-size:.6rem">✗ No Integrity</span>`;
  const authBadge = svc.auth
    ? `<span class="cb cb-pur" style="font-size:.6rem">✓ Authentication</span>`
    : `<span class="cb cb-no"  style="font-size:.6rem">✗ No Auth</span>`;

  const fieldsHtml = L.fields.map(f => `
    <div class="field-row" style="border-left-color:${L.col}">
      <div class="fn" style="color:${L.col}">${f.name}</div>
      <div class="fd">${f.desc}</div>
    </div>`).join('');

  // Current scenario's packet for this layer
  const pkts = sc.packets[lid] || [];
  const pktPreview = pkts.map(p =>
    `<span class="sp" style="color:${p.c};border-color:${p.c}88;background:${p.c}18;font-size:.54rem">${p.t}</span>`
  ).join(' ');

  document.getElementById('rightPanel').innerHTML = `
    <div class="detail-header" style="border-bottom:1px solid ${L.col}40;background:${L.bg}">
      <div class="detail-layer-name" style="color:${L.col}">${L.label}</div>
      <div class="detail-proto">${L.proto}</div>
      <div class="detail-badges">${confBadge}${integBadge}${authBadge}</div>
    </div>
    <div class="detail-body">

      <div class="detail-section">
        <div class="detail-section-title">Overview</div>
        <div class="detail-text">${L.overview}</div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Current Scenario Packet</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">${pktPreview || '<span style="color:var(--text-dim);font-size:.62rem">N/A for this scenario</span>'}</div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Header / Field Reference</div>
        <div class="field-list">${fieldsHtml}</div>
      </div>

      <div class="detail-section">
        <div class="exam-box" style="border-color:${L.tipColor}40;background:${L.tipColor}0a">
          <div style="font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:${L.tipColor};margin-bottom:5px">📌 Exam Tip</div>
          <div class="detail-text">${L.examTip}</div>
        </div>
      </div>

    </div>`;
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
renderAll();
// Auto-select Application layer on load
setTimeout(() => selectLayer('app'), 300);
</script>
</body>
</html>
