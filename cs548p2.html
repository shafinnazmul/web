<div class="slide-block" id="s7">
  <div class="slide-label">Slides 7–8 of 21 (Topic: IEEE 802.1X)</div>
  <div class="slide-title">IEEE 802.1X — Port-Based Network Access Control</div>

  <div class="slide-content">
    <ul>
      <li><strong>Authentication framework for IEEE 802 networks</strong> (Ethernet + Wi-Fi).</li>
      <li><strong>Uncontrolled port:</strong> Always open — carries EAP authentication messages only.</li>
      <li><strong>Controlled port:</strong> Blocked until authentication succeeds — then carries all data traffic.</li>
      <li>User cannot send any data until authenticated.</li>
      <li>Only NIC driver (Supplicant) and Authentication Server firmware need upgrading — switches/APs just relay.</li>
    </ul>
    <p style="margin-top:12px;"><strong>802.1X Authentication Flow (from Slide 8 diagram):</strong></p>
    <div class="workflow-wrap" style="margin-top:12px;">
      <table class="workflow-table">
        <thead>
          <tr><th>#</th><th>From</th><th>To</th><th>Message</th><th>Purpose</th></tr>
        </thead>
        <tbody>
          <tr><td class="step-num">1</td><td>Station</td><td>AP</td><td>Associate</td><td>Station requests association with AP</td></tr>
          <tr><td class="step-num">2</td><td>AP</td><td>Station</td><td>EAP Identity Request</td><td>AP asks "What's your username?"</td></tr>
          <tr><td class="step-num">3</td><td>Station</td><td>AP → AS</td><td>EAP Identity Response ("john")</td><td>Station provides identity; AP relays to Auth Server</td></tr>
          <tr><td class="step-num">4</td><td>AS → AP</td><td>Station</td><td>EAP Auth Request</td><td>AS asks for credential (password/cert)</td></tr>
          <tr><td class="step-num">5</td><td>Station</td><td>AP → AS</td><td>EAP Auth Response ("mary")</td><td>Station provides credential; AP relays to AS</td></tr>
          <tr><td class="step-num">6</td><td>AS → AP</td><td>Station</td><td>EAP-Success</td><td>AS confirms identity; AP opens controlled port</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>Two logical ports per physical port:</strong> Uncontrolled (EAP-only, always open) + Controlled (data, blocked until auth).</li>
      <li><strong>The AP is a transparent relay</strong> — it does not interpret EAP payloads, it just forwards them.</li>
      <li><strong>EAP-over-LAN (EAPOL)</strong> is the encapsulation used between Supplicant and Authenticator.</li>
      <li><strong>RADIUS</strong> is the protocol between Authenticator and Authentication Server.</li>
      <li>Authentication method flexibility: change EAP method (TLS → TTLS) without touching AP firmware.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-icon">W</div>
      <div class="gc-label">🔴 WHY — Purpose</div>
      <p>Without 802.1X, connecting to an Ethernet port or Wi-Fi network immediately grants full network access — no identity check. Anyone who plugs into a wall jack or knows the Wi-Fi password is trusted. 802.1X enforces identity verification before network access is granted, regardless of physical connection.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-icon">H</div>
      <div class="gc-label">🟡 HOW — Mechanism</div>
      <p>The controlled port acts as a gate. EAP authentication messages travel through the uncontrolled port to the RADIUS server. Only after EAP-Success does the switch open the controlled port and (optionally) assign a VLAN. EAP messages are encapsulated in EAPOL frames between client and AP, then in RADIUS packets between AP and server.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-icon">W</div>
      <div class="gc-label">🟢 WHAT — Result</div>
      <p>Every device on the network has a verified, individual identity. Unauthenticated devices have no data access. VLAN assignment is automatic per authentication result. The authentication method can evolve (PSK → certificate-based) without infrastructure changes, because the AP is just a relay.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p><strong>The Two-Port Model in Detail:</strong> Think of the network port as having two lanes: a narrow bike lane (uncontrolled port — EAP messages only) and a highway (controlled port — all data). Before authentication, only the bike lane is open. You can ride to the authentication office (RADIUS server) and prove your identity. Once verified, the highway opens.</p>
    <div class="analogy">
      <strong>🎯 Analogy — Airport Security Checkpoint:</strong> The uncontrolled port is the check-in line (you can approach, show your boarding pass — your EAP credentials). The controlled port is the gate to the plane (data network). You cannot board until the TSA (RADIUS) verifies your identity. The ticket agent (AP) doesn't read your documents — they just route you to the TSA agent.
    </div>
    <p><strong>Why Only NIC + Auth Server Need Upgrading:</strong> The EAP method (the specific authentication algorithm — TLS, TTLS, etc.) runs end-to-end between the Supplicant (client NIC/driver) and the Authentication Server (RADIUS). The Authenticator (AP/switch) just encapsulates and forwards opaque EAP payloads. This means: upgrading from password-based EAP to certificate-based EAP-TLS requires updating the client software and RADIUS server — no AP firmware update needed. This is a key architectural advantage.</p>
    <p><strong>EAPOL vs. RADIUS:</strong> EAPOL (EAP over LAN) is a Layer 2 protocol used on the wired/wireless link between client and AP. RADIUS is a UDP-based application protocol used between AP and Authentication Server, typically on port 1812 (authentication) and 1813 (accounting). The AP translates between them.</p>
  </div>

  <div class="questions">
    <h3>Practice Questions — Slides 7–8 (802.1X)</h3>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">In 802.1X, which port allows EAP authentication messages to pass before the user is authenticated?</div>
      <ul class="q-opts">
        <li class="correct">A) Uncontrolled port</li>
        <li>B) Controlled port</li>
        <li>C) Management port</li>
        <li>D) Trunk port</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: A.</strong> The uncontrolled port is always open for EAP/EAPOL authentication messages. The controlled port (data) remains blocked until authentication succeeds.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-tf">True / False</span>
      <div class="q-text">Changing the EAP authentication method from EAP-TTLS to EAP-TLS in an 802.1X deployment requires upgrading the firmware of all access points.</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> The AP is a transparent relay that does not process EAP payloads. Only the Supplicant (client software) and Authentication Server (RADIUS) need to implement the specific EAP method. APs do not need upgrading.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-sa">Short Answer</span>
      <div class="q-text">Describe the three roles in 802.1X and what each role does during the authentication process.</div>
      <div class="q-answer"><strong>✔ Answer: Supplicant</strong> (client device/NIC driver) — initiates authentication by sending EAP Identity Response with its credentials. <strong>Authenticator</strong> (AP or switch) — enforces access control by blocking the controlled port; relays EAP messages as EAPOL (client side) and RADIUS (server side). <strong>Authentication Server</strong> (RADIUS) — actually verifies credentials using the specific EAP method; sends Access-Accept or Access-Reject; may include VLAN ID and other policy attributes in Access-Accept.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-fb">Fill in the Blank</span>
      <div class="q-text">802.1X uses __________ to encapsulate EAP messages on the link between the Supplicant and the Authenticator, and __________ to relay those messages to the Authentication Server.</div>
      <div class="q-answer"><strong>✔ Answer: EAPOL (EAP over LAN); RADIUS.</strong> EAPOL is a Layer 2 encapsulation; RADIUS is the UDP application-layer protocol (port 1812/1813) used between AP and authentication server.</div>
    </div>
  </div>
</div>

<div class="slide-block" id="s9">
  <div class="slide-label">Slides 9–10 of 21 (Topic: 802.11i Phases of Operation & EAP Framework)</div>
  <div class="slide-title">IEEE 802.11i Phases of Operation &amp; EAP Framework</div>

  <div class="slide-content">
    <p><strong>IEEE 802.11i — Complete Authentication Sequence (from Slide 9 diagram):</strong></p>
    <div class="workflow-wrap">
      <table class="workflow-table">
        <thead>
          <tr><th>#</th><th>Phase</th><th>Message</th><th>Details</th></tr>
        </thead>
        <tbody>
          <tr><td class="step-num">1</td><td>Discovery</td><td>Probe Request / Response</td><td>Station finds APs; AP sends security capabilities (RSN IE)</td></tr>
          <tr><td class="step-num">2</td><td>Discovery</td><td>Open System Auth Request/Response</td><td>Legacy null authentication (IEEE 802.11 formality)</td></tr>
          <tr><td class="step-num">3</td><td>Discovery</td><td>Association Request/Response</td><td>Station selects cipher suite; AP sends selected parameters</td></tr>
          <tr><td class="step-num">4</td><td>802.1X Auth</td><td>802.1X Controlled Port BLOCKED</td><td>Data channel blocked; only EAP allowed</td></tr>
          <tr><td class="step-num">5</td><td>802.1X Auth</td><td>EAP Identity Request / Response</td><td>AP asks identity; client responds; AP relays to AS</td></tr>
          <tr><td class="step-num">6</td><td>802.1X Auth</td><td>EAP Method Exchange (multiple rounds)</td><td>Specific EAP method runs (TLS handshake, PEAP, etc.)</td></tr>
          <tr><td class="step-num">7</td><td>802.1X Auth</td><td>EAP Success + Key Material</td><td>AS sends EAP-Success + PMK (Pairwise Master Key) to AP</td></tr>
          <tr><td class="step-num">8</td><td>Key Management</td><td>4-Way Handshake (EAPOL-Key × 4)</td><td>STA &amp; AP derive PTK (Pairwise Transient Key) from PMK + nonces</td></tr>
          <tr><td class="step-num">9</td><td>Data</td><td>802.1X Controlled Port OPEN</td><td>Encrypted data channel established; all frames use PTK/GTK</td></tr>
        </tbody>
      </table>
    </div>
    <p style="margin-top:14px;"><strong>EAP Framework (Slide 10):</strong> A layered protocol where specific authentication methods (EAP-TLS, EAP-TTLS, EAP-PSK, EAP-IKEv2, etc.) plug into EAP messages, which ride over 802.1X/EAPOL on the link layer.</p>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>PMK (Pairwise Master Key)</strong> = derived during EAP authentication; shared between STA and AS (not AP). AP receives it from AS via RADIUS.</li>
      <li><strong>4-Way Handshake</strong> = uses PMK + nonces to derive PTK (used for unicast encryption) and GTK (used for broadcast/multicast).</li>
      <li><strong>PTK derivation</strong> requires both parties' nonces → prevents use of pre-computed PTKs (counter to replay attacks).</li>
      <li>EAP is a <em>framework</em> — it defines message format (Code/ID/Length/Type/Data) but not the specific authentication algorithm. Different methods plug in.</li>
      <li>EAP Code values: <strong>1=Request, 2=Response, 3=Success, 4=Failure.</strong></li>
    </ul>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p><strong>The 4-Way Handshake — Why It's Critical:</strong> After EAP authentication, both the STA and AS know the PMK. But the PMK is a long-term secret — using it directly to encrypt data is dangerous (if captured, all past/future data is exposed). The 4-way handshake derives a fresh PTK for this session using: PMK + AP nonce (ANonce) + STA nonce (SNonce) + MAC addresses. The nonces are random per-session, so PTK is unique per session even with the same PMK.</p>
    <div class="analogy">
      <strong>🎯 Analogy — Master Key → Session Lock:</strong> The PMK is your master key fob. The 4-way handshake generates a unique one-time room lock (PTK) for today's hotel room. Even if someone copies your fob (PMK), each day's room lock (PTK) is different.
    </div>
    <p><strong>EAP Message Format:</strong> Every EAP message has: Code (1B: Request/Response/Success/Failure), Identifier (1B: matches request to response), Length (2B: total message length), Type (1B: present only in Request/Response — specifies the method), Data (variable). The Type field selects the method: 1=Identity, 4=MD5, 13=TLS, 21=TTLS, 25=PEAP, etc.</p>
    <p><strong>The RSN Information Element (RSN IE):</strong> During the Probe/Association phase, the AP advertises its security capabilities in the RSN IE: which cipher suites it supports (CCMP, TKIP), which AKM suites (802.1X/PSK), and the PMKID cache. The STA selects compatible options and includes them in the Association Request. This negotiation prevents downgrade attacks where an attacker forces weak crypto.</p>
  </div>

  <div class="questions">
    <h3>Practice Questions — Slides 9–10 (802.11i / EAP)</h3>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">In the WPA2 4-way handshake, what is the primary purpose of including both ANonce and SNonce in the PTK derivation?</div>
      <ul class="q-opts">
        <li>A) To authenticate the AP's identity to the station</li>
        <li>B) To negotiate the cipher suite</li>
        <li class="correct">C) To ensure the PTK is fresh and unique for this session, preventing pre-computation attacks</li>
        <li>D) To transmit the PMK securely between the AP and station</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: C.</strong> Each party contributes a random nonce. PTK = PRF(PMK, ANonce, SNonce, AP_MAC, STA_MAC). Since both nonces are random per-session, the PTK is unique even if the PMK is reused. Pre-computing PTKs without the nonces is infeasible.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-tf">True / False</span>
      <div class="q-text">EAP-Success and EAP-Failure messages contain a Type field specifying the authentication method being concluded.</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> EAP-Success (Code=3) and EAP-Failure (Code=4) do not contain a Type field — they consist only of Code, Identifier, and Length. The Type field is only present in EAP-Request (Code=1) and EAP-Response (Code=2) messages.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-sa">Short Answer</span>
      <div class="q-text">What is the difference between the PMK and the PTK in WPA2, and why are both needed?</div>
      <div class="q-answer"><strong>✔ Answer:</strong> The <strong>PMK (Pairwise Master Key)</strong> is a long-term secret derived from EAP authentication (enterprise) or the PSK (personal). It is shared between the STA and the Authentication Server. Using the PMK directly to encrypt data would be dangerous — if captured, all sessions are exposed. The <strong>PTK (Pairwise Transient Key)</strong> is a session-specific key derived from PMK + nonces during the 4-way handshake. PTK is used for actual data encryption and changes every session. This two-level hierarchy limits the damage from any single key compromise.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-fb">Fill in the Blank</span>
      <div class="q-text">In the EAP message format, Code values of 1 and 2 represent __________ and __________ messages respectively, and are the only types that include the Type field specifying the authentication method.</div>
      <div class="q-answer"><strong>✔ Answer: Request; Response.</strong> Code 1 = EAP-Request (server/AP asks for credential); Code 2 = EAP-Response (client provides credential). Both include the Type field (e.g., Type=13 for EAP-TLS). Code 3 = Success; Code 4 = Failure (no Type field).</div>
    </div>
  </div>
</div>

<div class="slide-block" id="s11">
  <div class="slide-label">Slides 11–14 of 21 (Topic: EAP Methods, Protocol Exchanges, EAP-TLS, EAP-PEAP)</div>
  <div class="slide-title">EAP Authentication Methods &amp; Protocol Flows</div>

  <div class="slide-content">
    <div class="workflow-wrap">
      <table class="std-table">
        <thead>
          <tr><th>EAP Method</th><th>Client Cert?</th><th>Server Cert?</th><th>Inner Auth</th><th>Security Level</th><th>Use Case</th></tr>
        </thead>
        <tbody>
          <tr><td><span class="tag tag-green">EAP-TLS</span></td><td>✅ Required</td><td>✅ Required</td><td>None (TLS handshake)</td><td>Strongest</td><td>Enterprise with PKI</td></tr>
          <tr><td><span class="tag tag-blue">EAP-TTLS</span></td><td>❌ Not needed</td><td>✅ Required</td><td>Password (inside TLS tunnel)</td><td>Strong</td><td>Username/password with server cert</td></tr>
          <tr><td><span class="tag tag-blue">EAP-PEAP</span></td><td>❌ Not needed</td><td>✅ Required</td><td>EAP-MS-CHAPv2 inside TLS tunnel</td><td>Strong</td><td>Windows AD environments</td></tr>
          <tr><td><span class="tag tag-gold">EAP-GPSK</span></td><td>❌</td><td>❌</td><td>Pre-shared key</td><td>Medium</td><td>IoT / constrained devices</td></tr>
          <tr><td><span class="tag tag-gold">EAP-IKEv2</span></td><td>Flexible</td><td>Flexible</td><td>Multiple methods</td><td>High</td><td>VPN integration</td></tr>
          <tr><td><span class="tag tag-red">LEAP</span></td><td>❌</td><td>❌</td><td>MS-CHAP (weak)</td><td>⚠️ Insecure</td><td>Legacy Cisco — do not use</td></tr>
          <tr><td><span class="tag tag-purple">EAP-AKA</span></td><td>SIM card</td><td>✅</td><td>AKA (symmetric)</td><td>Strong</td><td>3G/4G cellular integration</td></tr>
        </tbody>
      </table>
    </div>
    <p style="margin-top:14px;"><strong>RADIUS Protocol:</strong> Carries EAP messages between Authenticator and Authentication Server. EAP message format: Code (8b) | Identifier (8b) | Length (16b) | [Type (8b)] | Data.</p>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>EAP-TLS</strong> requires <em>both</em> client and server certificates — the only EAP method providing mutual certificate-based authentication.</li>
      <li><strong>EAP-TTLS and PEAP</strong> require <em>only a server certificate</em> — they protect weak passwords inside a TLS tunnel.</li>
      <li>The key difference between TTLS and PEAP: TTLS can carry any inner protocol (PAP, CHAP, EAP); PEAP always uses an EAP method inside (typically MS-CHAPv2).</li>
      <li><strong>LEAP is broken</strong> — MS-CHAP vulnerability allows offline dictionary attacks. Never use in production.</li>
      <li><strong>EAP-AKA</strong> integrates cellular SIM-based authentication into Wi-Fi — bridges cellular and Wi-Fi identity.</li>
    </ul>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p><strong>EAP-TLS — The Gold Standard:</strong> Both sides present X.509 certificates. The TLS handshake provides mutual authentication: the server verifies the client's certificate against a trusted CA, and the client verifies the server's certificate. No passwords are involved. The resulting TLS session derives the PMK. This is the most secure EAP method but requires a PKI infrastructure to issue certificates to every client device — significant operational overhead.</p>
    <p><strong>PEAP — The Practical Choice:</strong> PEAP is a two-phase protocol. Phase 1 establishes a TLS tunnel (server authenticates with certificate — client validates it). Phase 2 runs EAP-MS-CHAPv2 inside the tunnel to verify the user's username and password. The password is protected by the TLS tunnel from outside observers. This is the most common enterprise deployment because it does not require client certificates — just a username and password.</p>
    <div class="workflow-wrap">
      <table class="workflow-table">
        <thead>
          <tr><th>Step</th><th>PEAP Phase</th><th>Action</th><th>Who Authenticates</th></tr>
        </thead>
        <tbody>
          <tr><td class="step-num">1–8</td><td>Phase 1 (TLS Tunnel)</td><td>Server sends certificate → Client validates → TLS tunnel established</td><td>Server authenticates to Client</td></tr>
          <tr><td class="step-num">9–14</td><td>Phase 2 (Inside Tunnel)</td><td>Client sends real username + MS-CHAPv2 response inside encrypted tunnel</td><td>Client authenticates to Server</td></tr>
          <tr><td class="step-num">15–17</td><td>Conclusion</td><td>TLS tunnel torn down; RADIUS Access-Accept sent; EAP-Success</td><td>Mutual authentication complete</td></tr>
          <tr><td class="step-num">18–22</td><td>4-Way Handshake</td><td>EAPOL-Key messages derive PTK and GTK</td><td>Session keys established</td></tr>
        </tbody>
      </table>
    </div>
    <div class="analogy">
      <strong>🎯 PEAP Analogy — The Secure Voting Booth:</strong> Phase 1 verifies the voting booth itself is legitimate (server cert). Once inside the locked booth (TLS tunnel), you write your name on the ballot (username/password) in private. No one outside can see what you wrote.
    </div>
    <div class="warning-box"><strong>⚠️ Anonymous Outer Identity:</strong> In PEAP, the EAP Identity Response in Phase 1 (before the tunnel) often sends "anonymous" as the username. The real username is only transmitted inside the encrypted tunnel in Phase 2. This protects the username from being revealed to passive observers — a privacy feature not available in simpler EAP methods.</div>
  </div>

  <div class="questions">
    <h3>Practice Questions — Slides 11–14 (EAP Methods)</h3>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">Which EAP method requires BOTH the client and server to present X.509 certificates?</div>
      <ul class="q-opts">
        <li class="correct">A) EAP-TLS</li>
        <li>B) EAP-TTLS</li>
        <li>C) EAP-PEAP</li>
        <li>D) EAP-GPSK</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: A.</strong> EAP-TLS mandates mutual certificate-based authentication — both sides present and validate X.509 certificates. EAP-TTLS and PEAP require only a server certificate; the client authenticates with a password inside the tunnel.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">In EAP-PEAP, what is the purpose of Phase 1?</div>
      <ul class="q-opts">
        <li>A) The client authenticates using MS-CHAPv2</li>
        <li class="correct">B) A TLS tunnel is established after the client validates the server's certificate</li>
        <li>C) The PMK is derived using the user's password</li>
        <li>D) The RADIUS server assigns a VLAN to the client</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: B.</strong> PEAP Phase 1 establishes a TLS tunnel for server authentication (client validates server certificate). Phase 2 runs inside the tunnel to authenticate the client (typically via EAP-MS-CHAPv2 with username/password).</div>
    </div>
    <div class="q-item">
      <span class="q-type q-tf">True / False</span>
      <div class="q-text">Lightweight EAP (LEAP) is a secure, Cisco-developed EAP method recommended for modern enterprise Wi-Fi deployments.</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> LEAP uses MS-CHAP for authentication, which is vulnerable to offline dictionary attacks. LEAP has been broken and is NOT recommended. Enterprise deployments should use EAP-TLS, EAP-TTLS, or PEAP.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-sa">Short Answer</span>
      <div class="q-text">Explain why PEAP uses an "anonymous" outer identity in Phase 1, and what the real identity is used for.</div>
      <div class="q-answer"><strong>✔ Answer:</strong> In PEAP Phase 1 (before the TLS tunnel is established), the EAP Identity Response is visible to anyone on the network. Sending the real username would expose it to passive eavesdroppers. By sending "anonymous" (or a realm like "anonymous@realm.com"), the real username is protected. The real username is only transmitted inside the encrypted TLS tunnel in Phase 2, where it cannot be observed by outside parties.</div>
    </div>
  </div>
</div>

<div class="slide-block" id="s15">
  <div class="slide-label">Slides 15–17 of 21 (Topic: 4G LTE Architecture, AKA, Key Derivation, 5G)</div>
  <div class="slide-title">4G LTE Architecture, AKA Authentication &amp; 5G Security Evolution</div>

  <div class="slide-content">
    <ul>
      <li><strong>Components:</strong> UE+SIM (subscriber device with long-term key Ki), eNodeB (base station), MME (Mobility Management Entity), HSS (Home Subscriber Server), SGW/PGW (data plane gateways).</li>
      <li><strong>Two planes:</strong> Control plane (MME — session management) + Data/User plane (SGW/PGW — data flow).</li>
      <li><strong>4G AKA (Authentication and Key Agreement):</strong> Symmetric key-based mutual authentication between UE and HSS.</li>
      <li><strong>Key hierarchy:</strong> Ki (SIM) → K_ASME (via AKA) → K_NASenc, K_NASint, K_eNB (session keys).</li>
      <li><strong>4G Problem → 5G Fix:</strong> IMSI/GUTI sent in plaintext in 4G → 5G encrypts IMSI with HSS public key (ECC). 5G also supports EAP-TLS authentication.</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>Ki</strong> — long-term symmetric key, lives in the SIM and in the HSS database. Never transmitted over the air.</li>
      <li><strong>AKA</strong> provides mutual authentication: the UE authenticates the HSS (via AUTH token), and the HSS authenticates the UE (via RES vs XRES comparison).</li>
      <li><strong>KASME</strong> is the "anchor" key derived from AKA — all session keys (NAS encryption, NAS integrity, eNodeB) are derived from it.</li>
      <li><strong>IMSI exposure in 4G</strong> is a known privacy vulnerability — the IMSI (permanent subscriber identifier) is sent in plaintext during attach, enabling tracking.</li>
      <li><strong>5G SUPI/SUCI</strong> — in 5G, the SUPI (new IMSI equivalent) is encrypted as SUCI using the HSS's public key before transmission.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-icon">W</div>
      <div class="gc-label">🔴 WHY — Purpose</div>
      <p>Cellular networks must authenticate millions of subscribers while maintaining availability and resisting international-scale attacks. SIM-based symmetric authentication (AKA) provides strong authentication with minimal subscriber-side complexity — the SIM handles all crypto. But it must also authenticate the network to the UE to prevent rogue base station (IMSI catcher) attacks.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-icon">H</div>
      <div class="gc-label">🟡 HOW — Mechanism</div>
      <p>HSS generates an Authentication Vector (AV) containing: RAND (random challenge), XRES (expected response), AUTH (authentication token for UE to verify HSS), KASME. MME sends RAND+AUTH to UE. UE computes AKA(Ki, RAND) → checks AUTH (mutual auth) → computes RES. MME compares RES=XRES. Key hierarchy derived from KASME.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-icon">W</div>
      <div class="gc-label">🟢 WHAT — Result</div>
      <p>Mutual authentication without transmitting Ki. Per-session keys (K_NASenc encrypts NAS messages; K_NASint protects NAS integrity; K_eNB secures the radio link). 5G extends this by encrypting the subscriber identity itself (SUCI), plugging the IMSI exposure vulnerability.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p><strong>The AKA Challenge-Response in Detail:</strong> AKA is based on the principle that both the SIM and the HSS share the same secret Ki. Neither ever sends Ki over the air. Instead:</p>
    <div class="workflow-wrap">
      <table class="workflow-table">
        <thead>
          <tr><th>Step</th><th>Actor</th><th>Action</th><th>Details</th></tr>
        </thead>
        <tbody>
          <tr><td class="step-num">1</td><td>UE</td><td>Attach Request</td><td>Sends IMSI (4G) or SUCI (5G) to MME</td></tr>
          <tr><td class="step-num">2</td><td>MME</td><td>Auth Request to HSS</td><td>Sends IMSI/GUTI + Serving Network ID to HSS</td></tr>
          <tr><td class="step-num">3</td><td>HSS</td><td>Generate AV</td><td>AV = f(Ki, RAND) → produces RAND, XRES, AUTH, K_ASME</td></tr>
          <tr><td class="step-num">4</td><td>MME</td><td>Auth Request to UE</td><td>Sends RAND + AUTH to UE</td></tr>
          <tr><td class="step-num">5</td><td>UE</td><td>Verify AUTH</td><td>UE recomputes expected AUTH using Ki — if match, HSS is authentic (mutual auth)</td></tr>
          <tr><td class="step-num">6</td><td>UE</td><td>Compute RES + K_ASME</td><td>UE derives RES = f(Ki, RAND) and K_ASME</td></tr>
          <tr><td class="step-num">7</td><td>MME</td><td>Verify RES=XRES</td><td>If match, UE authenticated; derive K_NAS and K_eNB from K_ASME</td></tr>
          <tr><td class="step-num">8</td><td>Both</td><td>Protected Signaling</td><td>NAS signaling protected by K_NASenc (encryption) + K_NASint (integrity)</td></tr>
        </tbody>
      </table>
    </div>
    <div class="analogy">
      <strong>🎯 Analogy — The Secret Handshake:</strong> Both you and your friend know a secret (Ki). Your friend generates a random phrase (RAND) and a special response you can verify (AUTH). You verify the response proves your friend knows the secret, then respond with your own proof (RES). Neither of you said the secret out loud.
    </div>
    <p><strong>The 4G IMSI Exposure Problem:</strong> In the 4G attach procedure, the UE sends its IMSI in plaintext before any security context is established. An IMSI catcher (fake base station — "Stingray") can intercept this. Since IMSI is a permanent subscriber identifier, it enables tracking user location across sessions and operators. This is a fundamental design flaw in 4G.</p>
    <p><strong>5G's Fix — SUCI:</strong> In 5G, the permanent subscriber identifier (SUPI — Subscriber Permanent Identifier, replacing IMSI) is encrypted with the home network's public key (ECC-based) before transmission, producing a SUCI (Subscriber Concealed Identifier). The base station only sees the SUCI, not the SUPI. Only the home HSS (holding the private key) can decrypt the SUCI to recover the SUPI. This closes the tracking vulnerability.</p>
    <div class="warning-box"><strong>⚠️ Exam Note:</strong> "4G uses asymmetric cryptography for authentication." — FALSE. 4G AKA uses symmetric cryptography (shared key Ki). The 5G enhancement uses ECC (asymmetric) only for concealing the subscriber identity (SUCI), not for the core AKA authentication.</div>
  </div>

  <div class="questions">
    <h3>Practice Questions — Slides 15–17 (4G AKA / 5G)</h3>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">In 4G LTE AKA, what does the UE verify when it receives the AUTH token from the MME?</div>
      <ul class="q-opts">
        <li>A) That the MME is authorized to assign IP addresses</li>
        <li class="correct">B) That the Home Subscriber Server (HSS) is authentic — proving knowledge of Ki</li>
        <li>C) That the eNodeB is legitimate</li>
        <li>D) That the session key K_ASME has not been tampered with</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: B.</strong> The AUTH token is computed by the HSS using Ki. The UE recomputes the expected AUTH using its own Ki (stored in SIM). A match proves the message came from the legitimate HSS — this is how the UE authenticates the network (mutual authentication).</div>
    </div>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">What is KASME in the 4G key hierarchy, and how is it derived?</div>
      <ul class="q-opts">
        <li>A) The permanent subscriber key stored in the SIM</li>
        <li class="correct">B) An anchor session key derived from AKA(Ki, RAND), used to produce all NAS and RRC session keys</li>
        <li>C) The key used directly to encrypt user data on the radio interface</li>
        <li>D) A public key certificate stored in the HSS</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: B.</strong> KASME = AKA(Ki, RAND) — derived by both UE and HSS independently from the shared Ki and random challenge RAND. It is the root key from which K_NASenc, K_NASint, and K_eNB are derived. It is never transmitted.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-tf">True / False</span>
      <div class="q-text">In 4G LTE, the subscriber's permanent identifier (IMSI) is transmitted in plaintext during the initial attach procedure, which enables location tracking.</div>
      <div class="q-answer"><strong>✔ Answer: TRUE.</strong> This is a documented 4G security vulnerability. The IMSI is sent unprotected before any security context exists. IMSI catchers (fake base stations) exploit this to track subscriber location. 5G addresses this with SUCI — encrypting the SUPI with the network's public key.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-sa">Short Answer</span>
      <div class="q-text">What is the difference between SUPI and SUCI in 5G, and what security problem does SUCI solve?</div>
      <div class="q-answer"><strong>✔ Answer: SUPI</strong> (Subscriber Permanent Identifier) is the 5G equivalent of IMSI — a permanent identifier for the subscriber stored in the SIM and known to the home network. <strong>SUCI</strong> (Subscriber Concealed Identifier) is a one-time encryption of the SUPI using the home network's ECC public key. When attaching to a network, the UE sends the SUCI instead of the SUPI. Only the home HSS (holding the ECC private key) can decrypt the SUCI to recover the SUPI. This prevents rogue base stations (IMSI catchers) from tracking subscriber identity across sessions.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-fb">Fill in the Blank</span>
      <div class="q-text">In the 4G key hierarchy: Ki → __________ (derived via AKA) → K_NASenc, K_NASint, K_eNB. The __________ key material lives in the SIM and is never transmitted over the air.</div>
      <div class="q-answer"><strong>✔ Answer: KASME; Ki.</strong> Ki is the permanent secret shared only between the SIM and the HSS. KASME is derived per-session from Ki and RAND. All subsequent NAS and RRC keys are derived from KASME, maintaining a strict key hierarchy.</div>
    </div>
  </div>
</div>

<div id="exam" class="section-header">
  <h2>🎯 Exam Preparation — <span>Integrative Questions</span></h2>
  <p>Challenge questions spanning multiple topics — the type expected in midterm/final exams.</p>

<div class="integrative">

  <div class="q-item">
    <span class="q-type q-sa">Short Answer — Integrative</span>
    <div class="q-text">A corporate IT admin is deciding between WPA2-Personal and WPA2-Enterprise for 500 employees. Compare the two in terms of authentication, key management, and what happens when an employee is terminated. Which should be chosen and why?</div>
    <div class="q-answer">
      <strong>✔ Answer:</strong><br>
      <strong>WPA2-Personal:</strong> All 500 employees share one PSK. Authentication is implicit — knowing the password grants access. When an employee is terminated, the only option is changing the password for all 500 employees (disruption). If the PSK is captured via PMKID attack or 4-way handshake sniffing, offline dictionary attacks are possible. There is no per-user accounting — you cannot prove which employee sent which packet.<br><br>
      <strong>WPA2-Enterprise (802.1X/EAP):</strong> Each employee has individual credentials (username/password or certificate) verified by a RADIUS server. When an employee is terminated, disable their account on RADIUS/Active Directory — immediately revoked, no disruption to others. Per-user accounting logs are available. Rogue users cannot use a captured PSK because there is none — each session uses a PMK derived from the individual EAP authentication.<br><br>
      <strong>Choice:</strong> WPA2-Enterprise for 500 employees. The operational overhead of RADIUS is justified by individual revocability, per-user accountability, no PSK sharing, and resistance to offline dictionary attacks.
    </div>
  </div>

  <div class="q-item">
    <span class="q-type q-sa">Short Answer — Integrative</span>
    <div class="q-text">Trace a laptop's complete journey from walking into the office to securely browsing an internal web server, covering: 802.11i discovery, 802.1X authentication (assume EAP-PEAP), 4-way handshake, VLAN assignment, and DHCP. List all major steps in order.</div>
    <div class="q-answer">
      <strong>✔ Answer:</strong><br>
      1. <strong>Discovery:</strong> Laptop sends Probe Request; AP responds with RSN IE (AES-CCMP + 802.1X). Laptop selects AES-CCMP. Open system auth request/response (legacy formality). Association Request/Response — cipher suite agreed.<br>
      2. <strong>802.1X Port State:</strong> AP blocks controlled port. Only EAPOL (EAP authentication) traffic allowed.<br>
      3. <strong>PEAP Phase 1:</strong> AP sends EAP-Identity-Request → Laptop responds "anonymous" → AP relays to RADIUS → RADIUS starts PEAP → sends Start-PEAP → Server Certificate sent → Laptop validates server cert against trusted CA → TLS tunnel established.<br>
      4. <strong>PEAP Phase 2 (inside tunnel):</strong> Real username sent → EAP-MS-CHAPv2 challenge/response → RADIUS verifies credentials against Active Directory → RADIUS sends Access-Accept with PMK + VLAN=Employee_VLAN.<br>
      5. <strong>4-Way Handshake:</strong> AP sends ANonce → Laptop computes PTK(PMK, ANonce, SNonce, MACs) → Laptop sends SNonce + MIC → AP verifies, sends GTK encrypted with PTK → Laptop confirms. Controlled port OPENED.<br>
      6. <strong>VLAN Assignment:</strong> AP places laptop's port into VLAN 20 (Employee). Laptop is now isolated from Guest (VLAN 10) and IoT (VLAN 30).<br>
      7. <strong>DHCP:</strong> Laptop sends DHCP Discover → Legitimate DHCP server (DHCP snooping blocks rogue DHCP from untrusted ports) sends DHCP Offer → Laptop requests IP → DHCP Acknowledge with IP, subnet, gateway, DNS.<br>
      8. <strong>Secure Browsing:</strong> All Wi-Fi traffic encrypted with PTK (AES-CCMP). HTTPS adds TLS on top for application-layer security to the web server.
    </div>
  </div>

  <div class="q-item">
    <span class="q-type q-sa">Short Answer — Integrative</span>
    <div class="q-text">Compare WPA2 4-way handshake offline dictionary attack vs. WPA3 SAE resistance. Explain the cryptographic reason why SAE prevents offline attacks, and why it still provides forward secrecy even if the Wi-Fi password is later disclosed.</div>
    <div class="q-answer">
      <strong>✔ Answer:</strong><br>
      <strong>WPA2 Offline Attack:</strong> The WPA2 4-way handshake is sent in plaintext over the air. An attacker captures the EAPOL-Key messages (specifically ANonce, SNonce, MIC). The MIC is computed as HMAC-SHA1(PTK, handshake_data) where PTK = PRF(PMK, ANonce, SNonce, MACs) and PMK = PBKDF2(PSK, SSID). The attacker takes the capture offline and for each candidate password: derives PMK → derives PTK → computes expected MIC → compares with captured MIC. No interaction with the AP required. GPU clusters run billions of candidates/second.<br><br>
      <strong>WPA3 SAE (Dragonfly) Defense:</strong> SAE is a Password Authenticated Key Exchange (PAKE). The protocol requires both parties to interactively exchange messages to derive a shared PMK. No pre-computable offline verification exists — to test a candidate password, the attacker MUST send messages to the AP and receive responses. The AP can rate-limit (1 attempt/second) and lock out after N failures, making brute force computationally impractical.<br><br>
      <strong>Forward Secrecy:</strong> In SAE, the shared PMK is derived using ephemeral values (fresh per session, discarded after key derivation). Even if an attacker records the SAE exchange and later obtains the Wi-Fi password, they cannot compute the PMK from the recorded exchange because the ephemeral values are gone. This is analogous to Diffie-Hellman forward secrecy.
    </div>
  </div>

  <div class="q-item">
    <span class="q-type q-sa">Short Answer — Integrative</span>
    <div class="q-text">A user's phone connects to a 4G LTE network. An IMSI catcher (fake base station) is operating nearby. (a) What information can the IMSI catcher capture in 4G? (b) How does 5G prevent this? (c) Does 5G's fix also protect against a compromised base station? Explain.</div>
    <div class="q-answer">
      <strong>✔ Answer:</strong><br>
      <strong>(a) 4G IMSI Catcher Attack:</strong> The fake base station presents itself as a legitimate eNodeB. The phone initiates attach with its IMSI in plaintext (before any security context). The IMSI catcher captures the permanent IMSI, enabling: subscriber identity disclosure, cross-network tracking, and session downgrade (forcing the phone to use no encryption via a false security mode command). The IMSI catcher cannot decrypt actual communication if AKA succeeds with the real network, but it can track the subscriber's presence and movement.<br><br>
      <strong>(b) 5G Fix (SUCI):</strong> In 5G, the phone never sends the SUPI (permanent ID) in plaintext. Instead, it computes SUCI = ECC_Encrypt(HSS_PublicKey, SUPI). Only the home HSS (holding the ECC private key) can decrypt the SUCI. The rogue base station sees only the SUCI, which changes every session and reveals no permanent identifier. Tracking is prevented.<br><br>
      <strong>(c) Limitation:</strong> If the base station itself is compromised (i.e., a legitimate eNodeB is hacked), the 5G SUCI protection helps because the SUCI is still encrypted for the HSS private key, which the base station does not hold. However, a compromised eNodeB can still intercept decrypted NAS messages after the security context is established, or perform other attacks (downgrade, traffic injection). SUCI protects subscriber identity but does not protect against all rogue infrastructure scenarios — defense in depth (network monitoring, air interface integrity) is also required.
    </div>

<!-- DISCUSSION: Slides 1–3 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">DNS</span><div class="ki-text"><strong>Domain Name System</strong> — translates human-readable domain names (www.ua.edu) into machine IP addresses (130.160.2.54). The phone book of the Internet.</div></div>
      <div class="key-item"><span class="ki-tag">Role</span><div class="ki-text">DNS is critical infrastructure. Every web request, email, or app connection starts with a DNS lookup — if DNS is poisoned, <strong>all subsequent communication can be hijacked</strong>.</div></div>
      <div class="key-item"><span class="ki-tag">3 Attacks</span><div class="ki-text"><strong>Cache Poisoning</strong> (inject fake records), <strong>Spoofing</strong> (forge DNS replies), <strong>DoS</strong> (overwhelm DNS servers). Each breaks a different part of the DNS trust model.</div></div>
      <div class="key-item"><span class="ki-tag">No Auth</span><div class="ki-text">Classic DNS (UDP port 53) has <strong>no built-in authentication</strong> — responses are trusted purely by timing (first reply wins) and matching a Transaction ID, both exploitable.</div></div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-golden">🌀 Simon Sinek's Golden Circle</div>
    <div class="golden-table">
      <div class="gc-cell gc-why">
        <div class="gc-circle">🔴 WHY — Purpose</div>
        <p>The Internet is built on names, not numbers. DNS is the universal translator. Without secure DNS, every name lookup is a potential attack vector — attackers who control DNS control where users go, even when URLs look correct.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-circle">🟡 HOW — Mechanism</div>
        <p>DNS relies on a hierarchical, distributed database queried via UDP. Responses are cached to reduce load. This caching efficiency creates the central vulnerability: poisoned cache entries persist and affect all subsequent users until TTL expires.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-circle">🟢 WHAT — Result of Attacks</div>
        <p>Successful DNS attacks redirect users to malicious servers without any visible URL change. Credentials get stolen, malware gets downloaded, and financial fraud occurs — all while the browser shows the correct domain name.</p>
      </div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-deep">📖 Beginner-Friendly Deep Dive</div>
    <p>Think of DNS as the Internet's directory assistance service. When you type <code>www.google.com</code>, your computer doesn't know where that is — it must ask DNS: "What IP address corresponds to this name?" DNS answers with something like <code>142.250.80.46</code>, and your browser connects there.</p>
    <p><strong>Why is DNS so valuable to attackers?</strong> Because trust in DNS is implicit. Your browser has no way to verify whether the IP address it received is really Google's. If an attacker can inject a fake answer — say, mapping <code>www.google.com</code> → <code>attacker's IP</code> — your browser connects to the attacker's machine, which shows you a perfect replica of Google's login page and harvests your credentials. You saw no warning. The URL bar still said "google.com".</p>
    <div class="info-box ib-warn">
      <span class="ib-icon">⚠️</span>
      <div class="ib-body"><strong>Security Implication:</strong> DNS sits below TLS in the trust chain. Even HTTPS can be undermined if the DNS reply directs you to an attacker's server — the attacker will have obtained a fraudulent certificate for that domain, or will rely on the fact that many users click through certificate warnings.</div>
    </div>
  </div>
</div>

<!-- SLIDE 4 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 4</span>
    <span class="slide-title">DNS Domain Hierarchy</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>Root Domain</strong> — the invisible dot at the top (e.g., <code>www.example.com.</code>)</li>
      <li><strong>Top-Level Domains (TLDs)</strong> — <code>.com</code>, <code>.net</code>, <code>.edu</code>, <code>.gov</code>, <code>.fr</code>, etc.</li>
      <li><strong>Second-Level Domains</strong> — <code>google</code>, <code>example</code> — assigned to specific entities</li>
      <li>Sub-domains can extend further: <code>www</code> is a third-level label under <code>example.com</code></li>
    </ul>
  </div>
</div>

<!-- SLIDE 5 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 5</span>
    <span class="slide-title">DNS Query Process</span>
  </div>
  <div class="slide-body">
    <ul>
      <li>User machine checks its <strong>local cache</strong> first — if cached, use it directly</li>
      <li>If not cached → ask the <strong>Local DNS Server</strong> (configured via DHCP or manually)</li>
      <li>Local DNS server queries <strong>DNS servers on the Internet</strong> iteratively</li>
      <li>Windows diagnostic: <code>ipconfig /displaydns</code> shows current DNS cache</li>
    </ul>
    <div class="code-block">
      <span class="c"># Windows — view DNS cache</span>
      ipconfig /displaydns
      <span class="c"># Clear DNS cache</span>
      ipconfig /flushdns
    </div>
  </div>
</div>

<!-- DISCUSSION Slides 4–5 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">Hierarchy</span><div class="ki-text">Root → TLD → Second-Level → Subdomain. Each level is managed by different organizations, creating a <strong>delegated authority chain</strong>.</div></div>
      <div class="key-item"><span class="ki-tag">Local Cache</span><div class="ki-text">Machine checks its own DNS cache before any network query. This speeds lookups — and is also where <strong>malicious /etc/hosts entries</strong> can hijack resolution.</div></div>
      <div class="key-item"><span class="ki-tag">TTL</span><div class="ki-text">Time-to-Live: how long a cached DNS answer is valid. Short TTL = less caching, more queries, more current. Long TTL = efficient, but poisoned entries last longer.</div></div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-golden">🌀 Simon Sinek's Golden Circle</div>
    <div class="golden-table">
      <div class="gc-cell gc-why">
        <div class="gc-circle">🔴 WHY</div>
        <p>The hierarchy distributes authority and load. No single entity controls all DNS — the Root servers delegate to TLD operators, who delegate to domain owners. This distribution is both DNS's strength and its attack surface.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-circle">🟡 HOW</div>
        <p>Each zone operator maintains authoritative DNS records for their domain. Resolvers cache answers per TTL. The client-side cache (checked first) is the first line — and first potential point of compromise.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-circle">🟢 WHAT</div>
        <p>The hierarchical cache system makes DNS efficient at Internet scale. But it also means: corrupt any layer — local hosts file, local DNS, or any authoritative server — and all downstream clients are affected.</p>
      </div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-deep">📖 Beginner-Friendly Deep Dive</div>
    <p><strong>🎯 Analogy — The Library System:</strong> Think of DNS like a library reference system. Your own notes (local cache) are checked first. If not found, you ask the local library (local DNS server). If the local library doesn't have the book, they ask a regional library (TLD server). If still not found, they go to the national archive (root server). Each step introduces delay — so answers are cached locally for reuse, specified by TTL.</p>
    <p><strong>Security significance of the local cache:</strong> The <code>/etc/hosts</code> file (Linux/Mac) or Windows DNS cache is checked <em>before</em> any network query. This means an attacker who writes a malicious entry to <code>/etc/hosts</code> — mapping <code>www.bank.com</code> to their own IP — has complete local DNS control, invisible to the network.</p>
    <div class="info-box ib-note">
      <span class="ib-icon">📝</span>
      <div class="ib-body"><strong>Exam Tip:</strong> Know the lookup order: (1) Local cache / hosts file → (2) Local DNS server → (3) Iterative queries to root, TLD, authoritative. An attack at step 1 affects only one machine; at step 2 (DNS cache poisoning), it affects all users of that DNS server.</div>
    </div>
  </div>
</div>

<!-- SLIDE 6 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 6</span>
    <span class="slide-title">Local DNS Server and Iterative Query Process</span>
  </div>
  <div class="slide-body">
    <p>The iterative process:</p>
    <ul>
      <li>Step 1: Local DNS → <strong>Root Server</strong>: "What is the IP of www.example.net?" → Root replies: "I don't know, go ask .NET servers"</li>
      <li>Step 2: Local DNS → <strong>.NET Server</strong>: same question → ".NET" replies: "Go ask example.net servers"</li>
      <li>Step 3: Local DNS → <strong>example.net Server</strong> (authoritative): returns the actual IP</li>
      <li>Local DNS caches the answer and forwards it to the client</li>
    </ul>
  </div>
</div>

<!-- SLIDE 7 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 7</span>
    <span class="slide-title">Iterative Query Process — Commands</span>
  </div>
  <div class="slide-body">
    <div class="code-block">
      <span class="c"># Query the root nameserver directly for ua.edu</span>
      dig @a.root-servers.net ua.edu
      <span class="c"># Query the .edu TLD nameserver</span>
      dig @b.edu-servers.net ua.edu
      <span class="c"># Query the authoritative nameserver for ua.edu</span>
      dig @int-dns3.ua.edu ua.edu
      <span class="c"># Show Start of Authority record</span>
      nslookup -type=soa ua.edu
    </div>
  </div>
</div>

<!-- SLIDE 8 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 8</span>
    <span class="slide-title">Ask DNS Server — dig Output</span>
  </div>
  <div class="slide-body">
    <div class="code-block">
      dig ua.edu

      ;; ANSWER SECTION:
      <span class="n">ua.edu.     200   IN  A   130.160.2.54</span>
      <span class="n">ua.edu.     200   IN  A   130.160.0.54</span>
      ;; SERVER: <span class="k">8.8.8.8#53</span>(8.8.8.8)
    </div>
    <ul>
      <li><code>200</code> = TTL in seconds</li>
      <li><code>IN A</code> = Internet Address (IPv4) record</li>
      <li>Server <code>8.8.8.8</code> = Google's public resolver (used as local DNS here)</li>
    </ul>
  </div>
</div>

<!-- SLIDE 9 (Local DNS Files) -->
<div class="slide-card" id="s9">
  <div class="slide-header">
    <span class="slide-num">SLIDE 9</span>
    <span class="slide-title">Local DNS Files</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong><code>/etc/hosts</code></strong> — Checked before any network query. Attacker write access = full local DNS hijack.</li>
      <li><strong><code>/etc/resolv.conf</code></strong> — Specifies which DNS server to query. DHCP-provided DNS server is stored here.</li>
    </ul>
    <div class="code-block">
      <span class="c"># /etc/hosts — malicious example</span>
      127.0.0.1   localhost
      127.0.0.1   www.CSRFLabAttacker.com
      127.0.0.1   www.bank.com    <span class="c"># redirects bank to localhost!</span>

      <span class="c"># /etc/resolv.conf — points to DNS resolver</span>
      nameserver 8.8.8.8
    </div>
  </div>
</div>

<!-- DISCUSSION Slides 6–9 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">Iterative</span><div class="ki-text">The <strong>local DNS server</strong> does all the work — it iteratively queries root → TLD → authoritative on behalf of the client. The client makes one request; the local DNS server makes three.</div></div>
      <div class="key-item"><span class="ki-tag">dig</span><div class="ki-text"><code>dig @server domain</code> lets you manually query specific nameservers. Critical for understanding and verifying the resolution chain — and for spotting DNS tampering.</div></div>
      <div class="key-item"><span class="ki-tag">/etc/hosts</span><div class="ki-text">Checked first, before any network request. Local root access or malware can poison it silently. This is the <strong>simplest and most reliable DNS hijack</strong> for a local attacker.</div></div>
      <div class="key-item"><span class="ki-tag">/etc/resolv.conf</span><div class="ki-text">Points your machine to the DNS resolver. Changing this to a <strong>malicious DNS server</strong> (e.g., via rogue DHCP) gives the attacker full control of all your DNS lookups.</div></div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-flow">🔄 Iterative Resolution Workflow</div>
    <div class="flow-wrap">
      <table class="flow-table">
        <thead>
          <tr><th>#</th><th>Who Queries</th><th>Server Asked</th><th>Response</th><th>Why</th></tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="tag tag-step">1</span></td>
            <td>Client</td>
            <td>Local DNS (8.8.8.8)</td>
            <td>Initiates resolution</td>
            <td>Client delegates all lookup work to local resolver</td>
          </tr>
          <tr>
            <td><span class="tag tag-step">2</span></td>
            <td>Local DNS</td>
            <td>Root Server (a.root-servers.net)</td>
            <td>"Don't know. Try .net servers."</td>
            <td>Root knows only TLD delegations</td>
          </tr>
          <tr>
            <td><span class="tag tag-step">3</span></td>
            <td>Local DNS</td>
            <td>.net TLD Server</td>
            <td>"Don't know. Try example.net's NS."</td>
            <td>TLD knows second-level delegations</td>
          </tr>
          <tr>
            <td><span class="tag tag-step">4</span></td>
            <td>Local DNS</td>
            <td>example.net Authoritative NS</td>
            <td><strong>Here is the IP!</strong></td>
            <td>Authoritative server is ground truth</td>
          </tr>
          <tr>
            <td><span class="tag tag-ok">5</span></td>
            <td>Local DNS</td>
            <td>Client (returns answer)</td>
            <td>IP address + TTL → cached</td>
            <td>Cache prevents repeating steps 2–4</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="info-box ib-warn">
      <span class="ib-icon">⚠️</span>
      <div class="ib-body"><strong>Attack Window:</strong> Steps 2–4 use UDP with no authentication. An attacker who can inject a spoofed reply to the local DNS server — faster than the real answer — poisons the cache. Every user of that DNS server is then misdirected for the duration of the TTL.</div>
    </div>
  </div>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 10</span>
    <span class="slide-title">DNS Attacks — Overview</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>Denial-of-Service (DoS)</strong> — DNS servers don't respond → names can't resolve → Internet effectively unreachable</li>
      <li><strong>DNS Spoofing (Cache Poisoning)</strong>
        <ul>
          <li>Provide fraudulent IP → victim communicates with wrong machine</li>
          <li><em>Vector 1:</em> Modify <code>/etc/resolv.conf</code> → use malicious DNS server</li>
          <li><em>Vector 2:</em> Modify <code>/etc/hosts</code> → override specific domains locally</li>
          <li><em>Vector 3:</em> Inject forged reply into DNS server's cache (network-level)</li>
        </ul>
      </li>
    </ul>
  </div>
</div>

<!-- DISCUSSION Slide 10 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">DoS</span><div class="ki-text">Overload DNS servers so they can't respond. Impact: <strong>entire Internet unreachable</strong> for affected users — even though IP routing is fine, names can't be resolved.</div></div>
      <div class="key-item"><span class="ki-tag">Spoofing</span><div class="ki-text">The attacker inserts a <strong>false DNS record</strong> that maps a legitimate domain to an attacker-controlled IP. Victim believes they're at the real site.</div></div>
      <div class="key-item"><span class="ki-tag">Vectors</span><div class="ki-text">Three attack vectors with increasing difficulty: (1) Local file modification — requires local access; (2) Local network spoofing — requires same LAN; (3) Remote cache poisoning — hardest, requires guessing random numbers.</div></div>
    </div>
  </div>
  <div class="disc-section">
    <div class="disc-label dl-deep">📖 Beginner-Friendly Deep Dive</div>
    <p>DNS attacks fall into two strategic categories: <em>misdirection</em> (spoofing — you send users somewhere wrong) and <em>obstruction</em> (DoS — you prevent them from going anywhere at all). Understanding which layer each attack targets is key to understanding defenses.</p>
    <div class="flow-wrap">
      <table class="flow-table">
        <thead>
          <tr><th>Attack Vector</th><th>Attacker Position</th><th>Target</th><th>Scope of Impact</th></tr>
        </thead>
        <tbody>
          <tr><td><strong>Modify /etc/hosts</strong></td><td>Local machine access</td><td>Single victim machine</td><td>One user</td></tr>
          <tr><td><strong>Modify /etc/resolv.conf</strong></td><td>Local machine or rogue DHCP</td><td>Single victim's DNS resolver</td><td>One user (all lookups)</td></tr>
          <tr><td><strong>LAN Spoofing</strong></td><td>Same LAN as local DNS</td><td>Local DNS server's cache</td><td>All users of that DNS server</td></tr>
          <tr><td><strong>Remote Cache Poisoning</strong></td><td>Anywhere on Internet</td><td>Local DNS server's cache</td><td>All users of that DNS server</td></tr>
          <tr><td><strong>DoS on DNS Server</strong></td><td>Anywhere (botnet)</td><td>DNS server availability</td><td>All users relying on that server</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- SLIDE 11 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 11</span>
    <span class="slide-title">Spoofing DNS Replies (from LAN)</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>Attack on user machines:</strong> Attacker on same LAN sees DNS query from user → immediately sends spoofed reply with local DNS as source IP → arrives first → accepted</li>
      <li><strong>Cache Poisoning attack on local DNS server:</strong> When local DNS sends iterative queries to Internet DNS servers → attacker sends spoofed replies to local DNS → <em>accepted if they arrive before the real replies</em> → poisoned entry cached</li>
      <li>Key requirement: spoofed reply must arrive <strong>before</strong> the legitimate reply</li>
    </ul>
  </div>
</div>

<!-- DISCUSSION Slide 11 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">Race</span><div class="ki-text">LAN cache poisoning is a <strong>race condition</strong>. DNS (UDP) accepts the first matching reply. The attacker on the LAN has lower latency than the real Internet server — so they almost always win.</div></div>
      <div class="key-item"><span class="ki-tag">Scope</span><div class="ki-text">Poisoning the <strong>local DNS server's cache</strong> is far more impactful than poisoning one user's cache — every user of that DNS server gets the wrong IP until the TTL expires.</div></div>
      <div class="key-item"><span class="ki-tag">UDP</span><div class="ki-text">DNS uses UDP — there's no connection to establish, no SYN/ACK sequence. Any packet with the right Transaction ID and source port is accepted as legitimate.</div></div>
    </div>
  </div>
  <div class="disc-section">
    <div class="disc-label dl-golden">🌀 Simon Sinek's Golden Circle</div>
    <div class="golden-table">
      <div class="gc-cell gc-why">
        <div class="gc-circle">🔴 WHY it works</div>
        <p>DNS was designed in a trusted university network where everyone was assumed to be honest. UDP has no built-in origin verification. The Transaction ID was meant to correlate requests/replies, not to prevent forgery.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-circle">🟡 HOW it's done</div>
        <p>Attacker sniffs DNS query (gets Transaction ID and source port), crafts a fake reply with matching IDs and a poisoned IP address, sends it back to the local DNS server before the real answer returns.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-circle">🟢 WHAT the attacker achieves</div>
        <p>Local DNS server caches the fake mapping. Every user who queries that DNS server for the targeted domain is silently redirected to the attacker's server — phishing, credential theft, malware delivery.</p>
      </div>
    </div>
  </div>
  <div class="disc-section">
    <div class="disc-label dl-flow">🔄 LAN Cache Poisoning Step-by-Step</div>
    <div class="flow-wrap">
      <table class="flow-table">
        <thead>
          <tr><th>#</th><th>Actor</th><th>Action</th><th>Security Note</th></tr>
        </thead>
        <tbody>
          <tr><td><span class="tag tag-step">1</span></td><td>User</td><td>Queries local DNS for <code>www.bank.com</code></td><td>Normal query, Transaction ID = 12345</td></tr>
          <tr><td><span class="tag tag-step">2</span></td><td>Local DNS</td><td>Queries authoritative DNS server (Internet)</td><td>Attacker sniffs this — sees TxID = 12345</td></tr>
          <tr><td><span class="tag tag-attack">3</span></td><td><strong>Attacker</strong></td><td>Sends spoofed reply: <code>bank.com → 1.2.3.4</code> with TxID=12345</td><td>Arrives before real reply due to LAN proximity</td></tr>
          <tr><td><span class="tag tag-warn">4</span></td><td>Local DNS</td><td>Accepts attacker's reply (arrived first), caches it</td><td>Real reply now arrives — discarded (already answered)</td></tr>
          <tr><td><span class="tag tag-warn">5</span></td><td>All users</td><td>Any <code>bank.com</code> query returns <code>1.2.3.4</code></td><td>Until TTL expires — affects whole organization</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

  <div class="td-line"></div>
</div>

<!-- SLIDE 12 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 12</span>
    <span class="slide-title">Remote DNS Cache Poisoning Attack</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>Challenge for remote attackers:</strong> Must guess two 16-bit random numbers without being on the same LAN:
        <ul>
          <li>Source port number (randomized by resolver)</li>
          <li>Transaction ID (random 16-bit number chosen per query)</li>
        </ul>
      </li>
      <li>Combined entropy: 16 + 16 = <strong>32 bits</strong> → 2³² ≈ 4 billion combinations → hard to brute force</li>
      <li><strong>Cache effect problem:</strong> If attack fails, real reply is cached → must wait for TTL to expire before trying again</li>
    </ul>
  </div>
</div>

<!-- SLIDE 13 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 13</span>
    <span class="slide-title">DNS Packet Structure</span>
  </div>
  <div class="slide-body">
    <ul>
      <li>IP Header: Source/Dest IP, TTL, Protocol=17 (UDP)</li>
      <li>UDP Header: <strong>Source Port</strong> (randomized — must guess), Destination Port=53</li>
      <li>DNS Header: <strong>Transaction ID</strong> (random 16-bit — must guess), Flags</li>
      <li>DNS Body: Question count, Answer count, Authority count, Additional count</li>
    </ul>
    <div class="info-box ib-note">
      <span class="ib-icon">🔑</span>
      <div class="ib-body"><strong>The two fields an attacker must guess:</strong> <code>Source Port</code> (UDP header) + <code>Transaction ID</code> (DNS header). Both are randomized since DNS security improvements post-2008.</div>
    </div>
  </div>
</div>

<!-- DISCUSSION Slides 12–13 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">32-bit entropy</span><div class="ki-text">Post-2008 DNS resolvers randomize both source port (16-bit) and Transaction ID (16-bit) = 2³² combinations. At 1000 guesses/sec: average ~50 days to succeed. This is the core defense against naive remote attacks.</div></div>
      <div class="key-item"><span class="ki-tag">Cache block</span><div class="ki-text">If the attack attempt fails (real reply arrives first), the correct answer is cached. Attacker must wait for TTL to expire before another attempt. This rate-limits attacks to roughly one attempt per TTL period.</div></div>
      <div class="key-item"><span class="ki-tag">Birthday Bound</span><div class="ki-text">Probability of success in n attempts on 32-bit space: roughly n / 2³². To get 50% chance: ~3 billion attempts needed. The cache effect prevents this volume of attempts in practice.</div></div>
    </div>
  </div>
  <div class="disc-section">
    <div class="disc-label dl-deep">📖 Deep Dive — Why 32-bit Is Not Enough: The Kaminsky Insight</div>
    <p>The naive analysis says: 32 bits = brute-force infeasible. But Dan Kaminsky realized in 2008 that there's a subtler flaw: <strong>the cache effect only blocks you from trying the same question again</strong>. What if you ask a <em>different question</em> every attempt?</p>
    <p>If you query for <code>random123.example.com</code>, get a cache miss, the real reply gets cached — but only for that random subdomain. You're now free to immediately try <code>random456.example.com</code>. Each attempt asks a fresh question that has never been cached. The cache effect is completely bypassed. This is the Kaminsky Attack, covered next.</p>
  </div>
</div>

  <div class="td-line"></div>
