<div id="s27" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDE 27</span>
    <div>
      <div class="slide-title">Anti-Replay Service</div>
      <div class="slide-subtitle">Sequence numbers + sliding window protocol</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li>Anti-replay uses <strong>sequence numbers</strong> + <strong>sliding window</strong></li>
      <li>Sender initializes sequence number to 0 when SA is established; increments for each packet</li>
      <li>Receiver accepts packets with sequence # within window: <code>(N − W + 1)</code> to <code>N</code></li>
      <li>Window advances when a valid packet beyond N is received</li>
      <li>Packets to the left of the window (already processed) are rejected</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">REPLAY ATTACK</span>
        A replay attack occurs when an attacker captures a valid, authenticated packet and retransmits it later. Without anti-replay protection, this could: re-execute a command (e.g., "transfer $1000"), establish a duplicate connection, or bypass authentication by replaying valid auth packets. The anti-replay window makes each sequence number acceptable only once.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">🌀</span>Simon Sinek's Golden Circle — Anti-Replay</div>
      <div class="golden-circle">
        <div class="gc-card gc-why">
          <div class="gc-label">🔴 WHY</div>
          <p>Authentication proves a packet came from the right source. But it doesn't prevent a valid packet from being resent by an attacker. A packet with a perfect MAC can still be replayed — we need a separate mechanism to detect and reject duplicates.</p>
        </div>
        <div class="gc-card gc-how">
          <div class="gc-label">🟡 HOW</div>
          <p>Sender includes a monotonically increasing sequence number in each packet (part of AH/ESP header). Receiver maintains a sliding window bitmap. Packets within the window are accepted if their sequence number hasn't been seen; packets outside the window (too old) are rejected.</p>
        </div>
        <div class="gc-card gc-what">
          <div class="gc-label">🟢 WHAT</div>
          <p>Each valid packet is accepted exactly once. An attacker capturing and replaying a packet will find it rejected because its sequence number has already been seen (marked in the window bitmap) or has fallen outside the window (too old).</p>
        </div>
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — The Sliding Window Mechanism</div>
      <div class="deep-dive">
        <p><strong>How the window works:</strong> The window has a fixed size W (typically 64). N is the highest sequence number received so far. The window accepts sequence numbers from (N–W+1) to any value greater than N. Received numbers within the window are tracked in a bitmap. When a packet with sequence number M is received:</p>
        <ul style="list-style: disc; padding-left: 24px; margin: 8px 0;">
          <li style="padding: 3px 0; color: var(--text2);">If M &lt; (N–W+1): <span style="color: var(--red);">REJECT</span> — too old, outside window, likely a replay</li>
          <li style="padding: 3px 0; color: var(--text2);">If (N–W+1) ≤ M ≤ N: check bitmap — if already seen: <span style="color: var(--red);">REJECT</span>; if not seen: <span style="color: var(--green);">ACCEPT</span> and mark</li>
          <li style="padding: 3px 0; color: var(--text2);">If M &gt; N: <span style="color: var(--green);">ACCEPT</span>, advance window to M, mark M in bitmap</li>
        </ul>
        <p><strong>Why a window rather than remembering all sequence numbers?</strong> Storing every sequence number ever received would require unbounded memory. A fixed-size window only requires W bits of memory and handles legitimate packet reordering (packets that arrive out of order within the window are still accepted).</p>
        <p><strong>What happens when the sequence number wraps around?</strong> The 32-bit sequence number can hold about 4 billion values. For very long or high-bandwidth SAs, the sequence number could eventually overflow. IPSec addresses this via Extended Sequence Numbers (ESN, 64-bit) or by requiring SA renegotiation before overflow — IKE's SA lifetime settings ensure renegotiation happens well before overflow.</p>
        <div class="analogy">
          The sliding window is like a theater ticket check. The usher has a list of valid seat numbers (window). If you arrive with a ticket for a seat that was seated an hour ago (too old), you're turned away. If your ticket is for a future seat, you're accepted and the window advances. Duplicate tickets are caught immediately.
        </div>
      </div>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — Slides 27 · Anti-Replay</div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-mc">MC</span>
        <span class="q-text">The receiver's anti-replay window currently has N=100 and W=64. A packet arrives with sequence number 35. What happens?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) Accepted — within the window</div>
        <div class="q-opt">B) Rejected — below (N–W+1) = 37, outside window</div>
        <div class="q-opt">C) Accepted — window advances to 35</div>
        <div class="q-opt">D) Forwarded to IKE for renegotiation</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>B) Rejected.</strong> The window lower bound is N–W+1 = 100–64+1 = 37. A packet with sequence number 35 is below 37 — it has fallen outside the window and is rejected as a likely replay. Only packets with sequence numbers 37–100 (and 101+ for new packets) are accepted.</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-tf">T/F</span>
        <span class="q-text">The anti-replay sequence number in IPSec is sufficient to prevent replay attacks even without the MAC/ICV provided by AH or ESP authentication.</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>False.</strong> The sequence number alone cannot prevent replay attacks because an attacker can forge packets with any sequence number — including fresh, unused ones — without the MAC. The MAC (ICV) proves the packet came from an authenticated source. Anti-replay depends on BOTH: (1) the MAC to prove authenticity, and (2) the sequence number window to detect duplicates. Without authentication, the sequence number check is meaningless.</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-sa">Short Answer</span>
        <span class="q-text">What is the purpose of IPSec's SA lifetime, and how does it relate to sequence number overflow?</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text">The SA lifetime (in seconds or bytes) forces periodic renegotiation of the SA via IKE. One key reason is to prevent sequence number overflow — the 32-bit sequence number wraps at ~4 billion packets. A SA processing high-bandwidth traffic (e.g., 10 Gbps with 1500-byte packets = ~833,000 pps) could exhaust the 32-bit counter in ~85 minutes. The SA lifetime ensures the SA is replaced (with a new sequence counter starting at 0) well before overflow. IPSec also supports Extended Sequence Numbers (ESN, 64-bit) for high-speed environments.</span>
      </div>
    </div>
  </div>
</div>

      <li><strong>IPSec:</strong> Network layer — IKE key exchange, AH/ESP protection, SA database</li>
      <li><strong>Summary:</strong> Symmetric encryption + Public key encryption + Cryptographic hash functions are building blocks of all three</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Master Comparison — SSH vs. TLS vs. IPSec</div>
      <table class="compare-table">
        <thead>
          <tr><th>Feature</th><th>SSH</th><th>TLS</th><th>IPSec</th></tr>
        </thead>
        <tbody>
          <tr><td><strong>Layer</strong></td><td>Application (L7)</td><td>Transport (L4)</td><td>Network (L3)</td></tr>
          <tr><td><strong>Scope</strong></td><td>Single remote session</td><td>Single connection</td><td>All IP traffic</td></tr>
          <tr><td><strong>Key Exchange</strong></td><td>ECDHE</td><td>ECDHE (TLS 1.3)</td><td>IKEv2 (ECDHE)</td></tr>
          <tr><td><strong>Auth Mechanism</strong></td><td>Public key or password</td><td>X.509 certificates (server, optionally client)</td><td>Certificates or PSK via IKE</td></tr>
          <tr><td><strong>Encryption</strong></td><td>AES-GCM</td><td>AES-GCM</td><td>AES-GCM (ESP)</td></tr>
          <tr><td><strong>Integrity</strong></td><td>HMAC</td><td>GCM auth tag</td><td>HMAC or GCM tag (AH/ESP)</td></tr>
          <tr><td><strong>Transparency</strong></td><td>App must use SSH explicitly</td><td>App must support TLS</td><td>Transparent to all apps</td></tr>
          <tr><td><strong>Typical Use</strong></td><td>Remote admin, SFTP</td><td>HTTPS, SMTPS, databases</td><td>VPN, enterprise routing</td></tr>
          <tr><td><strong>Certificate Authority</strong></td><td>No (TOFU/known_hosts)</td><td>Yes (PKI)</td><td>Optional (PKI or PSK)</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — SSH vs. TLS vs. IPSec</div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-mc">MC</span>
        <span class="q-text">A database server that receives TCP connections from multiple application servers needs to secure all connections regardless of which application is connecting, without modifying any application code. Which solution fits best?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) SSH tunneling on each application server</div>
        <div class="q-opt">B) TLS on the database connection library</div>
        <div class="q-opt">C) IPSec between the network segments hosting app servers and the DB</div>
        <div class="q-opt">D) WEP encryption on the data link layer</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>C.</strong> IPSec at the network layer protects all traffic between the two network segments transparently, without any application code changes. Any connection from any application server to the database is automatically protected. TLS (B) would require modifying each application's connection library. SSH (A) would require per-application tunnel configuration.</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-sa">Short Answer</span>
        <span class="q-text">Both TLS and IPSec use AES-GCM and ECDHE. What is the fundamental architectural difference that makes each suited to different use cases?</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text">TLS is connection-oriented and operates at the Transport Layer — it protects a specific TCP (or DTLS/UDP) connection between specific endpoints. Each application that wants TLS protection must explicitly use TLS in its code. IPSec is packet-oriented and operates at the Network Layer — it protects all IP packets between two network endpoints, regardless of what transport protocol or application they carry. Applications are completely unaware of IPSec. This transparency makes IPSec ideal for infrastructure-level security (VPNs, enterprise perimeter), while TLS is ideal for application-level security (HTTPS, database connections).</span>
      </div>
    </div>
  </div>
</div>

      <tr>
        <td>IPSec</td>
        <td>Suite of network-layer protocols providing comprehensive IP packet security</td>
        <td>AH + ESP + IKE + SPD + SAD working together</td>

      <tr>
        <td>AH</td>
        <td>Authentication Header — integrity + origin auth, no encryption</td>
        <td>HMAC over immutable IP header fields + payload; protocol number 51</td>
        <td>Incompatible with NAT; rarely used alone; TTL zeroed before HMAC</td>
      </tr>
      <tr>
        <td>ESP</td>
        <td>Encapsulating Security Payload — encryption + auth + anti-replay</td>
        <td>AES-GCM encrypts payload; ICV provides auth; Sequence Number for anti-replay; protocol number 50</td>
        <td>Preferred over AH; NAT-compatible in tunnel mode; Next Header field reveals payload type but is encrypted</td>
      </tr>
      <tr>
        <td>Transport Mode</td>
        <td>IPSec between two end hosts; original IP header exposed; only payload protected</td>
        <td>IPSec header inserted between IP header and payload</td>
        <td>Lower overhead; cannot evade destination-IP filtering (original IP visible); end hosts must support IPSec</td>
      </tr>
      <tr>
        <td>Tunnel Mode</td>
        <td>IPSec between two gateways; entire original packet encapsulated in new outer packet</td>
        <td>New outer IP header + ESP/AH header + encrypted(original IP header + payload)</td>
        <td>Can evade destination-IP filtering (inner IP hidden); used for VPN; end hosts don't need IPSec</td>
      </tr>
      <tr>
        <td>SA (Security Association)</td>
        <td>One-way security relationship between sender and receiver; stores all cryptographic parameters</td>
        <td>Identified by 3-tuple: SPI + Dest IP + Protocol; stored in SAD</td>
        <td>SA is unidirectional — 2 SAs required for bidirectional communication</td>
      </tr>
      <tr>
        <td>SPD (Security Policy Database)</td>
        <td>Defines what to do with each type of IP traffic: PROTECT / BYPASS / DISCARD</td>
        <td>Matched by selectors: src/dst IP, protocol, ports</td>
        <td>UDP 500 must BYPASS (IKE); port 443 often BYPASS (avoid double-TLS encryption)</td>
      </tr>
      <tr>
        <td>SAD (Security Association Database)</td>
        <td>Stores all active SA parameters for currently protected connections</td>
        <td>Lookup by SPI + Dest IP + Protocol; contains keys, algorithms, sequence counters, lifetime</td>
        <td>SPD determines intent; SAD determines how; IKE populates SAD; SA expires per lifetime</td>
      </tr>
      <tr>
        <td>IKE (v2)</td>
        <td>Internet Key Exchange — automated key negotiation protocol using ECDHE</td>
        <td>Phase 1: IKE SA (auth channel); Phase 2: IPSec SA pair; UDP port 500 (4500 for NAT)</td>
        <td>Without IKE, keys must be manually configured — impractical at scale; IKEv2 is more efficient than v1</td>
      </tr>
      <tr>
        <td>Anti-Replay</td>
        <td>Prevents an attacker from resending captured packets</td>
        <td>Monotonically increasing 32-bit sequence number + receiver sliding window (default W=64)</td>
        <td>Window bounds: (N–W+1) to N; packets outside window or already seen are rejected</td>

      <tr>

        <td>Security Parameters Index — 32-bit random value that identifies an SA</td>

        <td>Random (not sequential) to prevent SPI prediction; 0 = local use; 1-255 reserved</td>

<div id="exam">
  <div class="section-title">🎯 Exam Preparation — Integrative Questions</div>

  <div class="integ-q">
    <div class="integ-q-header">[Short Answer] Compare AH and ESP: services, NAT compatibility, and when you would choose each.</div>
    <div class="integ-q-body">
      <strong>✔ Model Answer:</strong>
      AH (Authentication Header, protocol 51) provides data origin authentication, data integrity, and optional anti-replay via HMAC, but provides NO confidentiality. It authenticates selected immutable IP header fields plus the payload. AH is incompatible with NAT because NAT modifies the source IP — an immutable field covered by the ICV — causing ICV verification failure at the receiver.<br><br>
      ESP (Encapsulating Security Payload, protocol 50) provides all of AH's services plus message confidentiality (encryption). Modern ESP uses AES-GCM (an AEAD cipher) for combined encryption and authentication in a single pass. ESP in tunnel mode is NAT-compatible because the original IP headers are encrypted inside the payload — NAT only modifies the new outer IP headers, which are not covered by the ICV.<br><br>
      Choice: Use AH only in environments where encryption is legally restricted but origin authentication is needed, AND no NAT is in the path. In virtually all real deployments, use ESP (usually with authentication) because it provides all of AH's services plus confidentiality.
    </div>
  </div>

  <div class="integ-q">
    <div class="integ-q-header">[Short Answer] Explain the complete packet processing pipeline for an outbound TCP packet that should be protected by ESP in tunnel mode.</div>
    <div class="integ-q-body">
      <strong>✔ Model Answer:</strong>
      1. Application generates TCP segment; OS TCP/IP stack builds IP packet with original src/dst IPs.<br>
      2. IPSec intercepts the outbound IP packet and consults the SPD using the packet's selectors (src IP, dst IP, protocol TCP, ports).<br>
      3. SPD entry matches with action PROTECT using ESP tunnel mode.<br>
      4. IPSec looks up the SAD for a matching SA (SPI + dst IP + ESP). If no SA exists, IKEv2 is triggered to negotiate one.<br>
      5. With a valid SA, IPSec builds the ESP packet: (a) appends Padding, Pad Length, and Next Header (TCP=6) fields; (b) encrypts the entire original IP packet + ESP trailer using AES-GCM with the SA's key and a fresh random IV/nonce; (c) computes the ICV (GCM auth tag) over ESP header (SPI + Seq#) + encrypted payload as associated data.<br>
      6. A new outer IP header is prepended with src = local gateway IP, dst = remote VPN gateway IP.<br>
      7. The sequence number in the SA is incremented.<br>
      8. The final packet (new IP hdr | ESP hdr | ciphertext | ICV) is forwarded via the standard IP routing stack.
    </div>
  </div>

  <div class="integ-q">
    <div class="integ-q-header">[Short Answer] A corporation's SPD has: "all traffic to 1.2.3.0/24 → PROTECT ESP transport; all traffic to 1.2.4.10 port 443 → BYPASS." An employee sends an HTTPS request to 1.2.4.10. What happens, and is this a security concern?</div>
    <div class="integ-q-body">
      <strong>✔ Model Answer:</strong>
      The packet to 1.2.4.10 port 443 matches the second SPD entry (BYPASS) — traffic is forwarded without IPSec protection. This is intentional: port 443 traffic is already protected by TLS (HTTPS). Double-encrypting with both TLS and ESP would waste CPU cycles with no security gain.<br><br>
      Security concern analysis: The BYPASS rule assumes TLS is doing its job. If the browser's TLS is compromised (e.g., forged certificate), there's no IPSec fallback protection. However, in a well-managed environment, this is an acceptable risk tradeoff — TLS provides application-level end-to-end encryption all the way to the server, which is actually stronger than IPSec which only protects to the gateway. The key insight is that the BYPASS does not mean "unprotected" — it means "protected by TLS at a different layer."
    </div>
  </div>

  <div class="integ-q">
    <div class="integ-q-header">[Multi-answer] Which security services does IPSec ESP with authentication provide? Select all correct answers: (a) Confidentiality, (b) Data integrity, (c) Anti-replay, (d) Non-repudiation, (e) Data origin authentication, (f) Access control</div>
    <div class="integ-q-body">
      <strong>✔ Model Answer: a, b, c, e</strong><br>
      (a) Confidentiality — YES, ESP encrypts the payload with AES-GCM.<br>
      (b) Data integrity — YES, the ICV (HMAC or GCM tag) detects any modification.<br>
      (c) Anti-replay — YES, sequence numbers + sliding window reject replayed packets.<br>
      (d) Non-repudiation — NO. IPSec uses symmetric shared keys negotiated by IKE. Both parties share the same key, so either could have generated the MAC. Non-repudiation requires asymmetric digital signatures where only the sender has the private key.<br>
      (e) Data origin authentication — YES, the ICV with a shared secret proves the packet came from the authenticated endpoint.<br>
      (f) Access control — Partially. IKE authentication controls which endpoints can establish SAs (access to the encrypted channel), but IPSec ESP itself does not perform fine-grained access control on packet contents. The SPD's DISCARD/PROTECT/BYPASS is closer to access control, and is provided by IPSec as a system.
    </div>
  </div>

  <div class="integ-q">
    <div class="integ-q-header">[Short Answer] Explain why the anti-replay mechanism in IPSec requires BOTH the sequence number AND the MAC/ICV to function correctly. What happens if either is missing?</div>
    <div class="integ-q-body">
      <strong>✔ Model Answer:</strong>
      The anti-replay mechanism has two parts: (1) <strong>MAC/ICV proves authenticity</strong> — the packet came from the authorized peer and was not modified. (2) <strong>Sequence number window detects duplicates</strong> — each valid authenticated packet is accepted at most once.<br><br>
      Without the MAC: An attacker can forge packets with any sequence number — including fresh, unused ones within the window. The sequence number check alone cannot prevent injection attacks.<br><br>
      Without the sequence number: The MAC proves each packet is authentic, but cannot prevent an attacker from capturing a valid authenticated packet and replaying it minutes or days later. The MAC would verify correctly on each replay (the packet content hasn't changed and it was legitimately signed).<br><br>
      Both are necessary: MAC eliminates forged packets, sequence numbers eliminate replayed legitimate packets. Together, they ensure each authenticated packet is processed exactly once.
    </div>
  </div>

  <div class="integ-q">
    <div class="integ-q-header">[Short Answer — Midterm-style] A client C at IP 192.168.1.5 uses a VPN gateway V at 130.160.57.1 to access server S at 10.116.230.1. List what each party can observe: (1) on-path attacker between C and V, (2) VPN gateway V, (3) destination server S.</div>
    <div class="integ-q-body">
      <strong>✔ Model Answer:</strong>
      (1) On-path attacker between C and V sees: Client IP (192.168.1.5), VPN gateway IP (130.160.57.1), timing and traffic volume/metadata. The inner destination IP (10.116.230.1) and payload content are hidden inside the encrypted ESP tunnel.<br><br>
      (2) VPN gateway V sees: Client IP (192.168.1.5), destination IP (10.116.230.1), VPN gateway IP (its own), and ALL payload content (after decrypting the ESP tunnel). V also sees timing and volume. V is a trusted party — this is why choosing a trustworthy VPN provider matters.<br><br>
      (3) Destination server S sees: VPN gateway IP (130.160.57.1) as the source (due to NAT), destination IP (10.116.230.1), all payload content, and timing/volume. The real client IP is masked by VPN NAT.
    </div>
  </div>

<div class="topic-header t1">
  <div class="topic-dot"></div>
  <h2>Topic 1 — What Is a Firewall? Policy, Requirements &amp; Actions</h2>
  <span class="topic-num">Slides 4 – 8</span>
</div>

<!-- SLIDE 4 — WHAT IS A FIREWALL -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 4</span>
    <span class="slide-title">What Is a Firewall?</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content</h4>
      <ul>
        <li>A <strong>choke point</strong> of control and monitoring — stops unauthorized traffic flowing between networks.</li>
        <li>Interconnects networks with <strong>differing trust levels</strong>.</li>
        <li>Imposes restrictions on network services — only <strong>authorized traffic</strong> is allowed.</li>
        <li>Provides <strong>auditing and access control</strong>; can implement alarms for abnormal behavior.</li>
        <li>Must itself be <strong>immune to penetration</strong>.</li>
        <li>Provides <strong>perimeter defense</strong>.</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>Choke Point</strong>All traffic between trust zones must pass through the firewall — no alternative paths.</div>
        <div class="kc-item"><strong>Trust Zones</strong>Networks are classified by trust level (e.g., Internet = untrusted, corporate LAN = trusted).</div>
        <div class="kc-item"><strong>Perimeter Defense</strong>Firewall is the outermost line of defense — first and most visible security barrier.</div>
        <div class="kc-item"><strong>Immune to Penetration</strong>The firewall itself must be hardened; a compromised firewall is worse than no firewall.</div>
        <div class="kc-item"><strong>Auditing</strong>Firewalls log traffic for later forensic analysis and compliance reporting.</div>
        <div class="kc-item"><strong>Authorization Policy</strong>Defined rules specify what is allowed — the default must be deny-all unless explicitly permitted.</div>
      </div>
    </div>

    <div class="golden-circle">
      <div class="gc-box gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Without a firewall, any host on the Internet can attempt to connect to any service on an internal network. Organizations have sensitive data, internal services, and administrative interfaces that must never be directly exposed to the public Internet. The firewall enforces the boundary between what is trusted and what is not.</p>
      </div>
      <div class="gc-box gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>A firewall sits at the boundary between networks, examining all traffic that crosses the boundary. It applies a policy (a ruleset) to decide whether each packet or connection is permitted. Rules are based on addresses, ports, protocols, connection state, or even application-layer content.</p>
      </div>
      <div class="gc-box gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Internal hosts are protected from unsolicited external connections. Only traffic that matches approved rules reaches internal services. Attack surface is reduced to what the organization deliberately exposes, and all boundary traffic is logged for auditing.</p>
      </div>
    </div>

    <div class="deep-dive">
      <h4>📖 Beginner-to-Expert Deep Dive</h4>
      <p>Imagine your corporate network is a building. The Internet is the street outside — anyone can walk up to the front door. Without security, anyone could walk in and access any room. A firewall is the <em>front door with a security guard</em>: everyone who enters must present credentials, and the guard decides whether to let them through based on a policy ("visitors must show ID and only go to the reception area").</p>
      <div class="analogy">The Bouncer Analogy: A nightclub bouncer checks IDs, enforces dress codes, and keeps troublemakers out — but once inside, the bouncer doesn't follow you around. A firewall works the same way: it enforces entry rules at the perimeter but typically doesn't monitor behavior once a connection is established. This is why defense-in-depth (additional internal controls) is still needed.</div>
      <p><strong>The choke point concept</strong> is critical: a firewall only works if <em>all traffic</em> passes through it. If there is an alternate path — say, an employee's personal hotspot — the firewall is bypassed. This is why firewall policy must also address physical and wireless access.</p>
      <p><strong>Why must the firewall itself be immune to penetration?</strong> Because a compromised firewall is the attacker's best friend — it gives them control of the exact device meant to keep them out. Firewall hardening includes: running a minimal OS with no unnecessary services, using dedicated hardware, restricting management access to a dedicated admin VLAN, and applying all security patches immediately.</p>
    </div>
  </div>
</div>

<!-- SLIDE 5 — REQUIREMENTS -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 5</span>
    <span class="slide-title">Requirements of a Firewall</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content</h4>
      <ul>
        <li><strong>All traffic</strong> between trust zones must pass through the firewall.</li>
        <li>Only <strong>authorized traffic</strong> (as defined by security policy) should be allowed.</li>
        <li>The firewall itself must be <strong>immune to penetration</strong> — implemented on a hardened OS.</li>
      </ul>
    </div>
    <div class="deep-dive">
      <h4>📖 Deep Dive — The Three Pillars</h4>
      <p>These three requirements define what makes something a <em>real</em> firewall versus a toy. Violation of any one of them undermines the security posture:</p>
      <p><strong>Pillar 1 — All Traffic Must Pass:</strong> If even a single packet can bypass the firewall, the entire security model is broken. This is enforced architecturally by ensuring there is no physical or logical path between networks that doesn't go through the firewall. In practice, this means carefully auditing every network connection — including VLANs, wireless access points, and remote access solutions.</p>
      <p><strong>Pillar 2 — Policy-Based Authorization:</strong> The security policy must be explicit about what is allowed. The two common stances are: (a) <em>Default Deny</em> — block everything, then explicitly allow what's needed. This is the secure approach. (b) <em>Default Allow</em> — allow everything, then block what's dangerous. This is the insecure approach — you'll always miss something to block. Security professionals always advocate for Default Deny.</p>
      <p><strong>Pillar 3 — Hardened Firewall:</strong> A firewall running on a general-purpose OS with many services is itself a large attack surface. Firewall appliances typically run a stripped-down OS with only the firewall software. Even management interfaces (SSH, web UI) should be restricted to dedicated management networks.</p>
      <div class="warning-box">A firewall that can be bypassed, misconfigured remotely, or compromised is worse than no firewall — it creates a false sense of security while providing no actual protection.</div>
    </div>
  </div>
</div>

<!-- SLIDE 6 & 7 — POLICY & ACTIONS -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDES 6 – 7</span>
    <span class="slide-title">Firewall Policy &amp; Actions</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content — Firewall Policy (3 dimensions)</h4>
      <ul>
        <li><strong>User Control:</strong> Based on <em>who</em> — role of the user. Applied to users inside the perimeter.</li>
        <li><strong>Service Control:</strong> Based on <em>what</em> — type of service, network address, protocol, port numbers.</li>
        <li><strong>Direction Control:</strong> Based on <em>which way</em> — inbound vs. outbound. Who initiated the request?</li>
      </ul>
      <h4 style="margin-top:14px">Slide Content — Firewall Actions</h4>
      <ul>
        <li><strong>Accepted:</strong> Packet allowed to pass.</li>
        <li><strong>Denied (Drop):</strong> Packet silently discarded — sender receives no notification.</li>
        <li><strong>Rejected:</strong> Packet discarded AND sender is notified via ICMP.</li>
        <li><strong>Ingress Filtering:</strong> Inspects incoming traffic to protect internal network.</li>
        <li><strong>Egress Filtering:</strong> Inspects outgoing traffic (e.g., blocking social media from corporate network).</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>User Control</strong>Role-based access — e.g., HR staff can access HR servers; developers cannot.</div>
        <div class="kc-item"><strong>Service Control</strong>Port/protocol-based — e.g., HTTP on port 80 allowed, Telnet on port 23 blocked.</div>
        <div class="kc-item"><strong>Direction Control</strong>Asymmetric rules — e.g., internal hosts can initiate outbound connections but external hosts cannot initiate inbound connections.</div>
        <div class="kc-item"><strong>Drop vs. Reject</strong>Drop = stealth (attacker doesn't know you're there). Reject = polite (tells sender the connection is refused). Drop is preferred for inbound from Internet.</div>
        <div class="kc-item"><strong>Ingress Filtering</strong>Protects internal network from external threats.</div>
        <div class="kc-item"><strong>Egress Filtering</strong>Prevents data exfiltration and policy violations from inside.</div>
      </div>
    </div>

    <div class="golden-circle">
      <div class="gc-box gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>A firewall without a clear policy is just an expensive router. The policy defines the security intent. Without all three dimensions (user, service, direction), the policy has gaps. For example, a policy that only controls services but not direction might allow a malware-infected internal machine to connect outbound to a command-and-control server.</p>
      </div>
      <div class="gc-box gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>Rules are evaluated in order (top-down in most firewalls). The first matching rule wins. If no rule matches, the default policy (accept or deny) applies. Good firewall design: specific rules at the top, general rules below, default deny at the bottom. Each rule specifies: source IP/range, destination IP/range, protocol, port, direction, and action.</p>
      </div>
      <div class="gc-box gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Fine-grained, predictable, auditable traffic control. The firewall becomes a policy enforcement point — the technical implementation of the organization's security intent. Logs show exactly what was allowed and what was blocked, enabling forensic analysis after incidents.</p>
      </div>
    </div>

    <div class="deep-dive">
      <h4>📖 Deep Dive — Drop vs. Reject: Why It Matters</h4>
      <p>This seemingly small distinction has significant security implications. When a firewall <em>drops</em> (silently discards) a packet, the sender's connection attempt eventually times out — they learn very little about the target network. This is the <em>stealth</em> approach preferred for Internet-facing rules: why confirm to a port scanner that the host even exists?</p>
      <p>When a firewall <em>rejects</em> (sends ICMP Port Unreachable or TCP RST), the sender gets an immediate response. This is faster for legitimate users who made a mistake, but tells attackers that the firewall and host are definitely there. Reject is often appropriate for internal rules where latency matters more than stealth.</p>
      <p><strong>Egress filtering is often overlooked</strong> but critically important. Most organizations focus on inbound filtering (protecting from outside attacks) but neglect outbound. Egress filtering can: (1) prevent malware from calling home to C&amp;C servers, (2) block data exfiltration, (3) enforce browsing policies, and (4) prevent an infected internal machine from being used in DDoS attacks against others.</p>
    </div>
  </div>
</div>

<!-- QUESTIONS TOPIC 1 -->
<div class="questions-section">
  <h3>🧪 Practice Questions — Topic 1: Firewall Fundamentals</h3>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-mc">MC</span><span class="q-text">Which of the following best describes the "choke point" concept of a firewall?</span></div>
    <div class="q-options">
      <div>A) The firewall encrypts all traffic passing through it</div>
      <div class="correct">B) All traffic between trust zones must pass through the firewall with no alternate paths</div>
      <div>C) The firewall blocks only inbound traffic from the Internet</div>
      <div>D) The firewall is the fastest device in the network for routing decisions</div>
    </div>
    <div class="q-answer"><strong>✔ Answer: B.</strong> The choke point means all inter-zone traffic goes through the firewall. If any alternate path exists (a rogue Wi-Fi AP, unmonitored VPN, etc.), the firewall can be bypassed entirely, nullifying its security value.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-tf">T/F</span><span class="q-text">A firewall that "rejects" a packet provides more security than one that "drops" a packet for inbound Internet traffic.</span></div>
    <div class="q-answer"><strong>✔ Answer: False.</strong> Dropping (silently discarding) is generally more secure for inbound Internet traffic because it gives an attacker no information — the host appears non-existent. Rejecting sends back an ICMP message, confirming the host is alive and the port is closed, which aids reconnaissance.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-mc">MC</span><span class="q-text">Which firewall policy dimension controls access based on the type of service (e.g., HTTP, Telnet) rather than user identity?</span></div>
    <div class="q-options">
      <div>A) User control</div>
      <div class="correct">B) Service control</div>
      <div>C) Direction control</div>
      <div>D) Ingress filtering</div>
    </div>
    <div class="q-answer"><strong>✔ Answer: B.</strong> Service control restricts access based on the type of network service — identified by network address, protocol (TCP/UDP/ICMP), and port numbers. For example: "Block all Telnet (port 23); Allow SSH (port 22)."</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-sa">Short Answer</span><span class="q-text">Explain why egress filtering is important even though most attacks come from outside the network.</span></div>
    <div class="q-answer"><strong>✔ Answer:</strong> Egress filtering is important for several reasons: (1) <strong>Malware containment</strong> — infected internal machines attempt to call back to attacker C&amp;C servers; egress filtering blocks these outbound connections. (2) <strong>Data exfiltration prevention</strong> — egress filtering can block sensitive data from leaving. (3) <strong>DDoS participation</strong> — egress filtering prevents compromised internal machines from being used in attacks against other organizations. (4) <strong>Policy enforcement</strong> — blocking social media or streaming sites in a corporate environment.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-fb">Fill Blank</span><span class="q-text">The three core requirements of a firewall are: all ________ must pass through it, only ________ traffic is allowed, and the firewall itself must be ________ to penetration.</span></div>
    <div class="q-answer"><strong>✔ Answer:</strong> <em>traffic (between trust zones)</em> / <em>authorized (as defined by security policy)</em> / <em>immune</em>. These three pillars are what define a functionally sound firewall — violating any one breaks the security model.</div>
  </div>
</div>

  <h2>Topic 2 — Types of Firewalls: Packet Filter, Stateful &amp; Application Proxy</h2>
  <span class="topic-num">Slides 9 – 12, 25 – 31</span>

<!-- SLIDES 9-10 — PACKET FILTER -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDES 9 – 10</span>
    <span class="slide-title">Firewalls – Packet Filter (Stateless)</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content</h4>
      <ul>
        <li>Controls traffic based on <strong>packet header information only</strong> — no payload inspection.</li>
        <li>Does <strong>not</strong> track whether a packet is part of an existing stream.</li>
        <li>Does <strong>not</strong> maintain state — also called <strong>Stateless Firewall</strong>.</li>
        <li>Inspects: IP Source/Destination, Protocol, TCP/UDP ports, TCP Flags (SYN, ACK, FIN, RST), ICMP type.</li>
        <li>Examples: Block port 23 (Telnet), restrict DNS to trusted servers only.</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>Header-Only Inspection</strong>Fastest firewall type — looks only at layer 3 (IP) and layer 4 (TCP/UDP) headers.</div>
        <div class="kc-item"><strong>Stateless</strong>Each packet evaluated independently — no memory of previous packets. Cannot distinguish "reply to established connection" from "new unsolicited connection."</div>
        <div class="kc-item"><strong>ACL-Based</strong>Rules implemented as Access Control Lists: ordered list of (match criteria → action) entries.</div>
        <div class="kc-item"><strong>Limitations</strong>Cannot prevent IP spoofing (doesn't verify source). Cannot detect fragmentation attacks. Cannot match return traffic automatically. Cannot inspect application data.</div>
        <div class="kc-item"><strong>Fields Inspected</strong>Source IP, Dest IP, Protocol, Source Port, Dest Port, TCP Flags (SYN/ACK/FIN/RST), ICMP type/code.</div>
        <div class="kc-item"><strong>Use Case</strong>Best as the outermost layer in a defense-in-depth strategy. High performance — can run in hardware at line rate.</div>
      </div>
    </div>

    <div class="golden-circle">
      <div class="gc-box gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Network traffic must be controlled at the IP/transport layer as the first line of defense. Packet filtering provides fast, low-overhead traffic control that can be implemented at wire speed in routers and switches, providing baseline protection for every packet that enters or leaves a network.</p>
      </div>
      <div class="gc-box gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>Each incoming packet is compared against an ordered ruleset (ACL). Fields from the IP header and TCP/UDP header are extracted and matched against rules sequentially. The first matching rule's action is applied. If no rule matches, the default policy applies. Processing is O(n) where n is the number of rules.</p>
      </div>
      <div class="gc-box gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>High-speed, low-latency traffic filtering that blocks known-bad traffic patterns. Widely deployed in routers, switches, and cloud security groups. Provides the first layer of defense but cannot stop more sophisticated attacks that abuse legitimate protocols or craft clever packet sequences.</p>
      </div>
    </div>

    <div class="deep-dive">
      <h4>📖 Deep Dive — Understanding Packet Filter Rules</h4>
      <p>A packet filter rule has the form: <em>[direction] [protocol] [src-ip] [src-port] [dst-ip] [dst-port] [flags] → [action]</em>. The challenge is writing rules that are both secure AND don't break legitimate traffic.</p>
      <p><strong>The TCP Return Traffic Problem:</strong> Suppose you want to allow internal users to browse the web. An outbound rule allows TCP from internal → port 80. But HTTP replies come back on a high port (ephemeral port chosen by the client). How do you allow the reply without opening all inbound high ports?<br>
      With a stateless firewall, you'd have to either: (a) allow all inbound TCP with ACK flag set (a common but imperfect solution), or (b) statically open wide port ranges. Neither is ideal. This is the primary motivation for stateful firewalls.</p>
      <div class="analogy">The Nightclub with a Memory: A stateless firewall is like a bouncer who checks every person individually with no memory — if someone leaves and tries to re-enter, they must show ID again from scratch. A stateful firewall is like a bouncer with a stamp — if you were checked on the way in, your return is automatically recognized.</div>
      <p><strong>TCP Flag Filtering:</strong> A clever use of packet filtering is TCP flag inspection. A connection-initiating packet always has SYN set and ACK clear (SYN=1, ACK=0). Reply packets have ACK=1. A rule that blocks inbound SYN-only packets while allowing ACK packets effectively prevents external hosts from initiating connections while allowing replies to internal-initiated connections — though this is easy to bypass with a crafted packet and is not fully reliable.</p>
    </div>
  </div>
</div>

<!-- SLIDES 25-27 — STATEFUL -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDES 25 – 27</span>
    <span class="slide-title">Firewalls – Stateful Firewall &amp; Stateful Packet Filters</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content</h4>
      <ul>
        <li>Tracks state of traffic by monitoring <strong>all connection interactions</strong> until connection closes.</li>
        <li>Maintains a <strong>Connection State Table</strong> to understand packet context.</li>
        <li>Only connections through <strong>open ports holding established connections</strong> are allowed.</li>
        <li>Traditional packet filters do not examine transport layer context (matching return packets with outgoing flow).</li>
        <li>Stateful filters examine each packet <strong>in context</strong> — keep track of client-server sessions.</li>
        <li>Better able to <strong>detect bogus packets out of context</strong>.</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>Connection State Table</strong>Records: src IP, dst IP, src port, dst port, protocol, state (SYN_SENT, ESTABLISHED, FIN_WAIT), timeout.</div>
        <div class="kc-item"><strong>States Tracked</strong>NEW (first packet, e.g., SYN), ESTABLISHED (reply seen, both sides communicating), RELATED (expected secondary connections, e.g., FTP data), INVALID (doesn't match any known connection).</div>
        <div class="kc-item"><strong>Dynamic Rules</strong>When an internal host opens a connection, the firewall automatically creates a temporary allow rule for the reply traffic — removed when connection closes.</div>
        <div class="kc-item"><strong>Context Awareness</strong>Can detect ACK packets arriving without a preceding SYN — impossible to catch with stateless filtering.</div>
        <div class="kc-item"><strong>Memory Cost</strong>Each tracked connection consumes memory. High-volume firewalls need large state tables and protection against state exhaustion attacks.</div>
        <div class="kc-item"><strong>SYN Flood Defense</strong>Stateful firewalls can implement SYN cookies to handle SYN floods that would otherwise exhaust the connection table.</div>
      </div>
    </div>

    <div class="golden-circle">
      <div class="gc-box gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Stateless packet filtering cannot automatically associate replies with their originating requests. This forces administrators to either open wide port ranges (insecure) or write complex bidirectional rules. Stateful inspection solves this elegantly: track conversations, not just individual packets. This allows precise "allow replies to established connections" semantics without broad rules.</p>
      </div>
      <div class="gc-box gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>When the first packet of a new connection arrives, the firewall evaluates its rules. If permitted, it creates an entry in the connection state table. Subsequent packets of the same flow are checked against the state table first — if they match an ESTABLISHED entry, they're allowed without re-checking all rules. This is both more secure and faster for established flows.</p>
      </div>
      <div class="gc-box gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Precise bidirectional traffic control: "allow internal hosts to browse the web" becomes a single outbound rule — reply traffic is automatically allowed. Dramatically reduces rule complexity. Can detect and block spoofed out-of-context packets (e.g., ACKs with no SYN, RSTs on non-existent connections) that evade stateless filters.</p>
      </div>
    </div>

    <div class="deep-dive">
      <h4>📖 Deep Dive — Connection State Table Walkthrough</h4>
      <p>Let's trace the stateful filtering diagram from the lecture (the UDP example with SP=3264, SA=192.168.51.50):</p>
      <div class="workflow-wrap">
        <table class="workflow-table">
          <thead>
            <tr><th>Step</th><th>Packet</th><th>State Table Action</th><th>Firewall Decision</th><th>Reason</th></tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td class="hl">Outbound UDP<br>SP=3264, SA=192.168.51.50<br>DP=1525, DA=172.16.3.4</td>
              <td>NEW entry created:<br>51.50:3264 ↔ 3.4:1525</td>
              <td class="hl3">ALLOWED OUT</td>
              <td>Outbound policy permits this traffic. State table records it.</td>
            </tr>
            <tr>
              <td>2</td>
              <td class="hl">Inbound UDP<br>SP=1525, SA=172.16.3.4<br>DP=3264, DA=192.168.51.50</td>
              <td>Matches existing entry 51.50:3264 ↔ 3.4:1525</td>
              <td class="hl3">ALLOWED IN</td>
              <td>"Matches outgoing, so allowed in." This is the reply to step 1.</td>
            </tr>
            <tr>
              <td>3</td>
              <td class="hl4">Inbound UDP<br>SP=1525, SA=172.16.3.4<br>DP=2049, DA=192.168.51.50</td>
              <td>No match found in state table (different DP=2049)</td>
              <td class="hl4">BLOCKED</td>
              <td>"No match, so not allowed in." This packet was never requested — it's unsolicited.</td>
            </tr>
          </tbody>
        </table>
      </div>
      <p>The key insight: <em>packet 3 has the same source address as a server we trust, but it was never requested</em>. A stateless filter might allow it (if there's a broad rule allowing traffic from 172.16.3.4). A stateful filter correctly identifies it as unsolicited and blocks it.</p>
      <p><strong>Connection Table State Exhaustion:</strong> An attacker can send millions of SYN packets (SYN flood) to fill the connection state table, preventing legitimate connections from being tracked. Defenses: SYN cookies (no state allocated until SYN-ACK is acknowledged), rate limiting new connection attempts, and aggressive timeout settings.</p>
    </div>
  </div>
</div>

<!-- SLIDES 11-12, 28-31 — APPLICATION PROXY -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDES 11 – 12, 28 – 31</span>
    <span class="slide-title">Firewalls – Application/Proxy Firewall</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content</h4>
      <ul>
        <li>Controls input/output from/to an <strong>application or service</strong>.</li>
        <li>Acts as an <strong>intermediary</strong> — impersonates the intended recipient.</li>
        <li>Client's connection <strong>terminates at the proxy</strong>; new connection from proxy to destination.</li>
        <li>Data analyzed <strong>up to the application layer</strong> (Layer 7) to allow/reject.</li>
        <li>Requires <strong>separate proxies</strong> for each service: WAF, SMTP, DNS, FTP proxies.</li>
        <li><strong>Proxy can evade egress filtering</strong>: destination address changed to proxy, defeating IP-based rules.</li>
        <li><strong>Anonymizing Proxy</strong>: hides source IP — servers only see the proxy's IP.</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>Two-Connection Model</strong>Client → Proxy (connection 1). Proxy → Server (connection 2). The proxy is the man-in-the-middle — by design.</div>
        <div class="kc-item"><strong>Full Protocol Awareness</strong>The proxy understands the application protocol (HTTP, SMTP, FTP). Can validate requests, strip dangerous content, and enforce application-specific policies.</div>
        <div class="kc-item"><strong>WAF (Web Application Firewall)</strong>Specialized proxy for HTTP/HTTPS. Protects web apps from SQLi, XSS, CSRF, and other OWASP Top 10 attacks by analyzing request/response content.</div>
        <div class="kc-item"><strong>SMTP Proxy</strong>Inspects email for spam, malware, phishing links, and policy violations before delivery.</div>
        <div class="kc-item"><strong>Limitation: Per-Service Proxies</strong>Need a separate proxy for each protocol. Custom protocols generally not supported. Higher latency than packet filters.</div>
        <div class="kc-item"><strong>Evasion Dual-Use</strong>The same proxy concept that secures traffic can be used to evade destination-based filtering.</div>
      </div>
    </div>

    <div class="golden-circle">
      <div class="gc-box gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Packet filters and stateful firewalls cannot inspect application-layer content. An attacker can send malicious SQL injection hidden inside an HTTP request that passes all lower-layer checks. Application proxies solve this by fully parsing and validating application-layer content, making them the only firewall type that can catch application-layer attacks.</p>
      </div>
      <div class="gc-box gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>The client connects to the proxy (thinking it's the real server). The proxy completely receives the request, parses it at the application layer against policy rules, and if valid, opens a separate connection to the real server and forwards an approved version of the request. The response follows the same path in reverse.</p>
      </div>
      <div class="gc-box gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Deep content inspection — the proxy can validate URLs, check for malware in file downloads, strip dangerous HTTP headers, enforce SMTP anti-spam policies, and block application-level attacks invisible to lower-layer firewalls. The client and server never directly communicate, providing strong isolation.</p>
      </div>
    </div>

    <div class="deep-dive">
      <h4>📖 Deep Dive — The Application Proxy Architecture</h4>
      <p>The lecture shows a daemon-spawns-proxy architecture: the firewall runs listener daemons (Web daemon, SMTP daemon, FTP daemon). When a connection is detected on the corresponding port, the daemon spawns a protocol-specific proxy (Web proxy, SMTP proxy, FTP proxy). This proxy handles the two-connection model.</p>
      <div class="analogy">The Translator at a Conference: Imagine every meeting requires a professional translator. The foreign visitor speaks to the translator, who validates what's being said, translates it, and only then speaks to the host. The host never directly hears the visitor. The translator can refuse to translate inappropriate content. This is exactly what a proxy firewall does for network communication.</div>
      <p><strong>WAF Deep Dive:</strong> A Web Application Firewall operates in reverse proxy mode. All HTTPS traffic destined for a web server first goes to the WAF. The WAF terminates the TLS connection (it has the server certificate), decrypts the request, inspects it for attacks (SQL injection patterns, XSS payloads, anomalous request structures), and if clean, re-encrypts and forwards to the backend. This is why WAFs can inspect HTTPS traffic — they're designed to be the TLS terminator.</p>
      <p><strong>The Evasion Problem:</strong> The same technology that makes proxies powerful also enables evasion. If a corporate firewall blocks access to facebook.com by IP, an employee can use a web proxy outside the network. The employee's traffic goes to the proxy (allowed IP), the proxy fetches Facebook, and returns the content. The firewall only sees traffic to the proxy server's IP — the destination is effectively hidden. This is why application-layer awareness and TLS inspection are needed to catch proxy evasion.</p>
    </div>
  </div>
</div>

<!-- QUESTIONS TOPIC 2 -->
<div class="questions-section">
  <h3>🧪 Practice Questions — Topic 2: Firewall Types</h3>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-mc">MC</span><span class="q-text">Which type of firewall maintains a connection state table to track ongoing TCP/UDP sessions?</span></div>
    <div class="q-options">
      <div>A) Packet filter (stateless) firewall</div>
      <div class="correct">B) Stateful firewall</div>
      <div>C) Application/proxy firewall</div>
      <div>D) Both A and C</div>
    </div>
    <div class="q-answer"><strong>✔ Answer: B.</strong> A stateful firewall maintains a connection state table that records active connections (source/destination IP, ports, protocol, state). This allows it to automatically permit reply traffic for established connections without additional rules, and to detect out-of-context packets.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-tf">T/F</span><span class="q-text">An application/proxy firewall allows the client to communicate directly with the destination server while inspecting the traffic in-line.</span></div>
    <div class="q-answer"><strong>✔ Answer: False.</strong> An application/proxy firewall uses a two-connection model: the client's connection terminates at the proxy, and the proxy opens a separate connection to the destination server. The client and server never communicate directly. This complete connection separation is what enables deep application-layer inspection.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-mc">MC</span><span class="q-text">In the stateful filtering diagram from the lecture, why was the third UDP packet (DP=2049) blocked?</span></div>
    <div class="q-options">
      <div>A) The source IP was from an untrusted network</div>
      <div>B) The protocol was UDP, which stateful firewalls cannot handle</div>
      <div class="correct">C) No matching entry existed in the connection state table for that destination port</div>
      <div>D) The packet exceeded the maximum size allowed</div>
    </div>
    <div class="q-answer"><strong>✔ Answer: C.</strong> The state table had an entry for the flow 192.168.51.50:3264 ↔ 172.16.3.4:1525 (based on the original outbound packet). The third packet arrived on destination port 2049, which was never in the state table — no one inside requested it. The firewall correctly identifies it as unsolicited and blocks it.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-sa">Short Answer</span><span class="q-text">What is a WAF, and what types of attacks can it detect that a traditional stateful firewall cannot?</span></div>
    <div class="q-answer"><strong>✔ Answer:</strong> A WAF (Web Application Firewall) is an application-layer proxy specifically designed for HTTP/HTTPS traffic. It fully parses HTTP requests and responses and can detect application-layer attacks invisible to lower-layer firewalls, including: <strong>SQL injection</strong> (malicious SQL in form fields), <strong>Cross-Site Scripting (XSS)</strong> (JavaScript injection), <strong>CSRF</strong>, <strong>path traversal</strong> (../../../etc/passwd), <strong>command injection</strong>, and anomalous request patterns. A stateful firewall only sees "TCP port 80 traffic" — it cannot tell a legitimate HTTP request from one containing a SQLi payload.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-fb">Fill Blank</span><span class="q-text">A packet filter firewall is also called a ________ firewall because it treats each packet ________, without memory of previous packets.</span></div>
    <div class="q-answer"><strong>✔ Answer:</strong> <em>stateless</em> / <em>independently (in isolation)</em>. This is the defining characteristic that differentiates it from a stateful firewall. No state = no context = each packet evaluated from scratch against the ruleset.</div>
  </div>
</div>
