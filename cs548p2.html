<div id="s4" class="slide-block">

  <div class="slide-card blue">
    <div class="slide-num">Slides 6–7 — TCP 3-Way Handshake Protocol</div>
    <h2>TCP 3-Way Handshake Protocol</h2>
    <ul>
      <li><strong>SYN packet (step 1):</strong> Client sends SYN with randomly generated sequence number <em>x</em></li>
      <li><strong>SYN-ACK packet (step 2):</strong> Server sends SYN-ACK with its own random sequence number <em>y</em>; ACK = x+1</li>
      <li><strong>ACK packet (step 3):</strong> Client sends ACK = y+1; connection is fully established</li>
      <li>When server receives SYN, it stores connection state in a <strong>TCB</strong> in a half-open queue</li>
      <li>After receiving final ACK, TCB is moved out of the half-open queue → connection is <strong>fully established</strong></li>
      <li>If ACK never arrives, server re-sends SYN-ACK and eventually discards the TCB after a timeout</li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">TCB</div><div class="kc-val">Transmission Control Block — OS data structure storing all state for one TCP connection (seq numbers, ports, state, buffers).</div></div>
        <div class="kc-item"><div class="kc-label">Half-open connection</div><div class="kc-val">State after SYN received and SYN-ACK sent, but final ACK not yet received. TCB is in the backlog queue.</div></div>
        <div class="kc-item"><div class="kc-label">Random ISN</div><div class="kc-val">Initial Sequence Numbers must be random to prevent attackers from predicting them for spoofing attacks.</div></div>
        <div class="kc-item"><div class="kc-label">Why 3 steps?</div><div class="kc-val">Both parties must prove they can send AND receive. 2 steps would only prove one direction.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">🌀</span>
      <h3 style="color:#2563a8;">Simon Sinek's Golden Circle</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <table class="gc-table">
        <thead>
          <tr><th class="gc-why">🔴 WHY</th><th class="gc-how">🟡 HOW</th><th class="gc-what">🟢 WHAT</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>Before exchanging application data, both parties must agree on initial sequence numbers and confirm the channel works in both directions.</td>
            <td>Three messages: SYN → SYN-ACK → ACK. Each side generates a random ISN. Each ACK confirms the other side's ISN was received.</td>
            <td>A fully established TCP connection with synchronized sequence numbers, ready to exchange application data reliably in both directions.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📖</span>
      <h3 style="color:#1e6b4a;">Beginner-Friendly Deep Dive — Handshake Workflow</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <p>The 3-way handshake is the <em>most security-critical</em> part of TCP. Every attack in this lecture either exploits it (SYN Flood) or depends on understanding it (Reset Attack, Session Hijacking).</p>
      <table class="flow-table">
        <thead>
          <tr><th>Step</th><th>Sender → Receiver</th><th>Packet Contents</th><th>Server State</th><th>Security Note</th></tr>
        </thead>
        <tbody>
          <tr>
            <td class="step-num">1</td>
            <td class="actor">Client → Server</td>
            <td class="what">SYN, seq=x (random ISN)</td>
            <td>Creates TCB, adds to <strong>half-open queue</strong></td>
            <td class="sec">x must be random! Predictable ISN = vulnerable to hijacking</td>
          </tr>
          <tr>
            <td class="step-num">2</td>
            <td class="actor">Server → Client</td>
            <td class="what">SYN-ACK, seq=y, ACK=x+1</td>
            <td>TCB remains in half-open queue, timer starts</td>
            <td class="sec">Server allocates memory for TCB here — attack target!</td>
          </tr>
          <tr>
            <td class="step-num">3</td>
            <td class="actor">Client → Server</td>
            <td class="what">ACK, ACK=y+1, seq=x+1</td>
            <td>TCB <strong>moved from half-open queue</strong> to established</td>
            <td class="sec">SYN Flood stops here — never sends this ACK</td>
          </tr>
        </tbody>
      </table>
      <div class="analogy">
        <div class="analogy-label">🎯 Analogy — Confirming Meeting Plans</div>
        <p>Alice texts Bob "Are you free Tuesday?" (SYN). Bob texts back "Yes! Are you free at 3pm?" (SYN-ACK). Alice confirms "Yes, 3pm works!" (ACK). Both now have a confirmed appointment. If Alice never replies to Bob's question (like a SYN flood), Bob keeps the timeslot reserved indefinitely — that's the attack.</p>
      </div>
      <div class="warn-block">⚠️ <strong>Critical Insight:</strong> The server allocates a TCB <em>before</em> the connection is confirmed. This resource commitment — memory for an unverified connection — is the root vulnerability that SYN Flood exploits.</div>
    </div>
  </div>

  <div class="questions-section">
    <h3>📝 Practice Questions — Topics 1–4: TCP Fundamentals</h3>

    <div class="q-item">
      <div class="q-label q-mc">Multiple Choice</div>
      <div class="q-text">Which socket type must be used for TCP connections in the POSIX socket API?</div>
      <ul class="q-opts"><li>A) SOCK_DGRAM</li><li>B) SOCK_STREAM</li><li>C) SOCK_RAW</li><li>D) SOCK_SEQPACKET</li></ul>
      <div class="q-answer"><strong>✔ Answer: B) SOCK_STREAM.</strong> TCP is stream-oriented. UDP uses SOCK_DGRAM (datagram-based, no connection).</div>
    </div>

    <div class="q-item">
      <div class="q-label q-tf">True / False</div>
      <div class="q-text">After step 1 of the 3-way handshake (SYN received), the TCP connection is considered "fully established."</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> After receiving SYN, the connection is only "half-open." It becomes fully established only after step 3 (ACK received).</div>
    </div>

    <div class="q-item">
      <div class="q-label q-mc">Multiple Choice</div>
      <div class="q-text">What is stored in the TCB (Transmission Control Block)?</div>
      <ul class="q-opts"><li>A) Only the client's IP address and port number</li><li>B) Complete connection state: sequence numbers, ports, buffers, and timers</li><li>C) The application data being transmitted</li><li>D) Cryptographic keys for TLS encryption</li></ul>
      <div class="q-answer"><strong>✔ Answer: B.</strong> The TCB is the OS kernel's full connection state record including IPs, ports, sequence numbers, window sizes, timer state, and buffer pointers.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-tf">True / False</div>
      <div class="q-text">TCP guarantees that data packets will arrive in the same order they were sent.</div>
      <div class="q-answer"><strong>✔ Answer: TRUE (with nuance).</strong> TCP guarantees the application sees data in order. IP packets may arrive out of order — TCP's receive buffer reorders them before delivery.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-sa">Short Answer</div>
      <div class="q-text">Why must the Initial Sequence Number (ISN) be randomly generated? What happens if it is predictable?</div>
      <div class="q-answer"><strong>✔ Answer:</strong> The ISN must be random because sequence numbers are the only credential distinguishing a legitimate packet from a forged one. If an attacker can predict the ISN, they can forge packets with valid sequence numbers and inject them into established TCP connections (session hijacking). Modern OSes use cryptographically secure random ISNs per RFC 6528.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-fb">Fill in the Blank</div>
      <div class="q-text">In the TCP 3-way handshake, the server sends a ________ packet in step 2, and the client's final ________ in step 3 moves the TCB out of the half-open queue.</div>
      <div class="q-answer"><strong>✔ Answer: SYN-ACK; ACK.</strong></div>
    </div>
  </div>
</div>

<div id="s5" class="slide-block">

  <div class="slide-card red">
    <div class="slide-num">Slide 8 — SYN Flooding Attack</div>
    <h2>SYN Flooding Attack</h2>
    <ul>
      <li><strong>Goal:</strong> Exhaust the server's half-open connection queue → server cannot accept any new connections (DoS)</li>
      <li><strong>Mechanism:</strong> Continuously send large volumes of SYN packets with <em>random/spoofed source IPs</em></li>
      <li><strong>Key trick:</strong> Never complete step 3 (ACK) — keeps all TCBs in the half-open queue permanently</li>
      <li>Server sends SYN-ACK to random/nonexistent IPs — nobody replies with ACK</li>
      <li>TCB queue fills up → legitimate clients' SYN packets are dropped → <strong>Denial of Service</strong></li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">Attack type</div><div class="kc-val">Denial of Service (DoS) — makes a service unavailable. Often launched as DDoS from many sources.</div></div>
        <div class="kc-item"><div class="kc-label">Resource targeted</div><div class="kc-val">The <strong>TCB backlog queue</strong> created by listen(). Limited in size; when full, server drops all new SYN packets.</div></div>
        <div class="kc-item"><div class="kc-label">Spoofed IPs</div><div class="kc-val">Attacker uses random source IPs so server's SYN-ACK replies go nowhere, preventing queue cleanup.</div></div>
        <div class="kc-item"><div class="kc-label">Why not just ACK?</div><div class="kc-val">Sending the final ACK would move the TCB out of the half-open queue, freeing space. Attacker deliberately never ACKs.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">🌀</span>
      <h3 style="color:#2563a8;">Simon Sinek's Golden Circle</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <table class="gc-table">
        <thead>
          <tr><th class="gc-why">🔴 WHY it works</th><th class="gc-how">🟡 HOW it's performed</th><th class="gc-what">🟢 WHAT the victim experiences</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>TCP allocates a scarce resource (TCB) <em>upon receiving SYN</em>, before the connection is verified. Cost asymmetry: cheap for attacker, expensive for server.</td>
            <td>Attacker floods the server with SYN packets using spoofed random source IPs. Never sends the final ACK. TCBs pile up until queue is full.</td>
            <td>The server's half-open queue is full. All new legitimate connection requests are silently dropped. The service appears completely unavailable.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📖</span>
      <h3 style="color:#1e6b4a;">Beginner-Friendly Deep Dive — SYN Flood Step by Step</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="analogy">
        <div class="analogy-label">🎯 Analogy — Restaurant Reservation Flood</div>
        <p>Imagine a restaurant with a reservation waitlist of 10. An attacker calls 1,000 times, making reservations under fake names. The waitlist fills instantly. When real customers try to make reservations, they're told "sorry, we're full." The attacker never shows up — they just wanted to block real customers.</p>
      </div>
      <table class="flow-table">
        <thead>
          <tr><th>Step</th><th>Who</th><th>What Happens</th><th>Effect on Queue</th></tr>
        </thead>
        <tbody>
          <tr>
            <td class="step-num">1</td>
            <td class="actor">Attacker</td>
            <td>Sends SYN with spoofed IP (e.g., 1.2.3.4) to server port 80</td>
            <td>Server creates TCB, adds to half-open queue (1/10)</td>
          </tr>
          <tr>
            <td class="step-num">2</td>
            <td class="actor">Server</td>
            <td>Sends SYN-ACK to 1.2.3.4 (spoofed IP — nobody there)</td>
            <td>Timer starts. TCB waits in queue.</td>
          </tr>
          <tr>
            <td class="step-num">3</td>
            <td class="actor">Attacker ×1000</td>
            <td>Never sends ACK. Sends 9 more SYNs with different spoofed IPs</td>
            <td>Queue: 10/10 — <span class="warn">FULL</span></td>
          </tr>
          <tr>
            <td class="step-num">4</td>
            <td class="actor">Legitimate Client</td>
            <td>Tries to connect with real SYN packet</td>
            <td>Server <strong>drops the SYN</strong> — queue is full. Connection fails.</td>
          </tr>
        </tbody>
      </table>
      <div class="warn-block">⚠️ <strong>Real-World Scale:</strong> Modern SYN flood attacks are often DDoS using botnets. The 2016 Mirai botnet used IoT devices to generate massive SYN floods, taking down major websites. Modern servers use SYN Cookies as the primary defense.</div>
    </div>
  </div>
</div>

<div id="s6" class="slide-block">

  <div class="slide-card green">
    <div class="slide-num">Slides 9–10 — Countermeasure: SYN Cookies</div>
    <h2>Countermeasure: SYN Cookies</h2>
    <ul>
      <li>After receiving SYN, server computes a <strong>keyed hash H</strong> using: src/dst IP, src/dst port, timestamp, and a <em>secret key known only to the server</em></li>
      <li>Server sends SYN-ACK with <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">seq = H</code> as its initial sequence number (the "SYN cookie")</li>
      <li>Server does <strong>NOT store a TCB</strong> in the half-open queue — eliminating the vulnerability!</li>
      <li>If client is legitimate: returns <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">ACK = H+1</code></li>
      <li>Server receives ACK, <strong>re-computes H</strong> and verifies <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">ACK-1 == H</code> → legitimate → allocate TCB now</li>
      <li>Attacker with spoofed IP: SYN-ACK goes to random host → H never returns → no resource wasted</li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">Core idea</div><div class="kc-val">Encode all connection state into the sequence number itself. No queue entry needed until connection is verified.</div></div>
        <div class="kc-item"><div class="kc-label">Security property</div><div class="kc-val">Only the real server can compute H (has the secret key). Only the real client can return H+1 (received SYN-ACK at their real IP).</div></div>
        <div class="kc-item"><div class="kc-label">Cost reversal</div><div class="kc-val">Server cost drops to one cheap hash computation instead of expensive TCB allocation. Eliminates queue overflow.</div></div>
        <div class="kc-item"><div class="kc-label">Tradeoff</div><div class="kc-val">TCP options (window scaling, timestamps) cannot be stored in the cookie — minor feature loss under attack. Acceptable tradeoff.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📖</span>
      <h3 style="color:#1e6b4a;">Beginner-Friendly Deep Dive</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="analogy">
        <div class="analogy-label">🎯 Analogy — Magical Ticket System</div>
        <p>Instead of writing a customer's name in a reservation book (TCB), the restaurant gives the customer a <strong>unique numbered token</strong> encoded with their details. No book entry is made. When the customer shows up, they present the token. The restaurant verifies the token's validity (re-computes the hash) and seats them. Fake callers never get a token — eliminating the flood attack entirely.</p>
      </div>
      <p>The SYN cookie: <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:2px 6px;border-radius:3px;">H = hash(srcIP, srcPort, dstIP, dstPort, timestamp, secret_key)</code></p>
      <p>This hash is sent as the server's ISN. The legitimate client returns <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:2px 6px;border-radius:3px;">ACK = H+1</code>. The server re-computes H, checks <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:2px 6px;border-radius:3px;">ACK-1 == H</code>. Match → only the real server generated H, only the real client returned it. TCB is allocated only now.</p>
      <div class="good-block">✅ <strong>Elegance:</strong> SYN Cookies completely eliminate the SYN Flood vulnerability without changing any client-side code. Clients don't even know SYN Cookies are being used.</div>
    </div>
  </div>

  <div class="questions-section">
    <h3>📝 Practice Questions — Topics 5–6: SYN Flood &amp; SYN Cookies</h3>

    <div class="q-item">
      <div class="q-label q-mc">Multiple Choice</div>
      <div class="q-text">What is the primary resource targeted by a SYN Flood attack?</div>
      <ul class="q-opts"><li>A) CPU processing power of the server</li><li>B) Network bandwidth between attacker and server</li><li>C) The server's half-open connection queue (TCB queue)</li><li>D) The server's DNS resolution cache</li></ul>
      <div class="q-answer"><strong>✔ Answer: C.</strong> The SYN Flood targets the backlog queue of half-open (SYN_RCVD) connections. When full, the server drops all new SYN packets from legitimate clients.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-tf">True / False</div>
      <div class="q-text">In a SYN Flood attack, the attacker completes the 3-way handshake but then immediately resets the connection.</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> The attack relies on <em>never</em> completing the handshake. Completing it would free the TCB. The attacker deliberately keeps connections half-open to fill the queue.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-mc">Multiple Choice</div>
      <div class="q-text">In SYN Cookies, what does the server use as the SYN cookie value?</div>
      <ul class="q-opts"><li>A) The client's IP address encrypted with AES</li><li>B) A keyed hash of connection parameters (IPs, ports, timestamp) sent as the server's ISN</li><li>C) A randomly generated session token stored in a database</li><li>D) The SHA-256 hash of the client's SYN packet payload</li></ul>
      <div class="q-answer"><strong>✔ Answer: B.</strong> H = hash(srcIP, srcPort, dstIP, dstPort, timestamp, secret_key), sent as the server's ISN. Encodes all connection state in the cookie, eliminating queue storage.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-tf">True / False</div>
      <div class="q-text">SYN Cookies require the client to install special software to recognize and respond correctly to them.</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> SYN Cookies are completely transparent to the client. The 3-way handshake looks identical from the client's perspective.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-sa">Short Answer</div>
      <div class="q-text">Explain why using spoofed source IP addresses is important to the effectiveness of the SYN Flood attack.</div>
      <div class="q-answer"><strong>✔ Answer:</strong> Spoofed IPs are critical because: (1) Server's SYN-ACK replies go to random IPs — nobody responds with ACK, so TCBs never get released. (2) If the attacker used their real IP, the SYN-ACK would arrive back at them — their OS might automatically send RST, freeing the TCB. (3) Spoofing makes the attack harder to filter by IP address. The combination of spoofing + never ACKing keeps TCBs permanently stuck in the queue.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-fb">Fill in the Blank</div>
      <div class="q-text">SYN Cookies solve SYN Flood by ensuring the server does not allocate a ________ until the connection is ________, using a cryptographic ________ as the server's initial sequence number.</div>
      <div class="q-answer"><strong>✔ Answer: TCB; verified; hash (keyed hash / cookie).</strong></div>
    </div>
  </div>
</div>

    <div class="slide-num">Slides 11–13 — TCP Reset Attack</div>
    <h2>TCP Reset Attack</h2>
    <ul>
      <li><strong>Normal TCP termination:</strong> FIN → ACK → FIN → ACK (graceful 4-step close)</li>
      <li><strong>Reset flag (RST):</strong> Either party can immediately terminate a connection by sending an RST packet</li>
      <li><strong>Attack goal:</strong> Force disconnection of a TCP connection between victims A and B by forging an RST packet</li>
      <li><strong>Forged RST must have correct:</strong>
        <ul>
          <li>Source IP address and source port (matching one endpoint)</li>
          <li>Destination IP address and destination port (the other endpoint)</li>
          <li>Sequence number — must fall <strong>within the receiver's acceptance window</strong></li>
        </ul>
      </li>
      <li><strong>How to get these values:</strong> Attacker uses Wireshark to sniff traffic and reads TCP header fields</li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">RST Flag</div><div class="kc-val">A TCP flag that immediately aborts a connection. Legitimate use: error recovery. Malicious use: forced disconnection of others' sessions.</div></div>
        <div class="kc-item"><div class="kc-label">Sequence window</div><div class="kc-val">Receiver only accepts packets with seq numbers in [expected, expected+window]. Attacker must observe or guess a value in this range.</div></div>
        <div class="kc-item"><div class="kc-label">Sniffing requirement</div><div class="kc-val">Attacker must be on-path (same LAN or MITM) to observe seq numbers. Remote attacks require seq number guessing.</div></div>
        <div class="kc-item"><div class="kc-label">Real-world use</div><div class="kc-val">China's "Great Firewall" uses TCP RST injection to block connections to forbidden content.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">🌀</span>
      <h3 style="color:#2563a8;">Simon Sinek's Golden Circle</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <table class="gc-table">

          <tr><th class="gc-why">🔴 WHY it works</th><th class="gc-how">🟡 HOW it's performed</th><th class="gc-what">🟢 WHAT the victim experiences</th></tr>

        <tbody>
          <tr>
            <td>TCP has no authentication. Any packet with the RST flag set and matching connection identifiers (IPs, ports, seq in window) will be accepted as legitimate.</td>
            <td>(1) Sniff network traffic to learn the 5-tuple. (2) Craft a packet with RST flag, spoofing one endpoint's identity. (3) Send it to the other endpoint. (4) Receiver accepts it and tears down the connection.</td>
            <td>The TCP connection is instantly severed. Both applications receive a "connection reset" error. Active sessions (SSH, database, video call) are immediately terminated.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

          <tr>
            <td class="step-num">1</td>
            <td class="actor">Attacker</td>
            <td>Sniff the network (Wireshark)</td>
            <td>Reads: src port=44421, dst port=23, seq=319575693</td>

            <td class="step-num">2</td>

<div id="s8" class="slide-block">

  <div class="slide-card purple">
    <div class="slide-num">Slide 14 — TCP Session Hijacking Attack</div>
    <h2>TCP Session Hijacking: Sequence Numbers</h2>
    <ul>
      <li>If receiver has received data up to sequence number <em>x</em>, the <strong>next expected</strong> sequence number is <em>x+1</em></li>
      <li>Attacker crafts a packet with seq = <em>x+δ</em> (slightly ahead) — this is <strong>out of order</strong></li>
      <li>The injected data is stored in the receive buffer at position <em>x+δ</em>, with the gap (δ positions) unfilled</li>
      <li>This injected data <strong>waits</strong> in the buffer for the gap to be filled — it can override legitimate future data</li>
      <li>If δ is too large, the packet falls outside the receiver's buffer window → silently discarded (attack fails)</li>
      <li><strong>Goal:</strong> Inject arbitrary commands into an established session (e.g., a Telnet session)</li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">Attack impact</div><div class="kc-val">Attacker injects arbitrary data (commands) into a legitimate session. Victim application executes attacker's commands as if from the real peer.</div></div>
        <div class="kc-item"><div class="kc-label">δ (delta)</div><div class="kc-val">Offset ahead of expected sequence. Too small: conflicts with real data. Too large: dropped. δ slightly ahead is ideal.</div></div>
        <div class="kc-item"><div class="kc-label">Requires</div><div class="kc-val">Attacker must be on-path (same LAN) to observe sequence numbers, src/dst IPs and ports.</div></div>
        <div class="kc-item"><div class="kc-label">vs RST Attack</div><div class="kc-val">RST attack <em>terminates</em> the connection. Session hijacking <em>takes over</em> the session — attacker continues to interact.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📖</span>
      <h3 style="color:#1e6b4a;">Beginner-Friendly Deep Dive</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="analogy">
        <div class="analogy-label">🎯 Analogy — Intercepted Conversation</div>
        <p>Alice and her IT admin Bob are having a conversation via text, authenticated only by phone number. An attacker sends a text to Bob that looks like it comes from Alice: "Please reset the root password to 'hacked123'." Bob, seeing Alice's number, complies. The attacker just hijacked the conversation.</p>
      </div>
      <p>The attacker places injected data at position x+δ in the buffer — ahead of the current position but within the window. Once the real sender catches up to position x+δ, <strong>the injected data is already there</strong>. The legitimate data is treated as a duplicate and discarded. The injected payload gets delivered to the application as if from the real peer.</p>
      <div class="warn-block">⚠️ <strong>Why Telnet is especially vulnerable:</strong> Telnet operates over raw TCP with no encryption. The attacker can see commands and responses in plaintext, making it easy to time the injection and know the exact current sequence number. This is why Telnet has been replaced by SSH.</div>
    </div>
  </div>
</div>

<div id="s9" class="slide-block">

  <div class="slide-card green">
    <div class="slide-num">Slides 15–16 — Defenses Against Session Hijacking &amp; Summary</div>
    <h2>Defenses Against Session Hijacking</h2>
    <ul>
      <li><strong>Making packet spoofing harder:</strong>
        <ul>
          <li>Randomize source port numbers</li>
          <li>Randomize initial sequence numbers (ISN)</li>
          <li>⚠️ <em>Not effective</em> against local (on-path) attackers who can observe real values with a sniffer</li>
        </ul>
      </li>
      <li><strong>Encrypting the payload:</strong>
        <ul>
          <li>Use <strong>IPsec</strong> or <strong>TLS</strong> to encrypt the payload</li>
          <li>Injected plaintext fails MAC/HMAC verification → application rejects it</li>
          <li>This is the <em>most effective</em> defense against session hijacking</li>
        </ul>
      </li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">Random ISN</div><div class="kc-val">Prevents remote attackers from guessing seq numbers. RFC 6528 mandates cryptographically random ISNs. NOT effective against local sniffers.</div></div>
        <div class="kc-item"><div class="kc-label">Random src port</div><div class="kc-val">Adds 16 bits of uncertainty. Doesn't prevent local attacks where port is observable.</div></div>
        <div class="kc-item"><div class="kc-label">IPsec / TLS</div><div class="kc-val">Gold standard. Injected packets fail MAC/HMAC verification → rejected before reaching application. Effective against all attackers.</div></div>
        <div class="kc-item"><div class="kc-label">SSH vs Telnet</div><div class="kc-val">SSH encrypts all data → session hijacking practically infeasible. Telnet sends plaintext → trivially hijackable.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📖</span>
      <h3 style="color:#1e6b4a;">Beginner-Friendly Deep Dive — Why Encryption is the Real Solution</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <p>Randomizing ISNs and source ports is <strong>not effective against local on-path attackers</strong>. If an attacker is on the same LAN, they can simply observe the real values with a packet sniffer.</p>
      <div class="analogy">
        <div class="analogy-label">🎯 Analogy — Encryption as a Sealed Safe</div>
        <p>Random ISNs are like using an unpredictable lock combination. A thief who picks the lock (sniffs the traffic) learns the combination anyway. Encryption is like putting the valuables in a safe that only the real owner can open — even if the thief gets the safe, they cannot read the contents or put fake contents inside.</p>
      </div>
      <p>With IPsec or TLS, every application message is protected by an HMAC (Message Authentication Code). Even if an attacker injects a packet with the correct sequence number, the injected data is in plaintext. The receiver's TLS/IPsec layer computes the HMAC and finds it doesn't match → the packet is <strong>immediately rejected</strong> before the application ever sees it.</p>
      <div class="good-block">✅ <strong>Practical takeaway:</strong> Use SSH instead of Telnet; HTTPS instead of HTTP. Both SSH and TLS encrypt the payload, rendering session hijacking completely ineffective regardless of whether the attacker is local or remote.</div>
    </div>
  </div>

  <div class="questions-section">
    <h3>📝 Practice Questions — Topics 7–9: Reset, Hijacking &amp; Defenses</h3>

    <div class="q-item">
      <div class="q-label q-mc">Multiple Choice</div>
      <div class="q-text">For a TCP Reset Attack to succeed, which of the following must be true about the forged RST packet?</div>
      <ul class="q-opts"><li>A) The RST flag must be combined with the SYN flag</li><li>B) The sequence number must be exactly x+1 where x was the last acknowledged byte</li><li>C) Source IP, source port, destination IP, destination port must match, and seq must fall within the receiver's window</li><li>D) The RST packet must be larger than 1024 bytes to be processed</li></ul>
      <div class="q-answer"><strong>✔ Answer: C.</strong> The forged RST must present valid connection identifiers (all four tuple fields) AND a sequence number within the receiver's acceptance window. The attacker uses Wireshark to obtain these values.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-tf">True / False</div>
      <div class="q-text">Randomizing the Initial Sequence Number (ISN) is an effective defense against TCP session hijacking by a local, on-path attacker who has access to a packet sniffer.</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> Randomizing ISNs only defeats <em>remote</em> attackers who must guess. A local on-path attacker with a packet sniffer can directly observe real sequence numbers. The only effective defense against local attackers is payload encryption (TLS/IPsec).</div>
    </div>

    <div class="q-item">
      <div class="q-label q-mc">Multiple Choice</div>
      <div class="q-text">What is the key difference between a TCP Reset Attack and a TCP Session Hijacking Attack?</div>
      <ul class="q-opts"><li>A) Reset attacks require the attacker to be on the same LAN; hijacking works remotely</li><li>B) Reset attacks terminate the connection; hijacking takes over the session to inject commands</li><li>C) Reset attacks use the SYN flag; hijacking uses the RST flag</li><li>D) Reset attacks are blocked by firewalls; hijacking bypasses firewalls</li></ul>
      <div class="q-answer"><strong>✔ Answer: B.</strong> A TCP Reset Attack tears down the connection (DoS). A Session Hijacking Attack keeps the connection alive but injects the attacker's data, allowing arbitrary command execution with the victim's access privileges.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-sa">Short Answer</div>
      <div class="q-text">Why does encrypting the TCP payload with IPsec/TLS prevent session hijacking, even when the attacker knows the correct sequence number?</div>
      <div class="q-answer"><strong>✔ Answer:</strong> With IPsec/TLS, each message includes an HMAC computed using a session key known only to the two legitimate parties. Even if an attacker injects a packet with the correct sequence number, the injected content is plaintext (attacker doesn't know the session key). The receiver computes the HMAC of the received data — it doesn't match the packet's HMAC → immediately rejected before reaching the application. The attacker cannot forge a valid HMAC without the session key.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-mc">Multiple Choice</div>
      <div class="q-text">Which protocol is specifically vulnerable to TCP session hijacking due to transmitting data in plaintext?</div>
      <ul class="q-opts"><li>A) SSH (Secure Shell)</li><li>B) HTTPS</li><li>C) Telnet</li><li>D) TLS 1.3</li></ul>
      <div class="q-answer"><strong>✔ Answer: C) Telnet.</strong> Telnet transmits all data including credentials in plaintext over raw TCP. An attacker on the same LAN can easily observe sequence numbers and inject commands. SSH was designed specifically to replace Telnet.</div>
    </div>

    <div class="q-item">
      <div class="q-label q-sa">Short Answer</div>
      <div class="q-text">Compare and contrast the three TCP attacks (SYN Flood, Reset Attack, Session Hijacking) in terms of goal, mechanism, and best defense.</div>
      <div class="q-answer"><strong>✔ Answer:</strong><br>
        <strong>SYN Flood:</strong> Goal = Deny service. Mechanism = Flood server with SYN+spoofed IPs, never completing handshake, filling TCB queue. Best defense = SYN Cookies.<br>
        <strong>TCP Reset Attack:</strong> Goal = Terminate an existing connection (targeted DoS). Mechanism = Forge RST with valid 4-tuple and seq in receiver's window. Best defense = Encrypted sessions (injected packets fail MAC) + strict seq checking.<br>
        <strong>Session Hijacking:</strong> Goal = Take over session to inject arbitrary commands. Mechanism = Inject packet with correct seq number containing malicious payload. Best defense = Payload encryption with TLS/IPsec (injected data fails MAC verification).</div>
    </div>
  </div>
</div>

<div id="qr">
  <div class="section-divider"><span>Quick Reference Summary</span></div>

  <table class="qr-table">
    <thead>
      <tr><th>Concept</th><th>What It Is / How It Works</th><th>Security Relevance / Key Point</th></tr>
    </thead>
    <tbody>
      <tr><td>TCP</td><td>Transport-layer protocol providing reliable, ordered, error-checked delivery using sequence numbers, ACKs, retransmission, and buffers.</td><td>No built-in authentication — root cause of all TCP attacks. Sequence numbers are the only "identity" of packets.</td></tr>
      <tr><td>3-Way Handshake</td><td>SYN → SYN-ACK → ACK. Establishes synchronized sequence numbers. Server allocates TCB after step 1.</td><td>Half-open connections consume server resources before client is verified — root vulnerability of SYN Flood.</td></tr>
      <tr><td>TCB</td><td>Transmission Control Block — OS kernel data structure storing all TCP connection state.</td><td>Scarce finite resource. Half-open connections fill TCB queue. When full, server cannot accept new connections.</td></tr>
      <tr><td>SYN Flood Attack</td><td>Attacker sends massive SYN packets with spoofed IPs, never completing handshake. TCB queue fills → DoS.</td><td>Exploits cost asymmetry: cheap for attacker (one packet), expensive for server (TCB + timer). Countermeasure: SYN Cookies.</td></tr>
      <tr><td>SYN Cookies</td><td>Server encodes connection state into ISN (keyed hash). No TCB allocated until client proves legitimacy by returning H+1.</td><td>Eliminates half-open queue vulnerability. Transparent to legitimate clients. Most effective SYN Flood defense.</td></tr>
      <tr><td>TCP Reset Attack</td><td>Attacker forges RST packet with correct 5-tuple (src/dst IP, src/dst port, seq in window). Victim tears down connection.</td><td>Targeted DoS against a specific connection. Used by censorship systems. Defense: randomized ISNs (remote attackers), encryption.</td></tr>
      <tr><td>TCP Session Hijacking</td><td>Attacker injects packet with correct seq number (x+δ). Injected data lands in receiver's buffer, passed to application.</td><td>More dangerous than RST — attacker controls the session. Defense: payload encryption (TLS/IPsec) makes injected data fail MAC.</td></tr>
      <tr><td>Randomized ISN</td><td>Initial Sequence Numbers generated via CSPRNG. RFC 6528. Prevents seq number guessing.</td><td>Defeats remote attackers only. Ineffective against local (on-path) attackers with sniffers.</td></tr>
      <tr><td>Payload Encryption (IPsec/TLS)</td><td>Session data encrypted and HMAC-protected. Injected plaintext fails HMAC verification and is rejected before reaching application.</td><td>The <strong>only effective defense</strong> against local on-path session hijacking. Reason SSH > Telnet and HTTPS > HTTP.</td></tr>
      <tr><td>Wireshark / Packet Sniffing</td><td>Network protocol analyzer capturing packets in real time. Attacker uses it to observe TCP header fields needed for forging packets.</td><td>Essential in all TCP attack demonstrations. On shared LAN, any device can capture others' packets without detection.</td></tr>
    </tbody>
  </table>
</div>

<div id="exam" class="exam-section">
  <h2>🎯 Exam Preparation — Integrative Questions</h2>

  <div class="q-item">
    <div class="q-label q-sa">Short Answer</div>
    <div class="q-text">A university's web server experiences sudden unavailability when a major exam is posted. Logs show thousands of TCP SYN packets from hundreds of different source IPs with no corresponding ACKs. (a) What attack is this? (b) What mechanism is being exploited? (c) What is the most effective countermeasure and why does it work?</div>
    <div class="q-answer">
      <strong>✔ Answer:</strong><br>
      (a) <strong>SYN Flood Attack</strong> (likely DDoS given many source IPs).<br>
      (b) TCP's requirement to allocate a TCB upon receiving SYN — before verifying the client is real. The attacker fills the server's backlog queue with fake half-open connections using spoofed source IPs.<br>
      (c) <strong>SYN Cookies</strong>: server encodes all connection state into its ISN (H = hash(srcIP, srcPort, dstIP, dstPort, timestamp, secret)). TCB only allocated when client returns ACK = H+1. An attacker using spoofed IPs can never return H+1, so no resources are ever wasted.
    </div>
  </div>

  <div class="q-item">
    <div class="q-label q-sa">Short Answer</div>
    <div class="q-text">An attacker is on the same WiFi network as a victim connected to a server via Telnet (port 23). Describe step-by-step how the attacker could perform a TCP Session Hijacking attack to execute a command on the server as the victim.</div>
    <div class="q-answer">
      <strong>✔ Answer:</strong><br>
      1. <strong>Sniff traffic:</strong> Run Wireshark on shared WiFi. Capture packets between victim (10.0.0.2:44421) and server (10.0.0.5:23).<br>
      2. <strong>Extract parameters:</strong> Read victim IP, victim src port, server IP, server port (23), current sequence number (e.g., seq=319575693).<br>
      3. <strong>Craft injected packet:</strong> TCP packet with src IP = victim's IP, src port = victim's port, dst = server:23, seq = 319575693 + δ, payload = "rm -rf /tmp/secret\\n".<br>
      4. <strong>Inject packet:</strong> Send to server. TCP stack accepts it (correct seq, valid identifiers), places payload in receive buffer.<br>
      5. <strong>Result:</strong> Telnet server passes injected text to the shell, which executes with victim's privileges.<br>

      <strong>✔ Answer: FALSE (as confirmed in Quiz 5).</strong><br>
      A local on-path attacker can run Wireshark and directly observe the current sequence numbers in live traffic. Randomization only helps against <em>remote</em> attackers who must blindly guess — if the attacker can read the value from a sniffer, randomization provides no protection at all.<br>
      For RST Attack: attacker observes real seq numbers → forges RST with observed values → attack succeeds regardless of how random the ISN was.<br>
      <strong>Effective defense for local attackers:</strong> Payload encryption (TLS/IPsec). Even with the correct seq number, injected data fails MAC verification.
    </div>

    <div class="q-text">Compare the "cost asymmetry" in SYN Flood with SYN Cookies. How does SYN Cookies reverse the cost balance?</div>
    <div class="q-answer">
      <strong>✔ Answer:</strong><br>
      <strong>Cost asymmetry in SYN Flood:</strong> Sending a SYN costs the attacker ~1 packet (negligible). Receiving a SYN costs the server: allocate TCB (kernel memory), send SYN-ACK, set retransmission timer, wait for ACK, eventually time out — hundreds of bytes of memory and CPU per fake SYN. Attacker sustains thousands of SYNs/second at near-zero cost; eventually server's queue fills.<br>

  <div class="slide-title">Why Wireless is Insecure?</div>

  <div class="slide-content">
    <ul>
      <li><strong>Channel:</strong> Broadcast — Eavesdropping, Jamming, Active attacks on protocols</li>
      <li><strong>Mobility:</strong> Portable devices — Not physically secured</li>
      <li><strong>Resources:</strong> Limited memory and processing — Need simpler security</li>
      <li><strong>Accessibility:</strong> May be left unattended</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li>Wireless inherits all wired threats <strong>plus</strong> four unique structural vulnerabilities.</li>
      <li><strong>Broadcast channel</strong> = any nearby device can receive every packet (no physical barrier).</li>
      <li><strong>Mobility</strong> = physical theft of the device equals device compromise, bypassing software security.</li>
      <li><strong>Resource constraints</strong> = heavy crypto (e.g., RSA handshakes) must be minimized — motivates simpler key exchange on IoT.</li>
      <li><strong>Unattended access points</strong> = adversary can physically plug in a rogue device.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-icon">W</div>
      <div class="gc-label">🔴 WHY — Purpose</div>
      <p>Wired security assumes a physical medium only authorized users can access. Wireless eliminates that assumption entirely — the medium is open air, shared by everyone in radio range. Understanding <em>why</em> wireless is structurally weaker is the foundation for understanding every countermeasure that follows.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-icon">H</div>
      <div class="gc-label">🟡 HOW — Mechanism</div>
      <p>Attackers exploit each weakness differently: eavesdrop on the broadcast channel with a passive sniffer; jam signals with RF interference; steal or tamper with unattended APs; exploit the constrained security on underpowered IoT nodes.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-icon">W</div>
      <div class="gc-label">🟢 WHAT — Result</div>
      <p>The industry response is a layered security model: strong encryption at Layer 2 (WPA2/WPA3), per-user authentication via 802.1X/EAP, mutual authentication in cellular via AKA — each addressing a specific structural weakness.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <div class="analogy">
      <strong>🎯 Analogy — The Glass Office vs. The Open Park:</strong> Wired networking is like a glass-walled office — you must physically enter to listen. Wireless networking is like holding a meeting in an open park — anyone within earshot can listen, and you cannot tell who is nearby.
    </div>
    <p>Let us break down each weakness in depth:</p>
    <p><strong>1. Broadcast Channel:</strong> IEEE 802.11 (Wi-Fi) transmits radio waves in all directions. Every device within range — including attackers — receives every frame. Encryption is therefore not optional; it is the <em>only</em> way to preserve confidentiality. A passive attacker does not need to send any traffic to capture thousands of frames per minute.</p>
    <p><strong>2. Mobility / Physical Security:</strong> A stolen laptop contains its entire key material. If the disk is unencrypted, game over. Even if it is encrypted, the attacker can mount offline brute-force attacks or wait for the user to authenticate. Physical security is a prerequisite for software security.</p>
    <p><strong>3. Resource Constraints:</strong> An IoT temperature sensor may have 32 KB of RAM. Running TLS 1.3 or a full RSA handshake is prohibitive. This forces protocol designers to use lightweight authenticated encryption (e.g., AES-CCM in 802.15.4 / ZigBee) and pre-shared keys. Resource constraints directly motivate the attack surface of IoT.</p>
    <p><strong>4. Accessibility:</strong> Access Points are often mounted on ceilings, in parking garages, or in server rooms with lax physical access controls. A rogue AP plugged into the Ethernet switch can be invisible unless the network uses 802.1X port-based authentication — which is exactly what this lecture covers.</p>
    <div class="warning-box"><strong>⚠️ Exam Alert:</strong> A common true/false trap: "WPA2 solves all wireless security problems." — FALSE. WPA2 addresses the broadcast channel (encryption) but does not physically secure devices or prevent jamming attacks.</div>
  </div>

  <div class="questions">
    <h3>Practice Questions — Slide 1</h3>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">Which wireless security challenge is directly caused by the nature of the transmission medium itself?</div>
      <ul class="q-opts">
        <li>A) Devices may be stolen (mobility)</li>
        <li class="correct">B) Any nearby device can receive transmitted frames (broadcast channel)</li>
        <li>C) Devices have limited processing power</li>
        <li>D) Access points may be left unattended</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: B.</strong> The broadcast nature of radio means every node in range receives every frame — passive eavesdropping requires zero active interaction.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-tf">True / False</span>
      <div class="q-text">Resource constraints in wireless devices (limited memory/processing) have no impact on the choice of security algorithm.</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> Resource constraints are a primary design driver. Protocols like ZigBee/NB-IoT use lightweight ciphers (AES-CCM, AES-128) and pre-shared keys precisely because heavy asymmetric operations are impractical on constrained nodes.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-sa">Short Answer</span>
      <div class="q-text">Explain why physical security of an access point matters even when strong WPA3 encryption is enabled.</div>
      <div class="q-answer"><strong>✔ Answer:</strong> A physically accessible AP can be reset to factory defaults (wiping security config), replaced with a rogue AP, or have its configuration extracted via USB/console access. Encryption protects over-the-air data but cannot prevent an attacker who has physical control of the hardware from resetting credentials or inserting a MITM device.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-fb">Fill in the Blank</span>
      <div class="q-text">The wireless channel is __________, meaning all devices within radio range receive every transmitted frame, making passive eavesdropping trivial without encryption.</div>
      <div class="q-answer"><strong>✔ Answer: broadcast.</strong> Unlike point-to-point wired links, radio waves propagate in all directions, forming a shared broadcast medium.</div>
    </div>
  </div>
</div>

<div class="slide-block" id="s2">
  <div class="slide-label">Slide 2 of 21</div>
  <div class="slide-title">History of Wireless LAN Security</div>

  <div class="slide-content">
    <ul>
      <li><strong>Open Authentication:</strong> AP accepts without question; authenticate on higher level. Example: hotel/airport Wi-Fi.</li>
      <li><strong>WEP (1999):</strong> Wired Equivalent Privacy — intended to match wired security; contained major weaknesses.</li>
      <li><strong>WPA (2003):</strong> Software fix; based on 802.11i draft — eliminates most WEP issues.</li>
      <li><strong>WPA2 / RSN (2004):</strong> Final 802.11i; replaced RC4 with AES; more complex but robust.</li>
      <li><strong>WPA3 (2018):</strong> Replacement for WPA2; adds SAE (Simultaneous Authentication of Equals) for forward secrecy.</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li>Each generation was motivated by <strong>cryptographic breaks</strong> in the previous standard.</li>
      <li><strong>WEP was broken</strong> because of IV reuse, weak RC4 keystream, and CRC-based integrity (not cryptographic).</li>
      <li><strong>WPA</strong> was a software-updatable band-aid using TKIP (RC4 with key mixing + counter).</li>
      <li><strong>WPA2</strong> required hardware replacement; introduced AES-CCMP — the first truly strong Wi-Fi standard.</li>
      <li><strong>WPA3</strong> addresses WPA2-PSK weaknesses: SAE provides <strong>forward secrecy</strong> even if the password is later compromised.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-icon">W</div>
      <div class="gc-label">🔴 WHY — Purpose</div>
      <p>WEP's failure exposed that security by obscurity and weak algorithms inevitably fail. Each new standard responded to concrete, published cryptographic attacks — not theoretical ones. History shows that deploying weak crypto creates more risk than deploying none (false sense of security).</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-icon">H</div>
      <div class="gc-label">🟡 HOW — Evolution</div>
      <p>WEP → WPA: TKIP added per-packet key mixing and sequence counters to fix IV reuse. WPA → WPA2: CCMP replaced TKIP with AES-CTR for encryption + CBC-MAC for integrity. WPA2 → WPA3: SAE replaced PSK's 4-way handshake exposure with a Diffie-Hellman-like protocol, adding forward secrecy.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-icon">W</div>
      <div class="gc-label">🟢 WHAT — Result</div>
      <p>WPA3 (2018) provides: offline dictionary attack resistance (SAE), 192-bit security for enterprise, forward secrecy (even if the PSK is later discovered, past sessions cannot be decrypted), and improved open network protections via OWE (Opportunistic Wireless Encryption).</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p><strong>WEP's Core Failure — The IV Problem:</strong> WEP encrypts using RC4(IV ‖ Key). The IV is only 24 bits — 16 million values. On a busy network, IVs repeat within hours. Two ciphertexts with the same IV can be XORed to cancel the keystream, revealing the XOR of their plaintexts. This is elementary cryptanalysis. Tools like Aircrack-ng crack WEP in under a minute with enough traffic.</p>
    <div class="analogy">
      <strong>🎯 Analogy — The One-Time Pad Reuse:</strong> WEP's IV reuse is exactly the one-time pad reuse problem. If you use the same keystream twice: C₁ ⊕ C₂ = P₁ ⊕ P₂. Known plaintext (e.g., HTTP headers) lets an attacker recover P₂.
    </div>
    <p><strong>WPA-TKIP as a Band-Aid:</strong> TKIP could be deployed as a firmware update to existing WEP hardware. It used per-packet key derivation (key mixing) to prevent IV reuse exploits and added a Michael MIC (Message Integrity Check) to detect forgeries. However, TKIP still used RC4 underneath — the algorithm was deprecated by 2012.</p>
    <p><strong>WPA2-CCMP — The Right Fix:</strong> CCMP (Counter Mode with CBC-MAC Protocol) uses AES, a NIST-standardized cipher with no known practical attacks. AES-CTR provides encryption; CBC-MAC provides integrity. WPA2 became mandatory for Wi-Fi Alliance certification in 2006 and remains widely deployed.</p>
    <p><strong>WPA2-PSK Weakness and WPA3-SAE:</strong> In WPA2-Personal, the 4-way handshake can be captured and subjected to offline dictionary attacks. If the password is weak ("password123"), Hashcat running on a GPU can crack it in seconds. WPA3's SAE (based on Dragonfly key exchange) prevents offline attacks because the attacker must interact with the AP for every guess — computationally forcing online-only brute force.</p>
  </div>

  <div class="questions">
    <h3>Practice Questions — Slide 2</h3>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">What was the primary cryptographic flaw in WEP?</div>
      <ul class="q-opts">
        <li>A) WEP used DES, which has a 56-bit key</li>
        <li class="correct">B) The 24-bit IV space caused keystream reuse, enabling decryption without knowing the key</li>
        <li>C) WEP used MD5 for integrity, which is collision-prone</li>
        <li>D) WEP used asymmetric encryption, which is too slow for real-time traffic</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: B.</strong> The 24-bit IV exhausts after ~16M packets, leading to repeated (IV, Key) pairs and identical keystreams. XORing two ciphertexts with the same keystream cancels it, leaking plaintext XOR.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-tf">True / False</span>
      <div class="q-text">WPA3's SAE handshake provides forward secrecy, meaning past sessions cannot be decrypted even if the Wi-Fi password is later compromised.</div>
      <div class="q-answer"><strong>✔ Answer: TRUE.</strong> SAE generates a fresh ephemeral key per session using a Diffie-Hellman-like exchange. No long-term secret is used directly to derive session keys, so compromising the PSK later does not reveal past traffic.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-sa">Short Answer</span>
      <div class="q-text">Why was WPA considered a temporary fix rather than a permanent solution?</div>
      <div class="q-answer"><strong>✔ Answer:</strong> WPA used TKIP, which was designed as a firmware-upgradeable patch for existing WEP hardware. TKIP still used the RC4 stream cipher underneath with added key mixing and MIC. RC4 was already considered weak, and TKIP could not use AES because original WEP hardware lacked the processing power. WPA2 (hardware replacement) with AES-CCMP was the intended permanent solution.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-fb">Fill in the Blank</span>
      <div class="q-text">WPA2 replaced RC4 with __________ encryption and used __________ for integrity, forming the CCMP protocol.</div>
      <div class="q-answer"><strong>✔ Answer: AES (AES-CTR mode); CBC-MAC.</strong> CCMP = Counter Mode with CBC-MAC Protocol. AES-CTR provides encryption; CBC-MAC provides data origin authentication and integrity.</div>
    </div>
  </div>
</div>

<div class="slide-block" id="s3">
  <div class="slide-label">Slide 3 of 21</div>
  <div class="slide-title">WEP, WPA, WPA2, WPA3 — Comparison Table</div>

  <div class="slide-content">
    <div class="workflow-wrap">
      <table class="std-table">
        <thead>
          <tr><th>Standard</th><th>Encryption</th><th>User Authentication</th><th>Status</th></tr>
        </thead>
        <tbody>
          <tr><td><span class="tag tag-red">WEP</span></td><td>RC4 (weak, IV reuse)</td><td>PSK (shared key)</td><td>Broken — do not use</td></tr>
          <tr><td><span class="tag tag-gold">WPA-Personal</span></td><td>TKIP (key mixing + counter + RC4)</td><td>PSK</td><td>Deprecated 2020</td></tr>
          <tr><td><span class="tag tag-gold">WPA-Enterprise</span></td><td>TKIP</td><td>802.1X / EAP</td><td>Deprecated 2020</td></tr>
          <tr><td><span class="tag tag-green">WPA2-Personal</span></td><td>AES-CTR (CCMP)</td><td>PSK</td><td>Current — vulnerable to offline dict. attack</td></tr>
          <tr><td><span class="tag tag-green">WPA2-Enterprise</span></td><td>AES-CTR (CCMP)</td><td>802.1X / EAP</td><td>Current — strongly recommended</td></tr>
          <tr><td><span class="tag tag-blue">WPA3-Personal</span></td><td>AES-CCMP / GCMP-256</td><td>SAE (Dragonfly)</td><td>Best for personal networks</td></tr>
          <tr><td><span class="tag tag-blue">WPA3-Enterprise</span></td><td>GCMP-256</td><td>802.1X / EAP + 192-bit suite</td><td>Best for enterprise</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>PSK (Pre-Shared Key)</strong> = everyone uses the same password; no per-user identity → no per-user accountability.</li>
      <li><strong>802.1X/EAP</strong> = per-user identity verified by a RADIUS authentication server → the enterprise standard.</li>
      <li><strong>WPA2-Enterprise is fundamentally stronger than WPA2-Personal</strong> for the same AES cipher because of per-user credentials and a RADIUS server.</li>
      <li>The <strong>encryption algorithm evolution</strong>: RC4 (broken) → TKIP/RC4 (patched, deprecated) → AES-CTR/CCM (strong, current) → AES-GCM/GCMP-256 (WPA3, future-proof).</li>
    </ul>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p><strong>PSK vs 802.1X — The Accountability Difference:</strong> In WPA2-Personal, the password is shared. If a laptop with the password is stolen, the only fix is changing the password for every user. In WPA2-Enterprise, each user has individual credentials. Revoke Bob's account on the RADIUS server → Bob is blocked immediately, without affecting anyone else.</p>
    <div class="analogy">
      <strong>🎯 Analogy — The Master Key vs. Individual Keys:</strong> PSK is a single master key to a building that 200 employees share. If one copy is lost, you must rekey the whole building. 802.1X/EAP gives each employee their own unique key that can be individually revoked.
    </div>
    <p><strong>WPA2-PSK Offline Attack:</strong> The WPA2-Personal 4-way handshake is publicly visible to anyone on the Wi-Fi network. An attacker captures it, takes it offline, and runs a dictionary attack: for each candidate password, the attacker derives the PMK and computes expected handshake messages, comparing to the capture. GPU clusters running Hashcat test billions of candidates per second.</p>
    <p><strong>WPA3 SAE Defense:</strong> SAE (Simultaneous Authentication of Equals) is a password-authenticated key exchange. The attacker cannot verify a guess without sending messages to the AP, which rate-limits attempts. Additionally, even if they eventually guess the password, the ephemeral session key was already derived and discarded — past sessions remain protected (forward secrecy).</p>
    <div class="warning-box"><strong>⚠️ Quiz Trap:</strong> "WPA-Enterprise uses TKIP." — TRUE for original WPA, but the exam may ask about WPA2-Enterprise which uses AES-CTR. Always check the WPA generation.</div>
  </div>

  <div class="questions">
    <h3>Practice Questions — Slide 3</h3>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">Which combination offers the strongest security for a corporate wireless network?</div>
      <ul class="q-opts">
        <li>A) WPA2-Personal with AES-CTR</li>
        <li>B) WPA-Enterprise with TKIP</li>
        <li class="correct">C) WPA2-Enterprise with AES-CTR and 802.1X/EAP</li>
        <li>D) WEP with RC4 and PSK</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: C.</strong> WPA2-Enterprise combines AES encryption (CCMP) with per-user authentication via 802.1X/EAP, providing both strong encryption and individual user accountability/revocability.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-tf">True / False</span>
      <div class="q-text">WPA2-Personal and WPA2-Enterprise use the same AES encryption algorithm but differ in how user authentication is performed.</div>
      <div class="q-answer"><strong>✔ Answer: TRUE.</strong> Both use AES-CTR (CCMP) for data encryption. The difference is authentication: Personal uses a shared PSK; Enterprise uses 802.1X with individual credentials verified by a RADIUS server.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-sa">Short Answer</span>
      <div class="q-text">What specific vulnerability in WPA2-Personal does WPA3-Personal address, and how?</div>
      <div class="q-answer"><strong>✔ Answer:</strong> WPA2-Personal is vulnerable to offline dictionary attacks on captured 4-way handshakes. WPA3-Personal addresses this via SAE (Simultaneous Authentication of Equals / Dragonfly key exchange): (1) the attacker cannot verify a password guess without interacting with the AP, forcing online-only brute force; (2) SAE provides forward secrecy — each session uses an ephemeral key, so discovering the password later does not decrypt captured past sessions.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-fb">Fill in the Blank</span>
      <div class="q-text">In WPA-Enterprise, authentication is performed per-user via the __________ framework, which relays credentials to a __________ server for verification.</div>
      <div class="q-answer"><strong>✔ Answer: EAP (Extensible Authentication Protocol); RADIUS.</strong> 802.1X uses EAP messages relayed by the Authenticator (AP) to the RADIUS Authentication Server, which verifies user credentials and grants/denies access.</div>
    </div>
  </div>
</div>

<div class="slide-block" id="s4">
  <div class="slide-label">Slides 4–6 of 21 (Topic: Network Access Control)</div>
  <div class="slide-title">Network Access Control (NAC) — Overview, Enforcement & Context</div>

  <div class="slide-content">
    <ul>
      <li><strong>NAC:</strong> Umbrella term for managing access to a network — authenticates users, determines permissions, examines device health.</li>
      <li><strong>Enforcement Methods:</strong>
        <ul class="sub">
          <li><strong>IEEE 802.1X (Wi-Fi):</strong> Enforces authorization before IP address assignment; uses EAP.</li>
          <li><strong>Firewall:</strong> Allow/deny traffic between enterprise hosts and external users.</li>
          <li><strong>DHCP Management:</strong> Assigns IP based on authentication status; DHCP snooping prevents rogue servers.</li>
          <li><strong>Network Segmentation (VLANs):</strong> NAC system assigns authenticated users to specific VLANs.</li>
        </ul>
      </li>
      <li><strong>AAA Framework:</strong> Authentication (Is user legit?), Authorization (What can they do?), Accounting (Track usage).</li>
      <li><strong>Components:</strong> Supplicant (user device), Authenticator (AP/switch), Authentication Server (RADIUS).</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>NAC is broader than 802.1X</strong> — it includes endpoint health checks (patching, antivirus status) before granting access.</li>
      <li><strong>Quarantine network:</strong> Unhealthy devices are placed in a restricted VLAN where they can only access patch servers.</li>
      <li><strong>DHCP snooping</strong> prevents rogue DHCP servers on switches by only allowing trusted ports to send DHCP Offer/ACK.</li>
      <li><strong>VLAN assignment</strong> by NAC = the network is logically segmented so guest, employee, and IoT devices never see each other's traffic.</li>
      <li>The <strong>AAA model</strong> (Authentication, Authorization, Accounting) is the conceptual backbone of all enterprise access control.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-icon">W</div>
      <div class="gc-label">🔴 WHY — Purpose</div>
      <p>Simply having Wi-Fi with a password is insufficient for enterprise. A compromised laptop with the right password should not access the entire corporate network. NAC solves this by adding per-user identity, device health verification, and dynamic network segmentation post-authentication.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-icon">H</div>
      <div class="gc-label">🟡 HOW — Mechanism</div>
      <p>The Supplicant (laptop) connects to the Authenticator (AP/switch). The controlled port is blocked — no data flows. Authentication credentials travel via EAP to the RADIUS server. On success, the RADIUS server instructs the AP to open the controlled port and optionally assign a VLAN.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-icon">W</div>
      <div class="gc-label">🟢 WHAT — Result</div>
      <p>Only authenticated, healthy devices join the correct network segment. Guests get Internet-only access. Employees get internal resources. IoT devices are isolated. Compromised devices are quarantined automatically. Every access event is logged for accounting/audit.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p><strong>The AAA Model in Practice:</strong> Think of AAA as a three-checkpoint security system at a datacenter:</p>
    <p><strong>Authentication</strong> — "Show me your badge." The RADIUS server verifies your username and password (or certificate). You are who you claim to be.</p>
    <p><strong>Authorization</strong> — "Your badge says 'Employee-Level-2.' You can access floors 1–3 but not the server room." RADIUS returns attributes (VLAN ID, firewall policy) telling the AP what network segment to place you in.</p>
    <p><strong>Accounting</strong> — "You entered at 9:03 AM and left at 5:47 PM. You consumed 2.3 GB of data." Every network session is logged with start/stop times, bytes transferred, and user identity for billing and forensics.</p>
    <div class="analogy">
      <strong>🎯 Analogy — The Hospital Visitor Badge System:</strong> Visiting a hospital, you stop at reception (Authenticator), show ID (Supplicant credentials), the receptionist calls the ward to confirm (RADIUS server), and you receive a badge granting access only to Floor 3 (VLAN assignment). Without the badge, all doors (controlled ports) remain locked.
    </div>
    <p><strong>DHCP Snooping Deep Dive:</strong> Without DHCP snooping, any device on the network can run a DHCP server and send DHCP Offer messages faster than the legitimate server. The victim's device accepts the rogue server's gateway → all traffic routes through the attacker (MITM). DHCP snooping on managed switches marks only the uplink port (toward the real DHCP server) as trusted. Any DHCP Offer arriving on an untrusted port is dropped silently.</p>
    <p><strong>VLAN Segmentation as Security Boundary:</strong> Even if a guest device is compromised, VLAN isolation ensures it cannot send ARP requests to the employee VLAN. The Layer 2 broadcast domain is separate. Routing between VLANs goes through a firewall with explicit rules.</p>
  </div>

  <div class="questions">
    <h3>Practice Questions — Slides 4–6 (NAC)</h3>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">In the AAA model, which function tracks user session duration and data consumption for billing/audit purposes?</div>
      <ul class="q-opts">
        <li>A) Authentication</li>
        <li>B) Authorization</li>
        <li class="correct">C) Accounting</li>
        <li>D) Access Control</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: C.</strong> Accounting logs session start/stop times, bytes transferred, and user identity. Authentication verifies identity; Authorization grants permissions.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-mc">Multiple Choice</span>
      <div class="q-text">Which NAC enforcement mechanism prevents a rogue DHCP server from redirecting a client's traffic to an attacker?</div>
      <ul class="q-opts">
        <li>A) 802.1X port blocking</li>
        <li>B) VLAN segmentation</li>
        <li class="correct">C) DHCP snooping</li>
        <li>D) Firewall egress filtering</li>
      </ul>
      <div class="q-answer"><strong>✔ Answer: C.</strong> DHCP snooping marks only trusted switch ports (uplinks to the real DHCP server) as allowed to send DHCP Offer/ACK messages. Offers from untrusted ports are dropped.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-tf">True / False</span>
      <div class="q-text">In 802.1X, the Authenticator (access point) is responsible for implementing and verifying the specific EAP authentication method (e.g., EAP-TLS).</div>
      <div class="q-answer"><strong>✔ Answer: FALSE.</strong> The Authenticator (AP) is a pass-through relay — it forwards EAP messages between the Supplicant and the Authentication Server (RADIUS). Only the Supplicant and Authentication Server implement the specific EAP method. This is why changing EAP methods doesn't require upgrading switches/APs.</div>
    </div>
    <div class="q-item">
      <span class="q-type q-sa">Short Answer</span>
      <div class="q-text">Describe how VLAN assignment by a NAC system provides security isolation in an enterprise network.</div>
      <div class="q-answer"><strong>✔ Answer:</strong> After authentication, the RADIUS server returns the appropriate VLAN ID as an attribute in the Access-Accept message. The Authenticator (switch/AP) assigns the device's port to that VLAN. This creates separate Layer 2 broadcast domains: guests in VLAN 10 cannot send ARP requests to employee VLAN 20. Cross-VLAN traffic must pass through a router/firewall where access control policies are enforced, containing any breach to a single segment.</div>
    </div>
  </div>
</div>
