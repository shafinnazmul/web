<div class="slide-block">
  <div class="slide-num">Slides 15 (cont.) & 18</div>
  <div class="slide-title">WPA2-PSK Weakness & WPA3 Fix</div>

  <div class="slide-content">
    <ul>
      <li><strong>WPA2-PSK vulnerability:</strong> Session key fully derivable from PSK + nonces captured during handshake</li>
      <li>In public Wi-Fi (hotels, conferences): all users share same PSK → attacker on same LAN can derive any user's session key</li>
      <li>Application data not protected by TLS is fully readable even on "WPA2-secured" network</li>
      <li><strong>WPA3 fix:</strong> SAE (Simultaneous Authentication of Equals) — DH-like ephemeral key exchange</li>
      <li>SAE provides <strong>forward secrecy</strong> — compromising PSK later cannot decrypt past sessions</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>PMK (Pairwise Master Key)</strong> = hash(PSK, SSID, SSID length, iteration count) — derived purely from the password.</li>
      <li><strong>PTK (Pairwise Transient Key)</strong> = PRF(PMK, "Pairwise key expansion", AP_nonce, Client_nonce, AP_MAC, Client_MAC) — the actual session key.</li>
      <li>An attacker who captures the 4-way handshake (which contains the nonces and MACs) can run an offline dictionary attack: guess passwords, compute PMK, compute PTK, verify against MIC in the handshake.</li>
      <li><strong>SAE (Simultaneous Authentication of Equals)</strong> = password-authenticated Diffie-Hellman, also called the Dragonfly handshake. Ephemeral session keys mean offline attack is impossible even if PSK is known later.</li>
      <li><strong>KRACK attack (CVE-2017-13078):</strong> Key Reinstallation Attack — forces nonce reuse in WPA2's 4-way handshake, breaking CCMP's security. Patched by OS updates, not WPA3.</li>
    </ul>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive — Why WPA2-PSK is Broken in Public Wi-Fi</h3>
    <p>Here's the attack scenario at a hotel: Alice, Bob, and Mallory all connect to "HotelWiFi" using the same PSK ("hotel123"). When Alice joins:</p>
    <p><strong>Step 1:</strong> Alice's laptop and the AP exchange nonces (random numbers). Mallory's passive Wi-Fi adapter captures these nonces — they're not secret.</p>
    <p><strong>Step 2:</strong> Alice computes PMK = PBKDF2(PSK, SSID, ...). Mallory also computes PMK from the same PSK. <em>Everyone with the PSK can compute the PMK.</em></p>
    <p><strong>Step 3:</strong> Alice's PTK = PRF(PMK, nonces, MAC addresses). Mallory already has PMK, nonces, and MACs from the captured handshake — she computes the identical PTK.</p>
    <p><strong>Result:</strong> Mallory can decrypt all of Alice's traffic on this Wi-Fi network, even though Alice's session is "encrypted."</p>
    <p><strong>WPA3's fix with SAE:</strong> The PSK is never used directly to derive the session key. Instead, both parties perform a Diffie-Hellman exchange using the password as entropy — each handshake derives a fresh, unique session key (the PMK). Even if Mallory captures every handshake message, she cannot derive the session key without breaking DH. Even if the PSK is compromised in the future, past sessions cannot be decrypted (forward secrecy).</p>
    <div class="callout tip">
      <span class="callout-icon">✅</span>
      <span class="callout-text"><strong>Practical takeaway:</strong> Always use HTTPS (TLS) for sensitive applications regardless of what Wi-Fi security is in use. TLS provides application-layer end-to-end encryption that protects you even if Wi-Fi is compromised entirely.</span>
    </div>
  </div>

  <div class="questions-section">
    <h3>🧪 Practice Questions — WPA/WPA2/WPA3</h3>

    <div class="question">
      <div class="q-type qt-mc">Multiple Choice</div>
      <div class="q-text">WPA2-Enterprise uses which authentication mechanism?</div>
      <ul class="q-options">
        <li>A) PSK (Pre-Shared Key)</li>
        <li>B) SAE (Simultaneous Authentication of Equals)</li>
        <li class="correct">C) 802.1X / EAP with a RADIUS server</li>
        <li>D) Challenge-response with RC4</li>
      </ul>
      <div class="q-answer">✔ <strong>C) 802.1X / EAP with a RADIUS server.</strong> WPA-Enterprise and WPA2-Enterprise both use the 802.1X port-based access control framework with the Extensible Authentication Protocol (EAP), backed by a RADIUS authentication server.</div>
    </div>

    <div class="question">
      <div class="q-type qt-tf">True / False</div>
      <div class="q-text">WPA3-Personal provides forward secrecy, meaning past session traffic cannot be decrypted even if the PSK is later compromised.</div>
      <div class="q-answer">✔ <strong>True.</strong> WPA3-Personal uses SAE (Simultaneous Authentication of Equals / Dragonfly handshake), which derives ephemeral session keys through a DH-like exchange. Since each session key is independent of the PSK (the PSK is only used as input entropy, not directly), compromising the PSK later does not allow decryption of previously recorded sessions.</div>
    </div>

    <div class="question">
      <div class="q-type qt-mc">Multiple Choice</div>
      <div class="q-text">CCMP uses which cryptographic combination?</div>
      <ul class="q-options">
        <li>A) RC4 for encryption + CRC-32 for integrity</li>
        <li>B) RC4 for encryption + Michael MIC for integrity</li>
        <li class="correct">C) AES-CTR for encryption + AES-CBC-MAC for integrity</li>
        <li>D) AES-GCM for both encryption and integrity</li>
      </ul>
      <div class="q-answer">✔ <strong>C) AES-CTR for encryption + AES-CBC-MAC for integrity.</strong> CCMP (Counter mode CBC-MAC Protocol) uses AES in Counter Mode (CTR) for confidentiality and AES in CBC-MAC mode for authentication/integrity. The combination is called CCM (Counter with CBC-MAC).</div>
    </div>

    <div class="question">
      <div class="q-type qt-sa">Short Answer</div>
      <div class="q-text">Explain why WPA was a software fix but WPA2 required hardware replacement.</div>
      <div class="q-answer">✔ <strong>WPA</strong> (2003) was designed as a firmware update for existing WEP hardware. It kept the same underlying RC4 stream cipher but added TKIP (per-packet key mixing) on top. Since RC4 was already implemented in the existing chipsets, TKIP could be implemented as a software layer above the existing cipher. <strong>WPA2</strong> (2004) requires AES-CCMP, which uses the AES block cipher performing 10–14 rounds of substitutions and permutations. AES is computationally far more intensive than RC4 and requires dedicated hardware acceleration (AES co-processor in the chip) to achieve the required throughput. Early WEP/WPA chips lacked this hardware, so new chipsets were required.</div>
    </div>

    <div class="question">
      <div class="q-type qt-fill">Fill in the Blank</div>
      <div class="q-text">In WPA2-PSK, an attacker who captures the __________ can perform an offline __________ attack to recover the passphrase without ever connecting to the network.</div>
      <div class="q-answer">✔ <strong>4-way handshake</strong>; <strong>dictionary (or brute-force)</strong> attack. The handshake contains the nonces and MIC that allow an attacker to verify password guesses offline by computing PMK → PTK → verifying MIC.</div>
    </div>
  </div>
</div>

<div class="slide-block">
  <div class="slide-num">Slides 17–22 + 26</div>
  <div class="slide-title">NAC Overview, AAA Framework, 802.1X, and IEEE 802.11i Phases of Operation</div>

  <div class="slide-content">
    <ul>
      <li><strong>NAC</strong> = umbrella term for managing network access; authenticates users, determines access rights, checks device health</li>
      <li><strong>AAA Framework:</strong> Authentication (who are you?), Authorization (what can you do?), Accounting (log usage)</li>
      <li><strong>Components:</strong> Supplicant (user device), Authenticator (network edge device / AP), Authentication Server (RADIUS)</li>
      <li><strong>802.1X</strong> = authentication framework for IEEE 802 (Ethernet + Wi-Fi); uses uncontrolled port (auth only) and controlled port (data, opened after auth)</li>
      <li>User cannot send data until authenticated; only driver/NIC firmware upgrades needed</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>802.1X</strong> is a <em>framework</em> — it specifies how authentication messages flow (via EAP over LAN = EAPOL), not the authentication method itself.</li>
      <li><strong>Uncontrolled port</strong>: always open — allows EAP/authentication traffic only.</li>
      <li><strong>Controlled port</strong>: blocked until 802.1X authentication succeeds — then opens for data.</li>
      <li><strong>Network Enforcement Methods:</strong> 802.1X (port-based), Firewall, DHCP Management, Network Segmentation (VLANs).</li>
      <li><strong>IEEE 802.11i phases:</strong> Discovery → 802.1X authentication → Key management (4-way handshake) → Protected data transfer.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-label"><div class="gc-dot"></div>🔴 WHY — Purpose</div>
      <p>Connecting a device to a network should not automatically grant access to all resources. Unauthorized devices (attacker's laptop, infected IoT device, unpatched machine) should be identified and quarantined before they can communicate. NAC enforces this gatekeeping at the network edge, before an IP address is assigned.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-label"><div class="gc-dot"></div>🟡 HOW — Process</div>
      <p>802.1X uses two logical ports on the access point. The uncontrolled port lets authentication traffic (EAP) through to the RADIUS server. Once the server confirms identity, the controlled port opens, the device gets an IP from DHCP, and can access the network. VLAN assignment routes the device to the appropriate network segment based on its identity and health.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-label"><div class="gc-dot"></div>🟢 WHAT — Result</div>
      <p>Only authenticated, authorized, and healthy devices access the enterprise network. Compromised or unpatched devices are quarantined to a remediation VLAN. The authentication method (password, certificate, token) can be changed without touching the AP or switches — only the RADIUS server and clients need updating.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive — 802.1X with the "Nightclub Bouncer" Analogy</h3>
    <p>Imagine 802.1X as a <em>nightclub with a bouncer (the AP) and a guest list manager (the RADIUS server)</em>. The front door (uncontrolled port) only lets you talk to the bouncer — you can't enter the club. You tell the bouncer your name (EAP Identity Request/Response). The bouncer radios the guest list manager (RADIUS server) who runs the actual verification (password check, certificate validation, etc.). If you're on the list, the manager radios back "approved." The bouncer opens the velvet rope (controlled port) and you enter the club.</p>
    <p><strong>Key separation of concerns:</strong> The bouncer (AP) doesn't need to know the authentication method — he just relays messages. The guest list manager (RADIUS) handles all the authentication logic. This is why you can change from password auth to certificate auth without replacing the AP — only the RADIUS server and client software change.</p>
  </div>

  <div class="workflow-wrap">
    <table class="workflow-table">
      <thead>
        <tr><th>#</th><th>Phase</th><th>Station → AP</th><th>AP → Auth Server</th><th>Result</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>1</strong></td>
          <td><span class="tag phase-badge tag-std">Discovery</span></td>
          <td>Probe Request → Probe Response (security params)</td>
          <td>—</td>
          <td>Station learns AP's security capabilities</td>
        </tr>
        <tr>
          <td><strong>2</strong></td>
          <td><span class="tag phase-badge tag-std">Open Auth</span></td>
          <td>Open system auth request/response (null auth)</td>
          <td>—</td>
          <td>AP performs null authentication (formality)</td>
        </tr>
        <tr>
          <td><strong>3</strong></td>
          <td><span class="tag phase-badge tag-std">Association</span></td>
          <td>Association request (security parameters) → Association response</td>
          <td>—</td>
          <td>Security parameters agreed; controlled port BLOCKED</td>
        </tr>
        <tr>
          <td><strong>4</strong></td>
          <td><span class="tag phase-badge tag-auth">802.1X EAP</span></td>
          <td>EAP Identity Response → EAP Auth (back and forth)</td>
          <td>Access Request (EAP) → EAP Auth exchange</td>
          <td>Identity verified; RADIUS sends key material (PMK)</td>
        </tr>
        <tr>
          <td><strong>5</strong></td>
          <td><span class="tag phase-badge tag-enc">Key Mgmt</span></td>
          <td>EAPOL-Key messages 1–4 (4-way handshake)</td>
          <td>—</td>
          <td>PTK derived; GTK installed; controlled port OPENED</td>
        </tr>
        <tr>
          <td><strong>6</strong></td>
          <td><span class="tag phase-badge tag-enc">Data</span></td>
          <td>Encrypted data (CCMP/TKIP)</td>
          <td>—</td>
          <td>Protected data transfer active</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="questions-section">
    <h3>🧪 Practice Questions — NAC & 802.1X</h3>

    <div class="question">
      <div class="q-type qt-mc">Multiple Choice</div>
      <div class="q-text">In the 802.1X framework, which component makes the actual authentication decision?</div>
      <ul class="q-options">
        <li>A) Supplicant</li>
        <li>B) Authenticator (Access Point)</li>
        <li class="correct">C) Authentication Server (RADIUS)</li>
        <li>D) DHCP Server</li>
      </ul>
      <div class="q-answer">✔ <strong>C) Authentication Server (RADIUS).</strong> The Authenticator (AP) merely relays EAP messages between the Supplicant and the Authentication Server. The actual decision to accept or reject is made by the RADIUS server, which checks credentials against its user database.</div>
    </div>

    <div class="question">
      <div class="q-type qt-tf">True / False</div>
      <div class="q-text">In 802.1X, the controlled port allows all network traffic to pass before authentication is complete.</div>
      <div class="q-answer">✔ <strong>False.</strong> In 802.1X, the controlled port is <em>blocked</em> until authentication succeeds. Only the uncontrolled port is available before authentication, and it only allows EAP/authentication traffic — not regular data traffic.</div>
    </div>

    <div class="question">
      <div class="q-type qt-mc">Multiple Choice</div>
      <div class="q-text">What does the AAA acronym stand for in network access control?</div>
      <ul class="q-options">
        <li>A) Authentication, Authorization, Accounting</li>
        <li>B) Authentication, Access, Administration</li>
        <li>C) Audit, Authorization, Access</li>
        <li>D) Authentication, Authorization, Auditing</li>
      </ul>
      <div class="q-answer">✔ <strong>A) Authentication, Authorization, Accounting.</strong> Authentication = "Who are you?"; Authorization = "What are you allowed to do?"; Accounting = "Keep track of what you do/use."</div>
    </div>

    <div class="question">
      <div class="q-type qt-sa">Short Answer</div>
      <div class="q-text">List four network access enforcement methods used in enterprise networks.</div>
      <div class="q-answer">✔ (1) <strong>IEEE 802.1X</strong> — port-based access control using EAP; blocks data until authentication succeeds. (2) <strong>Firewall</strong> — allows or denies traffic between enterprise hosts and external users. (3) <strong>DHCP Management</strong> — controls IP address assignment based on authentication status; DHCP snooping prevents rogue DHCP servers. (4) <strong>Network Segmentation (VLANs)</strong> — routes authenticated devices to appropriate network segments; quarantines unauth/unhealthy devices.</div>
    </div>

    <div class="question">
      <div class="q-type qt-fill">Fill in the Blank</div>
      <div class="q-text">In the IEEE 802.11i standard, the 4-way handshake occurs in the __________ phase, after EAP authentication, and before the __________ port opens for data traffic.</div>
      <div class="q-answer">✔ <strong>Key Management</strong> phase; <strong>controlled</strong> port. The 4-way handshake derives the PTK (Pairwise Transient Key) and installs the GTK (Group Temporal Key) before any protected data can flow.</div>
    </div>
  </div>
</div>

</div>

<div class="slide-block">
  <div class="slide-num">Slides 24–30 + 32–33</div>
  <div class="slide-title">Extensible Authentication Protocol (EAP) — Framework, Methods, Message Flow, EAP-TLS, EAP-PEAP</div>

  <div class="slide-content">
    <ul>
      <li><strong>EAP</strong> = framework for encapsulating any authentication method between client (peer) and authentication server</li>
      <li>EAP operates over: PPP links, LANs (EAPOL = EAP over LAN), 802.11 wireless, and others</li>
      <li><strong>EAP message format:</strong> Code (8b) | Identifier (8b) | Length (16b) | [Type (8b)] | Data</li>
      <li><strong>EAP Code values:</strong> 01=Request, 02=Response, 03=Success, 04=Failure</li>
      <li>Authentication info flows: Client ↔ AP (EAPOL) ↔ RADIUS server (EAP messages over RADIUS)</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance — EAP Methods</h3>
    <ul>
      <li><strong>EAP-TLS:</strong> Both client AND server have X.509 certificates. TLS handshake embedded in EAP. Strongest mutual authentication. Requires PKI infrastructure for all users.</li>
      <li><strong>EAP-TTLS:</strong> Only the <em>server</em> has a certificate. Creates an encrypted tunnel (TLS), then runs inner authentication (e.g., password-based) inside. More deployable than EAP-TLS (no client certs).</li>
      <li><strong>EAP-GPSK:</strong> Mutual authentication + session key derivation using a pre-shared key.</li>
      <li><strong>EAP-IKEv2:</strong> Mutual auth + session key establishment; supports multiple methods.</li>
      <li><strong>EAP-PEAP:</strong> Similar to TTLS — server cert creates outer TLS tunnel; inner auth (MS-CHAPv2 typically) runs inside tunnel.</li>
      <li><strong>EAP-AKA:</strong> Used in 3G/4G cellular. SIM-based authentication. 128-bit keys.</li>
      <li><strong>LEAP:</strong> Uses MS-CHAP. <strong>Not secure</strong> — vulnerable to dictionary attacks.</li>
      <li><strong>RADIUS</strong> = Remote Authentication Dial-In User Service; the authentication server protocol used between the AP and the auth backend.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-label"><div class="gc-dot"></div>🔴 WHY — Purpose</div>
      <p>Different organizations have different authentication needs — some use passwords, some use smart cards/certificates, some use hardware tokens, some use SIM cards. Rather than standardizing on one method, EAP provides a flexible envelope that can carry any authentication protocol, allowing the method to evolve without changing the network infrastructure.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-label"><div class="gc-dot"></div>🟡 HOW — Process</div>
      <p>EAP messages flow between the peer (supplicant) and the authenticator (AP) using EAPOL (EAP over LAN). The AP strips the EAPOL encapsulation and re-encapsulates the EAP payload into a RADIUS Access-Request message to the authentication server. The server runs its authentication logic and responds with Accept/Reject + keying material.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-label"><div class="gc-dot"></div>🟢 WHAT — Result</div>
      <p>Network administrators can deploy certificate-based auth for employees, password-based for guests, SIM-based for IoT devices — all using the same AP and 802.1X infrastructure. Changing the authentication method requires only updating the RADIUS server configuration and client software — not the APs or switches.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive — EAP-TLS vs EAP-PEAP</h3>
    <p><strong>EAP-TLS (Maximum security, maximum complexity):</strong> Both the client and server have X.509 certificates issued by a trusted CA (Certificate Authority). The TLS handshake authenticates both sides. The server sends its certificate → client validates it. The client sends its certificate → server validates it. After mutual validation, TLS session keys are derived and used as input to the 802.11 key hierarchy. <em>This is the most secure EAP method but requires every user to have a certificate — manageable in enterprises with PKI infrastructure, but impractical for most consumer/guest networks.</em></p>
    <p><strong>EAP-PEAP (Practical, widely deployed):</strong> Phase 1 is identical to EAP-TLS on the server side — the server sends its certificate, the client validates it, and a TLS tunnel is established. But in Phase 2, instead of requiring a client certificate, the client's actual credentials (typically username + MS-CHAPv2 hashed password) are transmitted <em>inside the encrypted tunnel</em>. This is far more practical — users have usernames and passwords, not certificates. The tunnel protects the credential exchange from eavesdroppers. Most enterprise Wi-Fi (eduroam, corporate WPA2-Enterprise) uses EAP-PEAP or EAP-TTLS.</p>
    <div class="callout info">
      <span class="callout-icon">🔬</span>
      <span class="callout-text"><strong>Note on eduroam:</strong> The annotation on Slide 26 says "eduroam" next to the AS. eduroam (Education Roaming) is a global enterprise Wi-Fi federation using WPA2-Enterprise with EAP-TTLS or EAP-PEAP. A student at University A can connect to University B's Wi-Fi using their home institution's credentials — the AP at B forwards EAP to the RADIUS server at A for verification.</span>
    </div>
  </div>

  <div class="workflow-wrap">
    <table class="workflow-table">
      <thead>
        <tr><th>#</th><th>Message</th><th>From</th><th>To</th><th>Content / Purpose</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>1</strong></td>
          <td>EAP-Request/Identity</td>
          <td>AP (Authenticator)</td>
          <td>Supplicant</td>
          <td>"What is your username?"</td>
        </tr>
        <tr>
          <td><strong>2</strong></td>
          <td>EAP-Response/Identity</td>
          <td>Supplicant</td>
          <td>AP</td>
          <td>"My identity is john@example.com"</td>
        </tr>
        <tr>
          <td><strong>3</strong></td>
          <td>RADIUS Access-Request</td>
          <td>AP</td>
          <td>RADIUS Server</td>
          <td>EAP identity forwarded to auth server</td>
        </tr>
        <tr>
          <td><strong>4</strong></td>
          <td>EAP-Request/Auth (challenge)</td>
          <td>AP ← RADIUS</td>
          <td>Supplicant</td>
          <td>Auth challenge (certificate request, password prompt, etc.)</td>
        </tr>
        <tr>
          <td><strong>5</strong></td>
          <td>EAP-Response/Auth</td>
          <td>Supplicant</td>
          <td>AP → RADIUS</td>
          <td>Auth response (cert, hashed password, etc.)</td>
        </tr>
        <tr>
          <td><strong>(repeat)</strong></td>
          <td colspan="3">Steps 4–5 repeat for multiple round-trips (TLS handshake, etc.)</td>
          <td>Multi-round method negotiation</td>
        </tr>
        <tr>
          <td><strong>6</strong></td>
          <td>RADIUS Access-Accept</td>
          <td>RADIUS Server</td>
          <td>AP</td>
          <td>Authentication success + key material (MSK)</td>
        </tr>
        <tr>
          <td><strong>7</strong></td>
          <td>EAP-Success</td>
          <td>AP</td>
          <td>Supplicant</td>
          <td>"You're authenticated" → 4-way handshake begins</td>
        </tr>
        <tr>
          <td><strong>8–11</strong></td>
          <td>EAPOL-Key (msgs 1–4)</td>
          <td>AP ↔ Supplicant</td>
          <td>Both</td>
          <td>4-way handshake: PTK derivation + GTK installation</td>
        </tr>
        <tr>
          <td><strong>12</strong></td>
          <td>Encrypted data channel</td>
          <td>Both</td>
          <td>Both</td>

    <div class="question">

      <div class="q-text">Which EAP method requires X.509 certificates on BOTH the client and the server?</div>

        <li>B) EAP-TTLS</li>
        <li>C) EAP-PEAP</li>

      <div class="q-answer">✔ <strong>A) EAP-TLS.</strong> EAP-TLS requires both sides to present certificates during the TLS handshake. EAP-TTLS and EAP-PEAP only require a server-side certificate; the client authenticates with credentials (password/PSK) inside the encrypted tunnel.</div>

    <div class="question">
      <div class="q-type qt-tf">True / False</div>
      <div class="q-text">EAP is an authentication method that specifies exactly how users must prove their identity.</div>

    <div class="question">
      <div class="q-type qt-mc">Multiple Choice</div>
      <div class="q-text">In EAP-PEAP, what is the purpose of the outer TLS tunnel established in Phase 1?</div>

        <li>C) To replace the 4-way handshake</li>
        <li>D) To distribute the PMK to the AP</li>

    <div class="question">
      <div class="q-type qt-sa">Short Answer</div>
      <div class="q-text">What is RADIUS and what role does it play in WPA-Enterprise?</div>
      <div class="q-answer">✔ <strong>RADIUS (Remote Authentication Dial-In User Service)</strong> is a client/server protocol used by the AP (acting as a RADIUS client) to communicate with a backend authentication server. In WPA-Enterprise, when a station tries to authenticate via 802.1X/EAP: the AP receives EAP messages from the station via EAPOL, encapsulates them in RADIUS Access-Request messages, and forwards them to the RADIUS server. The RADIUS server verifies credentials (against LDAP, Active Directory, local database, etc.), runs the EAP method logic, and responds with RADIUS Access-Accept (+ MSK keying material) or Access-Reject. The AP uses the MSK to derive the PMK for the 4-way handshake.</div>
    </div>

    <div class="question">
      <div class="q-type qt-fill">Fill in the Blank</div>
      <div class="q-text">EAP messages between the supplicant and the AP use the protocol called __________, while messages between the AP and the RADIUS server use __________.</div>
      <div class="q-answer">✔ <strong>EAPOL (EAP over LAN)</strong> between supplicant and AP; <strong>RADIUS (Remote Authentication Dial-In User Service)</strong> between AP and authentication server. The AP acts as a relay, translating between the two protocols.</div>
    </div>

<div class="integrative">
  <h2>🎯 Exam Preparation — Integrative Questions</h2>

  <div class="int-q">
    <div class="q-label">Short Answer — Cross-Protocol Comparison</div>
    <div class="q-body">Compare WEP, WPA2-Personal, and WPA3-Personal specifically in terms of: (a) encryption algorithm, (b) session key derivation method, and (c) susceptibility to offline dictionary attacks. What is the fundamental architectural difference that makes WPA3 immune to offline attacks?</div>
    <div class="q-ans">
      <strong>(a) Encryption:</strong> WEP = RC4 (40/104-bit static key per session); WPA2-Personal = AES-CCMP; WPA3-Personal = AES-CCMP or GCMP-256.<br>
      <strong>(b) Session key derivation:</strong> WEP = direct use of master key (no per-session derivation); WPA2-Personal = PMK = PBKDF2(PSK, SSID,...), then PTK = PRF(PMK, nonces, MACs) during 4-way handshake; WPA3-Personal = SAE derives a fresh, ephemeral PMK through a DH-based exchange — the PSK contributes entropy but is never directly used as a key.<br>
      <strong>(c) Offline attack susceptibility:</strong> WEP = trivially crackable; WPA2-Personal = captured 4-way handshake (nonces + MACs + MIC) allows offline dictionary attack: guess password → compute PMK → compute PTK → verify MIC; WPA3-Personal = SAE handshake does not expose any information that allows offline verification of a guessed password — the exchange must be completed interactively, limiting attacks to online rate-limited guessing.<br>
      <strong>Fundamental difference:</strong> WPA2's PMK is a deterministic function of the PSK — anyone who knows the PSK and captures the handshake can derive the exact session key. WPA3's SAE provides <em>perfect forward secrecy</em> — even knowing the PSK doesn't allow derivation of past session keys, because each SAE exchange derives an independent ephemeral key through a non-deterministic (randomized DH) process.
    </div>
  </div>

  <div class="int-q">
    <div class="q-label">Short Answer — 802.1X/EAP End-to-End Flow</div>
    <div class="q-body">Trace the complete authentication flow for a laptop connecting to a WPA2-Enterprise network using EAP-PEAP. Identify all three parties involved, the messages exchanged, and the point at which the 802.1X controlled port opens.</div>
    <div class="q-ans">
      <strong>Parties:</strong> Supplicant (laptop), Authenticator (AP), Authentication Server (RADIUS).<br>
      <strong>Flow:</strong><br>
      1. Probe request/response → Open system auth → Association request/response (security params negotiated; WPA2-Enterprise selected). 802.1X controlled port BLOCKED.<br>
      2. AP sends EAP-Request/Identity. Laptop responds with EAP-Response/Identity (username, possibly anonymous outer identity).<br>
      3. AP forwards to RADIUS via Access-Request. RADIUS sends EAP-Request/Start-PEAP.<br>
      4. (PEAP Phase 1) Server sends its TLS certificate. Laptop validates certificate against trusted CA. TLS tunnel established — server is authenticated to the client.<br>
      5. (PEAP Phase 2, inside TLS tunnel) Server requests real username. Laptop sends real username. Server sends MS-CHAPv2 challenge. Laptop sends MS-CHAPv2 response. Server verifies against its user database. <br>
      6. RADIUS sends RADIUS Access-Accept + MSK (Master Session Key) to AP. AP sends EAP-Success to laptop.<br>
      7. 4-way handshake: AP and laptop derive PTK from MSK-derived PMK + nonces. GTK installed. 802.1X controlled port OPENS.<br>
      8. AES-CCMP encrypted data channel active.
    </div>
  </div>

  <div class="int-q">
    <div class="q-label">Multiple Answers — Security Analysis</div>
    <div class="q-body">Alice connects to "CoffeeShopWiFi" which uses WPA2-PSK. Eve is also connected to the same network and has captured Alice's 4-way handshake. Alice uses an unencrypted HTTP website. What can Eve learn, and what defenses would have protected Alice? Select all protections that would have helped.</div>
    <div class="q-ans">
      <strong>What Eve can learn:</strong> (1) Eve already knows the PSK (she connected with the same password). She computes PMK = PBKDF2(PSK, SSID), then uses Alice's captured nonces + MACs to compute PTK. Eve can decrypt all of Alice's WPA2-encrypted Wi-Fi traffic. (2) Since Alice uses HTTP (not HTTPS), Eve can read the full HTTP request/response content — including passwords, session cookies, and all data.<br><br>
      <strong>Protections that would have helped:</strong><br>
      ✅ <strong>Using HTTPS/TLS:</strong> Even if Eve decrypts the WPA2 layer, TLS end-to-end encryption between Alice's browser and the server would prevent reading application content. TLS session keys are derived independently of Wi-Fi keys.<br>
      ✅ <strong>WPA3-Personal (SAE):</strong> SAE provides per-session keys with forward secrecy — even though Eve knows the PSK, she cannot derive Alice's session keys from the captured handshake.<br>
      ✅ <strong>Using a VPN:</strong> A VPN tunnels all traffic through an encrypted channel to a trusted exit node, regardless of Wi-Fi security. Even if Eve decrypts the Wi-Fi layer, she sees only encrypted VPN packets.<br>
      ✅ <strong>WPA2-Enterprise:</strong> Eve would not know Alice's per-user credentials (RADIUS authenticates individually). Each user has a unique PMK derived by the RADIUS server — Eve's PMK is different from Alice's.<br>
      ❌ <strong>MAC address filtering:</strong> Would not help — MAC addresses are sent in cleartext and can be spoofed after Eve observes Alice's MAC.<br>
      ❌ <strong>Hiding the SSID:</strong> Would not help — Eve can see the network via probe requests and association frames.
    </div>
  </div>

  <div class="int-q">
    <div class="q-label">Short Answer — KRACK Attack (Extended Reading)</div>
    <div class="q-body">Briefly describe the KRACK attack (CVE-2017-13078) — what it exploits, what it achieves, and how it is defended against. Why does WPA3 avoid this vulnerability by design?</div>
    <div class="q-ans">
      <strong>What it exploits:</strong> The WPA2 4-way handshake lacks protection against retransmission of Message 3 (which installs the PTK). The 802.11i specification requires the receiver to accept retransmissions and reinstall the key with a reset nonce. An attacker who forces Message 3 retransmission causes nonce reuse.<br>
      <strong>What it achieves:</strong> Nonce reuse in AES-CCMP allows an attacker to decrypt and potentially forge packets (similar to IV reuse in WEP). In some implementations it also allowed injection of all-zero keys, completely breaking encryption.<br>
      <strong>Defense:</strong> OS-level patches (released Nov 2017) prevent key reinstallation when the key is already installed — rejecting duplicate Message 3 retransmissions. All major OSes (Windows, Linux, Android, iOS, macOS) were patched.<br>
      <strong>Why WPA3 is immune:</strong> WPA3's SAE handshake replaces the 4-way handshake with a cryptographic exchange that cannot be manipulated through retransmission attacks. SAE provides commitment values that make state-reset attacks detectable. Additionally, WPA3 mandates Protected Management Frames (PMF/802.11w), which prevents deauthentication attacks that attackers used to force KRACK re-association.
    </div>
  </div>

  <div class="int-q">
    <div class="q-label">Diagram / Short Answer — WEP IV Reuse Attack</div>
    <div class="q-body">Explain the IV reuse attack against WEP. If two packets P1 and P2 are encrypted with the same keystream K (due to IV collision), write an expression showing how an attacker can extract information, and explain what the attacker needs to fully break WEP.</div>
    <div class="q-ans">
      <strong>Setup:</strong> WEP uses RC4(IV ‖ Key) to generate keystream K for each packet. With 24-bit IVs, only 2^24 ≈ 16.7M values exist. On a busy network, IV values repeat within a few hours — two packets encrypted with the same IV use the same keystream K.<br>
      <strong>The attack:</strong> Attacker captures C1 = P1 ⊕ K and C2 = P2 ⊕ K.<br>
      C1 ⊕ C2 = (P1 ⊕ K) ⊕ (P2 ⊕ K) = P1 ⊕ P2.<br>
      The attacker now has the XOR of two plaintexts. Since both are structured data (IP packets), statistical analysis of P1 ⊕ P2 reveals significant information about both plaintexts.<br>
      <strong>Known plaintext attack:</strong> If the attacker knows P1 (e.g., an ARP packet whose structure is predictable), then K = C1 ⊕ P1. With K, P2 = C2 ⊕ K — full decryption of all traffic using that IV.<br>
      <strong>FMS/PTW attacks go further:</strong> Certain IV values cause RC4 to reveal bytes of the key in its first output bytes. By collecting ~5,000–40,000 packets with these "weak IVs," the attacker applies statistics to recover all key bytes. Modern tools (Aircrack-ng) crack 128-bit WEP in under a minute given sufficient packets.
    </div>
  </div>
</div>

<div class="topic-header" id="t1">
  <span class="topic-num">SLIDE 1–2</span>
  <h2>Wireless Technologies Overview</h2>
  <span class="topic-sub">Comparison landscape · Key parameters</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDE 1</span>
    <span class="slide-title">Course Introduction — IoT Wireless Technologies</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li>IoT (Internet of Things) connects billions of physical devices through diverse wireless technologies.</li>
        <li>No single wireless standard fits all IoT use cases — each technology makes explicit trade-offs.</li>
        <li><strong>Five key parameters</strong> characterize any wireless technology: central frequency, bandwidth capacity, transmission rate, transmission range, and transmission power.</li>
        <li><strong>Two key factors for data rate:</strong> (1) Bandwidth and (2) Spectrum efficiency (modulation scheme).</li>
        <li>Shannon's Channel Capacity Law: C = B · log₂(1 + S/N) — capacity scales with bandwidth and Signal-to-Noise ratio.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>IoT devices range from tiny soil moisture sensors to autonomous vehicles. A single wireless standard cannot satisfy requirements as different as "transmit 1 byte per hour from a buried pipe sensor" and "stream 4K video from a drone." Understanding the landscape lets engineers pick the right tool for each job.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>Engineers compare technologies across the five key parameters — frequency, bandwidth, range, speed, and power — and plot them on capability graphs (bandwidth vs. range, data rate vs. power). The "best" technology is the one that satisfies the application's constraints at the lowest cost and complexity.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>A structured landscape emerges: short-range/high-speed (Wi-Fi), short-range/low-power (ZigBee, Bluetooth), long-range/low-speed (LoRa, NB-IoT), and medium-range (Cellular). Designers can navigate this map to choose the appropriate technology for their IoT application.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <div class="analogy"><strong>🎯 Analogy — The Transportation Network:</strong> Wireless technologies are like transportation modes. Wi-Fi is a city bus — fast, frequent, but limited to the city. LoRa is a long-haul truck — slow but carries goods thousands of miles. Cellular is the interstate highway system — broad coverage for moderate speed. RFID is a bicycle messenger — tiny payload, very short-range, nearly free to deploy. You wouldn't use a long-haul truck to deliver pizza across the street, and you wouldn't use a bicycle to move freight across the country.</div>

      <p><strong>The Five Key Parameters Explained:</strong></p>
      <p><strong>1. Central Frequency:</strong> The carrier frequency of the radio signal. Higher frequencies (GHz) carry more data but don't penetrate obstacles well and lose power over distance faster. Lower frequencies (MHz) travel farther and penetrate walls better but carry less data. Example: 900 MHz (good for deep indoor penetration — LoRa), 2.4 GHz (balanced — Wi-Fi, Bluetooth, ZigBee), 60 GHz (ultra-fast, line-of-sight only — 5G mmWave).</p>
      <p><strong>2. Bandwidth Capacity:</strong> The width of the frequency band assigned to the communication channel, measured in Hz (or MHz/GHz). Wider bandwidth = more data per second. A highway analogy: bandwidth is the number of lanes on the road. More lanes → more cars simultaneously.</p>
      <p><strong>3. Transmission Rate:</strong> How fast data can be sent, measured in bits per second (bps, Kbps, Mbps, Gbps). This is limited by both bandwidth and modulation scheme efficiency. Shannon's law: C = B × log₂(1 + S/N). More bandwidth OR better signal quality → higher rate.</p>
      <p><strong>4. Transmission Range:</strong> How far signals travel before becoming too weak. Inversely related to frequency (lower frequency = longer range) and directly related to transmit power. IoT devices often need very long ranges (kilometers for smart agriculture) with tiny batteries.</p>
      <p><strong>5. Transmission Power:</strong> Energy consumed per transmission. Battery-powered IoT sensors may need to last 10 years on a coin cell. High-power transmissions are not viable — power efficiency is a primary design constraint for most IoT applications.</p>

      <div class="info-box"><strong>💡 Shannon's Channel Capacity:</strong> C = B · log₂(1 + S/N). Even if you double the bandwidth, you only linearly double capacity. But doubling the SNR also has diminishing returns (logarithmic). This is why 5G uses massive antennas and complex modulation (high SNR exploitation) rather than just wider bands.</div>

      <p><strong>Reading the Wireless Landscape Chart:</strong> The chart from the slide shows technology bubbles on axes of Bandwidth Capability (vertical) vs. Range Capability (horizontal). Wi-Fi and 5G sit high (bandwidth) but are limited range. LPWAN technologies (LoRa, NB-IoT) sit low-bandwidth but extend to long range. RFID/NFC are at the extreme short-range low-bandwidth corner. This visual map is the single most important reference for understanding IoT wireless trade-offs.</p>
    </div>
  </div>
</div>

<!-- QUESTIONS FOR TOPIC 1 -->
<div class="questions">
  <div class="questions-title">🧪 Practice Questions — Wireless Technology Overview</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>According to Shannon's channel capacity formula C = B·log₂(1 + S/N), which two factors primarily determine the maximum achievable data rate?</p>
    <p>A) Transmission power and antenna height &nbsp; B) Bandwidth and Signal-to-Noise Ratio &nbsp; C) Frequency and modulation type &nbsp; D) Range and packet size</p>
    <div class="q-answer"><strong>✔ Answer: B) Bandwidth and Signal-to-Noise Ratio.</strong> Shannon's law states capacity scales with bandwidth (B) and logarithmically with SNR (S/N). Modulation type relates to how efficiently the SNR is exploited, but B and S/N are the fundamental limiting factors in the formula.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>Higher carrier frequencies (e.g., 60 GHz) generally provide longer transmission ranges than lower frequencies (e.g., 900 MHz) for the same transmit power.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> Higher frequencies experience greater path loss and are absorbed more readily by obstacles (walls, atmosphere). Lower frequencies (900 MHz) travel farther and penetrate obstacles better, which is why LoRa uses sub-GHz bands for long-range IoT.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>A smart agriculture company needs to deploy soil sensors across a 50-acre farm. Each sensor sends 50 bytes of data every 30 minutes. Battery replacement must be avoided for 5 years. Which wireless technology family (Wi-Fi, Cellular, LPWAN) is most appropriate and why?</p>
    <div class="q-answer"><strong>✔ Answer: LPWAN (e.g., LoRa or NB-IoT).</strong> Reasons: (1) Long range — 50 acres needs coverage across large distances; (2) Low data rate is acceptable — 50 bytes every 30 min is tiny; (3) Ultra-low power — LPWAN devices can achieve 10-year battery life; (4) Low cost per device. Wi-Fi is too short-range and power-hungry. Cellular has sufficient range but is far more expensive and power-hungry than needed.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>The two key factors for data rate in wireless systems are ________ and ________ (modulation scheme).</p>
    <div class="q-answer"><strong>✔ Answer: Bandwidth; Spectrum efficiency.</strong> From the slide: "Key factors for data rate: 1. Bandwidth 2. Spectrum efficiency (modulation scheme)." Bandwidth determines the theoretical maximum; modulation efficiency determines how many bits per Hz can actually be transmitted.</div>
  </div>
</div>

<div class="topic-header" id="t2">
  <span class="topic-num">SLIDE 3</span>
  <h2>The Radio Spectrum</h2>
  <span class="topic-sub">US frequency allocations · ISM bands</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDE 3</span>
    <span class="slide-title">U.S. Radio Spectrum Allocation Chart</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li>The radio spectrum is a finite, government-regulated resource managed by the FCC (commercial) and NTIA (government) in the U.S.</li>
        <li><strong>ISM Bands (Industrial, Scientific, Medical):</strong> License-free bands where anyone can transmit — the basis for Wi-Fi, Bluetooth, ZigBee, and LoRa. Key ISM bands: 915 MHz, 2.4 GHz, 5.8 GHz.</li>
        <li>Licensed spectrum (e.g., cellular LTE/5G) costs billions at auction — gives guaranteed interference-free operation.</li>
        <li>Unlicensed spectrum requires sharing and interference management — solved by techniques like spread spectrum and CSMA/CA.</li>
        <li>Frequency bands: VLF → LF → MF → HF → VHF → UHF → SHF → EHF (increasing frequency, decreasing wavelength).</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Radio waves from different transmitters interfere with each other. Without regulation, chaos would ensue — your Wi-Fi would be jammed by neighbors' microwave ovens, ambulance radios, and aircraft navigation systems simultaneously. Government allocation prevents this interference catastrophe.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>Governments divide the spectrum into frequency bands and assign each to specific services (aviation, cellular, broadcasting, amateur radio). ISM bands are carved out as "free for all" with power limits. Technologies operating in ISM bands must use techniques (spread spectrum, frequency hopping) to coexist without mutual destruction.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Devices know which frequencies they may use. Licensed operators (cellular carriers) get guaranteed spectrum. IoT devices predominantly use ISM bands (2.4 GHz especially) — enabling low-cost devices with no licensing fees, at the cost of managing interference from neighbors and other technologies sharing the same band.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <div class="analogy"><strong>🎯 Analogy — The Spectrum as Highway Lanes:</strong> Imagine the electromagnetic spectrum as a massive highway. The government assigns dedicated lanes to different services — ambulances (emergency radio), commercial trucks (broadcasting), taxis (cellular). ISM bands are like the shoulder of the highway — anyone can drive there, but you have to handle the chaos yourself (no dedicated lane, so use careful driving techniques to avoid collisions).</div>

      <p><strong>ISM Bands — The Foundation of IoT Wireless:</strong> ISM (Industrial, Scientific, Medical) bands are designated by the ITU and national regulators as license-free. Key ISM bands used by IoT technologies:</p>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>ISM Band</th><th>Frequency</th><th>Technologies</th><th>Characteristics</th></tr></thead>
          <tbody>
            <tr><td>Sub-GHz</td><td>868 MHz (EU), 915 MHz (NA)</td><td>LoRa, ZigBee, Z-Wave</td><td>Long range, good penetration, lower data rate</td></tr>
            <tr><td>2.4 GHz</td><td>2.400–2.4835 GHz</td><td>Wi-Fi, Bluetooth, ZigBee, LoRa</td><td>Global availability, crowded, medium range</td></tr>
            <tr><td>5.8 GHz</td><td>5.725–5.875 GHz</td><td>Wi-Fi 5/6</td><td>High data rate, short range, less congested</td></tr>
            <tr><td>24 GHz</td><td>24 GHz</td><td>Radar, industrial</td><td>Very short range, very high bandwidth</td></tr>
          </tbody>
        </table>
      </div>

      <div class="warn-box"><strong>⚠️ Security Implication — The ISM Band is a Battlefield:</strong> Because ISM bands are unlicensed and shared, they are vulnerable to jamming attacks. An attacker with a $50 transmitter can flood the 2.4 GHz band with noise, disrupting all nearby Wi-Fi, Bluetooth, and ZigBee devices simultaneously. This is why military-grade IoT systems often use licensed spectrum or frequency-hopping techniques to resist jamming.</div>

      <p><strong>Licensed vs. Unlicensed Spectrum for IoT Security:</strong> NB-IoT and LTE-M use licensed cellular spectrum, which provides much stronger interference protection and therefore more reliable communication — critical for security-sensitive applications like smart grid metering or medical device telemetry. LoRa and ZigBee use unlicensed ISM bands, which are cheaper but more exposed to interference and intentional jamming.</p>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — Radio Spectrum</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>Which of the following correctly describes ISM (Industrial, Scientific, Medical) bands?</p>
    <p>A) Licensed spectrum requiring FCC approval for each device &nbsp; B) License-free bands where anyone can transmit subject to power limits &nbsp; C) Bands reserved exclusively for government use &nbsp; D) Spectrum allocated only for cellular 5G deployment</p>
    <div class="q-answer"><strong>✔ Answer: B) License-free bands where anyone can transmit subject to power limits.</strong> ISM bands (e.g., 2.4 GHz, 915 MHz) are designated as free-to-use without individual licensing. Devices must comply with power limits and must accept interference from other users — this is the basis for Wi-Fi, Bluetooth, ZigBee, and LoRa.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>NB-IoT operating in licensed cellular spectrum provides better protection against interference than LoRa operating in the ISM band.</p>
    <div class="q-answer"><strong>✔ Answer: True.</strong> Licensed spectrum provides exclusive use of frequency bands, eliminating interference from other technologies sharing the same band. ISM bands like 2.4 GHz are shared by Wi-Fi, Bluetooth, ZigBee, microwave ovens, etc., creating potential for interference that cannot be legally prevented.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>From a security perspective, why are IoT systems using ISM bands more vulnerable than those using licensed cellular spectrum?</p>
    <div class="q-answer"><strong>✔ Answer:</strong> ISM bands are shared and unlicensed, making them vulnerable to: (1) <strong>Jamming attacks</strong> — any attacker can legally transmit in ISM bands, making it easy to flood them with interference; (2) <strong>Eavesdropping</strong> — anyone can receive ISM band transmissions without restriction; (3) <strong>Replay and injection attacks</strong> — no licensed exclusivity means attackers can transmit spoofed packets. Licensed cellular spectrum is protected by law, has interference management, and carriers authenticate devices, providing a layer of protection before the application-layer security even begins.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>The 2.4 GHz ISM band is used by ________, ________, and ________ technologies, making it the most crowded and interference-prone IoT frequency band.</p>
    <div class="q-answer"><strong>✔ Answer: Wi-Fi (IEEE 802.11), Bluetooth, ZigBee (IEEE 802.15.4).</strong> All three major short-range IoT/PAN technologies share the 2.4 GHz band, along with microwave ovens and other ISM devices. This congestion motivates techniques like frequency hopping (Bluetooth) and DSSS (ZigBee) to coexist.</div>
  </div>
</div>

<div class="topic-header" id="t3">
  <span class="topic-num">SLIDES 4, 11, 35</span>
  <h2>The 2.4 GHz ISM Band in Detail</h2>
  <span class="topic-sub">Channel plans for Wi-Fi, ZigBee, Bluetooth LE, Classic Bluetooth</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDES 4 · 11 · 35</span>
    <span class="slide-title">2.4G ISM Band Channel Comparison</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>IEEE 802.11 (Wi-Fi):</strong> 14 overlapping channels, each 22 MHz wide. Only channels 1, 6, and 11 are non-overlapping — the "golden three" for deployment planning.</li>
        <li><strong>IEEE 802.15.4 (ZigBee):</strong> 16 channels in 2.4 GHz, each only 2 MHz wide. Can fit between Wi-Fi channels.</li>
        <li><strong>Bluetooth LE:</strong> 40 channels of 1 MHz each; 3 are advertising channels (37, 38, 39), 37 are data channels.</li>
        <li><strong>Classic Bluetooth:</strong> 79 channels of 1 MHz each; uses FHSS (frequency hopping) across all 79.</li>
        <li>These four technologies must coexist in the same 2.4 GHz space — coexistence mechanisms are critical.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>The 2.4 GHz band is universally available globally (unlike 5 GHz which varies by country). This universality makes it the default for international IoT products. But sharing this finite space between competing technologies requires understanding each technology's channel plan.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>Each technology uses a different channel width and spacing strategy. Wi-Fi uses wide (22 MHz) channels for speed; ZigBee uses narrow (2 MHz) channels for efficiency; Bluetooth hops across 79 x 1 MHz channels to avoid interference adaptively. Understanding these channel plans reveals where conflicts arise and how to mitigate them in deployment.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>A smart home deployment might have Wi-Fi on channels 1, 6, 11; ZigBee on channels 15, 20, 25 (gaps between Wi-Fi); and Bluetooth hopping adaptively. Security engineers must model interference to assess reliability and vulnerability — a jammed ZigBee mesh could disable smart locks and alarms.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <p><strong>Understanding Wi-Fi Channel Overlap:</strong> Wi-Fi 802.11 allocates 22 MHz-wide channels starting at 2412 MHz (Channel 1) and stepping 5 MHz apart. Since 22 > 5, adjacent channels overlap heavily. Channel 1 (2412 MHz) and Channel 2 (2417 MHz) share most of their bandwidth. Only channels 1, 6, and 11 have zero overlap — that's why home routers and enterprise Wi-Fi deployments always use these three. Deploying two access points on channels 1 and 2 in the same space creates "co-channel interference" that halves effective throughput.</p>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Technology</th><th>Channel Width</th><th># Channels</th><th>Range</th><th>Coexistence Mechanism</th></tr></thead>
          <tbody>
            <tr><td><strong>IEEE 802.11 (Wi-Fi)</strong></td><td>22 MHz</td><td>14 (3 non-overlapping)</td><td>2412–2484 MHz</td><td>CSMA/CA (listen before transmit)</td></tr>
            <tr><td><strong>IEEE 802.15.4 (ZigBee)</strong></td><td>2 MHz</td><td>16 (ch 11–26)</td><td>2405–2480 MHz</td><td>CSMA/CA; narrow channels fit between Wi-Fi</td></tr>
            <tr><td><strong>Bluetooth LE</strong></td><td>1 MHz</td><td>40 (ch 0–39)</td><td>2402–2480 MHz</td><td>Adaptive Frequency Hopping (AFH)</td></tr>
            <tr><td><strong>Classic Bluetooth</strong></td><td>1 MHz</td><td>79</td><td>2402–2480 MHz</td><td>FHSS — hops 1600×/second across 79 channels</td></tr>
          </tbody>
        </table>
      </div>

      <div class="analogy"><strong>🎯 Analogy — Radio Traffic at a Busy Intersection:</strong> Imagine the 2.4 GHz band as a busy urban intersection. Wi-Fi trucks take up wide lanes (22 MHz) and must wait for clearance (CSMA/CA). ZigBee motorcycles fit in the small gaps between trucks (2 MHz channels). Bluetooth cars hop between lanes 1600 times a second to avoid collisions (FHSS). All must share the same intersection without a traffic officer — hence the importance of coexistence mechanisms.</div>

      <div class="warn-box"><strong>⚠️ Security Concern — Selective Jamming:</strong> Because Bluetooth LE advertising occurs on only 3 fixed channels (37, 38, 39), a targeted jammer that only disrupts those three specific frequencies can prevent ALL Bluetooth LE devices from advertising and connecting, without disrupting Wi-Fi. This selective jamming is much harder to perform against classic Bluetooth, which hops across all 79 channels — illustrating a security trade-off between efficiency (BLE fixed advertising channels) and resilience (classic BT hopping).</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — 2.4 GHz ISM Band</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>In the 2.4 GHz IEEE 802.11 channel plan, which set of channels are non-overlapping and therefore recommended for multi-AP deployments?</p>
    <p>A) Channels 1, 2, 3 &nbsp; B) Channels 1, 6, 11 &nbsp; C) Channels 6, 9, 12 &nbsp; D) Channels 1, 7, 14</p>
    <div class="q-answer"><strong>✔ Answer: B) Channels 1, 6, 11.</strong> Since each Wi-Fi channel is 22 MHz wide and they step every 5 MHz, channels separated by 5 steps (25 MHz) have no frequency overlap. Channels 1 (2412 MHz), 6 (2437 MHz), and 11 (2462 MHz) are exactly 25 MHz apart, creating three non-overlapping channels in the 2.4 GHz band.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>Classic Bluetooth and Bluetooth LE use the same number of channels in the 2.4 GHz band.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> Classic Bluetooth uses 79 channels (1 MHz each, 2402–2480 MHz). Bluetooth LE uses 40 channels (1 MHz each, 2402–2480 MHz) — 37 data channels and 3 advertising channels (37, 38, 39). BLE's reduced channel count enables simpler, lower-power hardware.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>Why does ZigBee (IEEE 802.15.4) using 2 MHz channels coexist better with Wi-Fi than classic Bluetooth's 1 MHz channels, despite ZigBee's channels being wider?</p>
    <div class="q-answer"><strong>✔ Answer:</strong> ZigBee's channel plan is <strong>static and carefully positioned</strong> relative to Wi-Fi channels. ZigBee channels 15, 20, 25, and 26 fall in the spectral gaps between Wi-Fi channels 1, 6, and 11, minimizing overlap by design. Classic Bluetooth hops across ALL 79 channels including those used by Wi-Fi, creating frequent overlaps — however, Bluetooth compensates with FHSS and Adaptive Frequency Hopping (AFH) to avoid busy channels dynamically. ZigBee avoids the problem by static placement; Bluetooth avoids it dynamically. Both approaches work, just differently.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>Bluetooth LE reserves ________ special channels for advertising (device discovery), while the remaining ________ channels are used for data communication.</p>
    <div class="q-answer"><strong>✔ Answer: 3 advertising channels (37, 38, 39); 37 data channels.</strong> The 3 fixed advertising channels are specifically chosen to fall in the spectral gaps between Wi-Fi channels 1, 6, and 11, minimizing interference during the critical device discovery phase.</div>
  </div>
</div>

<div class="topic-header" id="t4">
  <span class="topic-num">SLIDE 5</span>
  <h2>Cellular Networks — 1G through 5G</h2>
  <span class="topic-sub">Evolution of generations · Security improvements</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDE 5</span>
    <span class="slide-title">Cellular Networks (1G, 2G, 3G, 4G, and 5G)</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>1G (1980s):</strong> Analog voice only. No security. Calls could be monitored with a radio scanner.</li>
        <li><strong>2G (1991, GSM):</strong> Digital voice + SMS. First encryption. Uses TDMA (Time Division Multiple Access). Substandard: GPRS, EDGE.</li>
        <li><strong>3G (1998, UMTS):</strong> Mobile internet. Uses CDMA. Substands: HSPA. First mutual authentication between phone and network.</li>
        <li><strong>4G (2008, LTE):</strong> All-IP. Uses OFDM. High-speed data. Strong AES-based encryption. LTE-A for Advanced.</li>
        <li><strong>5G (2020+):</strong> Massive capacity, ultra-low latency, M2M (IoT), mmWave frequencies, Massive MIMO. Enhanced privacy (IMSI concealment).</li>
        <li>Each generation trend: increasing data rates, decreasing latency, increasing spectral efficiency, more security features, lower device battery life.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Each cellular generation was driven by new application demands: 2G for digital voice quality; 3G for mobile web browsing; 4G for video streaming; 5G for autonomous vehicles, smart cities, and IoT at massive scale (billions of simultaneous connections). Security improvements followed as previous generations' weaknesses were exploited.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>Each generation changes the multiple access technology (how multiple users share the spectrum): TDMA → CDMA → OFDMA. Each change increases spectral efficiency. Security layers are added or strengthened: encryption keys grow longer, mutual authentication is added, IMSI (subscriber identity) is protected from exposure.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>A progression from insecure analog voice (1G) to a secure, high-speed, all-IP network (5G) capable of supporting billions of IoT devices with machine-speed latency. Each generation is backward-compatible enough for devices to fall back to older, less secure generations — a persistent security weakness.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Generation</th><th>Year</th><th>Multiple Access</th><th>Max Speed</th><th>Key Security Feature</th><th>Key Weakness</th></tr></thead>
          <tbody>
            <tr><td><strong>1G</strong></td><td>1980s</td><td>FDMA (Analog)</td><td>~2.4 Kbps</td><td>None</td><td>Calls interceptable with scanner</td></tr>
            <tr><td><strong>2G (GSM)</strong></td><td>1991</td><td>TDMA</td><td>~384 Kbps</td><td>A5/1 encryption (weak)</td><td>One-way auth only; IMSI exposed; SS7 vulnerabilities</td></tr>
            <tr><td><strong>3G (UMTS)</strong></td><td>2001</td><td>CDMA (W-CDMA)</td><td>~21 Mbps</td><td>Mutual authentication (AKA); KASUMI cipher</td><td>IMSI still exposed; fake base station attacks</td></tr>
            <tr><td><strong>4G (LTE)</strong></td><td>2009</td><td>OFDMA (downlink) / SC-FDMA (uplink)</td><td>~300 Mbps</td><td>AES-based encryption; EPS-AKA; IPsec backhaul</td><td>IMSI sent in plaintext on attach (fixed in 5G)</td></tr>
            <tr><td><strong>5G (NR)</strong></td><td>2019+</td><td>OFDMA + Massive MIMO</td><td>~20 Gbps</td><td>SUPI/SUCI — IMSI encrypted using HSS public key; EAP-TLS support</td><td>Downgrade attacks; mmWave range limits</td></tr>
          </tbody>
        </table>
      </div>

      <div class="analogy"><strong>🎯 Analogy — Hotel Security Through the Decades:</strong> 1G was a hotel where guests shouted their names and room numbers through a megaphone. 2G added a lock on the door but used a key everyone could copy. 3G introduced two-way ID verification (guest proves identity to hotel AND hotel proves it's the real hotel). 4G is like a modern security card with encryption. 5G hides even the guest's identity (IMSI) so nobody in the lobby knows who's checking in.</div>

      <div class="warn-box"><strong>⚠️ Downgrade Attack — A Persistent Threat:</strong> Because devices support multiple generations for backward compatibility, attackers using "IMSI catchers" (fake base stations) can force phones to downgrade from 5G to 2G or 3G, where weaker security applies. This is a fundamental tension between compatibility and security that persists across all cellular generations.</div>

      <p><strong>4G vs. 5G Security for IoT:</strong> From the lecture's later slides, 4G security is covered in detail — the AKA (Authentication and Key Agreement) protocol uses a pre-shared key (Ki) stored in the SIM to derive session keys. 5G extends this by using the HSS's public key to encrypt the IMSI during initial attachment, preventing eavesdroppers from learning device identities. For the exam, understand that 4G sends IMSI/GUTI in plaintext → 5G encrypts IMSI using ECC public key.</p>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — Cellular Networks</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>Which cellular generation first introduced mutual authentication between the mobile device and the network?</p>
    <p>A) 1G &nbsp; B) 2G (GSM) &nbsp; C) 3G (UMTS) &nbsp; D) 4G (LTE)</p>
    <div class="q-answer"><strong>✔ Answer: C) 3G (UMTS).</strong> 2G (GSM) only authenticates the subscriber to the network, not the network to the subscriber — enabling IMSI catcher (fake base station) attacks. 3G introduced mutual authentication via the AKA protocol, where the network also proves its identity to the UE. However, IMSI was still exposed in plaintext, which was only fixed in 5G.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>4G LTE uses OFDMA (Orthogonal Frequency Division Multiple Access) for both uplink and downlink to conserve device battery life.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> 4G LTE uses OFDMA for the <strong>downlink</strong> (base station to device) but uses SC-FDMA (Single-Carrier FDMA) for the <strong>uplink</strong> (device to base station). SC-FDMA has a lower Peak-to-Average Power Ratio (PAPR) than OFDMA, which means the device's power amplifier operates more efficiently — directly conserving battery power.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>What specific security improvement does 5G make over 4G regarding subscriber identity, and why does it matter for IoT security?</p>
    <div class="q-answer"><strong>✔ Answer:</strong> 5G introduces <strong>SUCI (Subscription Concealed Identifier)</strong> — the IMSI is encrypted using the Home Network's public key (ECC-based) before being transmitted. In 4G, the IMSI (permanent subscriber ID) is sent in plaintext on initial attach, allowing passive eavesdroppers to track device identities and locations. For IoT, this matters because IoT devices are often deployed in hostile environments (traffic sensors, smart meters) where tracking their identity would reveal sensitive operational information about infrastructure.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>Each new cellular generation shows the trend of increasing ________, decreasing ________, increasing spectral efficiency, more security features, and lower device battery life.</p>
    <div class="q-answer"><strong>✔ Answer: data rates; latency.</strong> As stated directly in the slide: "increasing data rates, decreasing latency, increasing spectral efficiency, more security features, lower device battery life." Each generation sacrifices something (battery life, device complexity) to gain something (speed, latency, capacity).</div>
  </div>
</div>

<div class="topic-header" id="t5">
  <span class="topic-num">SLIDE 6</span>
  <h2>4G LTE — Long Term Evolution</h2>
  <span class="topic-sub">Specifications · OFDMA downlink · SC-FDMA uplink</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDE 6</span>
    <span class="slide-title">4G LTE (Long Term Evolution)</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>Frequency bands (North America):</strong> 700, 800, 1900, 1700/2100 (AWS), and 2600 MHz.</li>
        <li><strong>Range:</strong> Scalable from tens of meters (small cells) up to 100 km (62 miles) radius for macro cells.</li>
        <li><strong>Speed:</strong> Download up to 299.6 Mbps; Upload up to 75.4 Mbps (theoretical peak).</li>
        <li><strong>Downlink: OFDMA</strong> — multiple users share subcarriers simultaneously.</li>
        <li><strong>Uplink: SC-FDMA</strong> — single carrier to reduce device power consumption (lower PAPR).</li>
        <li>All-IP architecture — voice is VoLTE (Voice over LTE), not circuit-switched.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>3G could not handle the explosion of smartphone data demands (video streaming, cloud apps). LTE was designed from scratch as an all-IP, high-efficiency system capable of delivering broadband speeds to mobile users. It also needed to support IoT — leading to LTE-M and NB-IoT extensions.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>LTE uses OFDMA on the downlink — the base station simultaneously transmits to multiple users on different subcarriers. The uplink uses SC-FDMA (a variant of OFDM) because mobile devices have tight power budgets; SC-FDMA's lower PAPR means device amplifiers are more efficient. Multiple frequency bands enable operation in different national spectrum allocations.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>A mobile network delivering smartphone-class speeds with reliable coverage across urban, suburban, and rural areas. LTE became the global standard. Its cellular infrastructure is now being reused by NB-IoT (narrowband IoT) devices, providing IoT connectivity at a fraction of the cost of building new infrastructure.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <p><strong>Why Asymmetric Access (OFDMA down, SC-FDMA up)?</strong> This asymmetry reflects the power reality of mobile devices. A base station has unlimited power from the grid; it can afford the complex amplifiers needed for OFDMA's high PAPR (Peak-to-Average Power Ratio). A smartphone's power amplifier must be efficient to preserve battery — SC-FDMA's constant envelope (lower PAPR) is much gentler on battery life. This design choice is directly aligned with the IoT requirement of maximizing battery life.</p>

      <div class="analogy"><strong>🎯 Analogy — OFDMA as a Shared Office Space:</strong> Think of the LTE downlink as an office building. OFDMA is like hot-desking — many workers (users) share the open-plan office (subcarriers), each sitting at whichever desk (subcarrier) is available. The building manager (base station) coordinates who sits where and for how long. No worker wastes time searching for a desk; the manager optimizes seating. The uplink (SC-FDMA) is like each worker having their own dedicated phone line when calling in — simpler, more predictable, and energy-efficient for the caller.</div>

      <p><strong>LTE Frequency Bands — Why Multiple Bands?</strong> The 700 MHz band (used for broadcast TV in the US until digital switchover) penetrates buildings extremely well and covers vast areas — ideal for rural coverage. The 1900/2100 MHz AWS band provides capacity in dense urban areas with small cells. The 2600 MHz band is used for high-capacity urban hotspots. Devices support multiple bands to work everywhere — a phone might switch from 700 MHz outdoors (good building penetration but lower speed) to 2600 MHz indoors (higher speed, shorter range).</p>

      <div class="info-box"><strong>💡 LTE as the IoT Backbone:</strong> NB-IoT (Narrowband IoT) literally repurposes one LTE resource block (180 kHz) from existing LTE spectrum. This means IoT devices can use the vast existing LTE infrastructure without carriers needing to deploy new towers — reducing IoT deployment cost dramatically while inheriting LTE's mature security framework.</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — 4G LTE</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>Why does 4G LTE use SC-FDMA for the uplink rather than OFDMA like the downlink?</p>
    <p>A) SC-FDMA provides higher data rates than OFDMA &nbsp; B) SC-FDMA has lower Peak-to-Average Power Ratio, conserving device battery &nbsp; C) SC-FDMA requires less spectrum than OFDMA &nbsp; D) Base stations cannot decode OFDMA signals from mobile devices</p>
    <div class="q-answer"><strong>✔ Answer: B) SC-FDMA has lower Peak-to-Average Power Ratio, conserving device battery.</strong> OFDMA's multi-carrier nature creates high power peaks that require expensive, inefficient power amplifiers. SC-FDMA preserves the spectral efficiency of OFDMA while using a single-carrier waveform at any given time, dramatically reducing PAPR and enabling power-efficient device transmitters.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>4G LTE supports cell radii of only a few hundred meters and cannot provide rural coverage.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> 4G LTE supports cell sizes "from tens of meters radius up to 100 KM (62 miles) radius." Low-frequency bands (700 MHz) provide rural coverage in very large cells. High-frequency bands (2600 MHz) serve dense urban areas with small cells for capacity. This scalability is by design.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>4G LTE uses ________ for the downlink (base station to device) and ________ for the uplink (device to base station) to conserve mobile device battery life.</p>
    <div class="q-answer"><strong>✔ Answer: OFDMA (Orthogonal Frequency-Division Multiple Access); SC-FDMA (Single-Carrier Frequency-Division Multiple Access).</strong></div>
  </div>
</div>
