<div class="topic-header" id="t6">
  <span class="topic-num">SLIDES 7–9</span>
  <h2>5G, OFDM, and MIMO</h2>
  <span class="topic-sub">5G enabling techniques · Subcarrier multiplexing · Multi-antenna benefits</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDES 7–9</span>
    <span class="slide-title">5G Techniques · OFDM · MIMO</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>5G enabling techniques:</strong> Massive MIMO, Machine-to-Machine (IoT), Cognitive Radio, Wireless Network Virtualization, Millimeter-wave (up to 90 GHz).</li>
        <li><strong>OFDM idea:</strong> Split one high-speed data stream into N parallel lower-speed streams, each on a separate orthogonal subcarrier. Result: higher aggregate data rate + resistance to multipath fading.</li>
        <li><strong>MIMO benefit 1 — Channel Diversity:</strong> Multiple paths between Tx and Rx antennas → less chance all paths fade simultaneously.</li>
        <li><strong>MIMO benefit 2 — Spatial Division:</strong> Multiple antennas allow directing separate data streams to different users simultaneously (spatial multiplexing).</li>
        <li><strong>Massive MIMO:</strong> Hundreds of antennas at the base station; simultaneously serves many users with focused beams → huge capacity gains.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>5G must simultaneously serve autonomous vehicles (ultra-low latency), IoT sensors (massive scale, tiny data), and streaming (ultra-high bandwidth). No single technique delivers all three. OFDM provides flexible bandwidth allocation; MIMO multiplies capacity without using more spectrum; millimeter waves provide the raw bandwidth needed for Gbps speeds.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>OFDM: Divide a 20 MHz channel into 52 subcarriers of ~312 kHz each. Each subcarrier carries one constellation point (BPSK/QPSK/16QAM/64QAM) per OFDM symbol. Orthogonality ensures subcarriers don't interfere. MIMO: Use beamforming at the base station to direct focused RF "beams" at specific users, increasing signal strength while reducing interference to other users.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>5G delivers: latency as low as 1ms (for autonomous vehicle control), connectivity for 1 million devices/km² (for IoT), and peak data rates of 20 Gbps (for video/cloud). These simultaneously conflicting requirements are met by mixing OFDM, Massive MIMO, mmWave, and network slicing in different configurations for different use cases.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <div class="analogy"><strong>🎯 Analogy — OFDM as a Symphony Orchestra:</strong> Traditional single-carrier transmission is like one musician playing a very fast melody solo — any mistake (interference) destroys the whole piece. OFDM is like a symphony orchestra — 52 musicians (subcarriers) each play a slow, simple part simultaneously. If one musician is drowned out (faded subcarrier), the other 51 still play. The conductor (base station) assigns each musician's sheet music (data bits). The audience (receiver) hears the whole symphony even if it can't quite hear the violinists in the back row.</div>

      <p><strong>OFDM Orthogonality — The Key Property:</strong> In 802.11a, there are 52 subcarriers spaced 312.5 kHz apart. The "orthogonal" property means that at the peak of one subcarrier's frequency response, all other subcarriers are at exactly zero. This eliminates inter-carrier interference mathematically, enabling the subcarriers to be packed much more tightly than traditional FDM (Frequency Division Multiplexing) would allow. This is why OFDM is so spectrally efficient.</p>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Antenna Configuration</th><th>Name</th><th>Benefit</th><th>Example</th></tr></thead>
          <tbody>
            <tr><td>1 Tx → 1 Rx</td><td>SISO</td><td>Baseline, no diversity</td><td>1G, 2G</td></tr>
            <tr><td>1 Tx → Multiple Rx</td><td>SIMO</td><td>Receive diversity only</td><td>Basic LTE uplink</td></tr>
            <tr><td>Multiple Tx → 1 Rx</td><td>MISO</td><td>Transmit diversity (beamforming)</td><td>LTE DL with single antenna UE</td></tr>
            <tr><td>Multiple Tx → Multiple Rx</td><td>MIMO</td><td>Spatial multiplexing + diversity</td><td>LTE-A, Wi-Fi 5/6, 5G</td></tr>
            <tr><td>Hundreds of Tx → Many Rx</td><td>Massive MIMO</td><td>Serve many users simultaneously</td><td>5G NR base stations</td></tr>
          </tbody>
        </table>
      </div>

      <div class="warn-box"><strong>⚠️ Security Implication — Millimeter Wave (mmWave) Vulnerability:</strong> 5G mmWave (24–100 GHz) offers Gbps speeds but has extremely short range and is blocked by walls, trees, and even rain. This physical limitation means mmWave cells are densely deployed and difficult to use for eavesdropping at distance (attacker must be very close). However, the high density of small cells creates more attack surface — many more cell sites that could be physically compromised compared to traditional macro cells.</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — 5G, OFDM, MIMO</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>What is the fundamental idea behind OFDM (Orthogonal Frequency Division Multiplexing)?</p>
    <p>A) Transmit all data on a single high-frequency carrier for maximum efficiency &nbsp; B) Split the data stream into N parallel lower-rate streams, each on a separate orthogonal subcarrier &nbsp; C) Frequency hop between channels to avoid interference &nbsp; D) Use multiple antennas to reflect signals around obstacles</p>
    <div class="q-answer"><strong>✔ Answer: B) Split the data stream into N parallel lower-rate streams, each on a separate orthogonal subcarrier.</strong> OFDM converts a high-rate serial data stream into N parallel streams, each on its own subcarrier. The orthogonality property ensures subcarriers don't interfere. This makes the system resilient to multipath fading (narrowband subcarriers experience flat fading, not frequency-selective fading) and enables multiple users to share different subcarriers (OFDMA).</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>Massive MIMO at 5G base stations primarily improves coverage range rather than network capacity.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> Massive MIMO primarily improves <strong>capacity</strong> by simultaneously serving multiple users with spatially separated beams (spatial division). It also improves signal quality for each user (via beamforming gain), which can extend effective range, but capacity multiplication through simultaneous multi-user service is the primary benefit of Massive MIMO in 5G.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>In the IEEE 802.11a OFDM specification, the system uses 52 total subcarriers. How many carry data and what are the other subcarriers used for?</p>
    <div class="q-answer"><strong>✔ Answer:</strong> Of the 52 subcarriers: <strong>48 carry data</strong>; <strong>4 are pilot subcarriers</strong> (always transmitted in BPSK to allow the receiver to estimate channel phase and amplitude at known frequencies); <strong>1 is a DC/null subcarrier</strong> at zero frequency (suppressed to avoid DC offset problems in radio hardware). Pilot subcarriers are essential for coherent demodulation — the receiver uses them as reference points to correct for channel distortions across all 48 data subcarriers.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>MIMO provides two key benefits: ________ (multiple paths reduce the chance of total signal loss) and ________ (separate data streams sent to different users simultaneously).</p>
    <div class="q-answer"><strong>✔ Answer: Channel diversity; Spatial division.</strong> Channel diversity means that with multiple antennas, even if one path fades, others remain viable. Spatial division (spatial multiplexing) means the same frequency band can carry independent data streams to different users simultaneously, multiplying system capacity without additional spectrum.</div>
  </div>
</div>

<div class="topic-header" id="t9">
  <span class="topic-num">SLIDE 10</span>
  <h2>Wi-Fi Standards Evolution</h2>
  <span class="topic-sub">802.11 family · DSSS → OFDM → MIMO-OFDM · Wi-Fi 4/5/6</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDE 10</span>
    <span class="slide-title">Wi-Fi Standards Table</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>802.11 (1997):</strong> 2.4 GHz, 22 MHz BW, 1-2 Mbps, DSSS/FHSS. The original Wi-Fi.</li>
        <li><strong>802.11a (1999):</strong> 5 GHz, 20 MHz BW, up to 54 Mbps, OFDM. First OFDM Wi-Fi.</li>
        <li><strong>802.11g (2003):</strong> 2.4 GHz, 20 MHz BW, up to 54 Mbps, OFDM. Brought OFDM speed to 2.4 GHz.</li>
        <li><strong>802.11n (2009) = Wi-Fi 4:</strong> 2.4 and 5 GHz, up to 150 MHz BW (with bonding), MIMO-OFDM, 4 streams. Up to 72–600 Mbps.</li>
        <li><strong>802.11ac (2013) = Wi-Fi 5:</strong> 5 GHz only, up to 160 MHz BW, MIMO-OFDM, 8 streams, 64QAM. Up to 7 Gbps theoretical.</li>
        <li><strong>802.11ax (2021) = Wi-Fi 6:</strong> 2.4 AND 5 GHz, 37% higher than ac, OFDMA for multi-user efficiency (not just OFDM).</li>
      </ul>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Standard</th><th>Wi-Fi Name</th><th>Year</th><th>Band (GHz)</th><th>BW (MHz)</th><th>PHY Technique</th><th>Peak Rate</th></tr></thead>
          <tbody>
            <tr><td>802.11</td><td>—</td><td>1997</td><td>2.4</td><td>22</td><td>DSSS, FHSS</td><td>1–2 Mbps</td></tr>
            <tr><td>802.11a</td><td>—</td><td>1999</td><td>5</td><td>20</td><td>OFDM</td><td>6–54 Mbps</td></tr>
            <tr><td>802.11g</td><td>—</td><td>2003</td><td>2.4</td><td>20</td><td>OFDM</td><td>6–54 Mbps</td></tr>
            <tr><td>802.11n</td><td><strong>Wi-Fi 4</strong></td><td>2009</td><td>2.4 / 5</td><td>20, 40</td><td>MIMO-OFDM, 4 streams</td><td>72–600 Mbps</td></tr>
            <tr><td>802.11ac</td><td><strong>Wi-Fi 5</strong></td><td>2013</td><td>5</td><td>20/40/80/160</td><td>MIMO-OFDM, 8 streams</td><td>up to 7 Gbps</td></tr>
            <tr><td>802.11ax</td><td><strong>Wi-Fi 6</strong></td><td>2021</td><td>2.4 / 5</td><td>20/40/80/160</td><td>OFDMA (multi-user)</td><td>37% > ac (~9.6 Gbps)</td></tr>
          </tbody>
        </table>
      </div>

      <p><strong>Key Evolution Milestone — From OFDM to OFDMA:</strong> Wi-Fi 4 and Wi-Fi 5 use OFDM — one user occupies all subcarriers at a time. Wi-Fi 6 introduces OFDMA — multiple users share subcarriers simultaneously (like LTE's approach). This is revolutionary for IoT-heavy environments: instead of each IoT sensor waiting its turn to transmit (OFDM), Wi-Fi 6 can simultaneously serve dozens of IoT sensors in one transmission opportunity (OFDMA). This dramatically reduces latency and improves efficiency in dense deployments.</p>

      <div class="analogy"><strong>🎯 Analogy — Wi-Fi 5 vs. Wi-Fi 6 in a Coffee Shop:</strong> Wi-Fi 5 (OFDM): The barista takes one giant order from one customer at a time and makes everything for that person before taking the next order. Fast for large orders, but small orders (IoT devices sending 10 bytes) block the queue for everyone. Wi-Fi 6 (OFDMA): The barista takes multiple small orders simultaneously, grouping similar drinks to serve many customers at once. IoT devices get served in the gaps between smartphone users' large transmissions.</div>

      <div class="info-box"><strong>💡 Security Implication — Wi-Fi Security Standards Parallel:</strong> While physical layer evolved (DSSS → OFDM → MIMO-OFDM → OFDMA), the security layer evolved separately: WEP (broken) → WPA → WPA2 → WPA3. These are independent axes. A device can use 802.11ax (Wi-Fi 6) physical layer with WPA3 security — the physical and security layers are independent stacks.</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — Wi-Fi Standards</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>What is the key PHY-layer advancement that distinguishes Wi-Fi 6 (802.11ax) from Wi-Fi 5 (802.11ac)?</p>
    <p>A) Moving from 2.4 GHz to 5 GHz band &nbsp; B) Introduction of OFDMA for multi-user simultaneous transmission &nbsp; C) Addition of MIMO (multiple antennas) &nbsp; D) Increasing maximum channel width from 80 to 160 MHz</p>
    <div class="q-answer"><strong>✔ Answer: B) Introduction of OFDMA for multi-user simultaneous transmission.</strong> Wi-Fi 5 uses OFDM (one user at a time, all subcarriers). Wi-Fi 6 adds OFDMA — multiple users simultaneously share subcarriers, dramatically improving efficiency in dense IoT environments. Both standards support 160 MHz channels; both use MIMO; 802.11n (Wi-Fi 4) first added MIMO.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>IEEE 802.11ac (Wi-Fi 5) operates in both the 2.4 GHz and 5 GHz bands.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> 802.11ac (Wi-Fi 5) operates exclusively in the <strong>5 GHz band</strong>. This was a deliberate choice to avoid the crowded 2.4 GHz band. 802.11ax (Wi-Fi 6) returned to dual-band operation (both 2.4 GHz and 5 GHz). This is why "Wi-Fi 5 only" routers cannot help with 2.4 GHz congestion issues.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>IEEE 802.11n is marketed as ________, 802.11ac as ________, and 802.11ax as ________.</p>
    <div class="q-answer"><strong>✔ Answer: Wi-Fi 4; Wi-Fi 5; Wi-Fi 6.</strong> The Wi-Fi Alliance introduced simplified naming in 2018 to help consumers understand generational progression. This naming system was retroactively applied to 802.11n (Wi-Fi 4) and 802.11ac (Wi-Fi 5), and applied forward to 802.11ax (Wi-Fi 6).</div>
  </div>
</div>

<div class="topic-header" id="t10">
  <span class="topic-num">SLIDES 12–13</span>
  <h2>Bluetooth</h2>
  <span class="topic-sub">Overview · PHY/MAC · Piconet architecture · FHSS</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDES 12–13</span>
    <span class="slide-title">Bluetooth Overview and Basics</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li>Designed as a <strong>wire-replacement</strong> protocol (replace cables between nearby devices).</li>
        <li>Creates PANs (Personal Area Networks) with certain security levels.</li>
        <li>Master-slave piconet: one master, up to <strong>7 active slaves</strong>; slaves cannot communicate directly with each other.</li>
        <li><strong>PHY: FHSS</strong> (Frequency Hopping Spread Spectrum) — hops 1,600 times/second across 79 channels (2402–2480 MHz).</li>
        <li><strong>Speed:</strong> Up to 1 Mbps (Classic Bluetooth); BLE optimized for low power, not raw speed.</li>
        <li><strong>Range:</strong> 10 to 100 meters depending on class.</li>
        <li><strong>MAC: TDD</strong> (Time-Division Duplexing) — master and slave alternate transmission slots.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>In the late 1990s, devices like phones, headsets, printers, and keyboards were connected by a tangle of proprietary cables. Bluetooth was created to eliminate these cables and replace them with a universal short-range wireless link. This "cable replacement" philosophy explains why Bluetooth prioritizes simplicity and low power over raw throughput.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>Bluetooth uses FHSS to hop across 79 frequencies in a pseudo-random sequence known to both master and slave. This makes Bluetooth resilient to narrowband interference — if the current hopping frequency is jammed, the next hop moves to a different channel. The master controls the piconet timing and hop sequence; slaves synchronize to the master's clock.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Billions of Bluetooth devices coexist in the 2.4 GHz band because each piconet uses a different pseudo-random hopping sequence, and Adaptive Frequency Hopping (AFH) allows piconets to avoid channels occupied by Wi-Fi. The piconet's 7-slave limit keeps the network simple and controllable within the timing constraints of FHSS.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <p><strong>FHSS — How Bluetooth Avoids Interference:</strong> Classic Bluetooth hops 1,600 times per second across 79 channels. At each hop, master and slave switch to the next frequency in the pseudo-random sequence simultaneously. An eavesdropper must know the hopping sequence to follow the conversation — since the sequence is derived from the master's device address and clock, it's not secret but is unique per piconet. More importantly, Adaptive Frequency Hopping (AFH) allows Bluetooth to detect which channels are occupied by Wi-Fi and exclude them from the hopping sequence — this was a major compatibility improvement added to Bluetooth 1.2.</p>

      <div class="analogy"><strong>🎯 Analogy — Bluetooth as a Secret Dance Partner:</strong> Imagine master and slave are dance partners who have agreed on a secret choreography in advance (the hopping sequence). They switch positions (frequencies) together 1,600 times per second. An observer in the room (eavesdropper) can't follow the conversation because by the time they find the right channel, the dancers have already moved. Other pairs of dancers use their own private choreographies and don't interfere with each other.</div>

      <p><strong>Security Consideration — Bluetooth Vulnerabilities:</strong> Despite FHSS providing some security through obscurity, Bluetooth has had significant vulnerabilities: BlueBorne (2017) allowed remote code execution without pairing; KNOB attack (2019) reduced session key entropy to allow brute force; BLURtooth (2020) allowed key overwrite attacks. The pairing process (establishing a shared key) is a critical security moment — "Just Works" pairing provides no authentication. For security-sensitive IoT applications, Numeric Comparison or Passkey Entry pairing should be used.</p>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Parameter</th><th>Classic Bluetooth</th><th>Bluetooth LE (BLE)</th></tr></thead>
          <tbody>
            <tr><td>Modulation</td><td>FHSS (79 channels)</td><td>FHSS (40 channels, AFH on 37 data channels)</td></tr>
            <tr><td>Frequency</td><td>2.4–2.48 GHz</td><td>2.402–2.480 GHz</td></tr>
            <tr><td>Channel Width</td><td>1 MHz</td><td>1 MHz (2 MHz for BLE 5)</td></tr>
            <tr><td>Peak Data Rate</td><td>1–3 Mbps (EDR)</td><td>1–2 Mbps (LE 1M, LE 2M PHY)</td></tr>
            <tr><td>Range</td><td>10–100 m</td><td>10–400 m (LE Long Range)</td></tr>
            <tr><td>Power Consumption</td><td>Medium (30–100 mA)</td><td>Ultra-low (1–15 mA peak)</td></tr>
            <tr><td>Typical IoT use</td><td>Audio (headsets), file transfer</td><td>Sensors, beacons, health monitors</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — Bluetooth</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>In a Bluetooth piconet, what is the maximum number of active slave devices that can communicate with the master?</p>
    <p>A) 3 &nbsp; B) 7 &nbsp; C) 15 &nbsp; D) 255</p>
    <div class="q-answer"><strong>✔ Answer: B) 7 active slaves.</strong> The Bluetooth piconet supports 1 master and up to 7 active slaves. Additional devices can exist in a "parked" state (synchronized but not actively communicating). Slaves communicate only with the master — direct slave-to-slave communication is not supported in classic Bluetooth.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>Classic Bluetooth uses OFDM (Orthogonal Frequency Division Multiplexing) as its physical layer modulation technique.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> Classic Bluetooth uses <strong>FHSS (Frequency Hopping Spread Spectrum)</strong>, not OFDM. Bluetooth hops across 79 channels at 1,600 hops/second. OFDM is used by Wi-Fi (802.11a/g/n/ac/ax) and LTE. Bluetooth's FHSS provides interference resilience through frequency hopping rather than subcarrier orthogonality.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>Why does Classic Bluetooth use FHSS instead of a fixed frequency, and what security benefit does this provide?</p>
    <div class="q-answer"><strong>✔ Answer:</strong> FHSS provides: (1) <strong>Interference resilience</strong> — if one hopping channel is jammed, the next hop moves to a different frequency; (2) <strong>Coexistence</strong> — multiple piconets use different pseudo-random sequences, preventing mutual interference; (3) <strong>Limited eavesdropping resistance</strong> — an observer must know the hopping sequence to follow the conversation. However, FHSS is NOT strong cryptographic security — it provides "security through obscurity." Real Bluetooth security relies on the AES-128 based E0 encryption cipher applied at the link layer, with FHSS providing physical-layer resilience and coexistence benefits.</div>
  </div>
</div>

<div class="topic-header" id="t11">
  <span class="topic-num">SLIDES 14–16</span>
  <h2>ZigBee (IEEE 802.15.4)</h2>
  <span class="topic-sub">IoT mesh networking · PHY · MAC · Frequency bands</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDES 14–16</span>
    <span class="slide-title">ZigBee Overview, Basics, and PHY</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>Standard:</strong> IEEE 802.15.4 (PHY and MAC); ZigBee Alliance adds upper layers.</li>
        <li><strong>Frequency bands:</strong> 2.45 GHz (16 channels, global), 915 MHz (10 channels, North America), 868 MHz (1 channel, Europe).</li>
        <li><strong>PHY Modulation:</strong> DSSS (Direct Sequence Spread Spectrum).</li>
        <li><strong>MAC:</strong> CSMA/CA — same approach as Wi-Fi ("listen before transmit").</li>
        <li><strong>Speed:</strong> Up to 250 Kbps at 2.4 GHz; 40 Kbps at 915 MHz; 20 Kbps at 868 MHz.</li>
        <li><strong>Range:</strong> 10–75 meters line-of-sight; extended via mesh networking.</li>
        <li><strong>Key design goals:</strong> Low data rate, <strong>long battery life</strong>, mesh topology for extended range.</li>
        <li><strong>Applications:</strong> Home Automation, Smart Energy, Health Care.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>ZigBee was designed for IoT sensor networks where devices transmit tiny amounts of data (temperature reading, on/off status, door open/close) very infrequently. These devices need years of battery life and must form self-healing mesh networks to cover large areas cheaply. Wi-Fi and Bluetooth were both over-engineered (too power-hungry) for this use case.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>DSSS spreads each bit across a much wider bandwidth using a spreading code. This provides noise resistance without frequency hopping. Devices form mesh networks — each device can relay messages for its neighbors, extending coverage far beyond the direct radio range. The 802.15.4 PHY and MAC are standardized; ZigBee adds a network layer, security layer, and application profiles on top.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>ZigBee smart home networks covering entire houses with sensors and actuators, all running on AA batteries for years. A single ZigBee coordinator can manage hundreds of end devices. The mesh topology means removing or adding devices doesn't break the network — it heals around failures automatically.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <p><strong>DSSS — Making Signals Noise-Resistant:</strong> Direct Sequence Spread Spectrum multiplies each data bit by a pseudo-random "chipping code" of length N (called the spreading factor). If a bit is "1", it becomes N chips; if "0", it becomes -N chips. The result is a signal that occupies N times more bandwidth than needed. This apparent waste is justified by the processing gain: at the receiver, correlating with the same code extracts the signal while averaging out noise and interference. An unintended receiver seeing the DSSS signal without knowing the code sees only noise — providing inherent confidentiality and interference rejection.</p>

      <div class="analogy"><strong>🎯 Analogy — DSSS as Whispering in a Noisy Room:</strong> Instead of shouting your message (high power, narrow frequency), DSSS is like whispering the same message in 100 different ways simultaneously, with the recipient knowing exactly which 100 patterns to listen for. Even if background noise drowns out most of the whispers, the recipient can reconstruct the original message by combining all 100 partial detections. An eavesdropper only hears unintelligible noise because they don't know the pattern.</div>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Band</th><th>Region</th><th>Channels</th><th>Data Rate</th><th>Advantage</th></tr></thead>
          <tbody>
            <tr><td>868 MHz</td><td>EU</td><td>1 (Channel 0)</td><td>20 Kbps</td><td>Longer range, good penetration</td></tr>
            <tr><td>915 MHz</td><td>North America</td><td>10 (Ch 1–10)</td><td>40 Kbps</td><td>Better range/throughput balance</td></tr>
            <tr><td>2.45 GHz</td><td>Worldwide</td><td>16 (Ch 11–26)</td><td>250 Kbps</td><td>Highest speed, global availability</td></tr>
          </tbody>
        </table>
      </div>

      <div class="warn-box"><strong>⚠️ ZigBee Security Vulnerabilities:</strong> ZigBee security is based on AES-128. However, real-world deployments have suffered from: (1) Default or hardcoded network keys during pairing ("touchlink commissioning" vulnerability — KillerBee attack); (2) Frame injection attacks in early ZigBee implementations; (3) Replay attacks if sequence number validation is not implemented correctly. The mesh topology also creates attack surface — a compromised router node can intercept traffic from all its children. Security engineers must enforce unique installation codes for each device and disable insecure commissioning modes.</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — ZigBee</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>ZigBee's MAC layer uses which channel access mechanism?</p>
    <p>A) TDMA (Time Division Multiple Access) &nbsp; B) FHSS (Frequency Hopping) &nbsp; C) CSMA/CA (Carrier Sense Multiple Access / Collision Avoidance) &nbsp; D) FDMA (Frequency Division Multiple Access)</p>
    <div class="q-answer"><strong>✔ Answer: C) CSMA/CA — identical to Wi-Fi.</strong> ZigBee's IEEE 802.15.4 MAC layer uses CSMA/CA: before transmitting, a device senses the channel. If busy, it waits a random backoff time. If clear, it transmits. This is the same "polite" channel access protocol used by Wi-Fi (802.11), making ZigBee a good co-tenant of the 2.4 GHz band alongside Wi-Fi.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>ZigBee devices operating at 2.45 GHz achieve higher data rates than those operating at 868 MHz, but have shorter range.</p>
    <div class="q-answer"><strong>✔ Answer: True.</strong> At 2.45 GHz: 250 Kbps, shorter range (higher frequency = more path loss). At 868 MHz: 20 Kbps, longer range (lower frequency = less path loss, better penetration). This trade-off is fundamental to wireless physics — higher frequency = more bandwidth = higher rate, but also more propagation loss.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>How does ZigBee's mesh topology enhance both range and reliability compared to a star topology, and what security concern does it introduce?</p>
    <div class="q-answer"><strong>✔ Answer:</strong> <strong>Range:</strong> In a mesh, devices relay data for each other — a sensor at 200 meters from the coordinator can reach it through 3 intermediate hops of 75 meters each. <strong>Reliability:</strong> If one router node fails, the mesh automatically reroutes through alternative paths — no single point of failure. <strong>Security concern:</strong> Every router node in the path sees the traffic in plaintext (it must decrypt to route). A compromised router node can: (1) read all traffic from its child nodes; (2) inject forged messages appearing to come from sensor nodes; (3) drop messages (DoS). This requires that ZigBee router nodes be physically secured and that end-to-end application-layer encryption be added in addition to the ZigBee network-layer encryption.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>ZigBee uses ________ (modulation technique) at the PHY layer, which provides noise resistance by spreading each bit across a wider bandwidth using a unique ________.</p>
    <div class="q-answer"><strong>✔ Answer: DSSS (Direct Sequence Spread Spectrum); spreading code (chipping code/signature).</strong> DSSS multiplies each data bit by a spreading code, widening the signal bandwidth and making it look like noise to receivers that don't know the code.</div>
  </div>
</div>

<div class="topic-header" id="t12">
  <span class="topic-num">SLIDE 17</span>
  <h2>Spread Spectrum Techniques</h2>
  <span class="topic-sub">DS vs. FH · Advantages · Hedy Lamarr's contribution</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDE 17</span>
    <span class="slide-title">Spread Spectrum</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>Two basic techniques:</strong> Direct Sequence (DS/DSSS) and Frequency Hopping (FH/FHSS).</li>
        <li><strong>DS (DSSS):</strong> Spread narrowband signal over wider bandwidth using a unique code. Signal looks like noise without the code.</li>
        <li><strong>FH (FHSS):</strong> Change carrier frequency every few symbols using a pseudo-random hopping pattern known to sender and receiver.</li>
        <li><strong>Advantages of spread spectrum:</strong> Increased interference tolerance, low probability of detection/interception, increased capacity.</li>
        <li><strong>Historical note:</strong> Frequency hopping spread spectrum was invented by Hedy Lamarr (actress/inventor, 1913–2000) during WWII to prevent torpedo jamming. Patented 1942, basis for modern FHSS.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Narrowband radios are fragile — a single jammer on the same frequency destroys all communication. Military applications needed radio communications that could not be jammed or intercepted. Spread spectrum was the solution: even if an adversary knows you're transmitting, they cannot easily jam you (signal spread across wide band) or intercept you (appears as noise without the code/hopping pattern).</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p><strong>DSSS:</strong> Data bit is multiplied by a pseudo-random chip sequence (e.g., 11-chip Barker code in 802.11 2 Mbps mode). Output is a wideband signal. Receiver multiplies received signal by same code → data recovered; noise/interference is averaged out. <strong>FHSS:</strong> Transmitter and receiver share a synchronized pseudo-random frequency table. Every few milliseconds, they simultaneously jump to the next frequency in the sequence. Jammers on any single frequency affect only brief moments before the signal hops away.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Spread spectrum enables: (1) <strong>Multiple simultaneous users</strong> in the same band using different codes (CDMA principle — each user has a unique code, all share the same bandwidth); (2) <strong>Jamming resistance</strong> — signal energy spread too thin for narrowband jammers; (3) <strong>Low detectability</strong> — DSSS signals resemble noise floor, making them hard to detect passively. This is why CDMA underlies 3G cellular and why the military uses DSSS for covert communications.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <div class="analogy"><strong>🎯 Historical Context — Hedy Lamarr's Invention:</strong> During World War II, radio-guided torpedoes were vulnerable to jamming — enemies could broadcast on the torpedo's control frequency, sending it off course. Hedy Lamarr (famous as a Hollywood actress, also a self-taught engineer) invented frequency hopping: the torpedo's control signal would hop between 88 piano-keyboard frequencies in a synchronized pattern known only to the transmitter and receiver. A jammer couldn't follow the hops fast enough. The US Navy classified the patent; it was only publicly recognized decades later. Lamarr's invention is the direct ancestor of modern Bluetooth and other FHSS systems.</div>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Property</th><th>DSSS (Direct Sequence)</th><th>FHSS (Frequency Hopping)</th></tr></thead>
          <tbody>
            <tr><td><strong>Mechanism</strong></td><td>Spread signal using code multiplication</td><td>Hop between frequencies pseudo-randomly</td></tr>
            <tr><td><strong>Bandwidth usage</strong></td><td>Wide fixed bandwidth (always)</td><td>Narrow instantaneous; wide aggregate</td></tr>
            <tr><td><strong>Multi-user</strong></td><td>Multiple codes simultaneously (CDMA)</td><td>Different hop sequences (time-shared)</td></tr>
            <tr><td><strong>Jamming resistance</strong></td><td>Processing gain vs. wideband jammers</td><td>Resistant to narrowband jammers</td></tr>
            <tr><td><strong>Implementation</strong></td><td>More complex (DSP intensive)</td><td>Simpler (frequency synthesizer)</td></tr>
            <tr><td><strong>Example</strong></td><td>ZigBee, original Wi-Fi (802.11), CDMA (3G)</td><td>Bluetooth, early Wi-Fi (802.11 FHSS mode)</td></tr>
            <tr><td><strong>Security</strong></td><td>Code-based confidentiality (without code = noise)</td><td>Sequence-based confidentiality</td></tr>
          </tbody>
        </table>
      </div>

      <div class="info-box"><strong>💡 CDMA — Spread Spectrum as a Multiple Access Technology:</strong> 3G cellular (CDMA) took DSSS one step further. Every user in a cell is assigned a unique orthogonal spreading code. All users transmit simultaneously on the same frequency band. At the receiver, correlating with one user's code extracts that user's signal while the other users' signals appear as low-level noise. This is called Code Division Multiple Access — the "C" in CDMA. It's why 3G could serve many more simultaneous users than 2G's TDMA approach.</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — Spread Spectrum</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>Which of the following correctly describes Direct Sequence Spread Spectrum (DSSS)?</p>
    <p>A) The carrier frequency changes rapidly using a pseudo-random hopping pattern &nbsp; B) The narrowband signal is spread over a wider bandwidth by multiplication with a unique code &nbsp; C) Multiple subcarriers are used orthogonally to transmit parallel data streams &nbsp; D) Time slots are allocated to different users on a single carrier frequency</p>
    <div class="q-answer"><strong>✔ Answer: B) The narrowband signal is spread over a wider bandwidth by multiplication with a unique code.</strong> DSSS multiplies each data bit by a high-rate pseudo-random code (chipping sequence), spreading the narrow data signal across a much wider bandwidth. The signal appears as wideband noise to receivers without the code. A) describes FHSS; C) describes OFDM; D) describes TDMA.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>Spread spectrum techniques were originally developed for commercial applications and later adopted by the military.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> Spread spectrum was developed for <strong>military applications</strong> first — specifically to resist jamming and interception. Hedy Lamarr's FHSS patent (1942) was for torpedo control against military jamming. The US military used DSSS in secure communications for decades before it was declassified and adopted commercially (CDMA, Wi-Fi 802.11, ZigBee).</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>List three security advantages of spread spectrum techniques and explain one vulnerability.</p>
    <div class="q-answer"><strong>✔ Answer:</strong> <strong>Advantages:</strong> (1) <strong>Low probability of detection</strong> — DSSS signals appear as noise without the spreading code; hard to detect communication is occurring; (2) <strong>Low probability of interception</strong> — even if detected, the signal is unintelligible without the code (DSSS) or hopping sequence (FHSS); (3) <strong>Increased interference/jamming tolerance</strong> — energy spread thinly across wide band makes narrowband jammers ineffective; processing gain allows recovery from wideband noise. <strong>Vulnerability:</strong> Spreading codes/sequences are often known or discoverable — in ZigBee, the spreading code is standardized (not secret), so it provides interference resistance but NOT confidentiality. Actual security must come from application-layer encryption (AES), not from the spreading code itself.</div>
  </div>
</div>

<div class="topic-header" id="t13">
  <span class="topic-num">SLIDES 18–21</span>
  <h2>Narrowband IoT (NB-IoT)</h2>
  <span class="topic-sub">LPWAN from LTE · Goals · Security features · Design specs</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDES 18–21</span>
    <span class="slide-title">NB-IoT History, LTE Comparison, Goals, and Design</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>NB-IoT</strong> built directly from LTE — reuses LTE infrastructure at minimal cost.</li>
        <li>Standardized by 3GPP. Uses licensed cellular spectrum (not ISM) → guaranteed QoS and no interference from neighbors.</li>
        <li><strong>Security inheritance:</strong> NB-IoT benefits from ALL LTE/cellular security features: user identity confidentiality, entity authentication, confidentiality, data integrity, mobile equipment identification.</li>
        <li><strong>Design goals:</strong> 20 dB better coverage than legacy GPRS (deep indoor); ultra-low device complexity; 10-year battery life (5 Wh); supports ≥52,547 devices per cell sector; ≤10 second exception report latency for 99% of devices.</li>
        <li><strong>Bandwidth:</strong> 180 kHz (one LTE resource block). Vastly narrower than LTE (1.4–20 MHz).</li>
        <li>Can coexist with 2G, 3G, and 4G networks.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>In 2021, 1.5 billion devices connected via cellular. IoT needs billions more — water meters, gas sensors, parking sensors, cattle trackers — that transmit tiny amounts of data infrequently, are battery-powered, and deployed in hard-to-reach places (basements, manholes, deep indoors). Traditional LTE is over-powered, over-priced, and over-complex for these needs.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>NB-IoT is carved from existing LTE spectrum (one 180 kHz resource block). Cellular carriers deploy it with a software update to existing base stations — no new towers. Devices use simplified chipsets (SISO, half-duplex) for ultra-low cost. A Power Saving Mode (PSM) and extended discontinuous reception (eDRX) allow devices to sleep for hours, waking only to transmit, achieving years of battery life.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>A massive IoT platform layered on existing cellular infrastructure with carrier-grade security. A smart meter in a basement can reliably report readings every hour for 10 years on a single battery, using the same security as your smartphone's cellular data — AES encryption, mutual authentication, and IMSI protection — at a device cost of a few dollars.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <p><strong>NB-IoT Security Features Inherited from Cellular:</strong> This is a critical differentiator from ISM-band technologies. NB-IoT inherits the full cellular security stack:</p>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Security Feature</th><th>What It Does</th><th>Why It Matters for IoT</th></tr></thead>
          <tbody>
            <tr><td><strong>User Identity Confidentiality</strong></td><td>Device identity (IMSI) protected from passive eavesdroppers</td><td>Prevents tracking of IoT device locations</td></tr>
            <tr><td><strong>Entity Authentication</strong></td><td>Mutual auth between device and network (AKA protocol)</td><td>Prevents rogue base station attacks on IoT devices</td></tr>
            <tr><td><strong>Confidentiality</strong></td><td>AES-128 encryption of data</td><td>Meter readings, sensor data cannot be intercepted</td></tr>
            <tr><td><strong>Data Integrity</strong></td><td>HMAC on control plane messages</td><td>Prevents tampering with commands sent to devices</td></tr>
            <tr><td><strong>Equipment Identification</strong></td><td>IMEI verification</td><td>Prevents counterfeit or stolen device use</td></tr>
          </tbody>
        </table>
      </div>

      <p><strong>The 20 dB Coverage Improvement:</strong> NB-IoT achieves 20 dB better coverage than legacy GPRS. In practical terms, 20 dB corresponds to a 100× improvement in received signal power. This allows NB-IoT to reliably reach devices in basements, underground infrastructure (gas/water meters), and dense concrete buildings where LTE/Wi-Fi signals cannot penetrate. The technique used is "repetition" — sending the same data multiple times and combining the copies at the receiver (coherent combining). A device might send the same packet 128 or 2048 times, with the base station accumulating signal energy until the SNR is sufficient for decoding.</p>

      <div class="analogy"><strong>🎯 Analogy — NB-IoT as a Whisper-to-Stadium Amplifier:</strong> Imagine having to pass a message from someone whispering in a soundproof room to a person in a stadium. NB-IoT is like having the whispering person repeat the same message 2000 times. Each repetition is barely audible, but combined together (like how your brain averages out noise when straining to hear), the message eventually becomes clear. This repetition-based deep coverage is why NB-IoT can reach devices where no other technology can.</div>

      <div class="info-box"><strong>💡 Battery Life Design: Power Saving Mode (PSM):</strong> The key to NB-IoT's 10-year battery life is PSM. A water meter sends a reading once per hour, then enters deep sleep for ~59 minutes. In PSM, the device's radio is completely off — consuming microamps instead of milliamps. The network knows the device is asleep and buffers downlink messages for delivery when the device wakes. The device wakes, sends its reading in a single short burst, checks for buffered messages, then sleeps again. Over 10 years, the radio is active for only a tiny fraction of the time.</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — NB-IoT</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>Which security advantage does NB-IoT have over LoRa for IoT deployments?</p>
    <p>A) NB-IoT operates in the license-free ISM band, reducing deployment cost &nbsp; B) NB-IoT inherits the full cellular security stack including mutual authentication and AES encryption &nbsp; C) NB-IoT has longer range, making man-in-the-middle attacks less feasible &nbsp; D) NB-IoT uses frequency hopping to resist jamming</p>
    <div class="q-answer"><strong>✔ Answer: B) NB-IoT inherits the full cellular security stack including mutual authentication and AES encryption.</strong> NB-IoT uses licensed spectrum with carrier infrastructure, inheriting 4G/LTE security: AKA mutual authentication, AES-128 encryption, IMSI confidentiality, and data integrity. LoRa in the ISM band uses a simpler security model (AES-128 with pre-shared keys) without cellular-level carrier infrastructure and authenticated key distribution.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>NB-IoT requires deployment of new dedicated base stations separate from existing LTE infrastructure.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> NB-IoT was specifically designed to coexist with and reuse existing LTE base station infrastructure. It uses a single 180 kHz resource block within existing LTE spectrum. Carriers can deploy NB-IoT with software updates to existing base stations rather than building new infrastructure — this dramatically reduces deployment cost and accelerates roll-out.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>What design parameters allow NB-IoT to achieve a 10-year battery life with a 5 Wh battery?</p>
    <div class="q-answer"><strong>✔ Answer:</strong> (1) <strong>Power Saving Mode (PSM)</strong> — device radio completely off between transmissions, consuming only microamps during sleep; (2) <strong>Extended Discontinuous Reception (eDRX)</strong> — reduces frequency of listening for network pages; (3) <strong>Simplified hardware</strong> — SISO (single antenna), half-duplex, narrow 180 kHz bandwidth means smaller, cheaper, less power-hungry radio; (4) <strong>Infrequent transmission</strong> — IoT sensors designed for periodic reporting (hourly or daily); (5) <strong>Short transmission bursts</strong> — data volume is tiny (tens of bytes), minimizing active radio time per event. Together, these reduce average power consumption to tens of microwatts.</div>
  </div>
</div>

<div class="topic-header" id="t14">
  <span class="topic-num">SLIDES 22–29</span>
  <h2>LoRa and LoRaWAN</h2>
  <span class="topic-sub">CSS modulation · Spreading factor · Network architecture · LPWAN comparison</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDES 22–29</span>
    <span class="slide-title">LoRa/LoRaWAN — Chirp Spread Spectrum, MAC, and Network</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>LoRa:</strong> Physical layer — uses Chirp Spread Spectrum (CSS) modulation on sub-GHz ISM band.</li>
        <li><strong>LoRaWAN:</strong> MAC layer protocol built on LoRa PHY — ALOHA-based (no listen-before-talk).</li>
        <li><strong>CSS modulation:</strong> A chirp is a sinusoidal signal whose frequency increases or decreases linearly over time. s(t) = sin[2π(f₀ + ct)t].</li>
        <li><strong>CSS advantages:</strong> Resistant to multipath fading, Doppler effect, narrowband interference, and noise.</li>
        <li><strong>Spreading Factor (SF):</strong> Range 7–12. Higher SF → longer range but slower data rate. Every +1 SF doubles the chirps per bit → halves data rate but gains ~2.5 dB range.</li>
        <li><strong>Network topology:</strong> Star-of-stars. End devices connect to multiple gateways; gateways connect to the network server via standard IP backhaul.</li>
        <li><strong>Range:</strong> &gt;10 km line-of-sight; ~3 km urban; ~20 km maximum reported.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Sensors in remote locations (farms, forests, mountain terrain) need to transmit data kilometers to a gateway without cellular infrastructure. NB-IoT requires cell towers; Wi-Fi has 100m range. LoRa fills this gap with a low-power radio that reaches 10+ km per gateway, making nationwide IoT coverage possible with just a few thousand gateways.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>CSS encodes data by shifting the chirp's starting frequency. The receiver correlates the received chirp with reference chirps — a process equivalent to taking the Fast Fourier Transform (FFT). The correlation gain (processing gain) makes the signal detectable even below the noise floor, which is why LoRa achieves such extreme range. The spreading factor controls the trade-off: SF7 = fastest/shortest; SF12 = slowest/longest.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>A single LoRaWAN gateway can serve over 14,000 nodes in a city or cover 10+ km in a field. A farmer can deploy soil sensors across a 1,000-acre farm, all connecting to a single gateway on a barn silo. The gateway connects to the internet via Ethernet or cellular backhaul. No infrastructure investment beyond one gateway and the sensor nodes themselves.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <p><strong>Understanding Chirp Spread Spectrum (CSS):</strong> A chirp is a signal whose frequency changes over time. An up-chirp starts at a low frequency and sweeps to a high frequency. A down-chirp does the opposite. LoRa uses up-chirps as its base waveform. Data is encoded by specifying where in the frequency sweep the chirp starts (cyclic shift). The receiver runs a de-chirp operation (multiply by a down-chirp) and takes an FFT — the result is a single narrow peak at the cyclic shift frequency, which decodes to the data symbol.</p>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Spreading Factor</th><th>Chips per Bit (2^SF)</th><th>Approximate Bitrate @125 kHz</th><th>Receiver Sensitivity</th><th>Use Case</th></tr></thead>
          <tbody>
            <tr><td><strong>SF7</strong></td><td>128</td><td>5,470 bps</td><td>-123 dBm</td><td>Short range, high throughput</td></tr>
            <tr><td>SF8</td><td>256</td><td>3,125 bps</td><td>-126 dBm</td><td>Medium range</td></tr>
            <tr><td>SF9</td><td>512</td><td>1,760 bps</td><td>-129 dBm</td><td>Medium-long range</td></tr>
            <tr><td>SF10</td><td>1024</td><td>980 bps</td><td>-132 dBm</td><td>Long range</td></tr>
            <tr><td>SF11</td><td>2048</td><td>440 bps</td><td>-134.5 dBm</td><td>Very long range</td></tr>
            <tr><td><strong>SF12</strong></td><td>4096</td><td>250 bps</td><td>-137 dBm</td><td>Maximum range (remote/deep indoor)</td></tr>
          </tbody>
        </table>
      </div>

      <div class="analogy"><strong>🎯 Analogy — SF as a Choir Repeating a Message:</strong> Imagine sending a message by having a choir sing it. SF7 is a single singer — fast to deliver, but you must be close to hear. SF12 is 4,096 singers all repeating the same note — it takes forever (low data rate) but can be heard from miles away even in a thunderstorm (noise resistance). The "spreading factor" controls how many singers you recruit — more singers = louder effective signal = longer range, but more time per note = lower data rate.</div>

      <p><strong>LoRaWAN Architecture — Star-of-Stars Topology:</strong></p>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Layer</th><th>Component</th><th>Role</th><th>Connection</th></tr></thead>
          <tbody>
            <tr><td>Sensing</td><td>End Nodes (sensors)</td><td>Collect data, transmit via LoRa RF</td><td>LoRa RF to gateways</td></tr>
            <tr><td>Access</td><td>Concentrator Gateways</td><td>Receive LoRa packets; forward to network server</td><td>TCP/IP (3G/Ethernet) to network server</td></tr>
            <tr><td>Control</td><td>Network Server</td><td>Deduplication, routing, MAC commands, ADR</td><td>IP to application servers</td></tr>
            <tr><td>Application</td><td>Application Server</td><td>Decrypt payload, process IoT data</td><td>Standard web services</td></tr>
          </tbody>
        </table>
      </div>

      <div class="warn-box"><strong>⚠️ LoRaWAN Security — ALOHA-Based MAC Vulnerabilities:</strong> LoRaWAN uses ALOHA (random access, no listen-before-transmit), which means devices transmit whenever they have data. This creates several vulnerabilities: (1) <strong>Collision-based DoS</strong> — an attacker can transmit on the same frequency/SF to jam specific sensor data; (2) <strong>Replay attacks</strong> — LoRaWAN v1.0 uses a frame counter, but some implementations allow counter reset; (3) <strong>ACK spoofing</strong> — Class A devices expect downlink ACKs; a spoofed ACK can prevent retransmission of failed messages. LoRaWAN v1.1 strengthened these protections. Additionally, LoRaWAN v1.0 derives session keys from a root key that never leaves the device — compromise requires physical access. AES-128 is used for both data confidentiality and MIC (message integrity code).</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — LoRa/LoRaWAN</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>In LoRa's Chirp Spread Spectrum, what is the effect of increasing the Spreading Factor (SF) from SF7 to SF12?</p>
    <p>A) Data rate doubles and range decreases &nbsp; B) Data rate is halved for every +1 SF increase, and transmission range increases &nbsp; C) Data rate increases and receiver sensitivity improves &nbsp; D) The bandwidth increases proportionally with SF</p>
    <div class="q-answer"><strong>✔ Answer: B) Data rate is halved for every +1 SF increase, and transmission range increases.</strong> From the lecture: "For every increase in spreading factor, the data transmission rate is halved" and "Higher SF, longer transmission range." SF7→SF12: data rate decreases from ~5470 bps to ~250 bps (approx 22× reduction), while receiver sensitivity improves from -123 dBm to -137 dBm (14 dB improvement → significantly longer range).</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>A LoRa chirp is defined as a sinusoidal signal with constant frequency over time.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> A LoRa chirp is a sinusoidal signal whose frequency <strong>increases or decreases over time</strong> — specifically a linear chirp: s(t) = sin[2π(f₀ + ct)t] where c is the chirp rate. This frequency sweep over time is the defining characteristic that differentiates CSS from other modulation schemes and provides its unique resistance properties.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>Compare LoRaWAN and NB-IoT on QoS, battery life, scalability, and cost. Which would you choose for a city-wide air quality monitoring network and why?</p>
    <div class="q-answer"><strong>✔ Answer:</strong>
      <br><strong>LoRaWAN:</strong> QoS-2 (best-effort ISM band); Battery life class 1 (excellent for Class A); Scalability 50K devices/243 bytes; Coverage &lt;20km; Cost: ~€1000/base station + €100/gateway.
      <br><strong>NB-IoT:</strong> QoS-1 (licensed spectrum, guaranteed); Battery class 3 (very good); &gt;100K devices/1600 bytes; &lt;10km urban; Cost: ~€15000/base station.
      <br><strong>For city-wide air quality monitoring:</strong> LoRaWAN is likely better because: (1) Much lower infrastructure cost — a few LoRaWAN gateways can cover a city vs. dense cellular base stations; (2) Air quality sensors send small packets infrequently — LoRaWAN's limited payload (243 bytes) is sufficient; (3) No SIM card management needed; (4) Open standard, vendor flexibility. NB-IoT would be preferred if: reliability guarantees are critical (healthcare, safety), or mobile sensors need nationwide roaming coverage.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>LoRaWAN uses an ________ based MAC protocol (not CSMA/CA), and is based on a ________ topology where each end device connects directly to a LoRa gateway.</p>
    <div class="q-answer"><strong>✔ Answer: ALOHA; star-to-star (or star-of-stars).</strong> ALOHA means devices transmit whenever they have data without checking if the channel is busy first. This is simpler but less efficient than CSMA/CA. The star-of-stars topology means end devices connect to gateways (first star), and gateways connect to the network server (second star).</div>
  </div>
</div>

<div class="topic-header" id="t15">
  <span class="topic-num">SLIDES 30–33</span>
  <h2>RFID — Radio-Frequency Identification</h2>
  <span class="topic-sub">Passive vs. active tags · Inductive vs. backscatter · Slotted ALOHA MAC</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDES 30–33</span>
    <span class="slide-title">RFID — Overview, Basics, Inductive and Backscatter Coupling</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li>RFID automatically identifies and tracks objects using radio-frequency electromagnetic fields.</li>
        <li><strong>Two coupling mechanisms:</strong> Inductive (nearfield, &lt;1m) and Backscatter (farfield, &lt;200m).</li>
        <li><strong>PHY Modulation:</strong> AM, FSK, PSK depending on system.</li>
        <li><strong>Frequency bands:</strong> 100–500 kHz (LF inductive), 10–16 MHz (HF inductive, NFC), 850–950 MHz (UHF backscatter), 2.4–5.8 GHz (microwave backscatter).</li>
        <li><strong>Range:</strong> 10 cm (passive LF/HF) to 200 meters (active UHF).</li>
        <li><strong>MAC:</strong> Slotted ALOHA — probabilistic collision avoidance for reading many tags simultaneously.</li>
        <li>Passive tags: no battery — powered by the reader's RF field via inductive coupling.</li>
      </ul>
    </div>

    <div class="golden-circle">
      <div class="gc-cell gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Barcodes require line-of-sight and manual scanning. RFID enables automatic, contactless identification of objects without line-of-sight, at reading rates of thousands of tags per second. This transforms supply chain management (Walmart required RFID on all pallets), retail inventory (Apple stores track individual iPhones), and access control (building badges, transit cards).</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>The reader broadcasts RF energy. Passive tags harvest this energy inductively (at short range) or via backscattering (at longer range). The tag's chip uses the harvested power to modulate the RF field (by varying antenna impedance), creating tiny amplitude variations that the reader detects as data. Active tags have their own battery and transmit autonomously, achieving much longer range.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Contactless identification at speeds and scales impossible with barcodes. A single reader can inventory an entire warehouse shelf in seconds without opening boxes. RFID tags cost pennies each and can last decades because passive tags have no battery to replace. NFC (Near Field Communication) is a special case of HF RFID at 13.56 MHz used for mobile payments (Apple Pay, Google Pay) and access cards.</p>
      </div>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <p><strong>Inductive Coupling vs. Backscatter — Two Completely Different Physics:</strong></p>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Property</th><th>Inductive Coupling (Nearfield)</th><th>Backscatter Coupling (Farfield)</th></tr></thead>
          <tbody>
            <tr><td><strong>Frequency</strong></td><td>125 kHz (LF), 13.56 MHz (HF/NFC)</td><td>860–960 MHz (UHF), 2.4 GHz</td></tr>
            <tr><td><strong>Physics</strong></td><td>Magnetic coupling (like a transformer). Reader coil induces current in tag coil.</td><td>Tag reflects/absorbs RF waves back to reader (like radar).</td></tr>
            <tr><td><strong>Range</strong></td><td>Typically 10–20 cm (NFC: &lt;4 cm)</td><td>1–10 m (passive), up to 200 m (active)</td></tr>
            <tr><td><strong>Power transfer</strong></td><td>High efficiency — tag powered entirely by inductive field</td><td>Less efficient — decreases with distance squared</td></tr>
            <tr><td><strong>Security</strong></td><td>Short range limits eavesdropping distance</td><td>Longer range = easier to eavesdrop or attack</td></tr>
            <tr><td><strong>Examples</strong></td><td>Building access cards, NFC payments, library book tags</td><td>UHF inventory tags (EPC Gen 2), toll tags (E-ZPass)</td></tr>
          </tbody>
        </table>
      </div>

      <p><strong>Slotted ALOHA MAC — Solving the "Many Tags, One Reader" Problem:</strong> When a reader powers up, all nearby tags would try to respond simultaneously, causing collisions. Slotted ALOHA divides time into slots; each tag responds in a randomly chosen slot. If a collision occurs, those tags retry in a new random slot in the next round. The reader iterates until all tags are read. This probabilistic approach scales to thousands of tags in a single reader field — essential for warehouse applications.</p>

      <div class="warn-box"><strong>⚠️ RFID Security Vulnerabilities:</strong> RFID faces several attacks: (1) <strong>Eavesdropping</strong> — passive RFID tags transmit in the clear; an attacker with a directional antenna can read tags at greater distances than the intended reader; (2) <strong>Relay attacks (relay attack on NFC payments)</strong> — attacker uses two devices to relay NFC signals between a tag and reader that are physically far apart, enabling unauthorized payments; (3) <strong>Cloning</strong> — RFID tags without cryptographic protection can be read and duplicated (credit card skimming); (4) <strong>Jamming</strong> — flooding the RFID frequency with noise prevents readers from reading any tags. Mitigations: cryptographic mutual authentication (ISO 14443-4 for smart cards), shielded wallets (Faraday cage), and distance bounding protocols.</div>

      <div class="analogy"><strong>🎯 Analogy — Passive RFID as a Mirror in a Spotlight:</strong> The RFID reader is a spotlight. Passive backscatter tags are tiny mirrors — they reflect the light back with a pattern (they modulate the reflection by varying their antenna impedance). The reader shines its RF beam, the tags in its illumination field reflect it back with their ID data encoded in the reflection pattern. Tags need no batteries because they use the spotlight's energy to power their tiny circuits, just like a mirror needs no power to reflect light.</div>
    </div>
  </div>
</div>

<div class="questions">
  <div class="questions-title">🧪 Practice Questions — RFID</div>

  <div class="q-item">
    <span class="q-label q-mc">Multiple Choice</span>
    <p>Which RFID coupling mechanism allows passive tags to operate at distances up to 10 meters without a battery?</p>
    <p>A) Inductive coupling — magnetic field transfers both power and data &nbsp; B) Backscatter coupling — tag reflects reader's RF signal with modulated data &nbsp; C) Capacitive coupling — electric field provides power to the tag &nbsp; D) Optical coupling — tag uses ambient light to power an LED transmitter</p>
    <div class="q-answer"><strong>✔ Answer: B) Backscatter coupling.</strong> UHF backscatter RFID (860–960 MHz) allows passive tags at 1–10 meter distances. The reader's RF wave is reflected (backscattered) by the tag with data modulated into the reflection. The tag powers its chip from the harvested RF energy. Inductive coupling is much shorter range (cm) because magnetic field strength falls off much faster with distance than RF waves.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>RFID MAC uses CSMA/CA (like Wi-Fi and ZigBee) to prevent collisions when multiple tags respond simultaneously.</p>
    <div class="q-answer"><strong>✔ Answer: False.</strong> RFID uses <strong>Slotted ALOHA</strong>, not CSMA/CA. RFID tags cannot "listen" before transmitting because passive tags have no receiver — they simply reflect the reader's signal. Slotted ALOHA assigns each tag a random time slot to respond, with collision detection and retry by the reader. CSMA/CA requires devices to actively receive and sense the channel, which passive tags cannot do.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-sa">Short Answer</span>
    <p>Describe the relay attack on NFC payments and explain one defense against it.</p>
    <div class="q-answer"><strong>✔ Answer:</strong> A <strong>relay attack</strong> on NFC uses two colluding devices: a "mole" device placed near the victim's contactless payment card (or phone), and a "ghost" device at a payment terminal far away. The mole reads the NFC signal from the victim's card and immediately relays it wirelessly to the ghost, which presents the signal to the terminal. The terminal processes the payment believing the card is present. The victim's card just paid for something kilometers away. <strong>Defense — Distance Bounding Protocol:</strong> The payment system measures the round-trip time of cryptographic challenges. If the response arrives too slowly (because of relay delay), the transaction is rejected. Physical shielded wallets (Faraday cage) prevent the mole from reading the card at all. Apple Pay/Google Pay add device authentication and biometric unlocking, requiring user presence at the device before NFC signals are enabled.</div>
  </div>

  <div class="q-item">
    <span class="q-label q-fb">Fill in the Blank</span>
    <p>RFID tags operating at 13.56 MHz (HF band) use ________ coupling and are limited to approximately ________ cm range, which is the basis for NFC (Near Field Communication) payment systems.</p>
    <div class="q-answer"><strong>✔ Answer: Inductive (magnetic); 20 cm (NFC: &lt;4 cm).</strong> HF RFID at 13.56 MHz uses magnetic induction — the reader's coil creates an alternating magnetic field that induces current in the tag's coil. NFC is a subset of HF RFID, standardized at exactly this frequency with a maximum range of ~4 cm to limit eavesdropping and accidental activation.</div>
  </div>
</div>

<div class="topic-header" id="t16">
  <span class="topic-num">SLIDES 34–38</span>
  <h2>IoT Requirements, Bandwidth Summary, and Devices</h2>
  <span class="topic-sub">IoT wireless requirements · Bandwidth at a glance · Antenna examples · IoT device diversity</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-badge">SLIDES 34–38</span>
    <span class="slide-title">IoT Wireless Technologies — Summary and Requirements</span>
  </div>
  <div class="slide-body">

    <div class="key-box">
      <div class="key-box-title">📌 Key Concepts at a Glance</div>
      <ul>
        <li><strong>IoT wireless requirements (often conflicting):</strong> High data rate, Long communication distance, Low energy consumption, Peer-to-peer communication.</li>
        <li>No single technology satisfies ALL requirements simultaneously — always a trade-off.</li>
        <li><strong>Bandwidth at a Glance (900 MHz → 6 GHz+):</strong> ZigBee 2 MHz / BT 1 MHz / LoRa 500 kHz @ 900 MHz; Wi-Fi 20–160 MHz @ 2.4–6 GHz; mmWave for >1 Gbps.</li>
        <li>IoT devices vary enormously: from grain-of-sand RFID (Michigan Micro Mote) to autonomous cars equipped with radar, lidar, and 5G.</li>
        <li>Security must be designed for the <em>weakest</em> device in the network — a single unsecured sensor can compromise the entire IoT ecosystem.</li>
      </ul>
    </div>

    <div class="deep-dive">
      <div class="deep-dive-title">📖 Beginner-Friendly Deep Dive</div>

      <p><strong>The Fundamental IoT Wireless Trade-Off Triangle:</strong> IoT system designers face a trilemma — pick two, sacrifice the third:</p>

      <div class="comp-grid">
        <div class="comp-cell">
          <div class="comp-cell-title">High Speed + Long Range</div>
          <ul>
            <li>Technology: 5G Cellular</li>
            <li>Cost: High power, expensive chipset</li>
            <li>Sacrifice: Battery life, cost</li>
            <li>Use case: Connected vehicles, AR/VR</li>
          </ul>
        </div>
        <div class="comp-cell">
          <div class="comp-cell-title">Long Range + Low Power</div>
          <ul>
            <li>Technology: LoRa, NB-IoT, Sigfox</li>
            <li>Cost: Low power, low cost</li>
            <li>Sacrifice: Data rate (kbps)</li>
            <li>Use case: Smart meters, agriculture, tracking</li>
          </ul>
        </div>
        <div class="comp-cell">
          <div class="comp-cell-title">High Speed + Low Power</div>
          <ul>
            <li>Technology: BLE, ZigBee, Wi-Fi 6</li>
            <li>Cost: Short range only</li>
            <li>Sacrifice: Range (&lt;100m)</li>
            <li>Use case: Smart home, wearables, healthcare</li>
          </ul>
        </div>
      </div>

      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Band</th><th>Technology</th><th>BW</th><th>Approx. Speed</th><th>Typical Range</th></tr></thead>
          <tbody>
            <tr><td>900 MHz</td><td>ZigBee (sub-GHz)</td><td>2 MHz</td><td>40 Kbps</td><td>100–1000m</td></tr>
            <tr><td>900 MHz</td><td>LoRa</td><td>500 kHz</td><td>0.25–11 Kbps</td><td>5–15 km</td></tr>
            <tr><td>2.4 GHz</td><td>Bluetooth</td><td>1 MHz</td><td>1–3 Mbps</td><td>10–100m</td></tr>
            <tr><td>2.4 GHz</td><td>Wi-Fi 5 (20 MHz)</td><td>20 MHz</td><td>~200 Mbps</td><td>50–100m</td></tr>
            <tr><td>5 GHz</td><td>Wi-Fi 5 (80 MHz)</td><td>80 MHz</td><td>~500 Mbps</td><td>30–60m</td></tr>
            <tr><td>6 GHz</td><td>Wi-Fi 6 (160 MHz)</td><td>160 MHz</td><td>&gt;1 Gbps</td><td>10–30m</td></tr>

      </div>

      <div class="warn-box"><strong>⚠️ IoT Security — The Weakest Link Problem:</strong> An IoT network is only as secure as its least secure device. Consider a smart home with: a modern Wi-Fi router (WPA3, firmware updated), a smartphone (iOS/Android security model), and a budget ZigBee bulb (no firmware update mechanism, hardcoded pairing key). If the attacker compromises the bulb (via an unpatched ZigBee vulnerability), they gain a foothold in the home network. From there, they may pivot to attack other devices. This is the "shadow IT" problem of IoT at scale — billions of low-cost devices with minimal security capabilities that outlive their security support lifetime.</div>

      <p><strong>Security Design Principle for IoT Wireless:</strong> Select the technology whose security model matches the threat model of the application. For critical infrastructure (smart grid, water treatment), use NB-IoT/LTE with cellular-grade security. For commercial inventory tracking, UHF RFID with cryptographic mutual authentication (ISO 18000-63). For consumer smart home, ZigBee with application-layer encryption and proper commissioning procedures. For medical wearables, BLE with Numeric Comparison pairing and application-layer AES encryption. Never use security-by-obscurity alone (e.g., DSSS spreading code without application-layer encryption).</p>
    </div>

    <p>An autonomous vehicle requires real-time sensor fusion data at 1 Gbps with latency under 5ms. Which wireless technology is most appropriate?</p>
    <p>A) LoRaWAN at SF7 &nbsp; B) ZigBee at 2.4 GHz &nbsp; C) 5G mmWave with Massive MIMO &nbsp; D) NB-IoT LTE Cat NB2</p>
    <div class="q-answer"><strong>✔ Answer: C) 5G mmWave with Massive MIMO.</strong> 5G mmWave provides Gbps data rates and sub-1ms latency — exactly the requirements for autonomous vehicle sensor fusion (lidar point clouds, HD map updates). LoRa is low-speed (kbps). ZigBee is 250 Kbps maximum. NB-IoT is designed for low-power, low-data-rate IoT sensors. Only 5G meets the speed and latency requirements.</div>

  <div class="q-item">
    <span class="q-label q-tf">True/False</span>
    <p>The 6 GHz Wi-Fi band (Wi-Fi 6) provides longer range than the 2.4 GHz band at the same transmit power.</p>

    <span class="q-label q-sa">Short Answer</span>
    <p>You are designing a wireless sensor network for a hospital. The network must monitor patient vitals (BPM, SpO₂) continuously, alert staff within 500ms, and remain operational for 5 years without battery replacement. Identify which wireless technology you would use and justify your choice considering both functional and security requirements.</p>
    <div class="q-answer"><strong>✔ Answer:</strong> <strong>Recommended: BLE (Bluetooth Low Energy) for the sensor-to-hub link + Wi-Fi or LoRa for aggregation to the cloud.</strong>
    <br><strong>Functional justification:</strong> BLE provides adequate range within a hospital room (10m+), sufficient data rate for vital signs (few Kbps), and ultra-low power enabling 5-year battery life with PSM. The 500ms alert requirement is met by BLE's connection interval (can be set to 7.5–100ms).
    <br><strong>Security justification:</strong> Use BLE with Numeric Comparison or OOB (Out-of-Band) pairing — prevent unauthorized pairing via "Just Works." Mandate application-layer AES-128 encryption for all vital sign data (don't rely only on BLE link-layer encryption). Implement TLS/DTLS for any Wi-Fi backhaul. Perform regular firmware updates (OTA DFU in BLE). Use device attestation to prevent counterfeit sensor nodes. Reject unauthenticated devices via network access control.
    <br><strong>Alternative:</strong> ZigBee with AES-128 is equally valid if a mesh for whole-floor coverage is needed.</div>
