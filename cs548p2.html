<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS 448/548 — Network Security Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

/* ── SHELL THEMES ── */
:root[data-theme="dark"] {
  --shell-bg:         #060810;
  --shell-nav:        #0b0d16;
  --shell-border:     #1a2035;
  --shell-text:       #c8d4e8;
  --shell-text2:      #5a6a88;
  --shell-accent:     #4f9ef8;
  --shell-btn-bg:     #111827;
  --shell-btn-hover:  #1a2438;
  --shell-btn-active: #1e3a6e;
  --shell-btn-text:   #8a9bbf;
  --shell-btn-act-txt:#4f9ef8;
  --shell-toggle-bg:  #1c2438;
}
:root[data-theme="light"] {
  --shell-bg:         #f7f7f8;
  --shell-nav:        #ffffff;
  --shell-border:     #e2e4ea;
  --shell-text:       #1a1a2e;
  --shell-text2:      #6b7280;
  --shell-accent:     #2563eb;
  --shell-btn-bg:     #f4f5f7;
  --shell-btn-hover:  #e8eaf0;
  --shell-btn-active: #dbeafe;
  --shell-btn-text:   #4b5563;
  --shell-btn-act-txt:#1d4ed8;
  --shell-toggle-bg:  #e8eaf0;
}

/* ── LAYOUT ── */
body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--shell-bg);
  font-family: 'Syne', sans-serif;
  transition: background 0.25s, color 0.25s;
}

/* ── TOP BAR ── */
.topbar {
  background: var(--shell-nav);
  border-bottom: 1px solid var(--shell-border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 52px;
  flex-shrink: 0;
  z-index: 201;
  transition: background 0.25s, border-color 0.25s, transform 0.3s ease;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  transform: translateY(-100%);
}
.topbar.nav-visible { transform: translateY(0); }

/* Invisible 8px strip at top edge that triggers the nav */
#nav-hover-trigger {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 8px;
  z-index: 300;
}

.topbar-logo {
  font-size: 13px;
  font-weight: 800;
  color: var(--shell-accent);
  letter-spacing: 0.02em;
  white-space: nowrap;
  flex-shrink: 0;
}

.topbar-divider {
  width: 1px;
  height: 20px;
  background: var(--shell-border);
  flex-shrink: 0;
}

.lecture-count {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--shell-text2);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── THEME TOGGLE ── */
.theme-toggle {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.theme-label {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--shell-text2);
}

.toggle-btn {
  position: relative;
  width: 48px;
  height: 26px;
  border-radius: 13px;
  background: var(--shell-toggle-bg);
  border: 1px solid var(--shell-border);
  cursor: pointer;
  transition: background 0.25s;
  flex-shrink: 0;
  outline: none;
}
.toggle-btn::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--shell-accent);
  transition: transform 0.25s, background 0.25s;
}
:root[data-theme="light"] .toggle-btn::after {
  transform: translateX(22px);
}
.toggle-btn .icon {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  pointer-events: none;
}
.toggle-btn .icon-moon { left: 6px; }
.toggle-btn .icon-sun  { right: 5px; }

/* ── NAV STRIP (lecture buttons) ── */
.nav-strip-wrapper {
  background: var(--shell-nav);
  border-bottom: 1px solid var(--shell-border);
  padding: 0 20px;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: thin;
  transition: background 0.25s, border-color 0.25s, max-height 0.3s ease, opacity 0.3s ease;
  position: fixed;
  top: 52px;
  left: 0;
  width: 100%;
  z-index: 200;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
}
.nav-strip-wrapper.nav-visible {
  max-height: 60px;
  overflow: visible;
  opacity: 1;
}
.nav-strip-wrapper::-webkit-scrollbar { height: 3px; }
.nav-strip-wrapper::-webkit-scrollbar-track { background: transparent; }
.nav-strip-wrapper::-webkit-scrollbar-thumb { background: var(--shell-border); border-radius: 3px; }

.nav-strip {
  display: flex;
  gap: 2px;
  padding: 8px 0;
  width: max-content;
}

.nav-strip button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid transparent;
  background: var(--shell-btn-bg);
  color: var(--shell-btn-text);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  letter-spacing: 0.01em;
}
.nav-strip button:hover {
  background: var(--shell-btn-hover);
  color: var(--shell-text);
  border-color: var(--shell-border);
}
.nav-strip button.active {
  background: var(--shell-btn-active);
  color: var(--shell-btn-act-txt);
  border-color: var(--shell-accent);
}

/* ── IFRAME CONTAINER ── */
.iframe-shell {
  flex: 1;
  overflow: hidden;
  position: relative;
  /* topbar (52px) + nav (44px) are fixed; give iframe full viewport height */
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  transition: opacity 0.2s;
}
iframe.loading { opacity: 0; }

/* ── LOADING OVERLAY ── */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: var(--shell-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}
.loading-overlay.visible {
  opacity: 1;
  pointer-events: all;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--shell-border);
  border-top-color: var(--shell-accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--shell-text2);
}

/* ── SLIDE IMAGE CAPTION ── */
.slide-img-caption {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--shell-text2);
  padding: 4px 0 8px;
  opacity: 0.75;
  letter-spacing: 0.02em;
}
</style>
</head>
<body data-theme-init="dark">

<!-- HOVER TRIGGER ZONE -->
<div id="nav-hover-trigger"></div>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-logo">CS 448/548 · Study Hub</span>
  <div class="topbar-divider"></div>
  <span class="lecture-count">9 modules | Slide images: place JPGs in images/sl17_24v2/</span>

  <div class="theme-toggle">
    <span class="theme-label" id="theme-label">DARK</span>
    <button class="toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark theme">
      <span class="icon icon-moon">🌙</span>
      <span class="icon icon-sun">☀️</span>
    </button>
  </div>
</div>

<!-- IMAGE PATH INSTRUCTIONS -->
<div id="img-instructions" style="background:#1a2744;border-bottom:1px solid #2a3a5a;padding:8px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#8ab4d8;display:none;align-items:center;gap:12px;flex-shrink:0;">
  <span style="color:#4f9ef8;font-weight:700;">&#128193; IMAGES</span>
  <span>Place slide JPGs as <code style="background:#0d1525;padding:1px 6px;border-radius:3px;color:#a8c8f0;">images/sl17_24v2/001.jpg</code>
  through <code style="background:#0d1525;padding:1px 6px;border-radius:3px;color:#a8c8f0;">233.jpg</code> alongside this HTML file to display slide thumbnails.</span>
  <button onclick="this.parentElement.style.display='none'" style="margin-left:auto;background:none;border:none;color:#5a7a9a;cursor:pointer;font-size:14px;">&#x2715;</button>
</div>

<!-- LECTURE NAV -->
<div class="nav-strip-wrapper">
  <div class="nav-strip">
    <button class="active" onclick="switchLecture(0)" id="btn-0">Lec 15 · IP Security</button>
<button onclick="switchLecture(1)" id="btn-1">Lec 16 · Firewalls</button>
<button onclick="switchLecture(2)" id="btn-2">Lec 17 · Wireless Sec</button>
<button onclick="switchLecture(3)" id="btn-3">Lec 18 · IoT Wireless</button>
<button onclick="switchLecture(4)" id="btn-4">Lec 19 · IP Attacks</button>
<button onclick="switchLecture(5)" id="btn-5">Lec 20 · TCP Attacks</button>
<button onclick="switchLecture(6)" id="btn-6">Lec 20 · Access Ctrl</button>
<button onclick="switchLecture(7)" id="btn-7">Lec 22 · DNS Attacks</button>
<button onclick="switchLecture(8)" id="btn-8">Kerberos Workflow</button>

  </div>
</div>

<!-- IFRAME SHELL -->
<div class="iframe-shell">
  <iframe id="content-frame" title="Lecture content"></iframe>
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <span class="loading-text">Loading lecture…</span>
  </div>
</div>

<script>
// ─── LECTURE DATA ─────────────────────────────────────────────────────────────
const lectures = [
  { label: 'Lec 15 · IP Security', html: `<!DOCTYPE html>
<html lang="en">
<head>

<title>CS 448/548 · Lecture 16 – IP Security · Study Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap');

:root {

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── HERO ── */

    overflow: hidden;
    border: 1px solid var(--border);
  }
  .slide-header {

    border-bottom: 1px solid var(--border);

    align-items: center;

<div id="s1" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDE 1</span>
    <div>
      <div class="slide-title">Course Introduction — IP Security</div>
      <div class="slide-subtitle">Reminder: Lab 3 due 03/11</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li>CS 448/548 Network Security — Lecture 16</li>
      <li>Topic: IP Security (IPSec)</li>
      <li>Lab 3 deadline reminder</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">CONTEXT</span>
        This lecture focuses on <strong>IP Security (IPSec)</strong> — a suite of protocols that operate at <strong>Layer 3 (Network Layer)</strong> of the TCP/IP stack. Unlike TLS (which secures specific application connections) or SSH (which secures remote sessions), IPSec secures <em>all</em> IP traffic from <em>all</em> applications automatically, transparently, without requiring any changes to the applications themselves.
      </div>
      <div class="key-box">
        <strong>Where IPSec fits:</strong> In the layered security model, TLS/SSH guard individual connections at the transport/application layer. IPSec guards at the network layer — below everything else — meaning it can protect traffic even from legacy applications that have no built-in security.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">🌀</span>Simon Sinek's Golden Circle</div>
      <div class="golden-circle">
        <div class="gc-card gc-why">
          <div class="gc-label">🔴 WHY — Purpose</div>
          <p>Without network-layer security, every IP packet you send is an <em>open postcard</em> — readable and potentially modified by any router or attacker on the path. We need IPSec to seal that postcard at the lowest possible layer.</p>
        </div>
        <div class="gc-card gc-how">
          <div class="gc-label">🟡 HOW — Process</div>
          <p>IPSec adds cryptographic headers (AH/ESP) directly to IP packets. These headers provide authentication, integrity checking, and optionally encryption — all before the packet leaves the network stack.</p>
        </div>
        <div class="gc-card gc-what">
          <div class="gc-label">🟢 WHAT — Result</div>
          <p>All traffic between IPSec-enabled endpoints is private, tamper-proof, and authenticated — even if the application sending it has no built-in security. VPNs, secure enterprise networks, and encrypted routing all depend on IPSec.</p>
        </div>
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Beginner-Friendly Deep Dive</div>
      <div class="deep-dive">
        <div class="analogy">
          Think of the Internet as a giant postal system. Without security, every post office worker (router) can open your letter, read it, alter it, or replace it. IPSec is like sending your letter inside a <strong>locked, tamper-evident, certified-mail envelope</strong> — even if every post office worker handles it, they can't read or change the contents.
        </div>
        <p><strong>The key difference between IPSec and TLS/SSH:</strong> TLS protects specific connections (your browser's HTTPS session). SSH protects a specific remote login session. IPSec protects <em>everything</em> at the packet level — including the unencrypted DNS queries, telnet traffic, or any legacy protocol that would otherwise be completely exposed.</p>
        <p>This makes IPSec especially valuable in enterprise environments where you cannot audit or update every application's security posture individually. Configure IPSec once on the network gateway, and all outbound traffic is protected.</p>
      </div>
    </div>
  </div>
</div>

<div id="s2" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDE 2</span>
    <div>
      <div class="slide-title">IP Security — Services Provided</div>
      <div class="slide-subtitle">What IPSec guarantees &amp; its benefits</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li><strong>IPSec provides:</strong></li>
      <li>
        <ul>
          <li>Access control: User authentication</li>
          <li>Data integrity</li>
          <li>Data origin authentication (MAC)</li>
          <li>Rejection of replayed packets</li>
          <li>Confidentiality (encryption)</li>
          <li>Limited traffic flow confidentiality</li>
        </ul>
      </li>
      <li><strong>Benefits:</strong></li>
      <li>
        <ul>
          <li>Security at Layer 3 ⇒ Applies to all transports/applications</li>
          <li>Can be implemented in Firewall/router ⇒ perimeter security</li>
          <li>Transparent to applications and end users</li>
          <li>Can provide security for individual users</li>
        </ul>
      </li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">SIX SECURITY SERVICES</span>
        IPSec is one of the few security frameworks that addresses <strong>all six</strong> core security properties simultaneously. Most protocols address only two or three. The combination of access control + integrity + authentication + anti-replay + confidentiality makes IPSec uniquely comprehensive.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">🌀</span>Simon Sinek's Golden Circle</div>
      <div class="golden-circle">
        <div class="gc-card gc-why">
          <div class="gc-label">🔴 WHY</div>
          <p>Network threats are not limited to eavesdropping. Attackers can also replay old packets, forge the source of packets, or tamper with content in transit. A complete security solution must address all these threat vectors.</p>
        </div>
        <div class="gc-card gc-how">
          <div class="gc-label">🟡 HOW</div>
          <p>AH provides authentication + integrity. ESP adds encryption. Sequence numbers provide anti-replay. Together, these mechanisms are negotiated via IKE and stored in Security Associations (SAs).</p>
        </div>
        <div class="gc-card gc-what">
          <div class="gc-label">🟢 WHAT</div>
          <p>A fully secured IP communication channel where every packet is authenticated, integrity-verified, replay-resistant, and optionally encrypted — all implemented below the application layer so apps get security for free.</p>
        </div>
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — IPSec Services Explained</div>
      <div class="deep-dive">
        <p><strong>Access Control:</strong> IPSec can authenticate the two endpoints before any data is exchanged. If a device cannot authenticate itself, no Security Association is established and no traffic is permitted. This effectively locks untrusted devices out at the IP layer.</p>
        <p><strong>Data Integrity:</strong> Uses a MAC (Message Authentication Code) computed over the packet contents. If even a single bit is altered in transit, the MAC check fails at the receiver and the packet is discarded. This prevents Man-in-the-Middle modification attacks.</p>
        <p><strong>Data Origin Authentication:</strong> Proves <em>who</em> sent the packet. Not just "this packet arrived intact" (integrity) but "this packet was sent by this specific authenticated entity." Uses HMAC with a shared key established through IKE.</p>
        <p><strong>Anti-Replay:</strong> Each IPSec packet carries a monotonically increasing sequence number. The receiver maintains a sliding window and rejects packets outside the window or with already-seen sequence numbers. This defeats replay attacks where an attacker captures a valid packet and resends it later.</p>
        <p><strong>Confidentiality:</strong> Provided by ESP (not AH) using symmetric encryption (AES-GCM in modern deployments). The payload is encrypted so passive eavesdroppers cannot read the contents.</p>
        <div class="analogy">
          <strong>Limited Traffic Flow Confidentiality:</strong> Even with encryption, an attacker can analyze traffic patterns — when you communicate, with whom, how much. Tunnel mode partially addresses this by hiding the original IP headers. But timing analysis and volume analysis can still reveal patterns. This is an active area of research (traffic analysis / metadata analysis).
        </div>
        <p><strong>Key Benefit — Layer 3 deployment:</strong> Implementing IPSec at a router or firewall means <em>all traffic crossing that perimeter</em> is protected automatically. A corporation deploying IPSec on its border routers instantly secures all employee traffic — email, web, proprietary protocols — without modifying a single application.</p>
      </div>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — Slides 1–2</div>

    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-mc">MC</span>
        <span class="q-text">Which of the following security properties does IPSec NOT directly provide?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) Data integrity</div>
        <div class="q-opt">B) Confidentiality</div>
        <div class="q-opt">C) Non-repudiation</div>
        <div class="q-opt">D) Anti-replay</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>C) Non-repudiation.</strong> IPSec uses symmetric shared keys (via IKE) which do not provide non-repudiation — both parties know the same key, so either could have generated the MAC. Non-repudiation requires asymmetric digital signatures (PKI). IPSec provides access control, integrity, origin authentication, anti-replay, and confidentiality.</span>
      </div>
    </div>

    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-tf">T/F</span>
        <span class="q-text">IPSec operating at the network layer means it must be configured separately for each application (browser, email client, etc.).</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>False.</strong> IPSec works at the IP packet level, transparent to all applications. Once configured on a host or gateway, all traffic is automatically protected regardless of which application generated it — no per-app configuration is required.</span>
      </div>
    </div>

    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-sa">Short Answer</span>
        <span class="q-text">Explain why "limited traffic flow confidentiality" is listed as a service rather than full traffic flow confidentiality.</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text">Even with IPSec encryption, the outer IP headers (source/destination IP, timing, packet sizes, volume) may still be visible to network observers — especially in transport mode. Tunnel mode hides the inner IP headers but the tunnel endpoints remain visible. Achieving full traffic flow confidentiality would require techniques like constant-rate dummy traffic, padding to uniform packet sizes, and anonymization networks (like Tor) — well beyond IPSec's scope.</span>
      </div>
    </div>

    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-fb">Fill Blank</span>
        <span class="q-text">IPSec prevents an attacker from resending a captured packet by including a monotonically increasing ________ in each packet, verified using a ________ at the receiver.</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>sequence number</strong>; <strong>sliding window</strong>. The receiver accepts only packets whose sequence numbers fall within the current window (N–W+1 to N) and marks received numbers to detect duplicates.</span>
      </div>
    </div>
  </div>
</div>

  <div class="slide-content">
    <ul>
      <li><strong>Topics:</strong> VPN, IPSec (ESP, Transport/Tunnel Mode, IKE)</li>
      <li>IPSec operates at the <strong>Network Layer</strong> (below TCP/UDP, below TLS/DTLS)</li>
      <li>Comparison of security protocols at each layer:
        <ul>
          <li>Application: SSH, SSL/HTTPS</li>
          <li>Transport: TLS, DTLS</li>
          <li>Network: <strong>IPSec / VPN</strong></li>
          <li>Data Link: WPA, WEP, L2TP/PPTP</li>
        </ul>
      </li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">LAYERED SECURITY LANDSCAPE</span>
        Security can be applied at any layer of the TCP/IP stack. Each layer has different visibility, scope, and trade-offs. Understanding <em>where</em> a security protocol lives tells you <em>what</em> it can and cannot protect.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — The Security Layer Cake</div>
      <div class="deep-dive">
        <table class="compare-table">
          <thead>
            <tr><th>Layer</th><th>Protocol(s)</th><th>Scope</th><th>Protects</th><th>Limitation</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Application</strong></td>
              <td><code>SSH</code>, <code>HTTPS</code></td>
              <td>One application</td>
              <td>That app's traffic only</td>
              <td>Must modify each app</td>
            </tr>
            <tr>
              <td><strong>Transport</strong></td>
              <td><code>TLS</code>, <code>DTLS</code></td>
              <td>One connection</td>
              <td>TCP/UDP payload</td>
              <td>Per-connection setup</td>
            </tr>
            <tr>
              <td><strong>Network</strong></td>
              <td><code>IPSec</code>, VPN</td>
              <td>All IP traffic</td>
              <td>Entire IP payload</td>
              <td>Kernel/gateway config</td>
            </tr>
            <tr>
              <td><strong>Data Link</strong></td>
              <td><code>WPA2/3</code>, <code>WEP</code></td>
              <td>One wireless hop</td>
              <td>Radio transmission</td>
              <td>Hop-by-hop only</td>
            </tr>
          </tbody>
        </table>
        <p><strong>Why defense in depth matters:</strong> Each layer is a separate security barrier. If TLS is bypassed (e.g., through a certificate forgery attack or an unpatched library), IPSec at the network layer may still block the attacker from seeing the payload. Multiple independent layers mean multiple independent failure modes — an attacker must compromise <em>all</em> of them simultaneously.</p>
        <div class="analogy">
          Imagine a vault (IPSec at the network layer) inside a building (TLS at the transport layer) inside a gated estate (WPA2 at the data link layer). Breaking into the estate doesn't open the vault. Each layer independently protects against different attacker positions.
        </div>
      </div>
    </div>
  </div>
</div>

<div id="s4" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDES 4–5</span>
    <div>
      <div class="slide-title">IPSec Benefits & Virtual Private Networks</div>
      <div class="slide-subtitle">Router authentication guarantees · VPN use cases</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li><strong>IPsec can assure:</strong></li>
      <li>
        <ul>
          <li>Router advertisements come from authorized routers</li>
          <li>Routers in neighbor relationships are authorized</li>
          <li>Redirect messages come from the correct router</li>
          <li>Routing updates are not forged</li>
        </ul>
      </li>
      <li><strong>Applications:</strong> VPNs, Branch Offices, Remote Users, Extranets</li>
      <li><strong>VPN:</strong> Connects a remote user/branch to a private network over public Internet</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">ROUTING SECURITY</span>
        A critical but often overlooked benefit of IPSec is <strong>routing protocol security</strong>. Without IPSec, an attacker can send <em>forged BGP/OSPF updates</em> to redirect traffic — this is how real-world BGP hijacking attacks work. IPSec authenticates routing messages, ensuring only authorized routers can influence the routing table.
      </div>
      <div class="key-box">
        <span class="tag">VPN DEFINITION</span>
        A <strong>Virtual Private Network (VPN)</strong> uses IPSec (or TLS-based protocols) to create an <em>encrypted tunnel</em> over the public Internet. From the user's perspective, they appear to be on the private network — their traffic exits from the VPN server's IP address, not their own. The "virtual" in VPN means the private network exists logically, not physically.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">🌀</span>Simon Sinek's Golden Circle — VPN</div>
      <div class="golden-circle">
        <div class="gc-card gc-why">
          <div class="gc-label">🔴 WHY</div>
          <p>Remote employees and branch offices need access to internal corporate resources. Sending sensitive data over the public Internet unencrypted exposes it to any observer along the path — from your ISP to foreign governments to coffee shop sniffers.</p>
        </div>
        <div class="gc-card gc-how">
          <div class="gc-label">🟡 HOW</div>
          <p>IPSec tunnel mode wraps the original IP packet in a new outer packet, encrypts and authenticates the entire inner packet, and routes it to the VPN gateway. The gateway decrypts it and forwards to the internal destination.</p>
        </div>
        <div class="gc-card gc-what">
          <div class="gc-label">🟢 WHAT</div>
          <p>A remote employee on a coffee shop WiFi can securely access the corporate file server as if they were physically in the office — all traffic is encrypted end-to-end through the VPN tunnel.</p>
        </div>
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — VPN Use Cases</div>
      <div class="deep-dive">
        <p><strong>Remote Access VPN:</strong> Individual employees connect from home/travel. Client-to-gateway. The employee's VPN client establishes a tunnel to the corporate VPN gateway. Common protocols: IPSec/IKEv2, Cisco AnyConnect (SSL/TLS), WireGuard.</p>
        <p><strong>Site-to-Site VPN:</strong> Two office networks connected through VPN gateways (routers with IPSec). Neither end-user device knows about the tunnel — the gateways handle everything. Gateway-to-gateway tunnel mode.</p>
        <p><strong>Extranet VPN:</strong> Connecting to a partner organization's network securely. Similar to site-to-site but across organizational boundaries, often with stricter access control.</p>
        <div class="warn-box">
          <strong>VPN Limitation:</strong> VPN hides traffic from intermediate observers, but the VPN server itself sees all your traffic. Commercial VPN providers (NordVPN, ExpressVPN) can potentially log and sell your browsing history. For true privacy, you need to trust your VPN provider or run your own.
        </div>
      </div>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — Slides 3–5</div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-mc">MC</span>
        <span class="q-text">IPSec's routing security guarantees primarily defend against which type of attack?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) SQL injection</div>
        <div class="q-opt">B) BGP hijacking / forged routing updates</div>
        <div class="q-opt">C) DDoS amplification</div>
        <div class="q-opt">D) Password brute-force</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>B) BGP hijacking / forged routing updates.</strong> IPSec authenticates routing protocol messages, ensuring only authorized routers can advertise routes or update forwarding tables. Without this, an attacker can redirect global Internet traffic by injecting forged BGP updates.</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-tf">T/F</span>
        <span class="q-text">A site-to-site VPN requires IPSec to be installed and configured on every individual employee's workstation.</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>False.</strong> In a site-to-site VPN, IPSec is configured only on the gateway routers at each site. Individual workstations send unencrypted traffic to their local gateway, which then encrypts and tunnels it to the remote gateway. End users are completely unaware of the VPN.</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-fb">Fill Blank</span>
        <span class="q-text">In the VPN diagram, a remote user at IP 130.166.128.1 connects to the corporate network (10.116.230.x) through a ________ at IP 130.160.57.1, using IPSec ________ mode to encrypt the entire inner packet including its original IP header.</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>VPN server (gateway)</strong>; <strong>tunnel</strong>. The VPN server is the gateway between the public Internet and the private 10.116.230.x network. Tunnel mode encapsulates the entire original packet — including its private IP header — inside a new outer packet, hiding the internal addressing from the public Internet.</span>
      </div>
    </div>
  </div>
</div>

<div id="s7" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDE 7</span>
    <div>
      <div class="slide-title">IP Security Architecture</div>
      <div class="slide-subtitle">IKE · SAD · SPD · ESP/AH — the four pillars</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li><strong>Four components of IPSec Architecture:</strong></li>
      <li>
        <ul>
          <li><strong>IKE (Internet Key Exchange v2)</strong> — negotiates cryptographic keys</li>
          <li><strong>SAD (Security Association Database)</strong> — stores active SAs</li>
          <li><strong>SPD (Security Policy Database)</strong> — stores traffic rules</li>
          <li><strong>ESP / AH</strong> — the actual packet security protocols</li>
        </ul>
      </li>
      <li>IKE establishes an IKE SA first, then negotiates the IPSec SA Pair</li>
      <li>ESP then protects actual data traffic using the negotiated SA</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">ARCHITECTURE OVERVIEW</span>
        IPSec is not a single protocol — it is an <strong>architecture</strong> composed of four cooperating components. Understanding each component's role, and how they interact, is essential for both operating IPSec and answering exam questions about it.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">🌀</span>Simon Sinek's Golden Circle</div>
      <div class="golden-circle">
        <div class="gc-card gc-why">
          <div class="gc-label">🔴 WHY</div>
          <p>Secure communication requires: (1) agreement on what to protect (policy), (2) agreement on how to protect it (keys and algorithms), (3) a record of active protections (SA database), and (4) the actual cryptographic mechanisms. A protocol that only addresses one of these cannot work in practice.</p>
        </div>
        <div class="gc-card gc-how">
          <div class="gc-label">🟡 HOW</div>
          <p>SPD defines the policy. IKE negotiates keys and creates SAs stored in SAD. When a packet arrives, the device checks SPD to see if protection is needed, then looks up SAD to find the active SA, then applies AH/ESP using the SA parameters.</p>
        </div>
        <div class="gc-card gc-what">
          <div class="gc-label">🟢 WHAT</div>
          <p>A fully automated, policy-driven security framework. Admins define policy once (SPD). IKE handles key management automatically. Packets are protected/verified at wire speed using the negotiated parameters stored in SAD.</p>
        </div>
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — The Four Components</div>
      <div class="deep-dive">
        <p><strong>IKE (Internet Key Exchange v2):</strong> Runs over UDP port 500. Establishes a two-phase exchange: Phase 1 creates an authenticated, encrypted channel (IKE SA) between the two peers. Phase 2 uses that channel to negotiate the actual IPSec SA pair (one SA per direction) including: encryption algorithm, key material, SA lifetime, and mode (transport/tunnel). IKEv2 replaced IKEv1 and is significantly more efficient (fewer round trips) and secure.</p>
        <p><strong>SAD (Security Association Database):</strong> A table on each device listing all active Security Associations. Each SA specifies: the SPI (Security Parameters Index), destination IP, protocol (AH or ESP), encryption/auth algorithm, keys, sequence number, and lifetime. When IPSec processes an outbound or inbound packet, it looks up the correct SA in the SAD to know how to encrypt/decrypt or authenticate it.</p>
        <p><strong>SPD (Security Policy Database):</strong> Defines the <em>intent</em> — what to do with different types of traffic: PROTECT (apply IPSec), BYPASS (send unprotected), or DISCARD (drop it). Entries are matched by selectors: source/destination IP, protocol, ports. SPD is consulted before SAD — it's the policy that drives security decisions.</p>
        <p><strong>ESP / AH:</strong> The actual cryptographic headers inserted into/around IP packets to implement the security services. ESP provides encryption + authentication; AH provides authentication only. Both embed the SPI to let the receiver look up the correct SA in their SAD.</p>
        <div class="analogy">
          <strong>Analogy:</strong> Think of IPSec as a border control system. SPD is the rulebook (passengers from country X need a visa). IKE is the visa negotiation process (issuing credentials). SAD is the record of valid visas. AH/ESP are the actual passport stamps and sealed document pouches used at the border.
        </div>
      </div>
    </div>
  </div>
</div>

<div id="s8" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDE 8</span>
    <div>
      <div class="slide-title">Security Policy Database (SPD)</div>
      <div class="slide-subtitle">Traffic classification: PROTECT · BYPASS · DISCARD</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li>Defines how to process datagrams received/sent by the device</li>
      <li>Matches subsets of IP traffic to relevant SAs</li>
      <li>Uses <strong>selectors</strong> to filter: local/remote IP, protocol, ports</li>
      <li>Three actions: <strong>PROTECT</strong> (apply ESP/AH) · <strong>BYPASS</strong> (pass through) · <strong>DISCARD</strong> (drop)</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">SPD ENTRIES (from slide example)</span>
        The slide shows a real SPD table. Let's decode each entry:
        <ul style="margin-top: 8px; padding-left: 16px; list-style: disc;">
          <li style="padding: 3px 0; color: var(--text2);">UDP port 500 → BYPASS (IKE control traffic must not be encrypted, or IKE itself can't negotiate!)</li>
          <li style="padding: 3px 0; color: var(--text2);">ICMP → BYPASS (error messages like ping must flow freely for diagnostics)</li>
          <li style="padding: 3px 0; color: var(--text2);">All traffic to 1.2.3.0/24 → PROTECT with ESP transport-mode (intranet)</li>
          <li style="padding: 3px 0; color: var(--text2);">TCP to 1.2.4.10 port 80 → PROTECT with ESP (encrypt HTTP to that server)</li>
          <li style="padding: 3px 0; color: var(--text2);">TCP to 1.2.4.10 port 443 → BYPASS (already TLS-encrypted; double encryption wastes CPU)</li>
          <li style="padding: 3px 0; color: var(--text2);">All traffic to 1.2.4.0/24 → DISCARD (DMZ zone — no access)</li>
        </ul>
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — Reading an SPD Table</div>
      <div class="deep-dive">
        <p><strong>The SPD is evaluated top-to-bottom</strong> like a firewall ruleset. The first matching rule wins. This is why the most specific rules (specific IPs/ports) appear before general wildcard rules.</p>
        <p><strong>BYPASS for TLS traffic (port 443):</strong> This is a design insight worth understanding deeply. If traffic is already encrypted by TLS (HTTPS), applying IPSec on top would double-encrypt it — wasting CPU cycles with no security gain, since the application data is already confidential. The SPD rule BYPASS port 443 says "trust TLS to handle this."</p>
        <p><strong>BYPASS for IKE (UDP port 500):</strong> This one is required for correctness, not just efficiency. IKE is the protocol that <em>negotiates</em> IPSec parameters. If IPSec tried to protect IKE packets, it would need already-established IPSec parameters — a chicken-and-egg problem. IKE packets must bypass IPSec processing.</p>
        <div class="warn-box">
          <strong>Security Note:</strong> An incorrectly configured SPD that allows too many BYPASS entries can silently undermine IPSec protection. For example, accidentally bypassing all UDP traffic could expose DNS queries, video conferencing, and other UDP applications to eavesdropping — even though IPSec is "enabled."
        </div>
      </div>
    </div>
  </div>
</div>

<div id="s9" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDE 9</span>
    <div>
      <div class="slide-title">IPSec Processing Models</div>
      <div class="slide-subtitle">Outbound &amp; Inbound packet processing flows</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li><strong>Outbound:</strong> Search SPD → DISCARD / BYPASS / PROTECT → If PROTECT, search SAD → if no SA, trigger IKE → Process AH/ESP → Forward via IP</li>
      <li><strong>Inbound:</strong> Determine packet type (plain IP or IPSec) → Search SPD → if BYPASS, deliver up; if IPSec, search SAD → Process AH/ESP → Deliver to higher layer</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">🌀</span>Workflow — Outbound Packet Processing</div>
      <table class="workflow-table">
        <thead><tr><th>Step</th><th>Action</th><th>Database Consulted</th><th>Possible Outcomes</th></tr></thead>
        <tbody>
          <tr><td>1</td><td>New outbound IP packet arrives at IPSec layer</td><td>—</td><td>Start processing</td></tr>
          <tr><td>2</td><td>Search Security Policy Database for matching selectors</td><td>SPD</td><td>Match found / No match (DISCARD)</td></tr>
          <tr><td>3a</td><td>Policy says DISCARD</td><td>—</td><td>Drop packet silently</td></tr>
          <tr><td>3b</td><td>Policy says BYPASS</td><td>—</td><td>Forward packet without IPSec</td></tr>
          <tr><td>3c</td><td>Policy says PROTECT</td><td>SAD</td><td>Look up active SA</td></tr>
          <tr><td>4a</td><td>SA found in SAD</td><td>SAD</td><td>Apply AH/ESP using SA parameters</td></tr>
          <tr><td>4b</td><td>No SA exists yet</td><td>—</td><td>Trigger IKE to negotiate new SA</td></tr>
          <tr><td>5</td><td>IKE negotiates SA, stores in SAD</td><td>SAD (write)</td><td>SA now available</td></tr>
          <tr><td>6</td><td>Apply AH/ESP, forward packet via IP</td><td>—</td><td>Secured packet sent on wire</td></tr>
        </tbody>
      </table>
      <div class="disc-h"><span class="icon">🌀</span>Workflow — Inbound Packet Processing</div>
      <table class="workflow-table">
        <thead><tr><th>Step</th><th>Action</th><th>Outcome</th></tr></thead>
        <tbody>
          <tr><td>1</td><td>Inbound packet received</td><td>Determine: plain IP or IPSec packet?</td></tr>
          <tr><td>2a</td><td>Plain IP packet</td><td>Search SPD — is it expected unprotected traffic?</td></tr>
          <tr><td>2b</td><td>IPSec packet (has AH or ESP header)</td><td>Search SAD using SPI + destination IP + protocol</td></tr>
          <tr><td>3a</td><td>SPD says BYPASS expected</td><td>Deliver packet up to TCP/UDP layer</td></tr>
          <tr><td>3b</td><td>SPD says protection required but packet is plain</td><td>DISCARD — policy violation</td></tr>
          <tr><td>4</td><td>SA found in SAD</td><td>Process AH/ESP (verify MAC, decrypt)</td></tr>
          <tr><td>5</td><td>Verification passes</td><td>Strip IPSec headers, deliver inner packet up</td></tr>
          <tr><td>6</td><td>Verification fails</td><td>Drop packet, log security event</td></tr>
        </tbody>
      </table>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — Why This Two-Database Design?</div>
      <div class="deep-dive">
        <p><strong>SPD (policy) vs SAD (state):</strong> Separating policy from state is a fundamental design principle. SPD stores <em>intent</em> — what you want to happen. SAD stores <em>state</em> — what is currently happening. This separation means you can change policy without affecting active connections, and active connections don't change policy.</p>
        <p><strong>Why trigger IKE lazily (on first packet)?</strong> Pre-establishing SAs for every possible destination would be wasteful. IKE is triggered on-demand when the first packet matches a PROTECT policy but no SA exists. This is called "trigger-on-first-packet" or lazy SA establishment.</p>
      </div>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — Slides 7–9</div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-mc">MC</span>
        <span class="q-text">In an SPD, UDP port 500 traffic is set to BYPASS. What is the reason for this design decision?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) UDP is not supported by IPSec</div>
        <div class="q-opt">B) IKE uses UDP 500 and needs to bypass IPSec to avoid a chicken-and-egg problem</div>
        <div class="q-opt">C) Port 500 is reserved for DNS</div>
        <div class="q-opt">D) UDP traffic is always encrypted by default</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>B.</strong> IKE uses UDP port 500 to negotiate IPSec parameters. If IKE packets were subject to IPSec processing, they would need already-established IPSec SAs to be protected — but those SAs don't exist yet (IKE creates them). BYPASS allows IKE to function unobstructed.</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-sa">Short Answer</span>
        <span class="q-text">An inbound packet arrives with an IPSec ESP header, but the receiver cannot find a matching entry in its SAD using the SPI. What happens?</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text">The packet is discarded. Without a matching SA in the SAD, the receiver has no keys or parameters to decrypt/verify the packet. This is the correct behavior — silently discarding unrecognized IPSec packets prevents processing packets from unauthorized or unknown sources.</span>
      </div>
    </div>
  </div>
</div>

<div id="s10" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDE 10</span>
    <div>
      <div class="slide-title">Security Association Database (SAD)</div>
      <div class="slide-subtitle">The state record of all active IPSec connections</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li>SA = <strong>One-way</strong> security relationship between sender &amp; receiver</li>
      <li>Two-way communication requires <strong>two SAs</strong> (one per direction)</li>
      <li><strong>SA identified by 3 parameters:</strong></li>
      <li>
        <ul>
          <li><strong>SPI</strong> (Security Parameters Index) — 32-bit random ID</li>
          <li><strong>IP Destination Address</strong></li>
          <li><strong>Security Protocol Identifier:</strong> AH or ESP</li>
        </ul>
      </li>
      <li><strong>SA database contains per-SA:</strong> SPI, sequence counter, anti-replay window, AH/ESP info (keys, algorithms), SA lifetime, Mode, Path MTU</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">SA IS UNIDIRECTIONAL</span>
        This is a common exam trap. An SA is <strong>one-directional</strong>. For Alice to securely communicate with Bob in both directions, <em>two SAs</em> are required: Alice→Bob SA and Bob→Alice SA. They may use different algorithms, keys, and modes — this flexibility is intentional, allowing asymmetric security configurations.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — SA Parameters Explained</div>
      <div class="deep-dive">
        <table class="compare-table">
          <thead><tr><th>SA Field</th><th>Purpose</th><th>Example Value</th></tr></thead>
          <tbody>
            <tr><td><strong>SPI</strong></td><td>Unique 32-bit tag identifying this SA. Sent in every AH/ESP header so the receiver can look up the right SA quickly.</td><td><code>0x1463baaf</code></td></tr>
            <tr><td><strong>Dest IP</strong></td><td>The IP address toward which this SA applies (receiver's IP). Part of the 3-tuple lookup key.</td><td><code>192.168.1.10</code></td></tr>
            <tr><td><strong>Protocol</strong></td><td>AH (51) or ESP (50) — determines which header format and processing to apply.</td><td>ESP</td></tr>
            <tr><td><strong>Seq Counter</strong></td><td>Monotonically increasing. Sent in each packet. Receiver checks against anti-replay window.</td><td>Starts at 0, per-SA</td></tr>
            <tr><td><strong>Anti-Replay Window</strong></td><td>Bitmap of recently received sequence numbers. Detects replayed packets.</td><td>64-bit window (default)</td></tr>
            <tr><td><strong>Keys / Algorithms</strong></td><td>The actual cryptographic key material and algorithm IDs (e.g., AES-256-GCM for ESP).</td><td>AES-256-GCM key</td></tr>
            <tr><td><strong>Lifetime</strong></td><td>How long this SA is valid before it must be renegotiated via IKE. Measured in seconds or bytes.</td><td>3600 seconds</td></tr>
            <tr><td><strong>Mode</strong></td><td>Transport or Tunnel — determines the packet format and header placement.</td><td>Tunnel</td></tr>
          </tbody>
        </table>
        <p><strong>Why SPI is random and not sequential:</strong> If SPIs were sequential (1, 2, 3...), an attacker could guess the SPI of a new SA by watching established connections. A random 32-bit SPI prevents SPI prediction attacks.</p>
      </div>
    </div>
  </div>
</div>

<div id="s11" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDES 11–12</span>
    <div>
      <div class="slide-title">Authentication Header (AH) &amp; ICV Computation</div>
      <div class="slide-subtitle">Integrity + origin authentication (no encryption)</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li><strong>AH provides:</strong> data origin authentication, data integrity, optional anti-replay</li>
      <li><strong>AH does NOT provide:</strong> encryption / confidentiality</li>
      <li><strong>AH header fields:</strong> Next Header · Payload Length · Reserved · SPI · Sequence Number · Authentication Data (ICV)</li>
      <li>Next Header protocol numbers: TCP=6, UDP=17, IP=4, AH=51</li>
      <li><strong>ICV Computation (HMAC):</strong></li>
      <li>
        <ul>
          <li>Covers: immutable IP header fields + AH header + upper-layer data</li>
          <li>Mutable but predictable fields (e.g., TTL) are zeroed before computation</li>
        </ul>
      </li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">AH vs ESP — CRITICAL DISTINCTION</span>
        AH = <strong>Authentication only</strong> (no encryption). Anyone can read the payload. ESP = <strong>Authentication + Encryption</strong>. In practice, <strong>AH is rarely used alone</strong> because most real-world security requirements include confidentiality. AH is mainly relevant in environments where encryption is legally restricted but authentication is required.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — The AH ICV (Integrity Check Value)</div>
      <div class="deep-dive">
        <p><strong>The ICV computation problem:</strong> AH wants to authenticate the IP header, but some IP header fields change during routing — specifically TTL (decremented by each router), DSCP bits, and the checksum. AH cannot include these mutable fields in the ICV because they'll be different by the time the packet arrives.</p>
        <p><strong>Solution — Immutable vs. Mutable fields:</strong> AH zeroes out mutable IP header fields before computing the HMAC. Truly immutable fields (source IP, destination IP, protocol) are included as-is. Mutable but predictable fields (e.g., destination IP with loose source routing, which is predictable) can also be included. TTL and similar fields are zeroed to zero during ICV computation, so even though they change in transit, the receiver can reproduce the same zero value and verify the HMAC.</p>
        <div class="analogy">
          Think of it like signing a contract where some fields are filled in later. You sign the contract with placeholders for those fields — your signature covers the immutable content, and both parties know which fields will be filled in. The ICV is the cryptographic signature over the "important content."
        </div>
        <p><strong>Why HMAC?</strong> A plain hash (like SHA-256) does not require a key — anyone can compute it. A MAC computed without a key provides integrity but NOT authentication (an attacker could modify the packet AND recompute the hash). HMAC uses the SA's shared secret key, so only the two endpoints (who know the key) can compute or verify the ICV. This provides both integrity AND origin authentication.</p>
        <div class="warn-box">
          <strong>AH and NAT do not work together.</strong> NAT modifies the source IP address — an immutable field that AH includes in its ICV. After NAT translation, the destination's AH verification will fail because the source IP in the packet no longer matches the source IP at the time of ICV computation. This is a fundamental incompatibility. ESP in tunnel mode (which encrypts the original IP header into the payload) works with NAT, which is why ESP is almost universally preferred.
        </div>
      </div>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — Slides 10–12</div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-mc">MC</span>
        <span class="q-text">Why does AH zero out the TTL field when computing the ICV, even though TTL is part of the IP header?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) TTL is not important for security</div>
        <div class="q-opt">B) TTL changes at each router hop, making it mutable, so it would cause ICV verification failure</div>
        <div class="q-opt">C) TTL is encrypted separately by ESP</div>
        <div class="q-opt">D) TTL is only present in IPv6</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>B.</strong> TTL is decremented by every router that forwards the packet. If AH included TTL in the ICV calculation, the ICV computed at the sender (TTL=64) would not match the ICV verified at the receiver (TTL=57 after 7 hops). Zeroing mutable fields before HMAC computation ensures the receiver can reproduce the same input and verify the ICV correctly.</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-tf">T/F</span>
        <span class="q-text">AH (Authentication Header) can be used effectively when traffic passes through a NAT device.</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>False.</strong> NAT modifies the source IP address, which is an immutable field included in the AH ICV. After NAT translation, the receiver's ICV verification will fail because the source IP has changed. AH is incompatible with NAT. ESP in tunnel mode is NAT-compatible because the original IP headers are encrypted inside the payload (and the outer headers are added fresh by the VPN gateway).</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-fb">Fill Blank</span>
        <span class="q-text">A Security Association (SA) is ________ directional, meaning that for two hosts to securely exchange data in both directions, ________ SAs are required.</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>one (uni)</strong>; <strong>two</strong>. One SA covers Alice→Bob traffic, the other covers Bob→Alice. Each SA can independently use different algorithms, keys, and modes.</span>
      </div>
    </div>
  </div>
</div>

<div id="s13" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDES 13–14</span>
    <div>
      <div class="slide-title">Encapsulating Security Payload (ESP)</div>
      <div class="slide-subtitle">Confidentiality + Integrity + Authentication — the complete solution</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li><strong>ESP provides:</strong> Message confidentiality · Data origin authentication · Connectionless integrity · Anti-replay · Limited traffic flow confidentiality</li>
      <li>Services depend on options selected when establishing SA</li>
      <li><strong>ESP Packet Fields:</strong> SPI · Sequence Number · IV (optional) · Payload Data · TFC Padding · Padding · Pad Length · Next Header · Integrity Check Value (ICV)</li>
      <li>Key materials: negotiated via IKE (EC Diffie-Hellman — ECDHE)</li>
      <li>Algorithm in modern deployments: <strong>AES-GCM</strong></li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>Key Concepts at a Glance</div>
      <div class="key-box">
        <span class="tag">ESP IS THE WORKHORSE</span>
        ESP is the most important and most commonly used IPSec protocol in practice. It supersedes AH because it provides everything AH does <strong>plus</strong> confidentiality. Modern ESP deployments use <strong>AES-GCM</strong> (Galois/Counter Mode) — an authenticated encryption with associated data (AEAD) cipher that provides both encryption and authentication in a single pass.
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — ESP Packet Structure</div>
      <div class="deep-dive">
        <table class="compare-table">
          <thead><tr><th>ESP Field</th><th>Purpose</th><th>Security Role</th></tr></thead>
          <tbody>
            <tr><td><strong>SPI</strong></td><td>32-bit index identifying the SA. Sent in plaintext so receiver can look up the SA in SAD.</td><td>SA lookup (not secret)</td></tr>
            <tr><td><strong>Sequence Number</strong></td><td>Monotonically increasing counter. Sent in plaintext (AES-GCM uses it as additional authenticated data).</td><td>Anti-replay detection</td></tr>
            <tr><td><strong>IV (optional)</strong></td><td>Initialization Vector for the cipher. Random per packet for CBC mode. For GCM, this is the nonce.</td><td>Ensures ciphertext randomness</td></tr>
            <tr><td><strong>Payload Data</strong></td><td>Encrypted content — for transport mode: TCP/UDP segment; for tunnel mode: entire original IP packet.</td><td>Confidentiality (encrypted)</td></tr>
            <tr><td><strong>Padding</strong></td><td>Pads payload to block boundary (AES requires 16-byte alignment). Also TFC padding can pad to uniform sizes (traffic flow confidentiality).</td><td>Algorithm alignment + limited metadata hiding</td></tr>
            <tr><td><strong>Pad Length</strong></td><td>Length of padding in bytes, so receiver can strip it after decryption.</td><td>Structural (within encrypted region)</td></tr>
            <tr><td><strong>Next Header</strong></td><td>Protocol number of the payload (6=TCP, 17=UDP, 4=IP for tunnel). Encrypted alongside payload.</td><td>Hidden from eavesdroppers</td></tr>
            <tr><td><strong>ICV</strong></td><td>Integrity Check Value (MAC) computed over SPI + Sequence + Payload. Verifies authenticity.</td><td>Data origin auth + integrity</td></tr>
          </tbody>
        </table>
        <p><strong>Why AES-GCM for ESP?</strong> AES-GCM is an Authenticated Encryption with Associated Data (AEAD) cipher. It simultaneously: (1) encrypts the payload, (2) produces an authentication tag (ICV) over both the encrypted payload AND the ESP header (SPI, sequence number) as "associated data." This eliminates the need to run a separate HMAC operation, making it faster than traditional ESP with separate encryption and authentication. Modern IPSec (RFC 4106) standardizes AES-GCM as the preferred ESP cipher.</p>
        <div class="analogy">
          AES-GCM is like a tamper-evident lockbox that simultaneously locks AND seals the box in one step. Traditional separate encrypt-then-MAC is like locking the box separately AND sealing it separately — two operations. GCM does both in one efficient pass.
        </div>
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📌</span>ESP vs. AH — Master Comparison</div>
      <table class="compare-table">
        <thead><tr><th>Feature</th><th>AH</th><th>ESP</th><th>ESP + Auth</th></tr></thead>
        <tbody>
          <tr><td><strong>Confidentiality</strong></td><td class="tag-no">NO</td><td class="tag-yes">YES</td><td class="tag-yes">YES</td></tr>
          <tr><td><strong>Data Origin Auth</strong></td><td class="tag-yes">YES</td><td class="tag-no">NO (optional)</td><td class="tag-yes">YES</td></tr>
          <tr><td><strong>Integrity</strong></td><td class="tag-yes">YES</td><td class="tag-no">NO (optional)</td><td class="tag-yes">YES</td></tr>
          <tr><td><strong>Anti-Replay</strong></td><td class="tag-yes">YES</td><td class="tag-opt">OPTIONAL</td><td class="tag-opt">OPTIONAL</td></tr>
          <tr><td><strong>Protects IP Header</strong></td><td class="tag-yes">YES (immutable parts)</td><td class="tag-no">NO (transport) / YES (tunnel)</td><td class="tag-no">NO (transport) / YES (tunnel)</td></tr>
          <tr><td><strong>NAT Compatible</strong></td><td class="tag-no">NO</td><td class="tag-yes">YES (tunnel mode)</td><td class="tag-yes">YES (tunnel mode)</td></tr>
          <tr><td><strong>Protocol Number</strong></td><td><code>51</code></td><td><code>50</code></td><td><code>50</code></td></tr>
          <tr><td><strong>Practical Use</strong></td><td class="tag-no">Rare</td><td class="tag-yes">Ubiquitous</td><td class="tag-yes">Preferred</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — Slides 13–14</div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-mc">MC</span>
        <span class="q-text">Which ESP field allows the receiver to determine what type of data is in the payload (TCP, UDP, or a full IP packet)?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) SPI field</div>
        <div class="q-opt">B) Sequence Number field</div>
        <div class="q-opt">C) Next Header field</div>
        <div class="q-opt">D) Pad Length field</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>C) Next Header.</strong> The Next Header field contains the protocol number (6=TCP, 17=UDP, 4=IP for tunnel mode) identifying what type of data is encapsulated in the payload. This field is encrypted (inside the encrypted region), so eavesdroppers cannot determine what type of traffic is being carried.</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-sa">Short Answer</span>
        <span class="q-text">Why is AES-GCM preferred over traditional separate encrypt-then-HMAC for ESP?</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text">AES-GCM is an AEAD (Authenticated Encryption with Associated Data) cipher that simultaneously provides encryption and authentication in a single efficient pass. It's faster than running AES-CBC for encryption and then HMAC-SHA256 for authentication as separate operations. Additionally, GCM's authentication tag covers both the encrypted payload AND the header fields (SPI, sequence number) as associated data, providing authentication over the full ESP packet in one step.</span>
      </div>
    </div>
  </div>
</div>

<div id="s16" class="slide-block">
  <div class="slide-header">
    <span class="slide-num">SLIDES 16–20</span>
    <div>
      <div class="slide-title">Transport Mode vs. Tunnel Mode</div>
      <div class="slide-subtitle">End-to-end vs. gateway-to-gateway protection</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li><strong>Transport Mode:</strong> end-to-end between two hosts; IPSec header inserted between IP header and payload; original IP header preserved</li>
      <li><strong>Tunnel Mode:</strong> gateway-to-gateway; entire original packet wrapped in new IP packet; original IP header hidden inside</li>
      <li><strong>ESP Transport:</strong> encrypts IP payload (not IP header)</li>
      <li><strong>ESP Tunnel:</strong> encrypts entire inner IP packet (including inner IP header)</li>
      <li><strong>AH Transport:</strong> authenticates IP payload + selected IP header portions</li>
      <li><strong>AH Tunnel:</strong> authenticates entire inner IP packet + selected portions of outer IP header</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">🌀</span>Simon Sinek's Golden Circle — Modes</div>
      <div class="golden-circle">
        <div class="gc-card gc-why">
          <div class="gc-label">🔴 WHY TWO MODES?</div>
          <p>Different deployment scenarios have different requirements. Host-to-host communication within a trusted network needs different protection from site-to-site VPN tunnels where traffic crosses untrusted infrastructure. One mode fits each scenario.</p>
        </div>
        <div class="gc-card gc-how">
          <div class="gc-label">🟡 HOW THEY DIFFER</div>
          <p>Transport mode inserts IPSec between the existing IP header and payload. Tunnel mode creates a brand-new outer IP packet, placing the entire original packet (header + payload) as the payload of the new packet.</p>
        </div>
        <div class="gc-card gc-what">
          <div class="gc-label">🟢 WHAT EACH GIVES</div>
          <p>Transport: less overhead, but original IP addresses remain visible. Tunnel: more overhead, but original source/destination IPs are hidden inside encrypted content — attacker can't tell which internal host is talking to which external host.</p>
        </div>
      </div>
    </div>
    <div class="disc-section">
      <div class="disc-h"><span class="icon">📖</span>Deep Dive — Modes Compared</div>
      <div class="deep-dive">
        <table class="compare-table">
          <thead>
            <tr><th>Aspect</th><th>Transport Mode</th><th>Tunnel Mode</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>Typical use case</strong></td>
              <td>End-to-end between two hosts directly communicating</td>
              <td>Site-to-site VPN; remote access VPN through a gateway</td>
            </tr>
            <tr>
              <td><strong>IP header protection</strong></td>
              <td>Original IP header exposed; ESP does not encrypt it</td>
              <td>Original IP header fully encrypted inside new outer packet</td>
            </tr>
            <tr>
              <td><strong>Packet structure</strong></td>
              <td><code>IP hdr | ESP hdr | TCP hdr | Data | ESP trlr | ICV</code></td>
              <td><code>New IP hdr | ESP hdr | Orig IP hdr | TCP hdr | Data | ESP trlr | ICV</code></td>
            </tr>
            <tr>
              <td><strong>Overhead</strong></td>
              <td>Lower — only ESP/AH header added</td>
              <td>Higher — entire new outer IP header + ESP added</td>
            </tr>
            <tr>
              <td><strong>Traffic analysis resistance</strong></td>
              <td>Weak — original src/dst IPs visible</td>
              <td>Stronger — original IPs hidden; only VPN endpoint IPs visible</td>
            </tr>
            <tr>
              <td><strong>NAT compatibility</strong></td>
              <td>ESP OK; AH breaks with NAT</td>
              <td>ESP OK (outer IP modified by NAT, inner hidden); AH still breaks</td>
            </tr>
            <tr>
              <td><strong>Which end must support IPSec?</strong></td>
              <td>Both communicating hosts must run IPSec</td>
              <td>Only the gateways — end hosts behind firewalls don't need IPSec</td>
            </tr>
            <tr>
              <td><strong>Exam tip</strong></td>
              <td>Tunnel mode can evade destination-address-based egress filtering — important for the midterm!</td>
              <td>↩ Same cell</td>
            </tr>
          </tbody>
        </table>

        <div class="warn-box">
          <strong>Exam Critical:</strong> The midterm answer key confirms: "Which IPSec mode can encrypt the inner IP header to evade destination-address-based egress filtering in the Firewall?" — Answer: <strong>Tunnel Mode</strong>. Because tunnel mode encrypts the entire original packet (including the destination IP), a firewall doing packet filtering on destination address cannot see the real destination IP — it only sees the outer VPN gateway IP.
        </div>

        <p><strong>Why Tunnel Mode enables site-to-site VPN without end-host IPSec:</strong> Consider two offices. Office A has 100 workstations, none of which run IPSec. Office B has 200 workstations. In tunnel mode, only the border routers (gateways) run IPSec. When a workstation in Office A sends a packet to Office B, the Office A gateway wraps the entire packet in a new IPSec-protected outer packet addressed to Office B's gateway. Office B's gateway unwraps it and delivers to the destination workstation. Neither workstation knows about IPSec — they just see normal IP connectivity.</p>
      </div>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — Slides 16–20</div>

        <span class="q-text">A company wants to connect two branch offices over the Internet. Individual workstations should not need IPSec software. Which IPSec configuration is correct?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) AH in Transport Mode between all workstations</div>
        <div class="q-opt">B) ESP in Transport Mode between all workstations</div>
        <div class="q-opt">C) ESP in Tunnel Mode between the branch gateway routers</div>
        <div class="q-opt">D) IKE only (no ESP or AH needed)</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>C.</strong> Tunnel mode between gateways allows all workstations behind each gateway to communicate securely without installing IPSec software on any workstation. ESP provides encryption. The gateways encapsulate all outbound traffic and decapsulate all inbound traffic transparently.</span>

    </div>
    <div class="q-block">

        <div class="q-opt">B) Only the IP payload (TCP/UDP segment); the IP header remains visible</div>

        <div class="q-opt">D) Nothing is encrypted; only authenticated</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>B.</strong> In ESP Transport Mode, the IP payload (TCP/UDP/ICMP data) is encrypted. The original IP header remains in plaintext so intermediate routers can forward the packet. Only in Tunnel Mode is the entire original packet (including its IP header) encrypted inside the outer packet.</span>

    <div class="q-block">

        <span class="q-text">Using VPN (tunnel mode) can eliminate ALL traffic-flow metadata leakage, including source/destination address, timing, and volume.</span>

<div id="s22" class="slide-block">

    <div>
      <div class="slide-title">Without VPN vs. OpenVPN — Traffic Exposure Analysis</div>
      <div class="slide-subtitle">What can an attacker see? Before and after VPN</div>
    </div>
  </div>
  <div class="slide-content">
    <ul>
      <li><strong>Without VPN:</strong> plaintext Ethernet + IP + TCP + HTTP payload visible on WAN; attacker with tcpdump can read everything; ip_src=client, ip_dst=webserver visible</li>
      <li><strong>With OpenVPN:</strong> WAN packet = eth | ip | udp | [encrypted: ip | tcp | http | payload]; only tunnel endpoints visible to attacker; inner payload encrypted via TLS</li>
      <li>OpenVPN NAT table: maps public (eth0) addresses to private tun0 VPN addresses</li>
    </ul>
  </div>
  <div class="discussion">
    <div class="disc-section">
      <div class="disc-h"><span class="icon">🌀</span>What Can Observers See? — Before vs. After VPN</div>
      <table class="workflow-table">
        <thead>
          <tr><th>Observer Position</th><th>Without VPN (Visible)</th><th>With VPN (Visible)</th><th>With VPN (Hidden)</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>On-path between C and VPN server</td>
            <td>Client IP, Server IP, all payload</td>
            <td>Client IP, VPN gateway IP, traffic timing/volume</td>
            <td>Real destination IP, payload content</td>
          </tr>
          <tr>
            <td>VPN gateway V itself</td>
            <td>N/A (on-path)</td>
            <td>Client IP, destination IP, full payload, timing/volume</td>
            <td>Nothing — it sees everything</td>
          </tr>
          <tr>
            <td>Destination server S</td>
            <td>Client IP, payload</td>
            <td>VPN gateway IP, payload, timing/volume</td>
            <td>Real client IP (masked by VPN NAT)</td>
          </tr>
          <tr>
            <td>On-path between VPN and destination</td>
            <td>Client IP, Server IP, payload</td>
            <td>VPN gateway IP, Server IP, payload (if decrypted at gateway), timing/volume</td>
            <td>Original client IP (replaced by VPN gateway IP via NAT)</td>
          </tr>
        </tbody>
      </table>
      <div class="deep-dive" style="margin-top: 14px;">
        <div class="warn-box">
          <strong>Critical VPN Limitation (from midterm Q6):</strong> VPN hides the client's IP from the destination server (replaced by VPN gateway's IP via NAT). But traffic metadata (timing, packet sizes, volume) remains visible to on-path observers on both sides of the VPN gateway. The VPN gateway itself is a trusted party that sees everything.
        </div>
        <p><strong>OpenVPN NAT mechanics:</strong> OpenVPN creates a virtual network interface (tun0) with a private IP in the VPN subnet (e.g., 10.0.10.5). When the client sends traffic, it goes: application → TCP/IP stack → tun0 (VPN interface) → OpenVPN daemon → TLS encryption → UDP/IP → physical eth0. The VPN server receives the encrypted UDP, decrypts it, and forwards from its own public IP using NAT — the destination server sees the VPN server's IP, not the client's.</p>
      </div>
    </div>
  </div>
  <div class="questions">
    <div class="questions-title">📝 Practice Questions — Slides 21–23</div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-mc">MC</span>
        <span class="q-text">Client C accesses destination server S through VPN gateway V. What can an on-path observer between C and V observe?</span>
      </div>
      <div class="q-options">
        <div class="q-opt">A) Client IP, destination server IP, full payload</div>
        <div class="q-opt">B) Client IP, VPN gateway IP, traffic metadata (timing/volume)</div>
        <div class="q-opt">C) Only VPN gateway IP and volume</div>
        <div class="q-opt">D) Nothing — VPN hides everything</div>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text"><strong>B.</strong> Between C and V, the observer sees: (a) the client's IP address (a), (c) the VPN gateway's public IP as the destination, and (d) traffic metadata including timing, packet sizes, and total bytes. The actual destination server IP (b) is hidden inside the encrypted tunnel. (This matches the midterm answer: on-path C→V sees: a, c, d.)</span>
      </div>
    </div>
    <div class="q-block">
      <div class="q-header">
        <span class="q-type q-sa">Short Answer</span>
        <span class="q-text">Why does OpenVPN use NAT at the VPN server, and what security effect does this have from the destination server's perspective?</span>
      </div>
      <div class="q-answer">
        <span class="q-answer-label">✔ Answer</span>
        <span class="q-answer-text">OpenVPN uses NAT to multiplex multiple VPN clients (each with a private tun0 VPN address) through the single public IP of the VPN server. From the destination server's perspective, all traffic from all VPN clients appears to originate from the VPN server's public IP — the real client IP is hidden. This provides IP anonymization for clients: the destination server cannot directly identify or locate the individual client's real IP address.</span>
      </div>
    </div>
  </div>
</div>
