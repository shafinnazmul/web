<div class="integrative" id="exam">
  <h2>🎯 Exam Preparation — Integrative Questions</h2>
  <p class="sub">Comprehensive questions spanning multiple topics from Lecture 19</p>

  <div class="int-q">
    <p>Q1. [Short Answer] Compare DSSS (used by ZigBee) and FHSS (used by Bluetooth) as spread spectrum techniques. For each, explain: (a) the mechanism, (b) the security benefit it provides, and (c) why neither alone is sufficient for IoT security.</p>
    <div class="int-q-answer">
      <strong>DSSS (ZigBee):</strong> (a) Multiplies each data bit by a pseudo-random "chipping code" of length N, spreading the narrow signal across N times the bandwidth. (b) Security benefit: the signal appears as wideband noise to receivers without the code — low probability of interception; provides processing gain against narrowband interference. (c) Insufficient alone: the spreading code is public/standardized in ZigBee (not secret), so it provides interference resilience but NOT confidentiality. Actual security requires AES-128 encryption at the network and application layers.
      <br><br>
      <strong>FHSS (Bluetooth):</strong> (a) Transmitter and receiver share a synchronized pseudo-random frequency hopping sequence; they switch frequency together 1,600 times/second across 79 channels. (b) Security benefit: signals are difficult to jam (narrowband jammer affects only one hop slot); difficult to intercept without knowing the hopping sequence; Adaptive Frequency Hopping (AFH) avoids occupied channels. (c) Insufficient alone: the hopping sequence is derived from the master's public device address — not secret. Real Bluetooth security relies on AES-CCM link-layer encryption and E0 cipher, not on the hopping pattern alone.
    </div>
  </div>

  <div class="int-q">
    <p>Q2. [Short Answer] A municipality wants to deploy 50,000 smart water meters across a city. Meters need to report usage once per day, operate for 15 years on a battery, work in basements and underground vaults, and have tamper-proof data (utility billing depends on it). Compare LoRaWAN and NB-IoT for this use case, and recommend one with full justification.</p>
    <div class="int-q-answer">
      <strong>LoRaWAN assessment:</strong> Good range (covers city with few gateways), excellent battery life (Class A ALOHA, device sleeps between daily transmissions), low device cost (~$5 chipset), open standard. Security: AES-128 MIC and payload encryption. Concerns: ISM band — susceptible to interference and jamming from neighbors (a competing ISM device can disrupt readings); no carrier-grade QoS guarantee; daily readings could be tampered with via replay if counter management is weak (v1.0 vulnerability).
      <br><br>
      <strong>NB-IoT assessment:</strong> Licensed spectrum = guaranteed interference-free operation; full LTE security stack (AES-128, mutual authentication, data integrity via HMAC); 20 dB deep coverage advantage — reaches underground vaults; 10+ year battery life with PSM; >100K devices per cell sector (scales to 50K easily). Concerns: higher device cost (~$10–15 chipset); requires cellular carrier partnership; SIM card management; higher base station infrastructure cost.
      <br><br>
      <strong>Recommendation: NB-IoT.</strong> Billing data integrity is non-negotiable — the full LTE security stack with mutual authentication and HMAC-protected data integrity is critical. ISM band interference (LoRaWAN) could cause missed daily readings, leading to billing disputes. Underground vault coverage (20 dB gain) is critical for water meter applications. Battery life of 10 years (not 15) is the main limitation — would need to plan for mid-life battery replacement unless ultra-low-power hardware design extends this.
    </div>
  </div>

  <div class="int-q">
    <p>Q3. [Short Answer] A hospital's security team discovers that a patient monitoring IoT device using ZigBee is transmitting patient vital signs without encryption, despite the ZigBee standard supporting AES-128. How is this possible? What is the attack vector, and what remediation steps would you recommend?</p>
    <div class="int-q-answer">
      <strong>Why this is possible:</strong> ZigBee's AES-128 encryption is optional, not mandatory. Many manufacturers ship devices with encryption disabled for simpler setup or interoperability, intending to enable it later (often never). Additionally, if the network key was distributed insecurely (via "touchlink commissioning" which broadcasts the key in the open air), an attacker already has the key and can decrypt all traffic even when encryption is nominally enabled.
      <br><br>
      <strong>Attack vector:</strong> (1) Passive eavesdropping with a ZigBee sniffer (e.g., HackRF + KillerBee framework, ~$200 equipment) captures all plaintext vital signs from within ~75 meters of any device on the network. (2) If encryption IS enabled but touchlink commissioning was used, the attacker obtains the master key during commissioning and decrypts all traffic. (3) A ZigBee router node in the mesh (even a legitimate one) sees plaintext application data in transit.
      <br><br>
      <strong>Remediation:</strong> (1) Enable AES-128 network layer encryption immediately with a randomly generated network key; (2) Add application-layer end-to-end encryption (TLS/AES) for vital signs payload — do not rely solely on ZigBee network encryption; (3) Conduct a ZigBee network key audit — ensure no default keys are in use; (4) Disable touchlink commissioning, require installation codes (out-of-band key exchange); (5) Implement network access control (ZigBee Trust Center reject unrecognized devices); (6) Consider migrating to a technology with stronger built-in security for medical devices (BLE with Numeric Comparison pairing + application-layer AES, or NB-IoT for cellular-grade security).
    </div>
  </div>

  <div class="int-q">
    <p>Q4. [Short Answer] Explain the spreading factor (SF) trade-off in LoRa networks. If you were deploying sensors in a 10 km² urban area with 200 devices, what SF strategy would you implement and why? Include security considerations.</p>
    <div class="int-q-answer">
      <strong>SF Trade-off:</strong> Spreading Factor (SF) ranges from 7 to 12 in LoRa. For each unit increase in SF: data rate is halved (SF7: 5,470 bps → SF12: 250 bps at 125 kHz); receiver sensitivity improves by ~2.5 dB (SF7: -123 dBm → SF12: -137 dBm, a 14 dB total improvement); time on air (transmission duration) doubles, increasing collision probability in ALOHA networks.
      <br><br>
      <strong>Strategy for 200 devices in 10 km² urban area:</strong> Implement Adaptive Data Rate (ADR). Use SF7 for devices within 1 km of gateway (good signal, high throughput, minimal airtime = fewer collisions). Use SF9–10 for devices 2–5 km away (balance range vs. airtime). Reserve SF11–12 for edge-of-coverage devices in dense buildings. This minimizes total network airtime (reducing collisions) while ensuring all devices achieve reliable connectivity.
      <br><br>
      <strong>Security considerations:</strong> Higher SF = longer time on air = longer window for eavesdropping and jamming of individual transmissions. Attackers specifically targeting high-value sensors might selectively jam SF12 transmissions (which are slowest and most eavesdropping-vulnerable). Mitigate by: keeping payloads short and encrypted (AES-128 LoRaWAN v1.1), avoiding predictable transmission schedules (use jitter in reporting intervals), and implementing join-server attestation to prevent rogue gateway injection.
    </div>
  </div>

  <div class="int-q">
    <p>Q5. [Multiple Choice — Integrative] Which statement BEST describes why 5G uses both OFDMA and Massive MIMO together rather than either technique alone?</p>
    <p>A) OFDMA provides the multiple-antenna capability while Massive MIMO provides the multi-user scheduling. B) OFDMA enables efficient multi-user scheduling in the frequency domain; Massive MIMO enables spatial separation of users, multiplying total capacity beyond what frequency-domain sharing alone can achieve. C) Massive MIMO replaces OFDMA in 5G because it is more spectrally efficient. D) OFDMA is used for mmWave frequencies while Massive MIMO is used only for sub-6 GHz bands.</p>
    <div class="int-q-answer">
      <strong>✔ Answer: B.</strong> OFDMA allocates different subcarriers to different users at the same time — multi-user access in the frequency domain. Massive MIMO adds spatial multiplexing: hundreds of base station antennas create narrow focused beams directed at individual users. Multiple users with spatially separated beams can each receive their own OFDMA allocation simultaneously without interfering with each other — multiplying capacity in both the frequency AND spatial domains. Together, they allow 5G base stations to serve dozens of users simultaneously with high throughput per user, which neither technique alone could achieve at this scale.
    </div>
  </div>
</div>

<section class="section" id="kerberos">
  <div class="section-header">
    <div class="section-number">01</div>
    <h2>Kerberos Authentication Protocol</h2>
    <span class="section-tag">Lec 13</span>
  </div>

  <p class="lead">Kerberos is a symmetric-key authentication protocol that uses a trusted third party (the KDC) to verify identities and distribute session keys. Passwords never traverse the network in any form.</p>

  <div class="sub-section">
    <h3>Key Actors &amp; Keys</h3>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="label">Actor</div>
        <div class="title">Client (Alice)</div>
        <p>Derives <span class="k">Kc</span> = hash(password). Stores TGT + session key. Never sends password on wire.</p>
      </div>
      <div class="concept-card">
        <div class="label">Actor</div>
        <div class="title">AS — Authentication Server</div>
        <p>Holds all client keys (<span class="k">Kc</span>). Verifies identity implicitly; issues TGTs encrypted with <span class="k">K_TGS</span>.</p>
      </div>
      <div class="concept-card">
        <div class="label">Actor</div>
        <div class="title">TGS — Ticket Granting Server</div>
        <p>Holds <span class="k">K_TGS</span> and all service keys. Decrypts TGTs, issues service tickets <span class="k">Ticket_v</span>.</p>
      </div>
      <div class="concept-card gold">
        <div class="label">Actor</div>
        <div class="title">Server V (Service)</div>
        <p>Holds <span class="k">Kv</span> (installed out-of-band). Verifies <span class="k">Ticket_v</span> and Authenticator. Performs mutual auth.</p>
      </div>
    </div>

    <div class="concept-grid">
      <div class="concept-card">
        <div class="label">Long-Term Key (Gold)</div>
        <div class="title">Kc — Client Key</div>
        <p>hash(password). Stored in KDC DB. Derived locally by Alice. <strong>Discarded immediately</strong> after decrypting AS reply.</p>
      </div>
      <div class="concept-card">
        <div class="label">Long-Term Key (Gold)</div>
        <div class="title">K_TGS — TGS Key</div>
        <p>Shared between AS and TGS. Used to encrypt/decrypt TGTs. Client never knows this key.</p>
      </div>
      <div class="concept-card">
        <div class="label">Long-Term Key (Gold)</div>
        <div class="title">Kv — Service Key</div>
        <p>Random key per service, stored in KDC DB and installed on Server V. Encrypts service tickets.</p>
      </div>
      <div class="concept-card good">
        <div class="label">Session Key (Green)</div>
        <div class="title">K_c,TGS / K_c,v</div>
        <p>Fresh random key per session. Short-lived. K_c,TGS for Alice↔TGS; K_c,v for Alice↔Server V.</p>
      </div>
    </div>
  </div>

  <div class="sub-section">
    <h3>Phase 1 — AS Exchange (Initial Authentication)</h3>
    <div class="step-flow">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body"><strong>Client → AS:</strong> <span class="k">ID_client</span>, <span class="k">ID_TGS</span>, <span class="k">TS1</span> (all plaintext). <span>Password is NOT sent.</span></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body"><strong>AS looks up:</strong> retrieves <span class="k">Kc</span> from DB using <span class="k">ID_client</span>. Generates fresh session key <span class="k">K_c,TGS</span>.</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body"><strong>AS → Client (Part A):</strong> E(<span class="k">Kc</span>, [<span class="k">K_c,TGS</span> ‖ <span class="k">ID_TGS</span> ‖ <span class="k">TS1</span>]) — only Alice can decrypt.</div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-body"><strong>AS → Client (Part B / TGT):</strong> E(<span class="k">K_TGS</span>, [<span class="k">K_c,TGS</span> ‖ <span class="k">ID_client</span> ‖ <span class="k">AD_client</span> ‖ <span class="k">TS1</span> ‖ <span class="k">Lifetime</span>]) — opaque to client.</div>
      </div>
      <div class="step">
        <div class="step-num">5</div>
        <div class="step-body"><strong>Client decrypts Part A</strong> using locally derived <span class="k">Kc</span>. Extracts <span class="k">K_c,TGS</span>. Wrong password → garbage → fail. <strong>Discards <span class="k">Kc</span> immediately.</strong></div>
      </div>
    </div>
    <div class="callout"><strong>Key insight:</strong> Password verification is <em>implicit</em>. AS never says "wrong password." If Alice types wrong password, she derives wrong <span class="k">Kc</span>, Part A decrypts to garbage, and she gets no session key.</div>
  </div>

  <div class="sub-section">
    <h3>Phase 2 — TGS Exchange (Service Ticket Request)</h3>
    <div class="step-flow">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body"><strong>Client creates Authenticator1:</strong> E(<span class="k">K_c,TGS</span>, [<span class="k">ID_client</span> ‖ <span class="k">AD_client</span> ‖ <span class="k">TS2</span>]) — proves live presence.</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body"><strong>Client → TGS:</strong> <span class="k">ID_v</span> + TGT (forwarded opaque) + Authenticator1.</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body"><strong>TGS decrypts TGT</strong> with <span class="k">K_TGS</span> → extracts <span class="k">K_c,TGS</span>. Checks validity window. Decrypts Authenticator1 with extracted <span class="k">K_c,TGS</span>.</div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-body"><strong>TGS verifies:</strong> ID_client(TGT) == ID_client(Auth1), |now − TS2| ≤ 5 min, no replay in cache.</div>
      </div>
      <div class="step">
        <div class="step-num">5</div>
        <div class="step-body"><strong>TGS issues Ticket_v:</strong> E(<span class="k">Kv</span>, [<span class="k">K_c,v</span> ‖ ID_client ‖ AD_client ‖ ID_v ‖ TS2 ‖ Lifetime_v]) and Part A: E(<span class="k">K_c,TGS</span>, [<span class="k">K_c,v</span> ‖ ID_v ‖ TS2]).</div>
      </div>
    </div>
    <div class="callout"><strong>Two-layer verification:</strong> TGT proves KDC endorsed Alice. Authenticator proves sender has <span class="k">K_c,TGS</span> right now. Stolen TGT alone is useless — attacker can't forge the Authenticator.</div>
  </div>

  <div class="sub-section">
    <h3>Phase 3 — Service Access &amp; Mutual Authentication</h3>
    <div class="step-flow">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body"><strong>Client creates Authenticator2:</strong> E(<span class="k">K_c,v</span>, [ID_client ‖ AD_client ‖ TS3]). Sends with Ticket_v to Server V.</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body"><strong>Server V decrypts Ticket_v</strong> with <span class="k">Kv</span> → extracts <span class="k">K_c,v</span>. Checks ID_v matches own name, validity window.</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body"><strong>Server V decrypts Auth2</strong> with <span class="k">K_c,v</span>. Verifies ID cross-check, timestamp, replay cache.</div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-body"><strong>Mutual auth (optional):</strong> Server V sends E(<span class="k">K_c,v</span>, [TS3 + 1]) → Alice verifies the server genuinely knows <span class="k">Kv</span>.</div>
      </div>
      <div class="step">
        <div class="step-num">5</div>
        <div class="step-body"><strong>Secure session:</strong> All traffic encrypted with <span class="k">K_c,v</span>. KDC uninvolved from this point.</div>
      </div>
    </div>
  </div>

  <div class="sub-section">
    <h3>Attacks &amp; Defenses</h3>
    <div class="attack-box">
      <div class="atk-label">Attack</div>
      <h4>Pass-the-Ticket (Mimikatz)</h4>
      <p>Attacker dumps LSASS memory on Windows, extracts TGT + <span class="k safe">K_c,TGS</span> pair. Can now impersonate Alice until TGT expires. Password is never recovered — only temporary credentials.</p>
      <div class="defense">Defense: Credential Guard (hardware-isolated storage), Protected Users group, short TGT lifetimes (2–4 hrs for privileged accounts), PKINIT/smart cards.</div>
    </div>

    <div class="concept-grid">
      <div class="concept-card">
        <div class="label">Ticket Lifetime</div>
        <div class="title">TGT: 8–10 hrs</div>
        <p>Workday length. Stolen TGT automatically expires. No CRL/OCSP needed.</p>
      </div>
      <div class="concept-card good">
        <div class="label">Ticket Lifetime</div>
        <div class="title">Ticket_v: 1–2 hrs</div>
        <p>Shorter than TGT. Auto-renewed from TGS (no password re-entry). Limits stolen ticket window.</p>
      </div>
    </div>
  </div>

  <div class="pq-section">
    <h4>Practice Questions</h4>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">MC</span> Why does the AS send the TGT to the client if the client can't read it?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">The client acts as a <em>courier</em> — it forwards the opaque TGT to the TGS on the next request. The TGT is encrypted with K_TGS (which only TGS knows), so the client cannot read or forge it. The client carries proof of KDC endorsement without being able to tamper with it.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> Why is K_c (the long-term client key) discarded immediately after Phase 1?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">K_c is derived from Alice's password — it is the highest-value credential. Keeping it in memory creates a long window for memory-dump attacks (e.g., Mimikatz). After it decrypts Part A and delivers K_c,TGS, K_c has served its only purpose. The stored credentials (TGT + K_c,TGS) are sufficient for all service access until TGT expiry, so K_c need not be kept.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">TF</span> True or False: A Kerberos replay attack within the 5-minute clock skew window is impossible.</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">False. The 5-minute freshness check alone is insufficient — an attacker could replay the same Authenticator multiple times within that window. The <strong>replay cache</strong> (which records every (ID_client, TS) pair seen within the window) prevents duplicates. The combination of freshness check AND replay cache together ensures each Authenticator is accepted exactly once.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> Explain mutual authentication in step 3.8. What does TS3+1 prove?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">Server V returns E(K_c,v, [TS3+1]). To produce this, Server V must have: (1) decrypted Ticket_v using Kv → proving it knows Kv, (2) extracted K_c,v from the ticket, (3) decrypted Authenticator2 → extracted TS3, (4) encrypted TS3+1 with K_c,v. Only the legitimate KDC-registered Server V knows Kv. The +1 convention (not TS3 itself) proves the server processed Alice's specific current request, not a replayed old mutual-auth message.</div>
    </div>
  </div>
</section>

<section class="section" id="ipsec">
  <div class="section-header">
    <div class="section-number">02</div>
    <h2>IP Security (IPSec)</h2>
    <span class="section-tag">Lec 14</span>
  </div>

  <p class="lead">IPSec is a suite of protocols securing IP at the network layer — protecting all traffic transparently, regardless of application. It operates below TLS, protecting the entire IP packet.</p>

  <div class="sub-section">
    <h3>IPSec Components</h3>
    <div class="concept-grid">
      <div class="concept-card warn">
        <div class="label">Protocol</div>
        <div class="title">AH — Authentication Header</div>
        <p>Provides authentication + integrity. <strong>No encryption.</strong> Like a wax seal: proves who sent it, but contents are visible. Rarely used alone.</p>
      </div>
      <div class="concept-card good">
        <div class="label">Protocol</div>
        <div class="title">ESP — Encapsulating Security Payload</div>
        <p>Authentication + integrity + <strong>encryption</strong>. Most-used IPSec component. Provides full confidentiality. Preferred over AH.</p>
      </div>
      <div class="concept-card">
        <div class="label">Mode</div>
        <div class="title">Transport Mode</div>
        <p>Protects payload only. IP header unchanged and visible. Used host-to-host. Less overhead.</p>
      </div>
      <div class="concept-card gold">
        <div class="label">Mode</div>
        <div class="title">Tunnel Mode</div>
        <p>Wraps <strong>entire</strong> original packet in new IP packet. Hides internal addressing. Used for VPNs (site-to-site).</p>
      </div>
    </div>
    <div class="concept-card" style="margin-bottom:16px;">
      <div class="label">Key Management</div>
      <div class="title">IKE — Internet Key Exchange</div>
      <p>Automates negotiation of encryption keys between peers. Without IKE, admins would manually configure keys on every device — impractical at scale.</p>
    </div>

    <div class="callout"><strong>Exam tip — VPN design:</strong> Site-to-site VPNs use <strong>ESP in Tunnel Mode</strong>: ESP for confidentiality + integrity, Tunnel Mode to encapsulate entire packets (hiding internal IP structure).</div>
  </div>

  <div class="sub-section">
    <h3>TLS vs IPSec</h3>
    <table class="ctable">
      <tr><th>Attribute</th><th>TLS (Transport Layer)</th><th>IPSec (Network Layer)</th></tr>
      <tr><td>Scope</td><td>Specific application connections (HTTPS, etc.)</td><td>All IP traffic from all applications</td></tr>
      <tr><td>App changes needed?</td><td>Yes — app must be coded to use TLS</td><td>No — transparent to applications</td></tr>
      <tr><td>Browser padlock?</td><td>Yes (HTTPS uses TLS)</td><td>No</td></tr>
      <tr><td>VPN use?</td><td>Not directly (SSL VPNs exist)</td><td>Primary VPN protocol</td></tr>
      <tr><td>Deployment</td><td>Per connection, per app</td><td>Network-level, device-wide</td></tr>
    </table>
  </div>

  <div class="sub-section">
    <h3>Network Layer Fundamentals</h3>
    <div class="two-col">
      <div>
        <h4>IP Datagram Contents</h4>
        <ul>
          <li>Source IP address</li>
          <li>Destination IP address</li>
          <li>Protocol field (TCP=6, UDP=17, ICMP=1)</li>
          <li>TTL (Time-to-Live)</li>
          <li>Data payload (transport segment)</li>
          <li>Header checksum, fragmentation fields</li>
        </ul>
      </div>
      <div>
        <h4>Routing Protocols</h4>
        <ul>
          <li><strong>RIP</strong> — distance-vector, max 15 hops, oldest</li>
          <li><strong>OSPF</strong> — link-state, Dijkstra's algorithm, intra-domain</li>
          <li><strong>BGP</strong> — inter-domain, policy-based, Internet backbone</li>
          <li>BGP hijacking: false route announcements redirect global traffic</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="sub-section">
    <h3>NAT &amp; Private Addressing</h3>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="label">RFC 1918 Private Ranges</div>
        <div class="title">10.0.0.0/8</div>
        <p>~16.7M addresses. Used by large orgs, AWS internal.</p>
      </div>
      <div class="concept-card">
        <div class="label">RFC 1918 Private Ranges</div>
        <div class="title">172.16.0.0/12</div>
        <p>172.16.0.0 to 172.31.255.255. Note: 172.32.x.x is NOT private.</p>
      </div>
      <div class="concept-card">
        <div class="label">RFC 1918 Private Ranges</div>
        <div class="title">192.168.0.0/16</div>
        <p>Home routers. 192.168.0.x, 192.168.1.x, etc.</p>
      </div>
    </div>
    <p>NAT maps (private IP + port) → (public IP + new port) using a translation table. Supports ~60,000 concurrent connections per public IP (16-bit port space). Security benefit: blocks unsolicited inbound connections. <strong>Not a firewall replacement.</strong></p>
  </div>

  <div class="sub-section">
    <h3>Subnetting Quick Reference</h3>
    <table class="ctable">
      <tr><th>CIDR</th><th>Host bits</th><th>Total addresses</th><th>Usable hosts</th><th>Typical use</th></tr>
      <tr><td>/24</td><td>8</td><td>256</td><td>254</td><td>Small office/home</td></tr>
      <tr><td>/23</td><td>9</td><td>512</td><td>510</td><td>Medium network</td></tr>
      <tr><td>/16</td><td>16</td><td>65,536</td><td>65,534</td><td>Large org</td></tr>
      <tr><td>/8</td><td>24</td><td>16,777,216</td><td>16,777,214</td><td>ISP, RFC 1918</td></tr>
    </table>
    <div class="formula">Usable hosts = 2^(32 - prefix) − 2   [subtract network addr + broadcast addr]</div>
  </div>

  <div class="pq-section">
    <h4>Practice Questions</h4>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">MC</span> You're securing a site-to-site VPN over the Internet. Which combination?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a"><strong>C) ESP in Tunnel Mode.</strong> ESP provides encryption + authentication (confidentiality needed over untrusted Internet). Tunnel Mode wraps entire packets, hiding internal IP structure — essential for network-to-network VPN where you want to conceal internal addressing.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Calc</span> A /23 subnet: how many usable hosts? Show work.</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">Host bits = 32 − 23 = 9. Total = 2⁹ = 512. Usable = 512 − 2 = <strong>510</strong>. (Subtract 1 for network address where all host bits = 0, and 1 for broadcast where all host bits = 1.)</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> How does DHCP spoofing lead to a MITM attack?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">DHCP has no authentication — any device can respond to a DHCP Discover. Attacker sets up a rogue DHCP server that responds faster than the legitimate one. The rogue server assigns itself as the default gateway. All victim traffic now routes through the attacker's machine (MITM). <strong>Defense:</strong> DHCP Snooping on managed switches — marks only trusted ports as allowed to send DHCP Offer/Ack.</div>
    </div>
  </div>
</section>

<!-- ═══════════════════ IP ATTACKS ═══════════════════ -->
<section class="section" id="ip-attacks">
  <div class="section-header">
    <div class="section-number">03</div>
    <h2>IP &amp; ICMP Attacks</h2>
    <span class="section-tag">Lec 19</span>
  </div>

  <p class="lead">IP was designed for functionality, not security. The source address is filled in by the originating host — nothing prevents lying. Most IP attacks exploit this lack of authentication.</p>

  <div class="sub-section">
    <h3>IP Spoofing</h3>
    <p>Creating IP packets with a forged source address. Possible because IP has no state — peers are not authenticated. Enables unauthorized access, data leakage, and DDoS amplification.</p>
    <div class="formula danger">send(IP(src="victim_ip", dst="target")/ICMP())   # Scapy example</div>

    <h4>TTL-Based Detection</h4>
    <div class="two-col">
      <div>
        <p><strong>Scenario 1:</strong> Spoofer is further away than claimed. Destination receives packet with TTL = 29 (expected 30 after 2 hops). Probe reply comes back with different TTL. Mismatch → spoofed.</p>
      </div>
      <div>
        <p><strong>Scenario 2:</strong> Spoofer sends packet with TTL = 1. Router decrements to 0, sends ICMP Time Exceeded back to destination. Destination was not expecting this → spoofed.</p>
      </div>
    </div>

    <h4>Defenses Against IP Spoofing</h4>
    <ul>
      <li><strong>Ingress filtering:</strong> ISPs drop packets with source IPs not belonging to their assigned ranges</li>
      <li><strong>Egress filtering:</strong> Networks don't emit packets with external source IPs</li>
      <li><strong>IPSec:</strong> Cryptographic source authentication</li>
      <li><strong>Unicast Reverse Path Forwarding (uRPF):</strong> Router checks if return path exists</li>
      <li><strong>Randomized TCP ISN:</strong> Harder to guess sequence numbers for blind attacks</li>
      <li><strong>Avoid IP-based trust:</strong> Don't use r-utilities (rlogin, rsh)</li>
    </ul>
  </div>

  <div class="sub-section">
    <h3>ICMP Attacks</h3>
    <div class="attack-box">
      <div class="atk-label">Attack</div>
      <h4>ICMP Echo (Ping Scan / IP Sweep)</h4>
      <p>Send ICMP Echo Requests to all hosts in a subnet. Collect replies to map which hosts are alive. Used for reconnaissance (nmap -sP).</p>
      <div class="defense">Defense: Firewall rules blocking inbound ICMP, rate limiting.</div>
    </div>

    <div class="attack-box">
      <div class="atk-label">DDoS Attack</div>
      <h4>Smurf Attack</h4>
      <p>Send ICMP Echo Requests spoofed with the victim's IP as source, to a subnet's broadcast address. Every host on that subnet replies to the victim. Traffic amplification factor = number of hosts on broadcast network.</p>
      <div class="defense">Defense: Disable directed broadcast forwarding on routers. Modern networks do this by default.</div>
    </div>

    <div class="attack-box">
      <div class="atk-label">DoS Attack</div>
      <h4>Ping of Death</h4>
      <p>Send fragmented ICMP packets where the reassembled size exceeds 65,535 bytes (max IPv4 datagram). The offset of the last fragment causes total = 65,538 bytes. Kernel static buffer overflows → kernel panic / crash.</p>
      <div class="formula">Total 65120 + 398 = 65518 + 20 bytes header = 65538 &gt; 65535!</div>
      <div class="defense">Defense: Patch OS kernel. Validate fragment sizes before reassembly.</div>
    </div>

    <div class="attack-box">
      <div class="atk-label">DoS Attack</div>
      <h4>ICMP Destination Unreachable Attack</h4>
      <p>Forge ICMP Destination Unreachable messages to a host, claiming another host is unreachable. The victim drops its connection to the target → DoS via false error messages.</p>
      <div class="defense">Defense: IPSec authentication prevents forged ICMP.</div>
    </div>

    <div class="attack-box">
      <div class="atk-label">Evasion</div>
      <h4>Fragmentation Attack</h4>
      <p>Firewalls inspect the first fragment (containing TCP ports + flags). If a firewall allows a fragment and tracks by datagram ID, subsequent fragments slip through without inspection. SYN/ACK flags can be "postponed" to a later fragment, bypassing SYN-only firewall rules.</p>
    </div>
  </div>

  <div class="pq-section">
    <h4>Practice Questions</h4>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> Explain how Smurf uses amplification and why the victim is overwhelmed.</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">Attacker sends ICMP Echo Requests to N different subnet broadcast addresses, spoofing the victim's IP as source. Each subnet has M hosts that all reply to the victim. Total traffic directed at victim = N × M packets per original packet sent. The victim receives a massive flood it never requested, exhausting its bandwidth/CPU.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">TF</span> ICMP redirect messages are always safe.</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">False. ICMP has no authentication. Forged ICMP Redirect messages can trick a host into switching its default gateway to the attacker's machine, enabling a MITM attack or sniffing.</div>
    </div>
  </div>
</section>

<!-- ═══════════════════ ARP ATTACKS ═══════════════════ -->
<section class="section" id="arp">
  <div class="section-header">
    <div class="section-number">04</div>
    <h2>ARP &amp; Link-Layer Attacks</h2>
    <span class="section-tag">Lec 19</span>
  </div>

  <p class="lead">ARP (Address Resolution Protocol) maps IP addresses to MAC addresses on the local network. It is stateless and unauthenticated — replies without requests are accepted. This enables cache poisoning.</p>

  <div class="sub-section">
    <h3>How ARP Works</h3>
    <div class="step-flow">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body">Host A wants to reach Host B (192.168.1.10). Broadcasts: <span class="k">ARP who-has 192.168.1.10 tell 192.168.1.100</span></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">Host B replies: <span class="k">ARP reply 192.168.1.10 is-at 00:01:03:1D:98:B8</span>. Host A caches this mapping.</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body">Host A uses MAC 00:01:03:1D:98:B8 to build Ethernet frames to Host B.</div>
      </div>
    </div>
    <div class="callout"><strong>Critical flaw:</strong> ARP will accept unsolicited replies (gratuitous ARP). Any host can claim to be any IP at any time. The last reply wins — caches are overwritten.</div>
  </div>

  <div class="sub-section">
    <h3>ARP Spoofing / Cache Poisoning → MITM</h3>
    <div class="step-flow">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-body"><strong>Attacker (Host C)</strong> sends: <span class="k">ARP Reply: 192.168.1.10 is at BA:DB:AD:BA:DB:AD</span> → to Host A. Host A's cache poisoned: thinks B is at attacker's MAC.</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-body">Attacker also sends: <span class="k">ARP Reply: 192.168.1.100 is at BA:DB:AD:BA:DB:AD</span> → to Host B. Host B's cache poisoned: thinks A is at attacker's MAC.</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-body">Both A and B now send all traffic to the attacker. Attacker forwards traffic (acting as router) while reading everything. <strong>Full MITM established.</strong></div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-body">ARP spoofing tools repeatedly send forged replies to prevent the legitimate ARP cache from restoring correct values.</div>
      </div>
    </div>

    <div class="attack-box">
      <div class="atk-label">What attacker can steal</div>
      <h4>Clear-text protocols are fully exposed:</h4>
      <p>HTTP, FTP, Telnet — attacker reads all content. HTTPS/TLS defeats this (certificate verification prevents MITM on encrypted channels).</p>
      <div class="defense">Defenses: Dynamic ARP Inspection (DAI) on managed switches, static ARP entries for critical hosts, use encrypted protocols (TLS/SSH), 802.1X port authentication.</div>
    </div>
  </div>

  <div class="pq-section">
    <h4>Practice Questions</h4>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> Why does ARP spoofing work in a switched environment?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">Switches forward frames based on MAC addresses — they separate collision domains but not broadcast domains. ARP Replies are accepted without authentication (stateless). The attacker can poison ARP caches on both victim machines simultaneously, causing all traffic to flow through the attacker rather than directly between victims. The switch cooperates by delivering the poisoned frames as directed by the (now-corrupt) MAC table.</div>
    </div>
  </div>
</section>

<!-- ═══════════════════ TCP ATTACKS ═══════════════════ -->
<section class="section" id="tcp">
  <div class="section-header">
    <div class="section-number">05</div>
    <h2>TCP Attacks</h2>
    <span class="section-tag">Lec 20</span>
  </div>

  <div class="sub-section">
    <h3>TCP 3-Way Handshake</h3>
    <div class="step-flow">
      <div class="step">
        <div class="step-num">SYN</div>
        <div class="step-body">Client → Server: SYN packet with random sequence number x. Server stores TCB in half-open queue.</div>
      </div>
      <div class="step">
        <div class="step-num">SYN-ACK</div>
        <div class="step-body">Server → Client: SYN+ACK with server's random sequence y, ACK = x+1.</div>
      </div>
      <div class="step">
        <div class="step-num">ACK</div>
        <div class="step-body">Client → Server: ACK = y+1. Server moves TCB from half-open to established queue.</div>
      </div>
    </div>
  </div>

  <div class="sub-section">
    <h3>TCP Attacks</h3>
    <div class="attack-box">
      <div class="atk-label">DoS Attack</div>
      <h4>SYN Flooding</h4>
      <p>Attacker sends massive SYN packets (with spoofed source IPs) without completing the handshake. Server's half-open connection queue fills up. New legitimate connections cannot be accepted.</p>
      <div class="defense"><strong>Defense — SYN Cookies:</strong> Server computes H = keyed_hash(packet info, secret). H sent as SYN-ACK sequence number. Server does NOT store TCB in queue. If client is legitimate, it returns H+1. Server recomputes cookie to verify — only then allocates TCB. Queue never fills.</div>
    </div>

    <div class="attack-box">
      <div class="atk-label">DoS Attack</div>
      <h4>TCP Reset Attack</h4>
      <p>Attacker sniffs traffic (e.g., with Wireshark) to learn source IP, source port, destination IP, destination port, and current sequence number. Sends spoofed RST packet. Connection immediately terminated.</p>
      <p>Sequence number must fall within receiver's window — otherwise RST is ignored. Used to terminate SSH sessions, disrupt BGP peering, censor connections.</p>
      <div class="defense">Defense: IPSec (authenticates TCP segments), randomized ISN (harder to guess).</div>
    </div>

    <div class="attack-box">
      <div class="atk-label">Hijacking</div>
      <h4>TCP Session Hijacking</h4>
      <p>Attacker injects packets into an established TCP session. Must predict correct sequence number (ACK field must match receiver's expected next byte). If sequence number is off by Δ, data lands in buffer at wrong offset or falls outside window.</p>
      <div class="defense">Defense: Encrypt payload (IPSec/TLS) — injected data would decrypt to garbage. Randomize initial sequence numbers. Randomize source ports.</div>
    </div>
  </div>

  <div class="pq-section">
    <h4>Practice Questions</h4>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> How do SYN cookies defend against SYN floods without storing state?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">The server encodes connection state into the SYN-ACK sequence number (the cookie H = keyed_hash(src_ip, src_port, dst_ip, dst_port, timestamp, secret)). Since no TCB is stored, attackers cannot fill the queue. A legitimate client returns H+1 in the ACK; the server recomputes the expected cookie and verifies it matches, only then allocating a TCB. Attackers with spoofed IPs never see the SYN-ACK and cannot return the correct cookie.</div>
    </div>
  </div>
</section>

<!-- ═══════════════════ DNS ATTACKS ═══════════════════ -->
<section class="section" id="dns">
  <div class="section-header">
    <div class="section-number">06</div>
    <h2>DNS Attacks</h2>
    <span class="section-tag">Lec 22</span>
  </div>

  <div class="sub-section">
    <h3>DNS Query Flow (Iterative)</h3>
    <div class="step-flow">
      <div class="step"><div class="step-num">1</div><div class="step-body">Check /etc/hosts → local DNS cache</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-body">Query local DNS resolver (from /etc/resolv.conf)</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-body">Local DNS → Root Server → returns TLD server address (.com, .edu, etc.)</div></div>
      <div class="step"><div class="step-num">4</div><div class="step-body">Local DNS → TLD Server → returns authoritative nameserver address</div></div>
      <div class="step"><div class="step-num">5</div><div class="step-body">Local DNS → Authoritative Nameserver → returns final IP. Caches result.</div></div>
    </div>
  </div>

  <div class="sub-section">
    <h3>DNS Attacks</h3>
    <div class="attack-box">
      <div class="atk-label">LAN Attack</div>
      <h4>DNS Spoofing (Local)</h4>
      <p>Attacker on same LAN monitors DNS queries. Sends forged reply before real one arrives. Victim's machine accepts first response. Works because DNS uses UDP — no connection state to verify.</p>
      <div class="defense">Defense: DNSSEC (cryptographic signing of DNS records), HTTPS (certificate validation defeats MITM even with wrong IP).</div>
    </div>

    <div class="attack-box">
      <div class="atk-label">Remote Attack</div>
      <h4>DNS Cache Poisoning (Remote)</h4>
      <p>Remote attacker must guess both: (1) 16-bit transaction ID, and (2) 16-bit source port number of the DNS query. Probability per attempt = 1/(2^16 × 2^16) ≈ 1/4 billion. Cache effect: if wrong, real reply is cached; attacker must wait for TTL expiry.</p>
      <div class="defense">Defense: Randomize source port + transaction ID (reduces probability). DNSSEC. Run your own resolver.</div>
    </div>

    <div class="attack-box">
      <div class="atk-label">Advanced Attack</div>
      <h4>Kaminsky Attack</h4>
      <p>Solves the cache problem: ask a <em>different random subdomain</em> (e.g., random123.example.com) each attempt. The local DNS sends a new query each time (cache miss). In the forged response, provide a poisoned nameserver in the Authority section for the parent domain (example.com). If any attempt wins the race, the poisoned NS record gets cached for the entire domain.</p>
    </div>

    <div class="attack-box">
      <div class="atk-label">DoS</div>
      <h4>DoS Against DNS Infrastructure</h4>
      <p>Root servers: 13 named root servers (A–M), each a large server farm, highly distributed. Cached TLD records expire every 48hrs — attacks must sustain for days to have effect. TLD servers: more vulnerable. Country-code TLDs often lack redundancy. Authoritative servers: UltraDNS outage (2004) took Amazon, Walmart, Expedia offline for an hour.</p>
    </div>
  </div>

  <div class="sub-section">
    <h3>DNS Defenses</h3>
    <div class="concept-grid">
      <div class="concept-card good">
        <div class="label">Defense</div>
        <div class="title">DNSSEC</div>
        <p>Cryptographic signing of DNS records using zone hierarchy. Parent zones vouch for child zones. Detects tampered responses.</p>
      </div>
      <div class="concept-card good">
        <div class="label">Defense</div>
        <div class="title">HTTPS / TLS</div>
        <p>Even with a poisoned DNS response giving the wrong IP, TLS certificate validation fails → browser warning. DNS poisoning defeated.</p>
      </div>
      <div class="concept-card">
        <div class="label">Difference</div>
        <div class="title">DNSSEC vs TLS Chain of Trust</div>
        <p>DNSSEC: DNS zone hierarchy (parent zones sign child). TLS: Certificate Authorities (CAs) sign certificates.</p>
      </div>
    </div>
  </div>

  <div class="pq-section">
    <h4>Practice Questions</h4>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> Why is the Kaminsky attack more effective than a basic cache poisoning attack?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">Basic cache poisoning: if one attempt fails, the real reply gets cached. Attacker must wait for the TTL to expire (could be hours/days) before trying again. Kaminsky's insight: ask a different random subdomain each attempt (random1.example.com, random2.example.com...). Each is a cache miss, so the local DNS sends a fresh query each time. The attacker can make thousands of attempts per second without cache-blocking. The poisoned answer targets the parent domain's NS record in the Authority section, so one successful attempt poisons all lookups for the entire domain.</div>
    </div>
  </div>
</section>

<!-- ═══════════════════ WIRELESS ═══════════════════ -->
<section class="section" id="wireless">
  <div class="section-header">
    <div class="section-number">07</div>
    <h2>Wireless Security</h2>
    <span class="section-tag">Lec 17</span>
  </div>

  <p class="lead">Wireless is fundamentally insecure: broadcast medium enables eavesdropping, devices are mobile (not physically secured), and resource constraints limit security complexity.</p>

  <div class="sub-section">
    <h3>History of Wi-Fi Security Standards</h3>
    <table class="ctable">
      <tr><th>Standard</th><th>Encryption</th><th>Auth</th><th>Key Issues</th></tr>
      <tr><td>WEP (1999)</td><td>RC4</td><td>PSK (shared)</td><td>Short IV (24-bit), no replay protection, weak integrity, directly uses master key, no centralized key management</td></tr>
      <tr><td>WPA-Personal</td><td>TKIP (mixing+counter+RC4)</td><td>PSK</td><td>Software fix for WEP hardware; per-packet keys, 64-bit MIC, replay counter</td></tr>
      <tr><td>WPA-Enterprise</td><td>TKIP</td><td>802.1X/EAP</td><td>RADIUS server, per-user auth</td></tr>
      <tr><td>WPA2-Personal</td><td>AES-CTR (CCMP)</td><td>PSK</td><td>Session key derivable from PSK + nonce; all users share same password</td></tr>
      <tr><td>WPA2-Enterprise</td><td>AES-CTR</td><td>802.1X/EAP</td><td>Strong, but WPA2-PSK weak in shared environments</td></tr>
      <tr><td>WPA3 (2018)</td><td>AES-CTR</td><td>SAE (DH-like)</td><td>Forward secrecy! Even with PSK, past sessions safe. SAE = Simultaneous Authentication of Equals</td></tr>
    </table>
  </div>

  <div class="sub-section">
    <h3>WEP Problems (Exam Favorite)</h3>
    <div class="concept-grid">
      <div class="concept-card warn"><div class="label">Flaw</div><div class="title">Short IV (24-bit)</div><p>Only 2²⁴ ≈ 16M possible IVs. In a busy network, IV reuse is inevitable within hours. Same IV + same key = same keystream → XOR attacks.</p></div>
      <div class="concept-card warn"><div class="label">Flaw</div><div class="title">No IV Protection</div><p>IV sent in plaintext. Attacker can force IV reuse to collect enough ciphertext for statistical analysis.</p></div>
      <div class="concept-card warn"><div class="label">Flaw</div><div class="title">Directly Uses Master Key</div><p>RC4 used with master key directly (not per-session derivation). Compromise of any packet risks master key exposure.</p></div>
      <div class="concept-card warn"><div class="label">Flaw</div><div class="title">Weak Integrity (CRC-32)</div><p>CRC is linear — not a cryptographic MAC. An attacker can flip bits in ciphertext and predict how the CRC changes, enabling undetected modification.</p></div>
    </div>
  </div>

  <div class="sub-section">
    <h3>WPA2-PSK Vulnerability</h3>
    <p>Session key is fully derivable from PSK + nonces captured from the handshake. In hotel/conference environments, all users share the same PSK. An attacker who knows the password (legitimate user) can capture others' handshakes and decrypt their traffic. If application data is unencrypted (no TLS), attacker reads everything.</p>
    <div class="callout"><strong>WPA3 fix:</strong> SAE (Simultaneous Authentication of Equals) uses a Diffie-Hellman-like exchange. Even if attacker knows the PSK, past session traffic cannot be decrypted — this is <strong>forward secrecy</strong>.</div>
  </div>

  <div class="sub-section">
    <h3>802.1X / EAP Authentication</h3>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="label">Component</div>
        <div class="title">Supplicant</div>
        <p>The user/client device requesting network access.</p>
      </div>
      <div class="concept-card">
        <div class="label">Component</div>
        <div class="title">Authenticator</div>
        <p>Network edge device (switch/AP). Has uncontrolled port (auth channel) and controlled port (data — blocked until auth).</p>
      </div>
      <div class="concept-card good">
        <div class="label">Component</div>
        <div class="title">Authentication Server</div>
        <p>RADIUS server. Verifies credentials. Only client and auth server need to implement the EAP method.</p>
      </div>
    </div>

    <h4>EAP Methods</h4>
    <table class="ctable">
      <tr><th>Method</th><th>Certificates Needed</th><th>Notes</th></tr>
      <tr><td>EAP-TLS</td><td>Both sides</td><td>Strongest. TLS handshake encapsulated in EAP.</td></tr>
      <tr><td>EAP-TTLS</td><td>Server only</td><td>Client authenticates inside tunnel. More common.</td></tr>
      <tr><td>EAP-GPSK</td><td>None</td><td>Pre-shared key, mutual auth, session key derivation.</td></tr>
      <tr><td>LEAP</td><td>None</td><td>Uses MS-CHAP. <strong>Not secure.</strong></td></tr>
      <tr><td>EAP-AKA</td><td>SIM-based</td><td>Used in 3G/4G cellular (128-bit keys).</td></tr>
    </table>
  </div>

  <div class="sub-section">
    <h3>Notable Wireless Attacks</h3>
    <div class="attack-box">
      <div class="atk-label">CVE-2017-13078</div>
      <h4>KRACK — Key Reinstallation Attack (WPA2)</h4>
      <p>Attacker forces nonce reuse by replaying 4-way handshake message 3. When a nonce is reused, the keystream repeats. XOR of two ciphertexts encrypted with same keystream reveals XOR of plaintexts. Targets the WPA2 4-way handshake itself — not the key length.</p>
    </div>
    <div class="attack-box">
      <div class="atk-label">CVE-2019-15126</div>
      <h4>Kr00k</h4>
      <p>After a disassociation event, certain chips reset the session key to all zeros. Any buffered frames are encrypted with zero key — trivially decryptable.</p>
    </div>
  </div>

  <div class="pq-section">
    <h4>Practice Questions</h4>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> List five specific flaws in WEP that justified replacing it.</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">1) <strong>Short IV (24-bit)</strong> — forces IV reuse in busy networks, enabling keystream recovery. 2) <strong>No IV protection</strong> — IV sent in plaintext, attacker can target known IVs. 3) <strong>Directly uses master key</strong> — no per-session key derivation, one cracked packet risks everything. 4) <strong>Weak integrity (CRC-32)</strong> — linear, not cryptographic; bit-flipping attacks possible. 5) <strong>No replay protection</strong> — captured frames can be replayed. 6) <strong>Single shared key for all users</strong> — no user management, can't revoke one user. 7) <strong>No mutual authentication</strong> — client doesn't verify AP identity.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">MC</span> In a hotel using WPA2-PSK, what can a guest who knows the Wi-Fi password do to other guests' traffic?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">The guest can <strong>capture the 4-way WPA2 handshake</strong> of other guests joining the network. Because all users share the same PSK, and the session key is derived from PSK + captured nonces, the attacker can derive each victim's session key and decrypt their traffic. Any unencrypted application-layer traffic (no HTTPS/TLS) is fully readable. <strong>WPA3 with SAE prevents this</strong> — each client derives a unique key through the DH exchange; knowing the PSK doesn't help decrypt others' sessions.</div>
    </div>
  </div>
</section>

    <h3>4G LTE Authentication (AKA)</h3>
    <div class="step-flow">
      <div class="step"><div class="step-num">1</div><div class="step-body">UE sends Attach Request with IMSI (from SIM) or GUTI (temporary ID)</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-body">HSS generates Authentication Vector (AV) using Ki (long-term key in SIM)</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-body">AV sent to MME → challenge/response: UE and HSS both derive KASME from AKA(Ki, RAND)</div></div>

        <h4>DSSS (Direct Sequence)</h4>
        <p>Signal spread over wide bandwidth using a pseudo-random code. Looks like noise to eavesdroppers without the code. Used by ZigBee, GPS.</p>
      </div>
      <div>
        <h4>FHSS (Frequency Hopping)</h4>

  <div class="pq-section">
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Integrative</span> Compare Kerberos Authenticators to TLS client certificates — what problem does each solve and how?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">Both prove "I am who I claim to be right now." <strong>Kerberos Authenticator:</strong> Symmetric — client creates E(session_key, [ID, timestamp]). Proof = "I know the session key right now." Freshness enforced by timestamp + replay cache. <strong>TLS client certificate:</strong> Asymmetric — client signs a message with its private key. Proof = "I hold the private key corresponding to this certificate." Freshness enforced by the TLS challenge-response nonce. Kerberos scales without PKI but requires a live KDC for initial auth. TLS client certs work offline but require PKI infrastructure (CA, certificate management).</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Integrative</span> How could ARP spoofing + DNS cache poisoning be combined for a more powerful attack?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">Step 1: ARP spoof the gateway to MITM all traffic from victim LAN. Step 2: Intercept DNS queries the victim sends. Step 3: Send forged DNS replies with attacker's IP for targeted domains (e.g., bank.com → attacker_ip). Step 4: Victim's browser connects to attacker's server thinking it's the real bank. If HTTP only: full credential theft. If HTTPS: victim sees certificate warning (unless attacker also has a valid-looking cert via CA compromise). <strong>Defense chain:</strong> DNSSEC prevents DNS poisoning. TLS certificate validation prevents MITM even with poisoned DNS. Network segmentation limits ARP attack scope.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Integrative</span> Trace a packet from Host U (10.9.0.5) through a VPN to Host V (192.168.60.5). What happens at each step?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">1. Host U creates IP datagram: SRC=10.9.0.5, DST=192.168.60.5. 2. U's routing table has no route to 192.168.60.0/24 directly → VPN tunnel rule: send to VPN server 10.9.0.11. 3. VPN client on U <strong>encapsulates</strong> the original packet using ESP Tunnel Mode: new outer packet SRC=10.9.0.5, DST=10.9.0.11 with encrypted/authenticated payload. 4. Packet traverses 10.9.0.0/24 network. 5. VPN server receives, decrypts ESP tunnel → unwraps original packet with DST=192.168.60.5. 6. VPN server forwards (as a router) to 192.168.60.5 via the 192.168.60.0/24 interface. <strong>Security:</strong> Traffic on 10.9.0.0/24 shows only encrypted ESP packets between U and VPN server; internal IP structure hidden.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Integrative</span> An attacker compromises a BGP router and a DHCP server in a building. What two different scales of attack can they launch?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a"><strong>Local (DHCP):</strong> Rogue DHCP server assigns itself as the default gateway to all building clients. All building traffic routes through attacker → MITM at LAN scale. Defense: DHCP Snooping. <strong>Internet scale (BGP):</strong> BGP hijack — router announces false routes for IP prefixes it doesn't own. Global Internet routers believe the announcement and redirect traffic through the attacker. Can affect millions of users worldwide (e.g., 2008 Pakistan Telecom / YouTube incident). Defense: RPKI — cryptographic validation that an AS is authorized to announce specific prefixes. Both attacks exploit <em>lack of authentication in routing/configuration protocols</em>.</div>
    </div>
    <div class="pq">
      <div class="pq-q" onclick="toggle(this)">
        <div><span class="q-type">Short</span> What are the three checks the TGS performs on an Authenticator, and why is each needed?</div>
        <div class="arrow">›</div>
      </div>
      <div class="pq-a">1. <strong>Decryption succeeds</strong> using K_c,TGS from TGT → proves sender knows K_c,TGS (i.e., the session key only Alice and TGS know). 2. <strong>ID_client(TGT) == ID_client(Authenticator)</strong> → prevents a stolen TGT from being combined with a different user's Authenticator (combination attack). 3. <strong>|now − TS2| ≤ 5 minutes AND (ID_client, TS2) not in replay cache</strong> → prevents replay attacks. The freshness check bounds the replay window; the cache rejects even fresh duplicates within that window. All three together guarantee: the right person, right now, exactly once.</div>
    </div>
  </div>

<div id="s1" class="slide-block">

  <div class="slide-card">
    <div class="slide-num">Slide 1 — Overview</div>
    <h2>Overview</h2>
    <ul>
      <li>What is TCP protocol and how TCP works</li>
      <li>SYN Flooding Attack</li>
      <li>TCP Reset Attack</li>
      <li>TCP Session Hijacking Attack</li>
    </ul>
  </div>

  <div class="slide-card blue">
    <div class="slide-num">Slide 2 — TCP Protocol</div>
    <h2>TCP Protocol</h2>
    <ul>
      <li>Transmission Control Protocol (TCP) is a core protocol of the Internet protocol suite</li>
      <li>Sits on top of the IP layer; operates at the <strong>transport layer</strong></li>
      <li>Provides host-to-host communication services for applications</li>
      <li>Two transport layer protocols:
        <ul>
          <li>TCP: provides a <strong>reliable and ordered</strong> communication channel between applications</li>
          <li>UDP: lightweight protocol with lower overhead; used when reliability or order is not required</li>
        </ul>
      </li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">What TCP does</div><div class="kc-val">Provides reliable, ordered, error-checked delivery of data streams between applications over IP.</div></div>
        <div class="kc-item"><div class="kc-label">Where TCP lives</div><div class="kc-val">Layer 4 (Transport). Sits above IP (Layer 3) and below applications (Layer 5+).</div></div>
        <div class="kc-item"><div class="kc-label">TCP vs UDP</div><div class="kc-val">TCP = reliable + ordered. UDP = fast + unreliable. Choose based on application needs.</div></div>
        <div class="kc-item"><div class="kc-label">Why security matters</div><div class="kc-val">TCP has <strong>no built-in authentication</strong>. Anyone on the network can spoof packets and disrupt connections.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">🌀</span>
      <h3 style="color:#2563a8;">Understanding via Simon Sinek's Golden Circle</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <table class="gc-table">
        <thead>
          <tr>
            <th class="gc-why">🔴 WHY — Purpose</th>
            <th class="gc-how">🟡 HOW — Mechanism</th>
            <th class="gc-what">🟢 WHAT — Result</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Applications need a <strong>reliable pipe</strong> to send data over the unreliable Internet. IP alone drops, reorders, and duplicates packets — TCP fixes that.</td>
            <td>TCP uses <strong>sequence numbers, acknowledgements, timers, and retransmission</strong> to guarantee all data arrives in the correct order without loss or duplication.</td>
            <td>Your web browser, SSH session, and file downloads all work correctly because TCP silently manages reliability behind the scenes.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📖</span>
      <h3 style="color:#1e6b4a;">Beginner-Friendly Deep Dive</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="analogy">
        <div class="analogy-label">🎯 Analogy — Phone Call vs. Postal Service</div>
        <p>TCP is like a <strong>phone call</strong>: you establish a connection first, both parties confirm they're listening, and if you miss something you can ask for it again. UDP is like dropping a letter in a mailbox — you send it and hope it arrives, with no confirmation.</p>
      </div>
      <p><strong>Reliable</strong> means every byte sent by the sender is guaranteed to arrive at the receiver. If a packet is lost by a router, TCP <em>automatically retransmits</em> it.</p>
      <p><strong>Ordered</strong> means that even if packets arrive in a different order, TCP <em>reassembles them in the correct sequence</em> before handing data to your application via sequence numbers.</p>
      <p>TCP achieves this through <strong>sequence numbers</strong>. Every byte of data has a position number. The receiver sends back <strong>acknowledgements (ACKs)</strong> confirming which bytes it has received. If the sender doesn't receive an ACK within a timeout period, it retransmits.</p>
      <div class="warn-block">⚠️ <strong>Security Implication:</strong> TCP was designed in the 1970s for a trusted academic network. It has <strong>no authentication</strong> — TCP packets do not prove who sent them. Any attacker who can observe the network can potentially forge packets that appear to come from a trusted source. This is the root cause of all three attacks covered in this lecture.</div>
    </div>
  </div>
</div>

<div id="s2" class="slide-block">

  <div class="slide-card green">
    <div class="slide-num">Slide 3 — Data Transmission</div>
    <h2>Data Transmission</h2>
    <ul>
      <li>Once a connection is established, the OS allocates <strong>two buffers</strong> at each end: one <em>send buffer</em> and one <em>receive buffer</em></li>
      <li>When an application needs to send data, it places data into the TCP <strong>send buffer</strong></li>
      <li>TCP segments the buffer contents into packets, adds headers, and sends them across the network</li>
      <li>Packets may <strong>arrive out of order</strong>; TCP reassembles them into the correct sequence in the receive buffer</li>
      <li>Application reads from the receive buffer (ordered, complete data)</li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">Send Buffer</div><div class="kc-val">Holds outgoing data waiting to be sent. TCP reads from here in chunks (segments).</div></div>
        <div class="kc-item"><div class="kc-label">Receive Buffer</div><div class="kc-val">Holds incoming data, potentially out of order. TCP reorders it before delivering to the application.</div></div>
        <div class="kc-item"><div class="kc-label">Sequence Numbers</div><div class="kc-val">32-bit numbers tagging each byte, enabling both ordered delivery and attack exploitation.</div></div>
        <div class="kc-item"><div class="kc-label">Attack relevance</div><div class="kc-val">Session hijacking exploits the sequence number space — injecting data at the right position tricks the receiver.</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">🌀</span>
      <h3 style="color:#2563a8;">Simon Sinek's Golden Circle</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <table class="gc-table">
        <thead>
          <tr><th class="gc-why">🔴 WHY</th><th class="gc-how">🟡 HOW</th><th class="gc-what">🟢 WHAT</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>Applications generate data at their own rate; the network delivers it at a different rate. Buffers bridge this gap.</td>
            <td>OS kernel manages send/receive buffers. TCP segments data from the send buffer, numbers each segment, and reassembles into the receive buffer in order.</td>
            <td>Applications read a clean stream of data, never knowing about out-of-order delivery, retransmissions, or network hiccups happening underneath.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📖</span>
      <h3 style="color:#1e6b4a;">Beginner-Friendly Deep Dive</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="analogy">
        <div class="analogy-label">🎯 Analogy — Numbered Pages in a Book</div>
        <p>Imagine tearing out pages from a book and mailing them one by one. The post office might deliver them out of order (page 3 arrives before page 1). But because every page has a <strong>page number</strong> (sequence number), the reader can reassemble them in the correct order before reading.</p>
      </div>
      <p>The <strong>security implication</strong> of sequence numbers is profound: an attacker who can guess or observe the current sequence number can inject data into an existing TCP stream. The receiver's TCP stack will accept the injected data because it has the correct sequence number — it cannot tell whether the packet came from the real sender or a forger.</p>
      <p>This is the exact mechanism exploited by the <strong>TCP Session Hijacking Attack</strong> covered later in this lecture. Understanding buffers and sequence numbers now makes that attack intuitive.</p>
    </div>
  </div>
</div>

<div id="s3" class="slide-block">

  <div class="slide-card">
    <div class="slide-num">Slides 4–5 — TCP Client &amp; Server Programs</div>
    <h2>TCP Client &amp; Server Programs</h2>
    <ul>
      <li><strong>Client steps:</strong>
        <ul>
          <li>Step 1: Create a socket (SOCK_STREAM for TCP, SOCK_DGRAM for UDP)</li>
          <li>Step 2: Set destination information (IP + port)</li>
          <li>Step 3: <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">connect()</code> — initiates the 3-way handshake</li>
          <li>Step 4: <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">write()</code> / <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">send()</code> — sends data</li>
        </ul>
      </li>
      <li><strong>Server steps:</strong>
        <ul>
          <li>Step 1: Create a socket</li>
          <li>Step 2: <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">bind()</code> — attach to a port number</li>
          <li>Step 3: <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">listen()</code> — mark socket as accepting connections</li>
          <li>Step 4: <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">accept()</code> — block until a client connects</li>
          <li>Step 5: <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">read()</code> / <code style="font-family:var(--mono);font-size:.88em;background:#f0ede6;padding:1px 5px;border-radius:3px;">write()</code> — exchange data</li>
        </ul>
      </li>
    </ul>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📌</span>
      <h3 style="color:#b07d2a;">Key Concepts at a Glance</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="kc-grid">
        <div class="kc-item"><div class="kc-label">Socket</div><div class="kc-val">An OS abstraction representing one endpoint of a network connection. Identified by (IP, port, protocol).</div></div>
        <div class="kc-item"><div class="kc-label">SOCK_STREAM</div><div class="kc-val">TCP socket type. Provides bidirectional reliable byte stream.</div></div>
        <div class="kc-item"><div class="kc-label">bind()</div><div class="kc-val">Server pins itself to a specific port (e.g., 443 for HTTPS). Attackers target well-known ports.</div></div>
        <div class="kc-item"><div class="kc-label">listen()</div><div class="kc-val">Creates the <strong>backlog queue</strong> of half-open connections — the exact target of SYN Flood attacks!</div></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-icon">📖</span>
      <h3 style="color:#1e6b4a;">Beginner-Friendly Deep Dive</h3>
      <span class="panel-toggle">[collapse]</span>
    </div>
    <div class="panel-body">
      <div class="analogy">
        <div class="analogy-label">🎯 Analogy — Telephone System</div>
        <p>A <strong>socket</strong> is like a telephone handset. <code style="font-family:var(--mono);font-size:.9em;">bind()</code> is assigning your phone a number. <code style="font-family:var(--mono);font-size:.9em;">listen()</code> is turning on the ringer. <code style="font-family:var(--mono);font-size:.9em;">accept()</code> is picking up when the phone rings. <code style="font-family:var(--mono);font-size:.9em;">connect()</code> is dialing a number.</p>
      </div>
      <p>The <code style="font-family:var(--mono);font-size:.9em;">listen(sockfd, 5)</code> call is particularly important from a security perspective. The number <strong>5</strong> is the <em>backlog</em> — the maximum number of pending half-open connections the OS will queue. When this queue fills up, the server can no longer accept new connection requests. This is precisely what the SYN Flood attack exploits.</p>
      <div class="code-block">
<span class="cm">// Server-side C code — attack surface visible here</span>
sockfd = <span class="fn">socket</span>(AF_INET, SOCK_STREAM, <span class="nu">0</span>);   <span class="cm">// create socket</span>
<span class="fn">bind</span>(sockfd, ...);                          <span class="cm">// attach to port 9090</span>
<span class="fn">listen</span>(sockfd, <span class="nu">5</span>);                          <span class="cm">// ← backlog queue (attack target!)</span>
newsockfd = <span class="fn">accept</span>(sockfd, ...);            <span class="cm">// blocks until client connects</span>
      </div>
    </div>
  </div>
</div>
