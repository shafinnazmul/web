<!-- SLIDE 14 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 14</span>
    <span class="slide-title">The Kaminsky Attack</span>
  </div>
  <div class="slide-body">
    <p><strong>Core insight:</strong> How can we keep forging replies without worrying about the cache effect?</p>
    <p><strong>Kaminsky's idea:</strong></p>
    <ul>
      <li>Ask a <em>different random question</em> every time → local DNS server sends a new query each time → cache effect doesn't block repeated attempts</li>
      <li>Provide the forged answer in the <strong>Authority Section</strong>, not the Answer section</li>
      <li>Authority Section: "The nameserver for <code>example.com</code> is <code>ns.attacker32.com</code>"</li>
      <li>Once cached: <strong>all future queries for example.com go to attacker's DNS</strong></li>
    </ul>
  </div>
</div>

<!-- SLIDE 15 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 15</span>
    <span class="slide-title">The Kaminsky Attack — Sample Response</span>
  </div>
  <div class="slide-body">
    <div class="code-block">
      ;; QUESTION SECTION:
      ;<span class="n">twysw.example.com.</span>    IN A    <span class="c">← random name, changes each attempt</span>

      ;; ANSWER SECTION:
      twysw.example.com.  259200  IN  A  1.2.3.4
                              <span class="c">← this answer doesn't matter</span>

      ;; AUTHORITY SECTION:
      <span class="n">example.com.</span>        259200  IN  NS  <span class="k">ns.attacker32.com</span>
              <span class="c">↑ THIS is what we want cached ↑</span>
              <span class="c">Tell DNS: for example.com, use attacker's NS</span>
    </div>
  </div>
</div>

<!-- DISCUSSION Slides 14–15 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">Bypass Cache</span><div class="ki-text">By asking for random subdomains (twysw, abcde, xyzzy... each different), Kaminsky eliminates the cache-blocking defense. Each attempt is for a fresh uncached name.</div></div>
      <div class="key-item"><span class="ki-tag">Authority Section</span><div class="ki-text">The real poison is in the <strong>Authority Section</strong>, not the Answer. "Who is the NS for example.com?" → attacker's server. After this is cached, <em>all</em> queries for anything under example.com route to the attacker.</div></div>
      <div class="key-item"><span class="ki-tag">Impact</span><div class="ki-text">Once the NS record is poisoned, the attacker controls DNS for the <em>entire domain</em> — not just one hostname. www.bank.com, login.bank.com, mail.bank.com — all compromised.</div></div>
      <div class="key-item"><span class="ki-tag">Speed</span><div class="ki-text">With no cache blocking, attacker can send thousands of spoofed replies per second. On average, success in ~65,000 attempts (guessing 16-bit TxID if source port is unknown, or faster if one is fixed). In practice, exploits succeeded in seconds to minutes.</div></div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-flow">🔄 Kaminsky Attack Workflow</div>
    <div class="flow-wrap">
      <table class="flow-table">
        <thead>
          <tr><th>#</th><th>Actor</th><th>Action</th><th>Detail</th></tr>
        </thead>
        <tbody>
          <tr><td><span class="tag tag-attack">1</span></td><td>Attacker</td><td>Sends query to victim DNS for <code>rand123.example.com</code></td><td>Random subdomain — certainly not cached</td></tr>
          <tr><td><span class="tag tag-step">2</span></td><td>Victim DNS</td><td>Queries <code>example.com</code>'s nameserver</td><td>Sends query with random TxID + source port</td></tr>
          <tr><td><span class="tag tag-attack">3</span></td><td>Attacker</td><td>Floods victim DNS with spoofed replies (guessing TxID)</td><td>Authority section: NS for example.com = ns.attacker32.com</td></tr>
          <tr><td><span class="tag tag-step">4a</span></td><td>Victim DNS</td><td><em>If TxID guess is wrong</em> → discards, real reply accepted</td><td>Only <code>rand123.example.com</code> is cached — immediately try new random name</td></tr>
          <tr><td><span class="tag tag-warn">4b</span></td><td>Victim DNS</td><td><em>If TxID guess is correct</em> → accepts poisoned reply</td><td>Caches: <code>example.com NS = ns.attacker32.com</code></td></tr>
          <tr><td><span class="tag tag-warn">5</span></td><td>All users</td><td>Every query for *.example.com resolved by attacker's NS</td><td>Attacker returns any IP they choose for any hostname</td></tr>
        </tbody>
      </table>
    </div>
    <div class="info-box ib-warn">
      <span class="ib-icon">💣</span>
      <div class="ib-body"><strong>Historical Impact:</strong> Kaminsky disclosed this vulnerability in 2008. He coordinated a massive industry-wide patch effort before disclosure. The fix: randomize source port in addition to Transaction ID. The combined 32-bit entropy made the attack 65,000× harder.</div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-deep">📖 Why the Authority Section Injection Is Devastating</div>
    <p>Classic DNS cache poisoning poisons one record: "www.bank.com = 1.2.3.4". The Kaminsky attack poisons the <strong>delegation</strong>: "The authoritative nameserver for <em>all of bank.com</em> is now ns.attacker32.com". This is far more powerful because:</p>
    <ul style="padding-left:20px; color: var(--text2); font-size:0.95em;">
      <li style="margin-bottom:4px">Every subdomain (www, mail, vpn, internal, corp...) is now controlled by the attacker</li>
      <li style="margin-bottom:4px">The victim DNS server will consult the attacker's NS for every future lookup under that domain</li>
      <li style="margin-bottom:4px">The attacker can dynamically choose what IP to return — different IPs for different victims, or rotating phishing servers</li>
    </ul>
  </div>
</div>

<!-- QUESTIONS for Topics 4–7 -->
<div class="questions-section">
  <h3>❓ Practice Questions — DNS Attacks (Slides 10–15)</h3>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-mc">Multiple Choice</span>
      <span class="q-text">What two values must a remote attacker correctly guess to succeed in a remote DNS cache poisoning attack?</span>
    </div>
    <div class="q-options">
      <div class="q-opt"><span class="opt-letter">A</span>Destination IP and destination port</div>
      <div class="q-opt"><span class="opt-letter">B</span>Source port number and Transaction ID</div>
      <div class="q-opt"><span class="opt-letter">C</span>TTL value and source IP</div>
      <div class="q-opt"><span class="opt-letter">D</span>NS record type and answer section count</div>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>B.</strong> The attacker must guess the <strong>source port</strong> (randomized 16-bit number used by the local DNS resolver) and the <strong>Transaction ID</strong> (random 16-bit number in the DNS header). Together they provide ~32 bits of entropy. If both match, the local DNS server accepts the forged reply.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-mc">Multiple Choice</span>
      <span class="q-text">What is the key innovation of the Kaminsky attack that bypasses the "cache effect" limitation of remote DNS cache poisoning?</span>
    </div>
    <div class="q-options">
      <div class="q-opt"><span class="opt-letter">A</span>It uses TCP instead of UDP to guarantee delivery</div>
      <div class="q-opt"><span class="opt-letter">B</span>It asks a different random subdomain question each attempt, so the cache never blocks retry</div>
      <div class="q-opt"><span class="opt-letter">C</span>It floods the DNS server until it crashes</div>
      <div class="q-opt"><span class="opt-letter">D</span>It poisons the /etc/hosts file remotely</div>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>B.</strong> By asking for random subdomains (<code>rand1.example.com</code>, <code>rand2.example.com</code>...) that are certainly not cached, the attacker forces a new DNS query every attempt. If one attempt fails, the only thing cached is the random subdomain — the attacker is immediately free to try a new random name. The cache effect is eliminated.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-mc">Multiple Choice</span>
      <span class="q-text">In the Kaminsky attack, what is placed in the Authority Section of the forged response that makes it more powerful than a simple cache poisoning attack?</span>
    </div>
    <div class="q-options">
      <div class="q-opt"><span class="opt-letter">A</span>A fake A record for a single hostname</div>
      <div class="q-opt"><span class="opt-letter">B</span>A forged NS record claiming the attacker's server is the nameserver for the entire domain</div>
      <div class="q-opt"><span class="opt-letter">C</span>A CNAME pointing to a phishing site</div>
      <div class="q-opt"><span class="opt-letter">D</span>A MX record redirecting email</div>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>B.</strong> The forged Authority Section says: "The nameserver for <em>example.com</em> is <em>ns.attacker32.com</em>." Once cached, <strong>every future query for any subdomain under example.com</strong> goes to the attacker's nameserver, giving the attacker full control over the entire domain — vastly more powerful than poisoning a single hostname.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-tf">True / False</span>
      <span class="q-text">DNS cache poisoning from the LAN requires the attacker to correctly guess the Transaction ID, because the attacker cannot see the DNS queries being sent.</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>False.</strong> An attacker on the <strong>same LAN</strong> can <em>sniff</em> the DNS query and directly read the Transaction ID and source port from the packet. No guessing is needed. The LAN attacker only needs to send a spoofed reply <em>faster</em> than the real reply arrives. Guessing TxID is only required for <em>remote</em> attackers who cannot observe the network traffic.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-tf">True / False</span>
      <span class="q-text">Poisoning the local DNS server's cache affects only the user who triggered the poisoning query.</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>False.</strong> The local DNS server's cache is <strong>shared by all users</strong> who rely on that server. Poisoning it affects every client that queries for the poisoned domain — everyone in the organization — until the TTL of the fake record expires. This is why server-level cache poisoning is far more dangerous than machine-level /etc/hosts modification.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-sa">Short Answer</span>
      <span class="q-text">Explain the "cache effect" in DNS cache poisoning and why it presents a challenge for remote attackers.</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text">When a remote attacker tries to poison a DNS cache by sending a spoofed reply with a guessed Transaction ID and source port, they will usually fail (the guess is wrong). The moment the real DNS server returns the correct reply, the local DNS server caches it. The attacker cannot attempt to poison the same domain name again until that cached entry expires (per its TTL, which could be hours or days). This rate-limits the attacker to at most one attempt per TTL period — making brute-force attacks against a specific domain name impractically slow. <strong>The Kaminsky attack bypasses this by querying random subdomains that are never cached.</strong></div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-fb">Fill in the Blank</span>
      <span class="q-text">In the DNS packet structure, the two values a remote attacker must forge to successfully poison a DNS cache are the ________ (in the UDP header) and the ________ (in the DNS header).</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>Source port number</strong> (16-bit random value in the UDP header) and <strong>Transaction ID</strong> (16-bit random value in the DNS header). Together, when both fields are randomized, they provide 32 bits of entropy, making remote guessing attacks extremely difficult.</div>
    </div>
  </div>
</div>

<div class="topic-divider" id="s16">
  <div class="td-line"></div>
  <div class="td-label td-defense">Topic 8 — Defenses Against Cache Poisoning</div>
  <div class="td-line"></div>

<!-- SLIDE 16 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 16</span>
    <span class="slide-title">Protecting Against DNS Cache Poisoning Attacks</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>Defense 1 — Randomize Source Port:</strong> After Kaminsky's disclosure (2008), DNS resolvers began randomizing source ports in addition to Transaction IDs. Combined entropy ≈ 32 bits.</li>
      <li><strong>Defense 2 — DNSSEC:</strong> Cryptographic signatures on DNS records — chain of trust from root to authoritative server. Cannot be forged.</li>
      <li><strong>Defense 3 — TLS/SSL (HTTPS):</strong> Even if DNS is poisoned, TLS certificate validation at the application layer detects the impersonation.</li>
    </ul>
  </div>
</div>

<!-- SLIDE 17 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 17</span>
    <span class="slide-title">Protection Using DNSSEC</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>DNSKEY:</strong> Each zone publishes its public key</li>
      <li><strong>RRSIG:</strong> Cryptographic signatures for each DNS response</li>
      <li><strong>DS (Delegation Signer):</strong> One-way hash of the child zone's public key — stored in parent zone to create trust chain</li>
      <li>Chain of trust: Root signs .net's DNSKEY; .net signs example.net's DNSKEY; example.net signs its own records</li>
      <li>Resolvers verify signatures → forged replies detected (signature won't verify)</li>
    </ul>
  </div>
</div>

<!-- SLIDE 18 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 18</span>
    <span class="slide-title">Protection Using TLS/SSL</span>
  </div>
  <div class="slide-body">
    <ul>
      <li>After DNS resolves a domain name to an IP, the client connects via HTTPS</li>
      <li>The server must present a <strong>public-key certificate signed by a trusted CA</strong></li>
      <li>The server must prove it holds the corresponding <strong>private key</strong></li>
      <li>If DNS poisoning redirected to attacker's server → attacker can't present a valid certificate for <code>www.bank.com</code> → TLS handshake fails → browser shows certificate warning</li>
      <li>HTTPS is built on TLS/SSL → <strong>defeats DNS cache poisoning at the application layer</strong></li>
    </ul>
  </div>
</div>

<!-- SLIDE 19 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 19</span>
    <span class="slide-title">DNSSEC versus TLS/SSL</span>
  </div>
  <div class="slide-body">
    <ul>
      <li>Both DNSSEC and TLS/SSL use <strong>public-key cryptography</strong></li>
      <li><strong>Different chains of trust:</strong>
        <ul>
          <li>DNSSEC: trust chain follows <strong>DNS zone hierarchy</strong> (Root → TLD → Domain)</li>
          <li>TLS/SSL: trust chain goes through <strong>Certificate Authorities (CAs)</strong> — hundreds of trusted CAs pre-installed in browsers/OS</li>
        </ul>
      </li>
      <li>DNSSEC protects the DNS layer itself; TLS/SSL protects after DNS resolution</li>
      <li>They are <strong>complementary defenses</strong>, not alternatives</li>
    </ul>
  </div>
</div>

<!-- DISCUSSION Slides 16–19 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">DNSSEC</span><div class="ki-text">Cryptographically signs DNS records. A forged reply will have an <strong>invalid or missing signature</strong> → rejected by DNSSEC-validating resolvers. Protects the DNS protocol itself.</div></div>
      <div class="key-item"><span class="ki-tag">RRSIG</span><div class="ki-text">Resource Record SIGnature — the digital signature attached to each DNS response. Signed with the zone's private key; verified with the public DNSKEY record.</div></div>
      <div class="key-item"><span class="ki-tag">DS Record</span><div class="ki-text">Delegation Signer — a hash of the child zone's DNSKEY stored in the parent zone. Lets the parent vouch for the child's public key, creating the chain of trust.</div></div>
      <div class="key-item"><span class="ki-tag">TLS Defense</span><div class="ki-text">Defense-in-depth: even if DNS is poisoned and user connects to attacker's IP, <strong>TLS certificate validation</strong> catches the impersonation — the attacker can't forge a valid cert for a domain they don't own.</div></div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-flow">🔄 DNSSEC Chain of Trust Workflow</div>
    <div class="flow-wrap">
      <table class="flow-table">
        <thead>
          <tr><th>Layer</th><th>Server</th><th>What It Signs</th><th>Verified By</th></tr>
        </thead>
        <tbody>
          <tr><td><span class="tag tag-key">Root</span></td><td>Root servers</td><td>DNSKEY for .net TLD + RRSIG of root records</td><td>Resolver (root key pre-configured — "trust anchor")</td></tr>
          <tr><td><span class="tag tag-step">TLD</span></td><td>.net servers</td><td>DS record for example.net + RRSIG of .net records</td><td>Verified against Root's signature of .net DNSKEY</td></tr>
          <tr><td><span class="tag tag-ok">Domain</span></td><td>example.net server</td><td>DNSKEY + RRSIG for each A/MX/etc. record</td><td>Verified against .net's DS record</td></tr>
          <tr><td><span class="tag tag-ok">Resolver</span></td><td>Local DNS</td><td>Validates entire chain bottom-up</td><td>Rejects any response with invalid/missing signature</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-deep">📖 DNSSEC vs TLS — Complementary Defenses</div>
    <p><strong>DNSSEC</strong> is a DNS-layer defense: it ensures that the DNS resolution result itself hasn't been tampered with. If DNSSEC is properly deployed and validated, a poisoned reply will be cryptographically detected and rejected before the client even attempts to connect.</p>
    <p><strong>TLS/SSL</strong> is an application-layer defense: even if DNS was poisoned (and DNSSEC isn't deployed), TLS verifies that the server the client connects to actually controls the private key for the domain's certificate. An attacker's server can't impersonate bank.com without a valid certificate signed by a trusted CA for that domain.</p>
    <div class="info-box ib-good">
      <span class="ib-icon">✅</span>
      <div class="ib-body"><strong>Best Practice:</strong> Deploy both. DNSSEC stops poisoning before it happens. TLS stops exploitation even if poisoning succeeds. Neither alone is complete: DNSSEC is not universally deployed; TLS is ineffective if the attacker obtains a fraudulent certificate (possible via CA compromise).</div>
    </div>
    <div class="info-box ib-note">
      <span class="ib-icon">📌</span>
      <div class="ib-body"><strong>Key Difference in Trust Models:</strong> DNSSEC uses the <em>DNS zone hierarchy</em> as its chain of trust (hierarchical, controlled by domain owners). TLS uses <em>Certificate Authorities</em> — hundreds of trusted CAs are pre-installed in browsers, any of which can sign for any domain, creating a broader but potentially weaker trust model.</div>
    </div>
  </div>
</div>

<!-- QUESTIONS Defenses -->
<div class="questions-section">
  <h3>❓ Practice Questions — Defenses Against DNS Attacks (Slides 16–19)</h3>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-mc">Multiple Choice</span>
      <span class="q-text">Which DNSSEC record type stores a cryptographic signature for a DNS response?</span>
    </div>
    <div class="q-options">
      <div class="q-opt"><span class="opt-letter">A</span>DS (Delegation Signer)</div>
      <div class="q-opt"><span class="opt-letter">B</span>DNSKEY</div>
      <div class="q-opt"><span class="opt-letter">C</span>RRSIG (Resource Record Signature)</div>
      <div class="q-opt"><span class="opt-letter">D</span>SOA (Start of Authority)</div>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>C.</strong> RRSIG (Resource Record SIGnature) contains the digital signature for DNS records in a zone response. The DS record is the parent zone's hash of the child's DNSKEY. DNSKEY contains the public key itself. Together these three create the DNSSEC chain of trust.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-mc">Multiple Choice</span>
      <span class="q-text">How does TLS/SSL protect against DNS cache poisoning attacks?</span>
    </div>
    <div class="q-options">
      <div class="q-opt"><span class="opt-letter">A</span>It prevents DNS queries from being sent over the network</div>
      <div class="q-opt"><span class="opt-letter">B</span>It signs DNS records so forged replies are rejected</div>
      <div class="q-opt"><span class="opt-letter">C</span>Even if directed to a wrong IP, the server must prove ownership of the domain's certificate private key</div>
      <div class="q-opt"><span class="opt-letter">D</span>It encrypts DNS queries to prevent observation</div>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>C.</strong> TLS is an application-layer defense. After DNS resolves the domain (even if poisoned), the client initiates a TLS handshake. The server must present a valid certificate for the domain signed by a trusted CA, and prove it holds the corresponding private key. An attacker who intercepted DNS cannot forge this certificate — so the browser detects the impersonation via a certificate error.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-tf">True / False</span>
      <span class="q-text">DNSSEC and TLS/SSL both use the same Certificate Authority (CA)-based chain of trust.</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>False.</strong> DNSSEC uses the <strong>DNS zone hierarchy</strong> as its chain of trust: Root → TLD → domain. Each parent zone vouches for the child zone's public key via DS records. TLS/SSL uses the <strong>Certificate Authority (CA) infrastructure</strong> — a set of hundreds of independently trusted CAs that can issue certificates for any domain. The chains of trust are structurally different, though both rely on public-key cryptography.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-sa">Short Answer</span>
      <span class="q-text">Why are DNSSEC and TLS/SSL considered "complementary" rather than one replacing the other?</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text">They protect different layers of the attack chain. <strong>DNSSEC</strong> prevents poisoning at the DNS protocol level — a DNSSEC-validating resolver rejects forged DNS replies before the client connects to anything. <strong>TLS/SSL</strong> catches exploitation at the application layer — even if DNS was poisoned (e.g., DNSSEC not deployed), the client's TLS handshake will fail when the attacker can't provide a valid certificate. DNSSEC alone fails if the attacker obtains a fraudulent cert; TLS alone fails if DNSSEC isn't deployed and the attacker gets a certificate. Together they provide defense-in-depth.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-fb">Fill in the Blank</span>
      <span class="q-text">In DNSSEC, the ________ record in the parent zone contains a one-way hash of the child zone's public key, establishing the chain of trust between zones.</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>DS (Delegation Signer).</strong> The DS record in the parent zone (e.g., .net) holds a hash of the child zone's (e.g., example.net) DNSKEY record. When a resolver receives the child's DNSKEY, it can verify it by hashing it and comparing to the DS record — which was itself signed by the parent. This is how the chain of trust propagates from the root downward.</div>
    </div>
  </div>
</div>

<!-- SLIDE 20 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 20</span>
    <span class="slide-title">Denial of Services Attacks on DNS</span>
  </div>
  <div class="slide-body">
    <p>Goal: make DNS servers unavailable so names cannot be resolved → Internet becomes effectively unreachable for affected users.</p>
    <ul>
      <li>Three target tiers: Root servers, TLD servers, Domain-specific nameservers</li>
    </ul>
  </div>
</div>

<!-- SLIDE 21 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 21</span>
    <span class="slide-title">DoS Attacks on Root Servers</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>Root nameservers:</strong> If brought down, the entire Internet is disabled</li>
      <li><strong>Why it's hard to attack roots:</strong>
        <ul>
          <li><strong>Highly distributed:</strong> 13 logical root servers (A–M), each a <em>server farm</em> with many redundant machines</li>
          <li><strong>Anycast routing:</strong> Hundreds of instances globally — attacking one data center affects only local users</li>
          <li><strong>Cache protection:</strong> TLD nameserver addresses are cached in local DNS for 48 hours — root doesn't need to be queried constantly</li>
          <li>Attacks must be sustained for 48+ hours to have significant effect</li>
        </ul>
      </li>
    </ul>
  </div>
</div>

<!-- SLIDE 22 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 22</span>
    <span class="slide-title">DoS Attacks on TLD Servers</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>TLD servers are easier to attack</strong> than root servers</li>
      <li>Major TLDs (.gov, .com, .net) have resilient infrastructure</li>
      <li><strong>Vulnerable:</strong> Obscure country-code TLDs (ccTLDs) often have limited infrastructure</li>
      <li>Attacker can <strong>take down Internet access of an entire country</strong> by targeting its ccTLD (e.g., .ly, .io)</li>
    </ul>
  </div>
</div>

<!-- SLIDE 23 -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDE 23</span>
    <span class="slide-title">Attacks on Nameservers of a Particular Domain</span>
  </div>
  <div class="slide-body">
    <ul>
      <li><strong>Real-world example:</strong> UltraDNS — DNS provider for Amazon, Walmart, Expedia</li>
      <li>2004: DDoS against UltraDNS → all customer sites went offline for 1 hour just before Christmas</li>
      <li>Targeting DNS providers = single point of failure for many organizations</li>
      <li><strong>Mitigation:</strong> Use multiple independent DNS providers (redundancy)</li>
    </ul>
  </div>
</div>

<!-- DISCUSSION Slides 20–23 -->
<div class="discussion">
  <div class="disc-section">
    <div class="disc-label dl-key">📌 Key Concepts at a Glance</div>
    <div class="key-list">
      <div class="key-item"><span class="ki-tag">Root → hardest</span><div class="ki-text">Root servers use anycast — hundreds of globally distributed instances. Local cache of TLD records means root only needed every 48h. Sustained DDoS for days required to have global impact.</div></div>
      <div class="key-item"><span class="ki-tag">TLD → medium</span><div class="ki-text">Major TLDs (.com, .net) have good redundancy. <strong>ccTLDs often don't</strong> — taking down a small country's ccTLD is achievable and was done in practice (e.g., .ge during Georgia-Russia conflict 2008).</div></div>
      <div class="key-item"><span class="ki-tag">Domain NS → easiest</span><div class="ki-text">Organization-specific nameservers or DNS hosting providers are the most realistic targets. Many organizations use a single DNS provider — taking down that provider takes down all their customers.</div></div>
      <div class="key-item"><span class="ki-tag">DNS Amplification</span><div class="ki-text">DDoS vectors often use DNS amplification: send small spoofed UDP queries to open resolvers, which send large responses to the victim. Amplification factor can be 50–100×.</div></div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-golden">🌀 Simon Sinek's Golden Circle</div>
    <div class="golden-table">
      <div class="gc-cell gc-why">
        <div class="gc-circle">🔴 WHY attackers target DNS</div>
        <p>DNS is the phone book of the Internet. Without it, users can't reach services even if the services themselves are running. Taking down DNS is often easier than taking down the actual servers — and more impactful.</p>
      </div>
      <div class="gc-cell gc-how">
        <div class="gc-circle">🟡 HOW DoS works</div>
        <p>Flood the DNS server with more queries than it can handle. UDP-based DNS is particularly easy to flood — no connection establishment required. Use botnets to amplify the traffic volume. DNS amplification attacks use open resolvers to multiply attack traffic.</p>
      </div>
      <div class="gc-cell gc-what">
        <div class="gc-circle">🟢 WHAT defenses exist</div>
        <p>Anycast routing distributes load across many instances globally. Rate limiting and traffic filtering at the network edge. Multiple independent DNS providers (redundancy). Anycast deployment means attacking one instance is mostly harmless.</p>
      </div>
    </div>
  </div>

  <div class="disc-section">
    <div class="disc-label dl-flow">🔄 DoS Attack Tiers — Comparison</div>
    <div class="flow-wrap">
      <table class="flow-table">
        <thead>
          <tr><th>Target</th><th>Examples</th><th>Difficulty</th><th>Impact if Successful</th><th>Key Defense</th></tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>Root Servers</strong></td>
            <td>a.root-servers.net</td>
            <td><span class="tag tag-ok">Very Hard</span></td>
            <td>Global Internet disruption (after 48h cache expiry)</td>
            <td>Anycast, 100s of instances, 48h TLD caching</td>
          </tr>
          <tr>
            <td><strong>TLD Servers</strong></td>
            <td>.com, .edu, .gov</td>
            <td><span class="tag tag-step">Hard</span></td>
            <td>All domains under TLD unreachable</td>
            <td>Major TLDs: highly redundant; ccTLDs: weaker</td>
          </tr>
          <tr>
            <td><strong>ccTLD Servers</strong></td>
            <td>.ge, .ly, .io</td>
            <td><span class="tag tag-warn">Medium</span></td>
            <td>Country-level Internet disruption</td>
            <td>Limited — small operators, few redundant instances</td>
          </tr>
          <tr>
            <td><strong>Domain-Specific NS</strong></td>
            <td>Amazon's DNS, UltraDNS</td>
            <td><span class="tag tag-warn">Easier</span></td>
            <td>All sites using that provider go down</td>
            <td>Multiple DNS providers, geo-distributed NS</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="info-box ib-note">
      <span class="ib-icon">📰</span>
      <div class="ib-body"><strong>Historical Example:</strong> In October 2016, Dyn (a major DNS provider) suffered a massive DDoS attack using IoT-based botnets (Mirai botnet). Services including Twitter, Netflix, Reddit, and Spotify were inaccessible for hours. This single provider outage demonstrated how DNS infrastructure concentration creates critical vulnerabilities.</div>
    </div>
  </div>
</div>

<!-- QUESTIONS DoS -->
<div class="questions-section">
  <h3>❓ Practice Questions — DoS on DNS (Slides 20–23)</h3>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-mc">Multiple Choice</span>
      <span class="q-text">Why is it difficult to bring down the Internet by attacking root DNS servers?</span>
    </div>
    <div class="q-options">
      <div class="q-opt"><span class="opt-letter">A</span>Root servers use TCP, which is harder to flood than UDP</div>
      <div class="q-opt"><span class="opt-letter">B</span>Root servers are few in number but protected by firewalls</div>
      <div class="q-opt"><span class="opt-letter">C</span>Root servers are highly distributed via anycast, and TLD records are cached for ~48 hours so root is rarely queried</div>
      <div class="q-opt"><span class="opt-letter">D</span>Root servers use DNSSEC which blocks all DDoS packets</div>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>C.</strong> Root servers use anycast routing with hundreds of instances globally — taking down one data center affects only nearby users while the rest of the world is unaffected. Additionally, local DNS servers cache TLD nameserver addresses for approximately 48 hours, so the root servers don't need to be queried frequently. An attack would need to last 48+ hours and be global to have significant impact.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-mc">Multiple Choice</span>
      <span class="q-text">Which tier of DNS infrastructure is most vulnerable to DoS attacks and why?</span>
    </div>
    <div class="q-options">
      <div class="q-opt"><span class="opt-letter">A</span>Root servers — because there are only 13 of them</div>
      <div class="q-opt"><span class="opt-letter">B</span>Major TLD servers (.com, .net) — because they handle the most traffic</div>
      <div class="q-opt"><span class="opt-letter">C</span>Individual domain nameservers or small DNS providers — less redundancy</div>
      <div class="q-opt"><span class="opt-letter">D</span>Local DNS resolvers — because they are directly user-facing</div>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>C.</strong> Individual domain nameservers and small DNS hosting providers have limited redundancy. Many organizations rely on a single DNS provider — taking down that provider causes all their customers to go offline simultaneously. Country-code TLDs also fall into this category — they often lack the global infrastructure of major TLDs and can be taken down, effectively disrupting Internet access for an entire country.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-tf">True / False</span>
      <span class="q-text">A successful DoS attack on the root DNS servers would immediately cause global Internet failure.</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>False.</strong> Due to <strong>caching</strong>, the impact would be significantly delayed. Local DNS servers cache TLD nameserver addresses for approximately 48 hours. During this window, DNS resolution continues normally without consulting root servers. Only after the cache expires would users begin experiencing failures — and only if the attack is still ongoing. Additionally, anycast deployment means even a large attack would only affect the closest anycast instance.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-sa">Short Answer</span>
      <span class="q-text">Why might attacking a country-code TLD (ccTLD) be easier and more impactful for a targeted country than attacking the global root servers?</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text">ccTLD servers (e.g., .ge for Georgia, .ly for Libya) are often operated with limited infrastructure and fewer redundant instances compared to major TLDs. A sustained DDoS attack can overwhelm a ccTLD's servers, preventing resolution of all domain names under that TLD. The impact is concentrated: <strong>the entire Internet of the targeted country</strong> (all .ge domains, for example) becomes unreachable. This is geopolitically significant — it can be used to disrupt communications during conflicts. In contrast, attacking global root servers requires enormous botnet capacity and sustained effort for 48+ hours to overcome anycast redundancy and cache protection.</div>
    </div>
  </div>

  <div class="q-item">
    <div class="q-head">
      <span class="q-type qt-fb">Fill in the Blank</span>
      <span class="q-text">The root nameserver addresses for the TLDs are usually cached in local DNS servers for approximately ________ hours, which means a sustained DDoS attack on the root servers must last at least that long before having significant impact.</span>
    </div>
    <div class="q-answer">
      <span class="q-ans-label">✔ Answer</span>
      <div class="q-ans-text"><strong>48</strong> hours. TLD nameserver records (the addresses of .com, .net, .edu, etc. servers) are cached with a 48-hour TTL. During this window, local DNS servers can continue normal resolution without consulting root servers, making root server DDoS attacks very difficult to translate into immediate user impact.</div>

<div class="summary-section" id="summary">
  <h3>📊 Quick Reference Summary — Lecture 22: DNS Attacks</h3>
  <table class="sum-table">
    <thead>
      <tr><th>Concept</th><th>What It Is</th><th>Security Relevance / Exam Key Points</th></tr>
    </thead>
    <tbody>
      <tr>
        <td>DNS</td>
        <td><strong>Domain Name System</strong> — translates domain names to IP addresses. Hierarchical: Root → TLD → Domain.</td>
        <td>No built-in authentication in classic DNS (UDP, port 53). Foundation of all Internet communication — critical attack target.</td>
      </tr>
      <tr>
        <td>Local Resolution Order</td>
        <td>Machine cache / <code>/etc/hosts</code> → Local DNS server → Root → TLD → Authoritative NS</td>
        <td>Attacks at earlier steps in the chain are stealthier. <code>/etc/hosts</code> override is silent and requires no network attack.</td>
      </tr>
      <tr>
        <td>DNS Cache</td>
        <td>Local DNS servers cache responses per TTL to reduce repeated queries</td>
        <td>Poisoned cache entry persists until TTL expires, affecting all users. Long TTL = persistent attack. Short TTL = less damage.</td>
      </tr>
      <tr>
        <td>LAN Cache Poisoning</td>
        <td>Attacker on same LAN sniffs DNS query, sends spoofed reply before real reply arrives</td>
        <td>Race condition — LAN proximity gives attacker low-latency advantage. No guessing needed (TxID readable by sniffing). Poisons entire local DNS cache.</td>
      </tr>
      <tr>
        <td>Remote Cache Poisoning</td>
        <td>Attacker not on LAN must guess source port (16-bit) + Transaction ID (16-bit) = 32-bit entropy</td>
        <td>Cache effect blocks repeated attempts for same domain. ~2³² attempts needed on average without Kaminsky technique.</td>
      </tr>
      <tr>
        <td>Transaction ID</td>
        <td>16-bit random number in DNS header correlating query to reply</td>
        <td>Must match for forged reply to be accepted. Combined with source port randomization: 32-bit total entropy post-2008 patch.</td>
      </tr>
      <tr>
        <td>Kaminsky Attack</td>
        <td>Bypass cache effect by querying random subdomains; inject poison in Authority section (NS record)</td>
        <td><em>Disclosed 2008. Fixed by source port randomization.</em> Authority-section injection poisons entire domain delegation — far more powerful than single-record poisoning.</td>
      </tr>
      <tr>
        <td>Authority Section</td>
        <td>DNS response section indicating which nameserver is authoritative for a domain</td>
        <td>Poisoning the NS record here → attacker controls ALL future DNS queries for that domain, not just one hostname.</td>
      </tr>
      <tr>
        <td>DNSSEC</td>
        <td>Cryptographic signatures (RRSIG) on DNS records; chain of trust via DS + DNSKEY; zone hierarchy chain Root → TLD → Domain</td>
        <td>Forged replies have invalid signatures → rejected. Chain of trust: Root trust anchor → DS in parent → DNSKEY in child → RRSIG on records. Different from TLS (CA-based trust).</td>
      </tr>
      <tr>
        <td>RRSIG / DNSKEY / DS</td>
        <td>RRSIG = signature on response. DNSKEY = zone's public key. DS = parent's hash of child's DNSKEY.</td>
        <td>DS enables parent to vouch for child zone — crucial for chain of trust. Know all three for exam.</td>
      </tr>
      <tr>
        <td>TLS vs DNSSEC</td>
        <td>Both use public-key crypto. TLS: CA chain of trust, protects after DNS resolution. DNSSEC: zone hierarchy chain of trust, protects DNS protocol itself.</td>
        <td>Complementary defenses. DNSSEC protects DNS layer; TLS protects application layer. Neither replaces the other. Different trust models.</td>
      </tr>
      <tr>
        <td>DoS on Root Servers</td>
        <td>Flood root servers to prevent TLD resolution</td>
        <td>Very difficult: anycast (hundreds of instances), 48-hour TLD cache. Attack must be globally sustained for 48+ hours to have impact.</td>
      </tr>
      <tr>
        <td>DoS on TLD / ccTLD</td>
        <td>Target TLD (.com, .edu) or country-code (.ge, .ly) nameservers</td>
        <td>Major TLDs resilient. ccTLDs vulnerable — can take down a country's Internet. Historical: Georgia 2008, various ccTLD incidents.</td>
      </tr>
      <tr>
        <td>DoS on Domain NS</td>
        <td>Target specific domain's nameservers or DNS hosting providers</td>
        <td>High impact: single provider = many customer sites offline. UltraDNS 2004: Amazon, Walmart, Expedia offline for 1 hour. Defense: multiple redundant DNS providers.</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="integrative-section" id="exam">
  <h3>🎯 Exam Preparation — Integrative Questions</h3>

  <div class="int-q">
    <div class="int-q-head">
      <div class="iq-label">Integrative Short Answer</div>
      <p>Compare the LAN-based cache poisoning attack with the remote Kaminsky attack. What are the key differences in (a) attacker requirements, (b) attack mechanism, and (c) mitigation?</p>
    </div>
    <div class="int-q-ans">
      <strong>(a) Attacker Requirements:</strong><br>
      <ul>
        <li><em>LAN attack:</em> Attacker must be on the same network segment as the victim DNS server. Can passively sniff DNS queries to obtain Transaction ID and source port — no guessing needed.</li>
        <li><em>Remote Kaminsky:</em> Attacker can be anywhere on the Internet but must blind-guess the Transaction ID (and historically, source port). Requires sending many forged packets simultaneously.</li>
      </ul>
      <strong>(b) Attack Mechanism:</strong><br>
      <ul>
        <li><em>LAN:</em> Sniff query → read TxID → send spoofed reply faster than real server → wins the race condition → poisons cache with single record (A record) or NS record.</li>
        <li><em>Kaminsky:</em> Trigger queries for random subdomains → bypass cache effect (each attempt is fresh) → flood spoofed replies guessing TxID → inject forged NS record in Authority section → poisons entire domain delegation.</li>
      </ul>
      <strong>(c) Mitigation:</strong><br>
      <ul>
        <li><em>LAN:</em> DNSSEC (verifies signatures regardless of race outcome). Network-level: 802.1X authentication to prevent rogue LAN access. Detection via anomaly-based monitoring.</li>
        <li><em>Remote Kaminsky:</em> Source port randomization (adds 16 bits of entropy to TxID's 16 bits = 32-bit combined). DNSSEC (ultimate fix — cryptographic verification). DNS-over-TLS/HTTPS (encrypts queries, prevents observation by LAN attacker too).</li>
      </ul>
    </div>
  </div>

  <div class="int-q">
    <div class="int-q-head">
      <div class="iq-label">Integrative Short Answer</div>
      <p>An organization decides to use only HTTPS and not deploy DNSSEC, arguing that TLS will catch any DNS poisoning. Is this reasoning correct? What are the limitations of relying solely on TLS?</p>
    </div>
    <div class="int-q-ans">
      <strong>Partially correct, but with significant limitations:</strong><br>
      TLS does provide a strong second line of defense — if DNS is poisoned and a user connects to an attacker's IP, the TLS handshake will fail if the attacker cannot present a valid certificate for the domain. This is correct for most scenarios.
      <br><br>
      <strong>However, TLS-only has these limitations:</strong>
      <ol>
        <li><strong>CA compromise:</strong> If a Certificate Authority is compromised (or coerced), an attacker could obtain a valid certificate for any domain. TLS would then show no warning. DNSSEC uses the DNS hierarchy — a separate trust root — providing defense even if CAs are compromised.</li>
        <li><strong>User behavior:</strong> Many users click through certificate warnings. Without DNSSEC preventing the poisoning itself, users are exposed to social engineering.</li>
        <li><strong>Non-HTTPS protocols:</strong> TLS only protects HTTPS. Email (SMTP), FTP, and other protocols may not use TLS — DNS poisoning can redirect these without any TLS warning.</li>
        <li><strong>Phishing via valid certificates:</strong> An attacker who DNS-poisons to redirect to <code>bank.com.attacker.net</code> (which has a valid cert) can fool users who don't look closely at the certificate subject.</li>
      </ol>
      <strong>Conclusion:</strong> DNSSEC + TLS together provide defense-in-depth. DNSSEC stops the DNS layer attack before it can be exploited; TLS provides a final safety net at the application layer.
    </div>
  </div>

  <div class="int-q">
    <div class="int-q-head">
      <div class="iq-label">Challenge — Trace the Attack</div>
      <p>An attacker is located remotely (not on the same LAN as the victim's DNS server). Walk through each step of a successful Kaminsky-style attack against the local DNS server of a university, targeting the domain <code>university.edu</code>. State what the attacker achieves after success and what defenses could have prevented it at each step.</p>
    </div>
    <div class="int-q-ans">
      <strong>Step-by-step attack:</strong>
      <ol>
        <li><strong>Trigger query:</strong> Attacker sends DNS query to the victim's local DNS for <code>rand1.university.edu</code> (a random subdomain). Local DNS has no cache entry, so it queries the authoritative nameserver for university.edu.</li>
        <li><strong>Flood forged replies:</strong> While the real query is in-flight, attacker floods the local DNS server with thousands of forged UDP replies for <code>rand1.university.edu</code>, each guessing a different Transaction ID. All claim: Authority section = "university.edu NS is ns.attacker.com".</li>
        <li><strong>TxID match (probabilistic):</strong> With 16-bit TxID (65,536 possibilities), if source port is not randomized, attacker wins within ~1 second sending 65,536 packets/sec. With source port randomization (32-bit combined), attacker needs ~4 billion guesses — impractical.</li>
        <li><strong>If successful:</strong> Local DNS caches: "nameserver for university.edu = ns.attacker.com". All future DNS queries by any university user for anything under university.edu now go to attacker's NS server.</li>
        <li><strong>Attacker's control:</strong> Attacker can return any IP for any hostname — redirect login.university.edu to phishing site, mail.university.edu to attacker's mail server, etc.</li>
      </ol>
      <strong>Defenses at each step:</strong>
      <ul>
        <li>Step 2: <em>Source port randomization</em> — makes combined entropy 32 bits, attack infeasible at normal packet rates</li>
        <li>Step 3: <em>DNSSEC</em> — attacker's forged reply has no valid RRSIG; validating resolver rejects it regardless of TxID match</li>
        <li>Step 5 (if poisoning succeeded): <em>TLS</em> — attacker's server can't present valid certificate → browser certificate error → user protected if they heed warning</li>
      </ul>
    </div>
  </div>

  <div class="int-q">
    <div class="int-q-head">
      <div class="iq-label">True/False Analysis</div>
      <p>Evaluate: "DNSSEC protects DNS integrity by encrypting all DNS traffic between resolvers and authoritative servers."</p>
    </div>
    <div class="int-q-ans">
      <strong>False — common misconception.</strong><br>
      DNSSEC does <strong>not encrypt</strong> DNS traffic. DNS traffic sent with DNSSEC is still plaintext and visible to network observers — anyone can read the queries and responses. 
      <br><br>
      What DNSSEC provides is <strong>authentication and integrity</strong>: cryptographic signatures (RRSIG records) allow resolvers to verify that DNS responses came from the legitimate zone operator and haven't been modified in transit. A forged reply will lack a valid signature or have an invalid signature — the resolver detects the forgery and discards the response.
      <br><br>
      <strong>For encrypted DNS traffic</strong>, the technologies are <em>DNS-over-TLS (DoT)</em> and <em>DNS-over-HTTPS (DoH)</em>, which encrypt the DNS query/response payload. These are separate from DNSSEC and address a different threat (privacy — preventing observation of which domains you query). DNSSEC and DoT/DoH are complementary: DNSSEC provides integrity; DoT/DoH provides confidentiality.
    </div>
  </div>

  <div class="int-q">
    <div class="int-q-head">
      <div class="iq-label">Integrative — Threat Modeling</div>
      <p>A startup is building a financial services platform. Their security team asks: "What DNS-related threats should we worry about, and what defense layers should we implement?" Provide a structured answer addressing attack scenarios and corresponding defenses.</p>
    </div>
    <div class="int-q-ans">
      <strong>Threat Scenarios and Defenses:</strong>
      <ol>
        <li><strong>Threat: LAN Cache Poisoning</strong> — Internal attacker or compromised internal machine poisons the corporate DNS server. All users redirected to phishing login pages.<br>
        <em>Defenses:</em> Deploy DNSSEC on all authoritative zones. Use DNSSEC-validating resolvers internally. Network segmentation and 802.1X to limit who can reach the DNS server on the LAN.</li>

        <li><strong>Threat: Remote Kaminsky-style Attack</strong> — External attacker poisons the corporate DNS cache, redirecting users to attacker-controlled servers.<br>
        <em>Defenses:</em> Use DNSSEC-validating resolvers with source port randomization (post-2008 default). Deploying DNSSEC on your own domains ensures your NS delegation can't be poisoned. Use split-horizon DNS to minimize attack surface.</li>

        <li><strong>Threat: DoS on Corporate DNS</strong> — Attacker floods DNS servers to prevent name resolution.<br>
        <em>Defenses:</em> Use multiple independent DNS providers (geographic and organizational redundancy). Rate-limit incoming DNS queries. Deploy anycast DNS infrastructure. DNS provider SLAs and DDoS protection.</li>

        <li><strong>Threat: DNS Hijacking via /etc/hosts or resolver modification</strong> — Malware on employee machines modifies local DNS settings.<br>
        <em>Defenses:</em> Endpoint protection (antimalware). TLS/HTTPS as last line — even if DNS is hijacked, certificate errors alert users. Monitor DNS configuration drift.</li>

        <li><strong>Threat: DNS information leakage</strong> — Attackers observe DNS queries to map internal infrastructure.<br>
        <em>Defenses:</em> DNS-over-TLS or DNS-over-HTTPS for all external resolver communications. Minimize exposure of internal names via split-horizon DNS.</li>
      </ol>
      <strong>Summary defense stack:</strong> DNSSEC (integrity) + TLS/HTTPS (application-layer auth) + Source port randomization (resolver hardening) + Multiple DNS providers (availability) + DoT/DoH (privacy).
    </div>
  </div>
</div>
