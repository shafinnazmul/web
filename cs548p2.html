<div class="topic-header t3">
  <div class="topic-dot"></div>
  <h2>Topic 3 — Netfilter Framework &amp; iptables in Linux</h2>
  <span class="topic-num">Slides 13 – 23</span>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDES 13 – 16</span>
    <span class="slide-title">Netfilter &amp; Implementing a Simple Packet Filter Firewall</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content</h4>
      <ul>
        <li><strong>Netfilter</strong>: Rich packet processing and filtering framework in the Linux kernel.</li>
        <li>Each protocol stack defines a series of <strong>hooks</strong> along the packet traversal path.</li>
        <li>Developers register callback functions via <strong>LKMs (Loadable Kernel Modules)</strong>.</li>
        <li>When a packet reaches a hook, netfilter calls registered callbacks with the packet + hook number.</li>
        <li>Each module returns a <strong>verdict</strong>: <code>NF_ACCEPT</code> or <code>NF_DROP</code>.</li>
        <li>Simple firewall: check if protocol == TCP &amp;&amp; dest port == 23 → drop (block Telnet).</li>
        <li>Registration: <code>nf_register_hook(&amp;hookStruct)</code>; removal: <code>nf_unregister_hook</code>.</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>Netfilter Hooks</strong>5 hook points in the kernel: PRE_ROUTING, LOCAL_IN, FORWARD, LOCAL_OUT, POST_ROUTING. A module registers at one or more hooks to intercept packets at that traversal point.</div>
        <div class="kc-item"><strong>sk_buff (skb)</strong>The kernel data structure representing a packet. The struct sk_buff *skb parameter passed to callback functions contains the full packet — IP header, TCP header, and payload.</div>
        <div class="kc-item"><strong>LKM (Loadable Kernel Module)</strong>Code that can be inserted/removed from the kernel at runtime. <code>insmod</code> loads a module; <code>rmmod</code> removes it. Netfilter hooks are registered/unregistered in module init/exit functions.</div>
        <div class="kc-item"><strong>NF_ACCEPT / NF_DROP</strong>The two primary verdicts. NF_ACCEPT = let packet continue. NF_DROP = silently discard. Other verdicts include NF_STOLEN (module took ownership), NF_QUEUE (send to userspace), NF_REPEAT (process again).</div>
        <div class="kc-item"><strong>NF_INET_POST_ROUTING</strong>The hook used in the lecture example — packets that have been routed and are about to be sent out. Useful for filtering outgoing traffic.</div>
        <div class="kc-item"><strong>htons(23)</strong>Host-to-Network Short — converts port 23 from host byte order to network byte order. Network protocols use big-endian; x86 CPUs use little-endian. Always needed when comparing port numbers in kernel code.</div>
      </div>
    </div>

    <div class="golden-circle">
      <div class="gc-box gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Understanding Netfilter is essential for understanding how ALL Linux firewall tools work under the hood. iptables, nftables, and many security products all build on the Netfilter kernel framework. Understanding the hooks explains why iptables rules behave differently for local traffic vs. forwarded traffic.</p>
      </div>
      <div class="gc-box gc-how">
        <div class="gc-label">🟡 HOW — Process</div>
        <p>A developer writes a kernel module that: (1) defines a callback function that receives packets and returns a verdict; (2) fills a nf_hook_ops structure specifying the hook point, protocol family, and priority; (3) calls nf_register_hook() in the module's init function; (4) calls nf_unregister_hook() in the module's exit function. The kernel handles calling the callback for every packet at that hook point.</p>
      </div>
      <div class="gc-box gc-what">
        <div class="gc-label">🟢 WHAT — Result</div>
        <p>Custom packet filtering logic running at kernel speed, with access to the full packet contents. This is how iptables, connection tracking (conntrack), NAT, and many security tools are implemented. The hook architecture means multiple modules can register at the same hook, forming a processing pipeline.</p>
      </div>
    </div>

    <div class="deep-dive">
      <h4>📖 Deep Dive — Annotated Code Walkthrough</h4>
      <p>The lecture shows two code blocks. Let's analyze them in detail:</p>
      <div class="code-block"><span class="comment">/* The filtering callback function */</span>
unsigned int telnetFilter(unsigned int hooknum, struct sk_buff *skb, ...) {
    struct iphdr  *iph  = ip_hdr(skb);   <span class="comment">// Extract IP header from packet</span>
    struct tcphdr *tcph = (void*)iph + iph->ihl*4;  <span class="comment">// Extract TCP header</span>
    
    if (iph->protocol == IPPROTO_TCP &amp;&amp; tcph->dest == htons(23)) {
        <span class="comment">// TCP packet AND destination port is 23 (Telnet)</span>
        printk(KERN_INFO "Dropping telnet packet...");
        return NF_DROP;    <span class="comment">// Silently discard</span>
    } else {
        return NF_ACCEPT;  <span class="comment">// Allow everything else</span>
    }
}</div>
      <div class="code-block"><span class="comment">/* The setup function — registers the hook */</span>
int setUpFilter(void) {
    telnetFilterHook.hook     = telnetFilter;         <span class="comment">// Our callback</span>
    telnetFilterHook.hooknum  = NF_INET_POST_ROUTING; <span class="comment">// Where to intercept</span>
    telnetFilterHook.pf       = PF_INET;              <span class="comment">// IPv4 protocol family</span>
    telnetFilterHook.priority = NF_IP_PRI_FIRST;      <span class="comment">// Run before others</span>
    nf_register_hook(&amp;telnetFilterHook);              <span class="comment">// Register with kernel</span>
    return 0;
}</div>
      <p><strong>Testing sequence from the lecture:</strong></p>
      <p><code>sudo insmod telnetFilter.ko</code> — loads the module. Telnet to 10.0.2.5 → BLOCKED (module active).<br>
      <code>sudo rmmod telnetFilter</code> — removes the module. Telnet to 10.0.2.5 → SUCCEEDS (no filter).</p>
      <p>This demonstrates the kernel module lifecycle perfectly: load/unload at runtime without rebooting.</p>
    </div>
  </div>
</div>

<!-- IPTABLES -->
<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDES 18 – 23</span>
    <span class="slide-title">iptables Firewall in Linux — Tables, Chains, Rules &amp; Building a Simple Firewall</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content — iptables Structure</h4>
      <ul>
        <li>iptables = built-in firewall based on Netfilter. Kernel: <strong>Xtables</strong>; User-space: <strong>iptables</strong>.</li>
        <li>Rules arranged in <strong>Tables → Chains → Rules</strong> hierarchy.</li>
        <li><strong>filter table</strong>: INPUT, FORWARD, OUTPUT — packet filtering.</li>
        <li><strong>nat table</strong>: PREROUTING, INPUT, OUTPUT, POSTROUTING — address translation.</li>
        <li><strong>mangle table</strong>: all chains — packet content modification (TTL, TOS, marks).</li>
        <li>Extensions: <strong>conntrack</strong> (stateful — based on connection state) and <strong>owner</strong> (based on user/group ID).</li>
      </ul>
      <h4 style="margin-top:14px">Building a Firewall Workflow</h4>
      <ul>
        <li>Flush existing rules: <code>iptables -F</code></li>
        <li>Set default ACCEPT, then add rules, then set default DROP.</li>
        <li>Allow SSH (port 22) and HTTP (port 80) inbound TCP.</li>
        <li>Allow all outbound TCP and DNS (UDP port 53).</li>
        <li>Final default: <code>-P INPUT DROP</code>, <code>-P OUTPUT DROP</code>, <code>-P FORWARD DROP</code>.</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>iptables vs nftables</strong>iptables is the classic tool (pre-2014). nftables is the modern replacement but uses the same Netfilter infrastructure. The concepts are identical; syntax differs.</div>
        <div class="kc-item"><strong>Chain Evaluation</strong>Rules in a chain are evaluated top-to-bottom. First match wins. No match → chain's default policy applies.</div>
        <div class="kc-item"><strong>-A vs -I</strong>-A appends to end of chain; -I inserts at position (default: top). Order matters critically — wrong order can accidentally allow/block things.</div>
        <div class="kc-item"><strong>conntrack States</strong>NEW, ESTABLISHED, RELATED, INVALID. Common pattern: allow ESTABLISHED+RELATED inbound (replies to outbound), block NEW inbound (no unsolicited connections).</div>
        <div class="kc-item"><strong>owner Module</strong>Matches packets based on UID/GID of the process that created them. Works only for OUTPUT chain (outgoing packets). Cannot identify user for incoming packets.</div>
        <div class="kc-item"><strong>Default Deny (DROP)</strong>The secure default: set after explicit ACCEPT rules are in place. Ensures any traffic not matching an explicit rule is silently discarded.</div>
      </div>
    </div>

    <!-- iptables workflow table -->
    <div style="font-family: var(--mono); font-size: .72em; letter-spacing: .12em; text-transform: uppercase; color: var(--accent3); margin: 18px 0 10px;">🔀 iptables Tables &amp; Chains Reference</div>
    <div class="workflow-wrap">
      <table class="workflow-table">
        <thead>
          <tr><th>Table</th><th>Chains</th><th>Purpose</th><th>Common Use</th></tr>
        </thead>
        <tbody>
          <tr>
            <td class="hl">filter</td>
            <td>INPUT<br>FORWARD<br>OUTPUT</td>
            <td>Packet filtering — allow or deny</td>
            <td>Main firewall rules. INPUT = traffic to local host. FORWARD = traffic through router. OUTPUT = traffic from local host.</td>
          </tr>
          <tr>
            <td class="hl2">nat</td>
            <td>PREROUTING<br>INPUT<br>OUTPUT<br>POSTROUTING</td>
            <td>Modifying source/destination addresses</td>
            <td>PREROUTING: port forwarding (DNAT). POSTROUTING: masquerading/NAT (SNAT). INPUT/OUTPUT: for locally-generated/destined NAT.</td>
          </tr>
          <tr>
            <td class="hl3">mangle</td>
            <td>All 5 chains</td>
            <td>Packet content modification</td>
            <td>Modifying TTL, TOS, marking packets for QoS, setting conntrack marks. Advanced use cases only.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="font-family: var(--mono); font-size: .72em; letter-spacing: .12em; text-transform: uppercase; color: var(--accent3); margin: 18px 0 10px;">🔀 Step-by-Step Firewall Build Walkthrough</div>
    <div class="workflow-wrap">
      <table class="workflow-table">
        <thead>
          <tr><th>Step</th><th>Command</th><th>Effect</th><th>Why First / Reasoning</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td class="hl"><code>iptables -P INPUT ACCEPT<br>iptables -P OUTPUT ACCEPT<br>iptables -P FORWARD ACCEPT</code></td>
            <td>Set all chains to ACCEPT everything</td>
            <td>Critical: set ACCEPT before adding rules. If you set DROP first and then add rules, you may lock yourself out mid-configuration on a remote session.</td>
          </tr>
          <tr>
            <td>2</td>
            <td class="hl"><code>iptables -F</code></td>
            <td>Flush (delete) all existing rules</td>
            <td>Start with a clean slate. Old rules from previous sessions could conflict with or bypass new rules.</td>
          </tr>
          <tr>
            <td>3</td>
            <td class="hl"><code>iptables -A INPUT -p tcp --dport 22 -j ACCEPT<br>iptables -A INPUT -p tcp --dport 80 -j ACCEPT</code></td>
            <td>Allow inbound SSH (22) and HTTP (80)</td>
            <td>Only explicitly needed services allowed. SSH: remote management. HTTP: web server. All other inbound ports will be blocked by default DROP.</td>
          </tr>
          <tr>
            <td>4</td>
            <td class="hl"><code>iptables -A OUTPUT -p tcp -m tcp -j ACCEPT</code></td>
            <td>Allow all outbound TCP</td>
            <td>Allow local services to make outbound connections. -m tcp uses TCP match module for additional matching capability.</td>
          </tr>
          <tr>
            <td>5</td>
            <td class="hl"><code>iptables -A OUTPUT -p udp --dport 53 -j ACCEPT<br>iptables -A INPUT -p udp --sport 53 -j ACCEPT</code></td>
            <td>Allow DNS queries outbound and replies inbound</td>
            <td>Without DNS, no domain names resolve. Outbound to port 53 (query), inbound from port 53 (reply). This is why DNS must be explicitly permitted even with outbound TCP allowed — DNS uses UDP.</td>
          </tr>
          <tr>
            <td>6</td>
            <td class="hl"><code>iptables -P INPUT DROP<br>iptables -P OUTPUT DROP<br>iptables -P FORWARD DROP</code></td>
            <td>Set default policy to DROP</td>
            <td>Now that explicit ACCEPT rules are in place, anything not matched is silently dropped. This is the "default deny" security posture. Set LAST — after all ACCEPT rules — to avoid lockout.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="deep-dive">
      <h4>📖 Deep Dive — The owner Module &amp; User-Based Filtering</h4>
      <p>The lecture demonstrates a powerful feature: filtering based on <em>who</em> created the traffic, not just what it looks like. The command:</p>
      <div class="code-block">sudo iptables -A OUTPUT -m owner --uid-owner seed -j DROP</div>
      <p>This drops all outbound packets from user "seed". When user "seed" tries telnet → BLOCKED. When user "bob" tries telnet → SUCCEEDS (no rule matches bob's traffic).</p>
      <p><strong>Why only OUTPUT chain?</strong> Because the owner module can only match packets against the UID/GID of the <em>local process</em> that created them. For incoming packets, there is no local process — the packet came from the network. The UID of the remote sender is not in the IP packet. This is a fundamental architectural limitation, not a software bug.</p>
      <p><strong>Practical applications:</strong> (1) Prevent specific users from accessing the Internet. (2) Allow only the web server process (running as www-data) to make outbound connections on port 443. (3) Block all processes except an authorized backup agent from connecting to port 22 of the backup server.</p>
    </div>
  </div>
</div>

<!-- QUESTIONS TOPIC 3 -->
<div class="questions-section">
  <h3>🧪 Practice Questions — Topic 3: Netfilter &amp; iptables</h3>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-mc">MC</span><span class="q-text">In iptables, which table and chain would you use to block all incoming SSH connections to the local machine?</span></div>
    <div class="q-options">
      <div>A) nat table, PREROUTING chain</div>
      <div class="correct">B) filter table, INPUT chain</div>
      <div>C) filter table, FORWARD chain</div>
      <div>D) mangle table, INPUT chain</div>
    </div>
    <div class="q-answer"><strong>✔ Answer: B.</strong> The <strong>filter table</strong> is for packet filtering (allow/deny decisions). The <strong>INPUT chain</strong> handles packets destined for the local machine. To block SSH (port 22) arriving at the local host, you add a rule to filter:INPUT. The FORWARD chain handles packets passing through (not destined for the local host).</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-tf">T/F</span><span class="q-text">The iptables owner module can be used to block incoming traffic from a specific external user ID.</span></div>
    <div class="q-answer"><strong>✔ Answer: False.</strong> The owner module only works for the OUTPUT chain (outgoing packets created locally). It matches packets based on the UID/GID of the local process that generated them. For incoming packets, there is no local process — the packet came from the network — so the user ID of the remote sender is unavailable in the IP packet.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-mc">MC</span><span class="q-text">In the Netfilter architecture, what is the purpose of the NF_ACCEPT and NF_DROP return values from a callback function?</span></div>
    <div class="q-options">
      <div>A) NF_ACCEPT logs the packet; NF_DROP encrypts it</div>
      <div>B) NF_ACCEPT forwards to next hook; NF_DROP sends ICMP rejection</div>
      <div class="correct">C) NF_ACCEPT lets the packet continue; NF_DROP silently discards it</div>
      <div>D) NF_ACCEPT modifies the packet; NF_DROP returns it to sender</div>
    </div>
    <div class="q-answer"><strong>✔ Answer: C.</strong> These are the verdicts a Netfilter callback returns. NF_ACCEPT = let the packet continue its normal path through the kernel network stack. NF_DROP = silently discard the packet (no notification to sender). There's also NF_QUEUE (send to userspace) and NF_STOLEN (module takes ownership).</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-sa">Short Answer</span><span class="q-text">Explain why the default policy should be set to ACCEPT before adding rules, and then changed to DROP after all rules are added, when configuring iptables remotely.</span></div>
    <div class="q-answer"><strong>✔ Answer:</strong> If you set the default policy to DROP first and then add rules, any mistake or delay in adding rules means your SSH connection (which you're using to manage the firewall) gets blocked — locking you out of the remote server. The safe sequence is: (1) set default ACCEPT (all traffic still flows), (2) flush old rules, (3) add all needed ACCEPT rules, (4) finally set default DROP. This way, your SSH session is protected by an explicit ACCEPT rule before the default becomes DROP, preventing accidental lockout.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-fb">Fill Blank</span><span class="q-text">In iptables, the ________ flag appends a rule to the end of a chain, while ________ inserts it at the beginning. The command <code>iptables -F</code> ________ all rules in all chains.</span></div>
    <div class="q-answer"><strong>✔ Answer:</strong> <em>-A (append)</em> / <em>-I (insert)</em> / <em>flushes (deletes)</em>. Rule order matters critically in iptables — the first matching rule wins. -I is used when you need a rule to take priority over existing rules. -F with no arguments flushes all chains in the filter table.</div>
  </div>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDES 32 – 33</span>
    <span class="slide-title">Firewalls Aren't Perfect — Limitations &amp; Evasion Overview</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content — Limitations</h4>
      <ul>
        <li>Useless against <strong>insider attacks</strong> — attacker is already inside the perimeter.</li>
        <li>Cannot protect against <strong>malicious code executed on an internal machine</strong>.</li>
        <li>Cannot protect against <strong>transfer of virus-infected files</strong> (huge range of OS and file types).</li>
        <li>Evasion methods: <strong>SSH Tunneling</strong>, <strong>Dynamic Port Forwarding</strong>, <strong>VPN</strong>.</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>Insider Threat</strong>The firewall protects the perimeter. If an authorized insider is malicious, they're already inside — the firewall provides no protection. Banks and military organizations face the greatest insider threat risk.</div>
        <div class="kc-item"><strong>Malware on Internal Hosts</strong>If a user downloads malware (email attachment, USB drive), the malware runs inside the perimeter. The firewall may block some C&amp;C callbacks but cannot prevent local execution or lateral movement.</div>
        <div class="kc-item"><strong>Virus/Malware Transfer</strong>A firewall cannot inspect every file type for malware — there are too many formats, encryption methods, and zero-days. This requires endpoint protection (AV, EDR) in addition to firewalls.</div>
        <div class="kc-item"><strong>Encrypted Tunnels</strong>SSH tunneling, VPNs, and HTTPS proxies encrypt traffic, making it opaque to packet-filtering and stateful firewalls. Application proxies with TLS inspection can partially address this.</div>
      </div>
    </div>

    <div class="golden-circle">
      <div class="gc-box gc-why">
        <div class="gc-label">🔴 WHY — Purpose</div>
        <p>Understanding firewall limitations is as important as understanding capabilities. An organization that believes a firewall alone provides complete security will make critical mistakes. Defense-in-depth requires recognizing that firewalls are only one layer — endpoint security, IDS/IPS, user training, and monitoring are also essential.</p>
      </div>
      <div class="gc-box gc-how">
        <div class="gc-label">🟡 HOW — Evasion Works</div>
        <p>Evasion typically exploits one of two weaknesses: (1) The firewall allows a protocol that can be abused as a tunnel (e.g., SSH allows port forwarding, HTTPS allows proxy traffic). (2) The firewall cannot inspect encrypted content. Attackers route blocked protocols inside allowed, encrypted protocols.</p>
      </div>
      <div class="gc-box gc-what">
        <div class="gc-label">🟢 WHAT — Implication</div>
        <p>Security architects must assume that determined attackers will find evasion methods. Firewalls enforce policy for compliant users and block opportunistic attacks, but sophisticated attackers require a layered defense: firewalls + IDS/IPS + endpoint security + user behavior analytics + network segmentation.</p>
      </div>
    </div>
  </div>
</div>

<div class="slide-card">
  <div class="slide-header">
    <span class="slide-num">SLIDES 34 – 39</span>
    <span class="slide-title">SSH Tunneling &amp; Dynamic Port Forwarding</span>
  </div>
  <div class="slide-body">
    <div class="slide-content">
      <h4>Slide Content — SSH Tunneling Scenarios</h4>
      <ul>
        <li><strong>Scenario 1 (Inbound):</strong> Access a blocked service (Telnet to "work") through SSH to a permitted machine ("apollo") via local port forwarding.</li>
        <li>Command: <code>ssh -L 8000:work:23 apollo</code> then <code>telnet localhost 8000</code>.</li>
        <li><strong>Scenario 2 (Outbound — Egress Evasion):</strong> Access a blocked website (Facebook) from inside the corporate network via SSH to external "home" machine.</li>
        <li>Command: <code>ssh -L 8000:www.facebook.com:80 home</code> then browse localhost:8000.</li>
        <li><strong>Dynamic Port Forwarding (SOCKS Proxy):</strong> <code>ssh -D 9000 -C home</code> — creates a local SOCKS proxy on port 9000. Configure browser to use SOCKS 127.0.0.1:9000 — ALL browser traffic tunneled to "home."</li>
      </ul>
    </div>

    <div class="key-concepts">
      <h4>📌 Key Concepts at a Glance</h4>
      <div class="kc-grid">
        <div class="kc-item"><strong>Local Port Forwarding (-L)</strong><code>ssh -L local_port:remote_host:remote_port tunnel_host</code> — traffic to localhost:local_port is forwarded through the SSH tunnel to remote_host:remote_port. Destination is fixed.</div>
        <div class="kc-item"><strong>Dynamic Port Forwarding (-D)</strong><code>ssh -D local_port tunnel_host</code> — creates a SOCKS proxy. Destination is dynamic (decided by the client application per-connection).</div>
        <div class="kc-item"><strong>SOCKS Proxy</strong>A protocol for proxying network connections through an intermediary. SOCKS5 supports TCP and UDP. Client software must natively support SOCKS (most modern browsers do).</div>
        <div class="kc-item"><strong>Why This Evades Firewalls</strong>SSH traffic (port 22) is encrypted — the firewall sees SSH packets but cannot inspect contents. The tunnel endpoint (apollo/home) must be permitted. The tunneled protocol (Telnet, HTTP) is invisible to the firewall.</div>
        <div class="kc-item"><strong>-C flag</strong>Enables compression within the SSH tunnel. Reduces bandwidth usage, especially useful for text-heavy protocols tunneled through SSH.</div>
        <div class="kc-item"><strong>Detecting SSH Tunneling</strong>Network behavior analysis — unusually long-lived SSH connections with high data volume. DPI (Deep Packet Inspection) can identify protocol anomalies. Restricting SSH to specific servers reduces attack surface.</div>
      </div>
    </div>

    <!-- SSH Tunnel Workflow Table -->
    <div style="font-family: var(--mono); font-size: .72em; letter-spacing: .12em; text-transform: uppercase; color: var(--accent4); margin: 18px 0 10px;">🔀 SSH Tunneling Workflow — Scenario 1 (Inbound Access to Blocked Telnet)</div>

            <td>Data from localhost:8000 forwarded through encrypted SSH to apollo</td>

      </table>
    </div>

    <div style="font-family: var(--mono); font-size: .72em; letter-spacing: .12em; text-transform: uppercase; color: var(--accent4); margin: 18px 0 10px;">🔀 Dynamic Port Forwarding Workflow — SOCKS Proxy for Egress Evasion</div>
    <div class="workflow-wrap">
      <table class="workflow-table">
        <thead>
          <tr><th>Step</th><th>Action</th><th>What Happens</th><th>Firewall's View</th></tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td class="hl">User runs: <code>ssh -D 9000 -C home</code></td>
            <td>SSH tunnel established from "work" to "home". Local SOCKS5 proxy listening on port 9000 of "work."</td>
            <td>Outbound SSH (port 22) from work → home. Allowed.</td>
          </tr>
          <tr>
            <td>2</td>
            <td class="hl2">Configure browser: SOCKS host = 127.0.0.1, port = 9000</td>
            <td>All browser connections now go through SOCKS proxy on localhost:9000.</td>
            <td>Nothing visible yet — local browser config change.</td>
          </tr>
          <tr>
            <td>3</td>
            <td class="hl2">User browses to facebook.com (normally blocked)</td>
            <td>Browser sends SOCKS request to localhost:9000. SSH tunnel carries it to "home." "Home" opens TCP connection to facebook.com:80.</td>
            <td>Firewall sees: SSH traffic (work→home). No connection to facebook.com. Block on facebook.com is bypassed.</td>
          </tr>
          <tr>
            <td>4</td>
            <td class="hl3">Facebook response</td>
            <td>Facebook → home → SSH tunnel → work:9000 → browser. Full page loads.</td>
            <td>Still only sees SSH traffic. The actual web communication is completely hidden inside the encrypted SSH session.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="deep-dive">
      <h4>📖 Deep Dive — The Dual Nature of Tunneling</h4>
      <p>SSH tunneling has a fascinating dual nature in security: it's both a <em>security tool</em> (protecting sensitive traffic) and an <em>evasion tool</em> (bypassing security controls). The same command that a sysadmin uses to securely manage a remote server is the command an employee uses to bypass content filtering.</p>
      <p><strong>Organization's Dilemma:</strong> Should you block SSH? If you block SSH entirely, you eliminate tunneling but also prevent all legitimate remote management, SCP file transfers, and many development workflows. The typical approach is: (1) only allow SSH to specific, authorized servers (not arbitrary Internet hosts), (2) monitor SSH connections with long duration/high volume for anomalies, (3) use SSL/TLS inspection to catch HTTP proxying over port 443.</p>
      <div class="warning-box">Note: Dynamic port forwarding (SOCKS proxy) requires the client software to have native SOCKS support. Web browsers (Firefox, Chrome) natively support SOCKS. However, applications like curl require explicit SOCKS configuration. This is why SOCKS proxies work well for web browsing but may not tunnel all application traffic.</div>
      <p><strong>VPN vs SSH Tunneling:</strong> A VPN (e.g., OpenVPN, WireGuard) creates a virtual network interface and routes ALL network traffic through it at the OS level — no application-level configuration needed. SSH tunneling works at the port-forwarding level and requires either per-port configuration (-L) or SOCKS proxy configuration (-D). VPNs are more complete but more complex to set up. SSH tunneling is lightweight and uses existing infrastructure.</p>
    </div>
  </div>
</div>

<!-- QUESTIONS TOPIC 4 -->
<div class="questions-section">
  <h3>🧪 Practice Questions — Topic 4: Limitations &amp; Evasion</h3>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-mc">MC</span><span class="q-text">The command <code>ssh -L 8000:work:23 apollo</code> creates what type of tunnel?</span></div>
    <div class="q-options">
      <div>A) A SOCKS proxy that can forward any application's traffic</div>
      <div class="correct">B) A local port forward: traffic to localhost:8000 is forwarded to work:23 through apollo</div>
      <div>C) A reverse tunnel: apollo can connect back to localhost:8000</div>
      <div>D) A VPN tunnel encrypting all network traffic</div>
    </div>
    <div class="q-answer"><strong>✔ Answer: B.</strong> The -L flag means local port forwarding. The syntax is <code>-L local_port:destination:destination_port</code>. Port 8000 on localhost is forwarded through the SSH connection to apollo, which then connects to work:23. To use it: <code>telnet localhost 8000</code>.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-tf">T/F</span><span class="q-text">A corporate firewall blocking access to facebook.com by its IP address can be evaded using SSH dynamic port forwarding (-D flag).</span></div>
    <div class="q-answer"><strong>✔ Answer: True.</strong> SSH dynamic port forwarding creates a SOCKS proxy. When the browser connects to facebook.com through this SOCKS proxy, the actual TCP connection to facebook.com is made from the external SSH server ("home"), not from the corporate machine. The firewall only sees SSH traffic to the external server — the destination facebook.com is hidden inside the encrypted SSH session.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-mc">MC</span><span class="q-text">Which of the following is a limitation of traditional firewalls that makes them ineffective against insider threats?</span></div>
    <div class="q-options">
      <div>A) Firewalls cannot process packets fast enough to stop insider attacks</div>
      <div class="correct">B) Firewalls control traffic at the perimeter — insiders are already past the perimeter</div>
      <div>C) Firewalls require administrator credentials to stop insider threats</div>
      <div>D) Insiders can physically destroy the firewall hardware</div>
    </div>
    <div class="q-answer"><strong>✔ Answer: B.</strong> Firewalls provide perimeter defense — they control traffic flowing between trust zones. An insider threat (a malicious authorized user or a compromised internal machine) operates within the trusted zone, so the perimeter firewall provides no protection against their actions. This is why defense-in-depth (internal segmentation, endpoint security, behavioral monitoring) is essential.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-sa">Short Answer</span><span class="q-text">Compare SSH local port forwarding (-L) with SSH dynamic port forwarding (-D). What is the key difference, and when would you use each?</span></div>
    <div class="q-answer"><strong>✔ Answer:</strong> <strong>Local port forwarding (-L)</strong>: Fixed destination — one specific host:port is tunneled. Syntax: <code>ssh -L local_port:destination_host:destination_port tunnel_host</code>. Use when: you need access to one specific blocked service (e.g., Telnet to a specific server, RDP to a specific machine). <br><strong>Dynamic port forwarding (-D)</strong>: Creates a full SOCKS proxy — the destination is determined by the client application at runtime. Syntax: <code>ssh -D local_socks_port tunnel_host</code>. Use when: you need to tunnel many different destinations (e.g., browser to any website, all DNS queries). Much more flexible but requires SOCKS-compatible client software.</div>
  </div>

  <div class="q-block">
    <div class="q-header"><span class="q-tag q-fb">Fill Blank</span><span class="q-text">SSH dynamic port forwarding creates a ________ proxy on the local machine. The client software must have native ________ support to use it. The -C flag in the SSH command enables ________.</span></div>
    <div class="q-answer"><strong>✔ Answer:</strong> <em>SOCKS</em> / <em>SOCKS</em> / <em>compression</em>. SOCKS (Socket Secure) is an internet protocol that routes network packets between a client and server through a proxy server. The -C flag enables compression of the data stream, useful for reducing bandwidth consumption through the tunnel.</div>
  </div>
</div>

  📊 Quick Reference Summary — Lecture 16: Firewalls
</div>
<div class="quick-ref-wrap">
  <table class="quick-ref-table">
    <thead>
      <tr><th>Concept / Term</th><th>What It Is</th><th>Security / Exam Relevance</th></tr>
    </thead>
    <tbody>
      <tr><td class="concept">Firewall</td><td class="what">A choke point that controls and monitors all traffic between networks of differing trust levels. Must be: (1) complete (all traffic passes through), (2) policy-enforced, (3) hardened against attack.</td><td class="rel">Foundation of network perimeter security. Provides access control, auditing, and perimeter defense. Ineffective against insider threats.</td></tr>
      <tr><td class="concept">Packet Filter<br>(Stateless)</td><td class="what">Filters based on packet header fields only: src/dst IP, protocol, src/dst ports, TCP flags, ICMP type. No memory of previous packets. Simplest and fastest type.</td><td class="rel">Cannot detect application attacks, cannot auto-allow reply traffic, vulnerable to certain IP spoofing and fragmentation evasion. iptables without conntrack = stateless filter.</td></tr>
      <tr><td class="concept">Stateful Firewall</td><td class="what">Maintains a connection state table. Tracks NEW, ESTABLISHED, RELATED, INVALID states. Automatically permits reply traffic for established connections. Detects out-of-context packets.</td><td class="rel">Solves TCP return traffic problem. Can detect spoofed ACK packets with no SYN. Vulnerable to state exhaustion attacks (SYN flood).</td></tr>
      <tr><td class="concept">Application Proxy</td><td class="what">Two-connection model: client → proxy → server. Analyzes traffic up to Layer 7. Requires separate proxy per protocol (HTTP, SMTP, FTP). WAF is an HTTP-specific application proxy.</td><td class="rel">Only type that can detect application-layer attacks (SQLi, XSS). Can perform content inspection, URL filtering, malware scanning. Higher latency. Dual-use: legitimate security AND evasion tool.</td></tr>
      <tr><td class="concept">Ingress vs. Egress</td><td class="what">Ingress = incoming traffic inspection (protect from outside). Egress = outgoing traffic inspection (prevent data exfiltration, block malware C&amp;C callbacks, enforce policy).</td><td class="rel">Both are important. Egress filtering often neglected. Blocks malware callbacks, data theft, and prevents internal hosts from participating in DDoS attacks.</td></tr>
      <tr><td class="concept">Drop vs. Reject</td><td class="what">Drop = silently discard (no notification). Reject = discard AND send ICMP notification to sender.</td><td class="rel">Drop preferred for inbound Internet (stealth — doesn't reveal host existence). Reject can be used internally where latency matters more than stealth.</td></tr>
      <tr><td class="concept">Netfilter</td><td class="what">Linux kernel packet processing framework. Defines hook points (PRE_ROUTING, LOCAL_IN, FORWARD, LOCAL_OUT, POST_ROUTING). LKMs register callbacks at hooks. Foundation of iptables.</td><td class="rel">Callback returns NF_ACCEPT or NF_DROP. struct sk_buff *skb contains the full packet. htons() needed for port comparison (network byte order).</td></tr>
      <tr><td class="concept">iptables Tables</td><td class="what">filter (INPUT/FORWARD/OUTPUT) = packet filtering. nat (PREROUTING/POSTROUTING/etc.) = address translation. mangle = packet modification.</td><td class="rel">Most firewall rules go in filter table. NAT rules go in nat table. Chains within tables = specific traversal points. Default policy: ACCEPT first, then add rules, then DROP.</td></tr>
      <tr><td class="concept">conntrack Extension</td><td class="what">iptables extension enabling stateful rules. States: NEW, ESTABLISHED, RELATED, INVALID. Allows: "permit replies to established connections" with a single rule.</td><td class="rel">Essential for practical stateful filtering in iptables. Without conntrack, every return packet needs a separate explicit rule.</td></tr>
      <tr><td class="concept">owner Extension</td><td class="what">iptables extension matching packets by UID/GID of creating process. Only works for OUTPUT chain (local packets).</td><td class="rel">Enables user-based filtering: block Alice from Telnet, allow Bob. Cannot filter incoming packets by sender UID (not in IP header).</td></tr>
      <tr><td class="concept">SSH Local Forwarding (-L)</td><td class="what"><code>ssh -L local_port:dest:dest_port tunnel</code>. Creates fixed tunnel: localhost:local_port → dest:dest_port via tunnel host.</td><td class="rel">Evades firewalls blocking specific services. Firewall sees only SSH to tunnel host. Actual destination is hidden inside encrypted SSH session.</td></tr>
      <tr><td class="concept">SSH Dynamic Forwarding (-D)</td><td class="what"><code>ssh -D local_port tunnel</code>. Creates SOCKS5 proxy on local port. Browser configured to use SOCKS proxy tunnels all traffic through SSH to tunnel host.</td><td class="rel">More powerful than -L — tunnels any destination, not just one. Requires SOCKS-compatible client. Evades destination-IP-based egress filtering.</td></tr>
      <tr><td class="concept">Firewall Limitations</td><td class="what">Ineffective against: (1) insider threats, (2) malware executing on internal hosts, (3) virus-infected files, (4) attacks tunneled inside allowed protocols.</td><td class="rel">Firewalls are one layer — not complete security. Defense-in-depth: firewalls + EDR + IDS/IPS + DLP + user behavior analytics needed for comprehensive protection.</td></tr>
      <tr><td class="concept">WAF</td><td class="what">Web Application Firewall — application proxy specifically for HTTP/HTTPS. Analyzes HTTP requests/responses for SQLi, XSS, CSRF, path traversal, and other web attacks.</td><td class="rel">TLS terminator — decrypts HTTPS to inspect content. Modern WAFs use ML-based anomaly detection. Proxy firewalls inspect payload; stateful/packet-filter firewalls cannot detect web attacks.</td></tr>
    </tbody>
  </table>
</div>

<div class="integrative">
  <h2>🎯 Exam Preparation — Integrative Questions</h2>

  <div class="int-q">
    <div class="int-q-header">1. [Short Answer] Compare the three types of firewalls (packet filter, stateful, application proxy) in terms of: (a) what layer they inspect, (b) one attack each can detect that the previous type cannot, and (c) one limitation each has.</div>
    <div class="int-q-answer">
      <strong>Packet Filter (Stateless):</strong> Inspects only Layer 3-4 headers. Detects: port-based access violations (e.g., blocks Telnet port 23). Limitation: Cannot distinguish replies from new connections — cannot auto-allow TCP return traffic without broad rules; cannot detect application-layer attacks.<br><br>
      <strong>Stateful Firewall:</strong> Inspects Layer 3-4 + connection state table. Detects: spoofed packets out of context (e.g., ACK with no SYN, packets claiming to belong to non-existent sessions). Limitation: Cannot inspect application-layer content; vulnerable to state exhaustion (SYN flood filling the state table).<br><br>
      <strong>Application Proxy:</strong> Inspects all layers up to Layer 7. Detects: application-layer attacks (SQL injection in HTTP requests, SMTP envelope spoofing, malware in FTP transfers). Limitation: Requires separate proxy per protocol; highest latency; cannot support custom/proprietary protocols; proxy itself becomes a high-value attack target.
    </div>
  </div>

  <div class="int-q">
    <div class="int-q-header">2. [Short Answer] An organization uses a packet-filter firewall that blocks all inbound connections except TCP port 22 (SSH) and port 443 (HTTPS). A security auditor says this firewall configuration is "technically correct but practically insufficient." Explain three reasons why.</div>
    <div class="int-q-answer">
      <strong>Reason 1 — Application-Layer Attacks on HTTPS:</strong> A packet filter allows all traffic to port 443 regardless of content. An attacker can send SQLi, XSS, or malware download via HTTPS — all encrypted, all allowed. A WAF or TLS-inspecting proxy is needed.<br><br>
      <strong>Reason 2 — SSH Tunneling Evasion:</strong> The firewall allows port 22. An authorized user or attacker with SSH access to an internal machine can tunnel any blocked protocol (HTTP, Telnet, RDP) inside encrypted SSH. The filter sees only SSH traffic and cannot block the tunneled protocols.<br><br>
      <strong>Reason 3 — Insider Threats &amp; Internal Lateral Movement:</strong> The firewall controls the perimeter — traffic between internal hosts never passes through it. An insider or a compromised internal host can communicate freely with all other internal hosts, access databases, and exfiltrate data without the perimeter firewall seeing anything.
    </div>
  </div>

  <div class="int-q">
    <div class="int-q-header">3. [Short Answer] You need to write an iptables configuration that: (a) allows inbound SSH from only one trusted management IP (192.168.1.100), (b) allows all outbound HTTPS, (c) blocks all other inbound traffic, and (d) does NOT block already-established connections. Write the commands and explain each.</div>
    <div class="int-q-answer">
<div class="code-block"><span class="comment"># Step 1: Set defaults to ACCEPT first (prevents lockout)</span>
sudo iptables -P INPUT ACCEPT
sudo iptables -P OUTPUT ACCEPT
sudo iptables -P FORWARD ACCEPT

<span class="comment"># Step 2: Flush existing rules</span>
sudo iptables -F

<span class="comment"># Step 3: Allow inbound SSH only from trusted management IP</span>
sudo iptables -A INPUT -p tcp --dport 22 -s 192.168.1.100 -j ACCEPT
<span class="comment"># -s 192.168.1.100 restricts SSH to one specific source IP only</span>

<span class="comment"># Step 4: Allow inbound traffic for already-established connections</span>
sudo iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
<span class="comment"># ESTABLISHED = reply to connections we initiated; RELATED = expected secondary connections</span>
<span class="comment"># Without this, replies to our outbound HTTPS connections would be blocked</span>

<span class="comment"># Step 5: Allow outbound HTTPS</span>
sudo iptables -A OUTPUT -p tcp --dport 443 -j ACCEPT

<span class="comment"># Step 6: Set default DROP (after all rules in place)</span>
sudo iptables -P INPUT DROP
sudo iptables -P OUTPUT DROP
sudo iptables -P FORWARD DROP</div>
    </div>
  </div>

  <div class="int-q">
    <div class="int-q-header">4. [Short Answer] You work at a company whose firewall blocks YouTube. Your colleague says "just use dynamic SSH port forwarding." Describe step-by-step how this works, why the firewall fails to block it, and what countermeasures the company could deploy to prevent this evasion.</div>
    <div class="int-q-answer">
      <strong>How the Evasion Works:</strong> (1) Employee has an external machine ("home") reachable via SSH on port 22 (which the firewall allows). (2) Run: <code>ssh -D 9000 -C home</code> — creates SSH tunnel and SOCKS5 proxy on localhost:9000. (3) Configure browser: SOCKS proxy = 127.0.0.1:9000. (4) Browse to youtube.com — browser connects to localhost:9000 (SOCKS), SSH tunnel forwards request to "home," "home" connects to YouTube, response returns through tunnel. (5) Firewall sees: SSH traffic to "home." YouTube's IP never appears in firewall-visible connections.<br><br>
      <strong>Why Firewall Fails:</strong> The destination (YouTube) is hidden inside the encrypted SSH tunnel. The firewall only sees SSH traffic to an allowed external host. Without decrypting the SSH session, the firewall cannot know what's inside. Packet filters and stateful firewalls cannot inspect encrypted payloads.<br><br>
      <strong>Countermeasures:</strong> (1) <strong>Restrict SSH</strong> — only allow outbound SSH to explicitly approved servers (e.g., company jump hosts), not arbitrary Internet hosts. (2) <strong>TLS/SSL Inspection</strong> — deploy an SSL-inspecting proxy that terminates HTTPS and re-encrypts. While this doesn't stop SSH tunneling specifically, it helps with HTTPS-based proxies. (3) <strong>Network Behavior Analysis</strong> — monitor for unusually long-lived SSH connections with high bandwidth. (4) <strong>SOCKS Detection</strong> — some DPI systems can identify SOCKS protocol patterns inside SSH. (5) <strong>Application-Layer Firewall</strong> — identify and block SOCKS proxy protocol signatures.
    </div>
  </div>

  <div class="int-q">
    <div class="int-q-header">5. [True/False with Explanation — Exam Style] Evaluate each statement: (a) A stateful firewall can detect and block SQL injection attacks. (b) In iptables, the FORWARD chain handles traffic destined for the local machine. (c) The iptables owner module can restrict incoming traffic from specific remote users. (d) Proxy firewalls need separate proxies for each application protocol.</div>
    <div class="int-q-answer">
      <strong>(a) False.</strong> A stateful firewall tracks TCP connection state but does not inspect application-layer content. SQL injection is carried inside the HTTP payload — the stateful firewall sees only "port 80 TCP ESTABLISHED" and cannot analyze the SQL query in the request. Only an application proxy (WAF) can detect SQLi.<br><br>
      <strong>(b) False.</strong> The INPUT chain handles traffic destined for the local machine. The FORWARD chain handles traffic passing through the machine acting as a router (neither originating nor destined for the local machine). OUTPUT handles traffic generated by the local machine.<br><br>
      <strong>(c) False.</strong> The iptables owner module works only for the OUTPUT chain and matches packets by the UID/GID of the local process that created them. For incoming traffic, there is no local process — the remote sender's user ID is not contained in the IP packet. Owner module cannot filter based on remote user identity.<br><br>
      <strong>(d) True.</strong> An application proxy must fully understand and speak the application protocol to validate, filter, and forward requests. An HTTP proxy cannot handle SMTP traffic — it doesn't understand email envelope syntax, MIME encoding, or anti-spam rules. Separate, protocol-specific proxies (WAF for HTTP, SMTP firewall for email, DNS proxy, FTP proxy) are required for each protocol.
    </div>
  </div>
</div>

<!-- SLIDE 1: TCP/IP Layers                                   -->
<!-- ═══════════════════════════════════════════════════════ -->
<div id="sec-layers" class="slide-block">
  <div class="slide-num">Slide 3</div>
  <div class="slide-title">Layered Architecture of the TCP/IP Model</div>

  <div class="slide-content">
    <ul>
      <li><strong>L5 (Application):</strong> Application Security (e.g., SSH, HTTPS)</li>
      <li><strong>L4 (Transport):</strong> TLS / SSL / SSH sit here</li>
      <li><strong>L3 (Network):</strong> IPSec secures all traffic at this layer</li>
      <li><strong>L2 (Data Link):</strong> <strong>WEP, WPA, WPA2 (WPA3)</strong> operate here — between the wireless client and the access point. L2TP/PPTP also at this layer.</li>
      <li><strong>L1 (Physical):</strong> Radio-frequency signal transmission</li>
    </ul>
    <br>
    <p style="color:var(--text2);font-size:.9em;">The diagram shows the full stack from Wireless Client → Access Point → Router → Server, with security protocols labeled at each hop and layer.</p>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li>Wireless security protocols (WEP/WPA/WPA2) operate at <strong>Layer 2</strong> — the Data Link layer.</li>
      <li>Security can be applied at <strong>multiple layers simultaneously</strong> — defense in depth.</li>
      <li>WEP/WPA protect the wireless hop (client ↔ AP); once traffic leaves the AP it may be unprotected unless TLS/IPSec is also used.</li>
      <li>The AP is a <strong>critical trust boundary</strong> — traffic decrypted here and re-encrypted (or not) for the wired segment.</li>
      <li><strong>L2TP / PPTP</strong> are tunneling protocols also operating at Layer 2 for VPN-style connectivity.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-label"><div class="gc-dot"></div>🔴 WHY — Purpose</div>
      <p>Wireless networks broadcast over radio waves visible to anyone nearby. Without Layer 2 security, every packet you send over Wi-Fi can be captured by any device with a wireless adapter in promiscuous mode. We need security at the link layer to protect even the first hop.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-label"><div class="gc-dot"></div>🟡 HOW — Process</div>
      <p>Each layer adds its own protection headers and encryption. WPA2 encrypts the wireless link between your laptop and the AP. TLS then encrypts specific app connections above that. IPSec can protect all IP traffic in transit. These stack independently.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-label"><div class="gc-dot"></div>🟢 WHAT — Result</div>
      <p>Multiple independent protection layers (defense in depth). An attacker who breaks WEP still faces TLS on HTTPS. An attacker who compromises an AP cannot read IPSec-encrypted VPN traffic. No single layer failure is catastrophic.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p>Think of the TCP/IP stack as a series of <em>security checkpoints at an airport</em>. Before you even board (L1/L2 = the terminal and gate), your luggage is scanned (WPA2 encrypts the wireless link). Inside the plane (L3 = the network), your carry-on gets additional inspection (IPSec). At customs on the other side (L5 = the application), your passport is checked again (HTTPS/TLS). Each checkpoint is independent — removing one weakens the system but doesn't eliminate all protection.</p>
    <p><strong>Why does WEP/WPA operate at Layer 2?</strong> Because the wireless medium is shared. Layer 2 is the first point where a distinct sender/receiver relationship can be established. It's also the layer responsible for framing data and addressing it via MAC addresses — so encryption here protects the entire frame, including IP headers that higher layers cannot hide.</p>
    <p><strong>The critical insight:</strong> WPA2 only protects the air gap between your laptop and the access point. Once the AP decrypts your traffic and sends it over Ethernet to the router, the protection ends — unless TLS or IPSec is also present. This is why HTTPS remains essential even on "secure" Wi-Fi networks.</p>
    <div class="callout info">
      <span class="callout-icon">💡</span>
      <span class="callout-text"><strong>Exam tip:</strong> When asked where WEP/WPA operate, answer "Layer 2 (Data Link layer)" — not Layer 3, not Layer 4. It operates between the wireless station and the access point only.</span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->

    src="images/sl17_24v2/070.jpg"

<div class="slide-block">
  <div class="slide-num">Slide 4</div>
  <div class="slide-title">Data Link / Medium Access Control (MAC)</div>

  <div class="slide-content">
    <ul>
      <li><strong>Data Link / MAC layer</strong> handles communication in Local Access Networks (LANs)</li>
      <li><strong>Mediums:</strong> Ethernet cable, Wi-Fi (IEEE 802.11), LTE/4G/5G, Starlink</li>
      <li>MAC protocols govern how devices share a common medium</li>
      <li><strong>ARP (Address Resolution Protocol):</strong> Maps private IP addresses ↔ MAC/Physical addresses</li>
      <li>LAN security = wireless security (plus wired Ethernet security)</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li>Every network interface has a <strong>MAC address</strong> (48-bit, burned into hardware, e.g., <code>AA:BB:CC:DD:EE:FF</code>).</li>
      <li>IP addresses are logical (Layer 3); MAC addresses are physical (Layer 2).</li>
      <li><strong>ARP</strong> bridges these two: "Who has IP 192.168.1.10? Tell me your MAC."</li>
      <li>MAC addresses can be <strong>spoofed</strong> in software — MAC ≠ identity.</li>
      <li>Wi-Fi uses IEEE 802.11 standards for the physical and MAC layers.</li>
    </ul>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p>Imagine a large office floor with everyone sharing one giant conference-call line. That's a LAN. The MAC layer is the <em>moderator</em> deciding who speaks when, ensuring messages reach the right desk. Your <strong>MAC address</strong> is like your desk's nameplate — it's unique and printed there at manufacture. But unlike a desk nameplate, software can change it.</p>
    <p><strong>ARP bridges the gap:</strong> Your laptop knows Google's IP address (172.217.x.x) but doesn't know the MAC address of the next router hop. ARP broadcasts: "Hey everyone, who owns 192.168.1.1?" The router replies with its MAC address. Your laptop caches this and sends frames directly. This ARP cache can be <em>poisoned</em> — a critical wireless attack vector.</p>
    <p>Wi-Fi (IEEE 802.11) is just one type of MAC medium. Others include LTE (licensed spectrum, carrier-controlled) and Starlink (satellite-based). Each medium has different security properties — cellular (LTE/5G) uses SIM-based authentication, far stronger than Wi-Fi's PSK model.</p>
  </div>
</div>

<div id="sec-wifi-op" class="slide-block">
  <div class="slide-num">Slides 5–6</div>
  <div class="slide-title">Wi-Fi Operation & IEEE 802.11 Services</div>

  <div class="slide-content">
    <ul>
      <li>APs periodically broadcast <strong>beacons</strong> containing SSID and security level</li>
      <li>Stations listen to beacons, measure signal strength, choose best AP</li>
      <li>Stations can actively send <strong>Probe requests</strong> to discover nearby APs</li>
      <li>AP authenticates station using shared keys → encrypted packet exchange → <strong>Disassociate</strong> to log off</li>
    </ul>
    <br>
    <p style="color:var(--text2);font-size:.9em;"><strong>IEEE 802.11 Services:</strong> Association, Disassociation, Re-association, MSDU Delivery, Distribution, Integration, Authentication, De-authentication, Privacy (Encryption)</p>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>SSID</strong> (Service Set Identifier): the network name broadcast in the beacon.</li>
      <li><strong>BSS</strong> (Basic Service Set): a single AP and its associated stations.</li>
      <li><strong>ESS</strong> (Extended Service Set): multiple APs connected by a backbone, same SSID — enables roaming.</li>
      <li><strong>Re-association</strong> enables seamless handoff between APs (roaming within same ESS).</li>
      <li>Beacons are sent every 100ms by default — any attacker can capture SSID, supported rates, security capabilities.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-label"><div class="gc-dot"></div>🔴 WHY — Purpose</div>
      <p>Wi-Fi devices need a discovery mechanism to find available networks without pre-configuration. Beacons provide network advertisements passively; Probes allow active discovery. Without this, joining a network would require manual IP/MAC configuration for every device.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-label"><div class="gc-dot"></div>🟡 HOW — Process</div>
      <p>AP broadcasts beacon → station listens, measures RSSI → station probes (optional) → authentication handshake → association request/response → 4-way handshake for session key derivation → encrypted data exchange → disassociation.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-label"><div class="gc-dot"></div>🟢 WHAT — Result</div>
      <p>A seamless user experience: plug in your laptop, Wi-Fi connects automatically. The entire discovery-to-encryption process takes under a second. Re-association enables roaming between APs without losing connection — essential for enterprise campuses and hospitals.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p><em>The 802.11 join process, step by step:</em></p>
    <p><strong>1. Discovery:</strong> Your phone scans for beacons ("Hey, I'm 'Starbucks-WiFi', WPA2, Channel 6"). Alternatively, you can send a Probe Request ("Is anyone here named 'MyHome'?") and nearby APs with that SSID respond.</p>
    <p><strong>2. Authentication:</strong> In modern WPA2/WPA3 this is a formality (Open Authentication) — the real security happens during the 4-way handshake that derives session keys from the PSK or EAP credentials. In WEP, Shared Key Authentication actually happened here (and was broken).</p>
    <p><strong>3. Association:</strong> The station declares which security parameters it supports (WPA2-CCMP, WPA2-TKIP, etc.) and the AP confirms the selected parameters. The station is now "associated" but the 802.1X controlled port is still blocked — no data can flow until authentication completes.</p>
    <p><strong>4. Key Derivation (4-way handshake):</strong> Both sides prove knowledge of the PMK (Pairwise Master Key, derived from PSK or EAP) and derive the PTK (Pairwise Transient Key) for encrypting this specific session.</p>
    <div class="callout danger">
      <span class="callout-icon">⚠️</span>
      <span class="callout-text"><strong>Security note:</strong> Beacons are unauthenticated — any attacker can broadcast a fake beacon with the same SSID as your bank's network. This is the <em>Evil Twin</em> attack. Stations will associate with the strongest signal regardless of authenticity, unless the station verifies the AP's certificate (EAP-TLS).</span>
    </div>
  </div>
</div>

<div class="slide-block">
  <div class="slide-num">Slide 7</div>
  <div class="slide-title">History of Wireless LAN Security</div>

  <div class="slide-content">
    <ul>
      <li><strong>Open Authentication</strong> — AP accepts without question; used in public hotspots (hotels, airports)</li>
      <li><strong>WEP (1999)</strong> — Wired Equivalent Privacy; first encryption standard; contained major design flaws</li>
      <li><strong>WPA (2003)</strong> — Wi-Fi Protected Access; software patch to WEP hardware using TKIP</li>
      <li><strong>WPA2 / RSN (2004)</strong> — Robust Security Network; IEEE 802.11i final form; requires hardware; uses AES-CCMP</li>
      <li><strong>WPA3 (2018)</strong> — Replaces WPA2; SAE (dragonfly) handshake; forward secrecy</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li>The progression WEP → WPA → WPA2 → WPA3 reflects <strong>incremental fixes to discovered vulnerabilities</strong>.</li>
      <li>WPA was a <em>software fix</em> for existing WEP hardware — same RC4 cipher, better key management.</li>
      <li>WPA2 required <em>hardware replacement</em> because it uses AES (too computationally heavy for early WEP chips).</li>
      <li>WPA3's SAE (Simultaneous Authentication of Equals) provides <strong>forward secrecy</strong> — past traffic unreadable even if PSK is later compromised.</li>
    </ul>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive</h3>
    <p>Wireless security has evolved in direct response to attacks. This is not unique to Wi-Fi — almost all security protocols are a series of patches and rewrites as researchers discover new vulnerabilities. The timeline:</p>
    <p><strong>1999 — WEP:</strong> 802.11 was approved. Engineers wanted "wired equivalent" privacy — a reasonable goal. They chose RC4 (fast, simple) and a 40-bit key. What they missed: the IV (Initialization Vector) was only 24 bits, reused after 2^24 ≈ 16 million packets, and the key derivation was trivially reversible. By 2001, academic papers showed WEP could be cracked with just 5,000–10,000 packets using statistical attacks (FMS attack, later the Aircrack-ng tool).</p>
    <p><strong>2003 — WPA:</strong> The 802.11i standard wasn't finished, but the industry needed a fix. Wi-Fi Alliance released WPA as a firmware update that could run on existing WEP hardware. It added TKIP (Temporal Key Integrity Protocol) which generates per-packet keys and adds a Message Integrity Check (MIC, called "Michael"). Replay protection via sequence numbers. Still uses RC4 underneath — a stopgap.</p>
    <p><strong>2004 — WPA2:</strong> The full 802.11i standard. Replaced RC4 with <strong>AES</strong> and replaced TKIP with <strong>CCMP</strong> (Counter mode CBC-MAC Protocol). AES-CTR for encryption, CBC-MAC for integrity — both proven to be cryptographically strong. Required new hardware chipsets.</p>
    <p><strong>2018 — WPA3:</strong> Addressed WPA2's main weakness: PSK mode leaks enough information during the handshake for offline dictionary attacks. WPA3 uses SAE (a DH-based password-authenticated key exchange) that provides forward secrecy and prevents offline attacks even if the password is eventually compromised.</p>
    <div class="callout exam">
      <span class="callout-icon">🎯</span>
      <span class="callout-text"><strong>Exam hook:</strong> Know that WPA was a software-only fix (same RC4/hardware) while WPA2 required hardware replacement. Know that WPA3's key improvement is SAE with forward secrecy, which WPA2-PSK lacks.</span>
    </div>
  </div>
</div>

<div class="slide-block">
  <div class="slide-num">Slides 8–11</div>
  <div class="slide-title">WEP: Design, Authentication, Encapsulation & Problems</div>

  <div class="slide-content">
    <ul>
      <li><strong>Goal:</strong> Privacy similar to a wired network — not intended to stop hackers, just casual eavesdroppers</li>
      <li>Defined in IEEE 802.11b (1999); provides authentication and encryption</li>
      <li><strong>Shared Key Authentication:</strong> All users and APs share one single key</li>
      <li><strong>Authentication flow:</strong> AP sends Nonce (challenge) → Station encrypts nonce with RC4 using shared key → AP decrypts and verifies</li>
      <li><strong>Encapsulation:</strong> IV (24-bit) + WEP Key (40-bit or 104-bit) → fed into RC4 → XOR with (Data + ICV) → transmitted as [MAC hdr | IV | Pad | KID | Cipher text | CRC]</li>
    </ul>
  </div>

  <div class="key-concepts">
    <h3>📌 Key Concepts at a Glance</h3>
    <ul>
      <li><strong>RC4</strong> = stream cipher. WEP uses it as RC4(IV ‖ Key) to generate a keystream, then XORs with plaintext.</li>
      <li><strong>IV (Initialization Vector)</strong> = 24-bit random value prepended to the packet (sent in cleartext). Changes per-packet to vary the keystream.</li>
      <li><strong>ICV (Integrity Check Value)</strong> = CRC-32 over the plaintext. Not cryptographically secure.</li>
      <li><strong>KID (Key ID)</strong> = identifies which of up to 4 WEP keys to use.</li>
      <li>24-bit IV → 2^24 = 16,777,216 possible values → on busy networks, IVs repeat within hours → keystream reuse → statistical attacks.</li>
    </ul>
  </div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-label"><div class="gc-dot"></div>🔴 WHY — Purpose</div>
      <p>WEP was designed to give wireless networks the same privacy guarantee as wired Ethernet. On a wired network, you can't listen to someone else's traffic unless you're physically on the same wire. WEP tried to replicate this in a broadcast medium using encryption.</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-label"><div class="gc-dot"></div>🟡 HOW — Process</div>
      <p>Concatenate IV (24-bit random) with the shared WEP key (40 or 104 bits). Feed into RC4 to produce a keystream. Compute CRC-32 of plaintext → append as ICV. XOR (plaintext ‖ ICV) with keystream. Prepend IV in cleartext so receiver can reconstruct the same keystream.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-label"><div class="gc-dot"></div>🟢 WHAT — Result</div>
      <p>Encrypted packets that appear to prevent eavesdropping — but the 24-bit IV is far too small, IVs repeat in hours, the key derivation is cryptographically broken (RC4 weak keys), and CRC-32 is not a MAC — modifications can be made without detection. WEP was cracked completely by 2001.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive — WEP Encapsulation in Detail</h3>
    <p>Let's trace a packet through WEP encryption step by step:</p>
    <p><strong>Step 1:</strong> Choose a random 24-bit IV (e.g., <code>0xA1B2C3</code>). Concatenate with the WEP key (K1, 40-bit) to get a 64-bit seed.</p>
    <p><strong>Step 2:</strong> Feed the seed into RC4's key scheduling algorithm to generate a pseudorandom keystream as long as the data.</p>
    <p><strong>Step 3:</strong> Compute CRC-32 over the plaintext data → this becomes the ICV (4 bytes) appended to the data.</p>
    <p><strong>Step 4:</strong> XOR (data ‖ ICV) with the keystream to produce the ciphertext.</p>
    <p><strong>Step 5:</strong> Transmit: [MAC header | IV (24-bit, cleartext) | Pad | KID | Ciphertext | CRC]</p>
    <p><em>The fatal flaw:</em> The IV is sent in cleartext so the receiver can reconstruct the keystream. An eavesdropper also sees the IV. After collecting enough packets with the same IV (IV collision), the attacker can XOR two ciphertexts that share the same keystream, cancelling the keystream and revealing information about the plaintexts. With enough packets, the FMS attack can recover the WEP key directly from IV-keystream correlations in RC4's weak initialization.</p>
    <div class="callout danger">
      <span class="callout-icon">🔴</span>
      <span class="callout-text"><strong>WEP Problems Summary:</strong> (1) Manual key distribution — no centralized management; (2) Single key shared by all users — one compromised device exposes everyone; (3) 24-bit IV is too short — repeats within hours on busy networks; (4) CRC-32 is not a cryptographic MAC — attacker can flip bits and recompute ICV undetected; (5) No mutual authentication — client doesn't verify the AP; (6) No replay protection; (7) Directly uses master key — no key derivation hierarchy; (8) No user management / RADIUS.</span>
    </div>
  </div>

  <div class="workflow-wrap">
    <table class="workflow-table">
      <thead>
        <tr><th>Step</th><th>Actor</th><th>Action</th><th>Field / Key Used</th><th>Security Issue</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>1</strong></td>
          <td>Sender</td>
          <td>Generate IV + concatenate with WEP Key</td>
          <td><span class="tag phase-badge tag-enc">24-bit IV</span> + <span class="tag phase-badge tag-enc">40/104-bit Key</span></td>
          <td class="bad">IV only 24 bits → 16M values → reuse within hours</td>
        </tr>
        <tr>
          <td><strong>2</strong></td>
          <td>Sender</td>
          <td>Generate keystream via RC4(IV ‖ Key)</td>
          <td><span class="tag phase-badge tag-enc">RC4 stream cipher</span></td>
          <td class="bad">RC4 has known weak keys correlated to specific IV values</td>
        </tr>
        <tr>
          <td><strong>3</strong></td>
          <td>Sender</td>
          <td>Compute CRC-32 over plaintext → append as ICV</td>
          <td><span class="tag phase-badge tag-auth">ICV = CRC-32(data)</span></td>
          <td class="bad">CRC-32 is linear — attacker can modify ciphertext and recompute ICV</td>
        </tr>
        <tr>
          <td><strong>4</strong></td>
          <td>Sender</td>
          <td>XOR (data ‖ ICV) with keystream</td>
          <td><span class="tag phase-badge tag-enc">Ciphertext</span></td>
          <td class="warn">XOR with reused keystream → attacker cancels keystream, reads plaintext</td>
        </tr>
        <tr>
          <td><strong>5</strong></td>
          <td>Sender</td>
          <td>Transmit [IV (cleartext) | KID | Ciphertext | CRC]</td>
          <td><span class="tag phase-badge" style="background:#1a170e;color:#f4c45a;">IV sent openly</span></td>
          <td class="bad">IV exposed to attacker — enables all IV-based attacks</td>
        </tr>
        <tr>
          <td><strong>6</strong></td>
          <td>Receiver</td>
          <td>Reconstruct RC4(IV ‖ Key) → XOR to decrypt</td>
          <td><span class="tag phase-badge tag-enc">Same RC4 keystream</span></td>
          <td class="good">Decryption succeeds if key is correct</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="questions-section">
    <h3>🧪 Practice Questions — WEP</h3>

    <div class="question">
      <div class="q-type qt-mc">Multiple Choice</div>
      <div class="q-text">What is the size of the Initialization Vector (IV) in WEP?</div>
      <ul class="q-options">
        <li>A) 16 bits</li>
        <li class="correct">B) 24 bits</li>
        <li>C) 40 bits</li>
        <li>D) 48 bits</li>
      </ul>
      <div class="q-answer">✔ <strong>B) 24 bits.</strong> The 24-bit IV provides only 2^24 ≈ 16.7 million values. On a busy network, IV collisions occur within hours, enabling statistical attacks to recover the WEP key.</div>
    </div>

    <div class="question">
      <div class="q-type qt-tf">True / False</div>
      <div class="q-text">WEP provides mutual authentication between the station and the access point.</div>
      <div class="q-answer">✔ <strong>False.</strong> WEP's Shared Key Authentication only authenticates the station to the AP. The AP does not prove its identity to the station, making Evil Twin attacks possible.</div>
    </div>

    <div class="question">
      <div class="q-type qt-mc">Multiple Choice</div>
      <div class="q-text">Which of the following is NOT a weakness of WEP?</div>
      <ul class="q-options">
        <li>A) IV is too short and reused</li>
        <li>B) CRC-32 is used as the integrity check</li>
        <li class="correct">C) WEP uses AES-128 encryption</li>
        <li>D) No centralized key management</li>
      </ul>
      <div class="q-answer">✔ <strong>C) WEP uses AES-128 encryption</strong> — This is false. WEP uses RC4, not AES. All other options (A, B, D) are genuine WEP weaknesses.</div>
    </div>

    <div class="question">
      <div class="q-type qt-fill">Fill in the Blank</div>
      <div class="q-text">In WEP, the keystream is generated by feeding __________ into the RC4 algorithm, and the result is XORed with the __________ to produce ciphertext.</div>
      <div class="q-answer">✔ <strong>(IV ‖ WEP Key)</strong> into RC4; <strong>(plaintext ‖ ICV)</strong> to produce ciphertext. The IV is sent in cleartext with each frame.</div>
    </div>

    <div class="question">
      <div class="q-type qt-sa">Short Answer</div>
      <div class="q-text">Explain why WEP's use of CRC-32 as an integrity check is a security flaw.</div>
      <div class="q-answer">✔ CRC-32 is a checksum designed to detect random errors, not malicious modifications. It is a <strong>linear function</strong> — meaning an attacker who knows which bits to flip in the ciphertext can predict exactly how the ICV changes and recompute a valid ICV for the modified ciphertext. This allows an attacker to modify encrypted packets (e.g., change a destination IP) without the receiver detecting the tampering. A real cryptographic MAC (like HMAC) requires knowledge of a secret key to produce a valid tag, making such modifications detectable.</div>
    </div>
  </div>
</div>

  <div class="golden-circle">
    <div class="gc-card gc-why">
      <div class="gc-label"><div class="gc-dot"></div>🔴 WHY — Purpose</div>
      <p>WEP's cryptographic failures needed to be fixed without replacing billions of deployed devices. WPA provided an immediate software-patchable solution. WPA2 then replaced the cipher entirely with AES. WPA3 fixes WPA2's session key derivation weakness (offline PSK attacks).</p>
    </div>
    <div class="gc-card gc-how">
      <div class="gc-label"><div class="gc-dot"></div>🟡 HOW — Process</div>
      <p>WPA adds TKIP — per-packet key mixing using the master key + nonce + MAC address, ensuring each packet uses a unique keystream. WPA2 replaces RC4+TKIP with AES-CCMP entirely. WPA3 replaces the 4-way handshake's PSK derivation with SAE (a DH-based PAKE), preventing offline dictionary attacks.</p>
    </div>
    <div class="gc-card gc-what">
      <div class="gc-label"><div class="gc-dot"></div>🟢 WHAT — Result</div>
      <p>WPA2-Enterprise (AES + 802.1X/EAP) is the current gold standard for secure enterprise Wi-Fi. WPA3-Personal eliminates the main weakness of WPA2-Personal (offline password guessing from captured handshake). WPA3-Enterprise provides government-grade 192-bit security.</p>
    </div>
  </div>

  <div class="deep-dive">
    <h3>📖 Beginner-Friendly Deep Dive — TKIP and CCMP</h3>
    <p><strong>TKIP (Temporal Key Integrity Protocol):</strong> Think of TKIP as a "key mixer" built on top of WEP's RC4. For each packet, it takes the master key (TMK), the sender's MAC address, and a per-packet sequence number, mixes them through a two-phase key mixing function, and produces a unique 128-bit RC4 key for that packet only. It also adds a 64-bit MIC (called "Michael") over the frame header + payload to detect forgeries. The sequence number (TKIP counter) provides replay protection — the receiver rejects packets with old sequence numbers.</p>
    <p><strong>CCMP (Counter mode CBC-MAC Protocol):</strong> The real upgrade. CCMP uses AES (the gold-standard block cipher) in two modes simultaneously: AES in Counter Mode (CTR) for encryption, and AES in CBC-MAC mode for integrity. The combination is called CCM (Counter with CBC-MAC). Unlike TKIP's "bolt-on" security, CCMP was designed from scratch as a secure protocol. It provides confidentiality, integrity, replay protection, and data origin authentication in a single pass.</p>
    <p><em>Why did WPA2 require hardware replacement?</em> WEP chips were designed to run RC4, which is a simple stream cipher. AES is a block cipher requiring 10–14 rounds of substitutions and permutations — far too computationally intensive for the 2003-era Wi-Fi chipsets that were optimized for RC4. New chips with hardware AES acceleration were required.</p>
  </div>
